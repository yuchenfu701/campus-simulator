<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>设置 - 校园模拟器</title>
    <script src="js/campus-settings.js"></script>
    <link rel="stylesheet" href="css/campus-mobile.css">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(160deg, #0f172a 0%, #312e81 45%, #1e1b4b 100%);
            color: #e2e8f0;
            padding: 24px 18px 48px;
        }
        .page-title {
            font-size: 26px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .page-sub {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .card {
            max-width: 520px;
            margin: 0 auto 20px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(148,163,184,0.2);
            border-radius: 20px;
            padding: 22px 20px;
            backdrop-filter: blur(12px);
        }
        .card h2 {
            font-size: 17px;
            margin: 0 0 16px;
            color: #c4b5fd;
        }
        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 14px 0;
            border-bottom: 1px solid rgba(148,163,184,0.12);
        }
        .row:last-child { border-bottom: none; }
        .row-label { flex: 1; }
        .row-label strong { display: block; font-size: 15px; margin-bottom: 4px; }
        .row-label small { color: #94a3b8; font-size: 12px; line-height: 1.5; }
        .switch {
            width: 52px;
            height: 30px;
            border-radius: 15px;
            background: #475569;
            position: relative;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.25s;
        }
        .switch.on { background: linear-gradient(135deg, #8b5cf6, #6366f1); }
        .switch::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: white;
            top: 3px;
            left: 3px;
            transition: transform 0.25s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.25);
        }
        .switch.on::after { transform: translateX(22px); }
        .btn-back {
            display: block;
            max-width: 520px;
            margin: 28px auto 0;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            color: #e2e8f0;
            border: 1px solid rgba(148,163,184,0.25);
        }
        .btn-back:active { opacity: 0.85; }
        .plat-btn {
            padding: 12px 8px;
            border-radius: 12px;
            border: 1px solid rgba(148,163,184,0.2);
            background: rgba(255,255,255,0.05);
            color: #e2e8f0;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s, border-color .2s;
        }
        .plat-btn:hover { background: rgba(255,255,255,0.1); }
        .plat-btn.active {
            background: linear-gradient(135deg,rgba(139,92,246,.3),rgba(99,102,241,.3));
            border-color: #8b5cf6;
            color: #c4b5fd;
        }
        .tips {
            max-width: 520px;
            margin: 16px auto 0;
            font-size: 12px;
            color: #64748b;
            line-height: 1.7;
            padding: 0 8px;
        }
    </style>
</head>
<body>
    <div class="page-title">⚙️ 设置</div>
    <div class="page-sub">根据你的设备选择平台，界面自动适配</div>

    <!-- 平台选择 -->
    <div class="card">
        <h2>📱 选择平台</h2>
        <div id="platform-current" style="font-size:13px;color:#94a3b8;margin-bottom:14px;min-height:20px;"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">
            <button class="plat-btn" id="plat-win" onclick="setPlatform('windows')">🪟 Windows</button>
            <button class="plat-btn" id="plat-mac" onclick="setPlatform('mac')"> macOS</button>
            <button class="plat-btn" id="plat-ios" onclick="setPlatform('ios')">📱 iPhone</button>
            <button class="plat-btn" id="plat-android" onclick="setPlatform('android')">🤖 华为/安卓</button>
        </div>
        <div class="row" style="padding-top:0;">
            <div class="row-label">
                <small>Windows / macOS → 电脑布局 &nbsp;·&nbsp; iPhone / 华为 → 触控布局。也可前往 <a href="download.html" style="color:#8b5cf6;">下载页</a> 获取安装包。</small>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>显示与操作</h2>
        <div class="row">
            <div class="row-label">
                <strong>减少动态效果</strong>
                <small>减弱部分动画（若页面支持）。</small>
            </div>
            <div class="switch" id="sw-motion" role="switch" onclick="toggleMotion()"></div>
        </div>
    </div>

    <!-- 云端服务器配置 -->
    <div class="card">
        <h2>🌐 云端服务器</h2>
        <div class="row" style="flex-direction:column;align-items:flex-start;gap:10px;">
            <div class="row-label">
                <strong>服务器地址</strong>
                <small>填入云端后端地址，启用多设备聊天、帖子、好友等功能。</small>
            </div>
            <input id="serverUrlInput" type="url"
                placeholder="https://xxx.b4a.run"
                style="width:100%;padding:10px 14px;border-radius:10px;border:1px solid rgba(148,163,184,0.3);
                       background:rgba(255,255,255,0.08);color:#e2e8f0;font-size:14px;outline:none;box-sizing:border-box;">
            <div style="display:flex;gap:8px;width:100%;">
                <button onclick="saveServer()"
                    style="flex:1;padding:10px;border:none;border-radius:10px;
                           background:linear-gradient(135deg,#8b5cf6,#6366f1);
                           color:white;font-size:14px;font-weight:700;cursor:pointer;">
                    💾 保存
                </button>
                <button onclick="testServer()"
                    style="flex:1;padding:10px;border:none;border-radius:10px;
                           background:rgba(255,255,255,0.1);border:1px solid rgba(148,163,184,0.25);
                           color:#e2e8f0;font-size:14px;cursor:pointer;">
                    🔍 测试连接
                </button>
            </div>
            <div id="serverStatus" style="font-size:13px;color:#94a3b8;min-height:18px;"></div>
        </div>
    </div>

    <div class="card">
        <h2>说明</h2>
        <div class="row" style="border:none;padding-top:0;">
            <div class="row-label">
                <small>设置保存在本机浏览器。更换设备或清除数据后需重新开启手机模式。电脑也可手动开启以预览手机布局。</small>
            </div>
        </div>
    </div>

    <button class="btn-back" onclick="goBack()">← 返回</button>
    <p class="tips">2D：滑动画布移动角色；轻点画布为「交互」。3D：左侧轮盘移动，右侧按钮交互 / 跳跃。</p>

    <script>
        var PLAT_LABELS = {windows:'🪟 Windows（电脑布局）',mac:' macOS（电脑布局）',ios:'📱 iPhone（触控布局）',android:'🤖 华为/安卓（触控布局）'};
        function setPlatform(p) {
            localStorage.setItem('platform', p);
            var isDesktop = p==='windows'||p==='mac';
            CampusSettings.setMobileMode(!isDesktop);
            ['windows','mac','ios','android'].forEach(function(id){
                var map = {windows:'win',mac:'mac',ios:'ios',android:'android'};
                var btn = document.getElementById('plat-'+map[id]);
                if(btn) btn.classList.toggle('active', id===p);
            });
            var cur = document.getElementById('platform-current');
            if(cur) cur.textContent = '当前：' + (PLAT_LABELS[p]||p);
        }
        function toggleMotion() {
            CampusSettings.setReduceMotion(!CampusSettings.load().reduceMotion);
            var rm = !!CampusSettings.load().reduceMotion;
            document.getElementById('sw-motion').classList.toggle('on', rm);
        }
        (function init(){
            var saved = localStorage.getItem('platform') || (CampusSettings.isMobileMode()?'android':'windows');
            setPlatform(saved);
            var rm = !!CampusSettings.load().reduceMotion;
            document.getElementById('sw-motion').classList.toggle('on', rm);
        })();
        function goBack() {
            if (window.parent && window.parent !== window) {
                try {
                    if (typeof window.parent.closeModal === 'function') {
                        window.parent.closeModal('quick-menu-modal');
                    }
                    var cb = window.parent.document.getElementById('close-web-btn');
                    if (cb) {
                        cb.click();
                        return;
                    }
                } catch (e) {}
            }
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = 'main-menu.html';
            }
        }
        sync();

        // ── 云端服务器配置 ──────────────────────────────
        (function initServerConfig() {
            var saved = localStorage.getItem('api_server_url') || '';
            // 去掉末尾 /api 只显示根地址
            var display = saved.endsWith('/api') ? saved.slice(0, -4) : saved;
            document.getElementById('serverUrlInput').value = display;
        })();

        function saveServer() {
            var url = document.getElementById('serverUrlInput').value.trim().replace(/\/+$/, '');
            var status = document.getElementById('serverStatus');
            if (!url) {
                localStorage.removeItem('api_server_url');
                status.style.color = '#94a3b8';
                status.textContent = '已清除服务器配置，使用本地模式';
                return;
            }
            var apiUrl = url.endsWith('/api') ? url : url + '/api';
            localStorage.setItem('api_server_url', apiUrl);
            status.style.color = '#86efac';
            status.textContent = '✅ 已保存：' + url;
        }

        async function testServer() {
            var url = document.getElementById('serverUrlInput').value.trim().replace(/\/+$/, '');
            var status = document.getElementById('serverStatus');
            if (!url) { status.textContent = '请先填入服务器地址'; return; }
            status.style.color = '#94a3b8';
            status.textContent = '🔄 测试中...';
            try {
                var apiUrl = url.endsWith('/api') ? url : url + '/api';
                var res = await fetch(apiUrl + '/health', { signal: AbortSignal.timeout(8000) });
                var json = await res.json();
                if (json.success) {
                    status.style.color = '#86efac';
                    status.textContent = '✅ 连接成功！服务器运行正常';
                    // 自动保存
                    localStorage.setItem('api_server_url', apiUrl);
                } else {
                    status.style.color = '#fca5a5';
                    status.textContent = '❌ 服务器返回异常';
                }
            } catch (e) {
                status.style.color = '#fca5a5';
                status.textContent = '❌ 连接失败：' + (e.message || '无法访问');
            }
        }
    </script>
</body>
</html>
