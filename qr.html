<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站二维码 - 校园模拟器</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: linear-gradient(160deg, #0f172a 0%, #1e1b4b 45%, #312e81 100%);
            color: #e0e7ff;
        }
        h1 { font-size: 1.25rem; font-weight: 700; margin: 0 0 8px; text-align: center; }
        p { margin: 0 0 20px; font-size: 14px; color: #a5b4fc; text-align: center; max-width: 320px; line-height: 1.6; }
        #qrcode {
            background: #fff;
            padding: 16px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.35);
        }
        #qrcode canvas, #qrcode img { display: block; }
        .url {
            margin-top: 20px;
            font-size: 13px;
            word-break: break-all;
            color: #818cf8;
            max-width: 340px;
            text-align: center;
        }
        .url a { color: #c4b5fd; }
    </style>
</head>
<body>
    <h1>扫码进入校园模拟器</h1>
    <p>用手机相机或微信扫一扫，即可打开线上站点。</p>
    <div id="qrcode"></div>
    <p class="url" id="urlLine"></p>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" crossorigin="anonymous"></script>
    <script>
        (function () {
            var SITE_URL = 'https://yuchenfu701.github.io/campus-simulator/';
            document.getElementById('urlLine').innerHTML =
                '<a href="' + SITE_URL + '">' + SITE_URL + '</a>';
            if (typeof QRCode !== 'undefined') {
                new QRCode(document.getElementById('qrcode'), {
                    text: SITE_URL,
                    width: 256,
                    height: 256,
                    colorDark: '#0f172a',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.M
                });
            } else {
                document.getElementById('qrcode').innerHTML =
                    '<p style="color:#64748b;padding:40px;">二维码脚本加载失败，请直接点击上方链接。</p>';
            }
        })();
    </script>
</body>
</html>
