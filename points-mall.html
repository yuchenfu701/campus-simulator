<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>装备商城 · 爱哲校园</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'PingFang SC','Microsoft YaHei','Segoe UI',sans-serif;}
:root{
  --bg:#060a14;--panel:rgba(8,14,28,.92);
  --gold:#f5a623;--gold2:#ffd700;
  --orange:#f97316;--cyan:#22d3ee;--purple:#8b5cf6;--green:#22c55e;
  --rare:#3b82f6;--epic:#a855f7;--legend:#f59e0b;
  --border:rgba(249,115,22,.2);
  --hi:rgba(255,255,255,.95);--mid:rgba(255,255,255,.65);--lo:rgba(255,255,255,.35);
}
html,body{min-height:100vh;background:var(--bg);color:var(--hi);overflow-x:hidden;}

/* ── ANIMATED BACKGROUND ── */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
.scanlines{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);}

/* ── HEADER ── */
.header{position:sticky;top:0;z-index:200;
  background:rgba(4,8,20,.96);border-bottom:1px solid var(--border);
  backdrop-filter:blur(24px);padding:12px 16px 0;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:12px;}
.h-back{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;flex-shrink:0;}
.h-title{font-size:18px;font-weight:800;letter-spacing:.5px;flex:1;}
.pts-badge{display:flex;align-items:center;gap:6px;padding:6px 14px;
  background:rgba(245,166,35,.12);border:1px solid rgba(245,166,35,.3);
  border-radius:20px;flex-shrink:0;}
.pts-icon{font-size:16px;}
.pts-val{font-size:18px;font-weight:900;
  background:linear-gradient(135deg,var(--gold),#fb923c);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* ── TABS ── */
.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:7px 16px;border-radius:8px;white-space:nowrap;cursor:pointer;
  font-size:12px;font-weight:700;letter-spacing:.3px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:var(--mid);transition:all .2s;flex-shrink:0;}
.tab:hover{background:rgba(255,255,255,.1);color:var(--hi);}
.tab.active{background:rgba(249,115,22,.2);border-color:var(--orange);color:var(--orange);}

/* ── LAYOUT ── */
.main-layout{position:relative;z-index:10;display:flex;gap:0;}

/* ── PREVIEW SIDEBAR ── */
.preview-sidebar{
  width:260px;flex-shrink:0;position:sticky;top:96px;height:calc(100vh - 96px);
  overflow-y:auto;padding:16px;border-right:1px solid rgba(255,255,255,.06);
  display:none;
}
@media(min-width:900px){.preview-sidebar{display:block;}}
.preview-sidebar::-webkit-scrollbar{width:4px;}
.preview-sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}

.preview-box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  border-radius:18px;padding:20px;text-align:center;margin-bottom:12px;}
.preview-art{width:120px;height:200px;margin:0 auto 12px;position:relative;display:flex;align-items:center;justify-content:center;}
.preview-art svg{width:100%;height:100%;}
.preview-name{font-size:16px;font-weight:800;margin-bottom:4px;}
.preview-desc{font-size:11px;color:var(--lo);line-height:1.5;margin-bottom:12px;}
.preview-rarity{display:inline-block;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;border-radius:10px;margin-bottom:14px;}
.preview-price{font-size:22px;font-weight:900;margin-bottom:14px;}
.preview-btn{width:100%;padding:12px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s,transform .1s;}
.preview-btn:active{transform:scale(.96);}
.preview-btn.equip{background:linear-gradient(135deg,#8b5cf6,#6366f1);color:#fff;}
.preview-btn.buy{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;}
.preview-btn.owned{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#4ade80;cursor:default;}
.preview-btn.free{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;}

/* ── ITEMS AREA ── */
.items-area{flex:1;min-width:0;padding:16px 16px 120px;}

/* ── FEATURED BANNER ── */
.featured-banner{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,#1e1b4b,#312e81 40%,#1e1b4b);
  border:1px solid rgba(139,92,246,.4);border-radius:20px;
  padding:24px 20px;margin-bottom:20px;
  display:flex;align-items:center;gap:20px;cursor:pointer;
  transition:transform .2s,box-shadow .2s;
}
.featured-banner:hover{transform:translateY(-3px);box-shadow:0 20px 60px rgba(139,92,246,.3);}
.featured-banner::before{content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 80% 50%,rgba(139,92,246,.25),transparent 60%);pointer-events:none;}
.featured-glow{position:absolute;right:-20px;top:-20px;width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,rgba(245,166,35,.15),transparent 70%);}
.featured-art{width:100px;height:140px;flex-shrink:0;filter:drop-shadow(0 0 20px rgba(139,92,246,.6));}
.featured-art svg{width:100%;height:100%;}
.featured-info{flex:1;}
.featured-tag{display:inline-block;background:linear-gradient(135deg,#f59e0b,#ef4444);
  color:#fff;font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;
  padding:3px 10px;border-radius:10px;margin-bottom:8px;}
.featured-name{font-size:22px;font-weight:900;margin-bottom:6px;
  background:linear-gradient(135deg,#fff,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.featured-desc{font-size:12px;color:var(--mid);margin-bottom:12px;line-height:1.5;}
.featured-price{font-size:14px;font-weight:800;color:var(--gold);}

/* ── SECTION TITLE ── */
.section-title{
  display:flex;align-items:center;gap:10px;
  font-size:13px;font-weight:800;letter-spacing:1px;text-transform:uppercase;
  color:var(--mid);margin:20px 0 12px;
}
.section-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08);}

/* ── ITEMS GRID ── */
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
@media(min-width:900px){.items-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));}}
@media(max-width:420px){.items-grid{grid-template-columns:repeat(2,1fr);}}

/* ── ITEM CARD ── */
.item-card{
  position:relative;border-radius:16px;overflow:hidden;cursor:pointer;
  background:rgba(10,15,30,.8);border:1px solid rgba(255,255,255,.1);
  transition:transform .2s,box-shadow .2s,border-color .2s;
  display:flex;flex-direction:column;
}
.item-card:hover{transform:translateY(-5px);}
.item-card.selected{outline:2px solid var(--orange);outline-offset:2px;}

/* rarity borders */
.r-common{border-color:rgba(107,114,128,.4);}
.r-rare{border-color:rgba(59,130,246,.5);}
.r-epic{border-color:rgba(168,85,247,.5);}
.r-legend{border-color:rgba(245,158,11,.6);animation:legendPulse 2.5s ease-in-out infinite;}
@keyframes legendPulse{0%,100%{box-shadow:0 0 12px rgba(245,158,11,.2);}50%{box-shadow:0 0 28px rgba(245,158,11,.45),0 0 50px rgba(245,158,11,.1);}}

/* card art area */
.card-art{
  position:relative;height:160px;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.card-art-bg{position:absolute;inset:0;}
.card-art svg{position:relative;z-index:2;width:80px;height:130px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.5));}
.card-art .art-glow{position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:80px;height:40px;border-radius:50%;filter:blur(20px);z-index:1;}

/* rarity art backgrounds */
.r-common .card-art-bg{background:linear-gradient(160deg,#1e293b,#0f172a);}
.r-rare .card-art-bg{background:linear-gradient(160deg,#1e3a5f,#0c1a2e);}
.r-epic .card-art-bg{background:linear-gradient(160deg,#2d1b69,#150b30);}
.r-legend .card-art-bg{background:linear-gradient(160deg,#451a03,#292524,#1c1917);}

/* card info area */
.card-info{padding:10px;flex:1;display:flex;flex-direction:column;gap:4px;}
.card-rarity{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;}
.r-common .card-rarity{color:#9ca3af;}
.r-rare .card-rarity{color:#60a5fa;}
.r-epic .card-rarity{color:#c084fc;}
.r-legend .card-rarity{
  background:linear-gradient(135deg,var(--gold),#fb923c);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.card-name{font-size:13px;font-weight:700;}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;}
.card-tag{font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,.08);color:var(--lo);}
.card-price{font-size:14px;font-weight:800;margin-top:auto;padding-top:6px;}
.card-price.p-common{color:#9ca3af;}
.card-price.p-rare{color:#60a5fa;}
.card-price.p-epic{color:#c084fc;}
.card-price.p-legend{
  background:linear-gradient(135deg,var(--gold),#fb923c);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.card-price.p-free{color:#4ade80;}

/* card badges */
.card-badge{
  position:absolute;top:8px;left:8px;z-index:10;
  font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
  padding:3px 8px;border-radius:6px;
}
.badge-owned{background:rgba(34,197,94,.25);color:#4ade80;border:1px solid rgba(34,197,94,.3);}
.badge-equipped{background:rgba(249,115,22,.25);color:#fb923c;border:1px solid rgba(249,115,22,.4);}
.badge-new{background:rgba(236,72,153,.25);color:#f472b6;border:1px solid rgba(236,72,153,.3);}
.badge-limited{background:rgba(245,158,11,.2);color:#fbbf24;border:1px solid rgba(245,158,11,.3);}

/* ── TASK CARDS ── */
.task-card{
  background:linear-gradient(145deg,rgba(14,20,40,.9),rgba(20,14,40,.9));
  border-color:rgba(251,191,36,.3);
}
.task-card:hover{border-color:rgba(251,191,36,.6);box-shadow:0 0 30px rgba(251,191,36,.15);}
.task-art{height:100px;display:flex;align-items:center;justify-content:center;font-size:44px;
  background:linear-gradient(160deg,rgba(245,158,11,.1),rgba(139,92,246,.05));}
.task-badge-top{position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#f59e0b,#ec4899,#8b5cf6);}
.task-teacher{font-size:10px;padding:2px 8px;border-radius:5px;
  background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.2);color:#fbbf24;
  width:fit-content;}
.task-reward{font-size:15px;font-weight:900;margin-top:auto;
  background:linear-gradient(135deg,#4ade80,#22d3ee);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:300;
  background:rgba(4,8,20,.97);border-top:1px solid var(--border);
  backdrop-filter:blur(24px);
  display:flex;justify-content:space-around;
  padding:8px 0 env(safe-area-inset-bottom,8px);}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 14px;border-radius:10px;cursor:pointer;transition:all .2s;color:var(--lo);}
.bnav-item:hover,.bnav-item.active{color:var(--orange);background:rgba(249,115,22,.08);}
.bnav-icon{font-size:20px;}
.bnav-label{font-size:10px;font-weight:700;}

/* ── MODAL ── */
.modal{display:none;position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,.8);backdrop-filter:blur(16px);
  align-items:center;justify-content:center;}
.modal.show{display:flex;animation:fadeIn .2s;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{background:linear-gradient(145deg,#080d1e,#0f1729);
  border:1px solid rgba(249,115,22,.4);border-radius:24px;
  padding:32px 24px;max-width:360px;width:90%;text-align:center;}
.modal-art{width:80px;height:130px;margin:0 auto 14px;filter:drop-shadow(0 0 20px rgba(139,92,246,.5));}
.modal-art svg{width:100%;height:100%;}
.modal-icon{font-size:52px;margin-bottom:12px;display:block;}
.modal-title{font-size:20px;font-weight:900;margin-bottom:8px;}
.modal-text{font-size:13px;color:var(--mid);line-height:1.6;margin-bottom:20px;}
.modal-btns{display:flex;gap:10px;}
.mbtn{flex:1;padding:13px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;}
.mbtn-cancel{background:rgba(255,255,255,.08);color:var(--hi);border:1px solid rgba(255,255,255,.15);}
.mbtn-confirm{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;}
.mbtn-equip{background:linear-gradient(135deg,#8b5cf6,#6366f1);color:#fff;}
input.code-input{width:100%;padding:12px 14px;margin-bottom:14px;
  border-radius:10px;border:1px solid rgba(148,163,184,.25);
  background:rgba(255,255,255,.07);color:var(--hi);font-size:15px;letter-spacing:2px;text-align:center;outline:none;}

/* ── TOAST ── */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;
  background:rgba(14,20,40,.97);border:1px solid rgba(249,115,22,.4);
  color:var(--hi);padding:16px 28px;border-radius:14px;
  font-size:15px;font-weight:700;display:none;pointer-events:none;
  box-shadow:0 0 40px rgba(249,115,22,.2),0 20px 40px rgba(0,0,0,.6);
  min-width:180px;text-align:center;}
.toast.show{display:block;animation:popIn .3s;}
@keyframes popIn{from{transform:translate(-50%,-50%) scale(.8);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}}

.empty-state{text-align:center;padding:60px 20px;color:var(--lo);}
.empty-state .ei{font-size:56px;margin-bottom:14px;filter:grayscale(1);}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="scanlines"></div>

<!-- ── HEADER ── -->
<div class="header">
  <div class="header-top">
    <div class="h-back" onclick="goBack()">←</div>
    <div class="h-title">⚔️ 装备商城</div>
    <div class="pts-badge">
      <span class="pts-icon">💎</span>
      <span class="pts-val" id="ptsVal">—</span>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="setTab('all',this)">🌐 全部</button>
    <button class="tab" onclick="setTab('skin',this)">👔 角色换装</button>
    <button class="tab" onclick="setTab('weapon',this)">⚔️ 武器道具</button>
    <button class="tab" onclick="setTab('bg',this)">🌅 背景主题</button>
    <button class="tab" onclick="setTab('model',this)">🧍 角色模型</button>
    <button class="tab" onclick="setTab('task',this)">📋 任务</button>
  </div>
</div>

<!-- ── MAIN LAYOUT ── -->
<div class="main-layout">

  <!-- SIDEBAR PREVIEW (desktop) -->
  <div class="preview-sidebar" id="previewSidebar">
    <div class="preview-box" id="previewBox">
      <div class="preview-art" id="previewArt"></div>
      <div class="preview-name" id="previewName">选择物品预览</div>
      <div class="preview-desc" id="previewDesc">点击任意物品查看详情</div>
      <div class="preview-rarity" id="previewRarity"></div>
      <div class="preview-price" id="previewPrice"></div>
      <button class="preview-btn" id="previewBtn" onclick="previewAction()" style="display:none;"></button>
    </div>
    <div style="font-size:11px;color:#374151;text-align:center;line-height:1.6;">
      购买后可随时装备 / 更换<br>装备效果实时显示在主菜单
    </div>
  </div>

  <!-- ITEMS AREA -->
  <div class="items-area" id="itemsArea">

    <!-- FEATURED (only shown on 'all' tab) -->
    <div id="featuredSection"></div>

    <!-- DYNAMIC CONTENT -->
    <div id="itemsContainer"></div>
    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="ei">📦</div><p>暂无商品</p>
    </div>
  </div>
</div>

<!-- ── BOTTOM NAV ── -->
<div class="bottom-nav">
  <div class="bnav-item active" onclick="goToPage('mall')"><div class="bnav-icon">🏪</div><div class="bnav-label">商城</div></div>
  <div class="bnav-item" onclick="goToPage('inventory')"><div class="bnav-icon">🎒</div><div class="bnav-label">背包</div></div>
  <div class="bnav-item" onclick="goToPage('avatar')"><div class="bnav-icon">👤</div><div class="bnav-label">形象</div></div>
  <div class="bnav-item" onclick="goToPage('rank')"><div class="bnav-icon">🏆</div><div class="bnav-label">排行榜</div></div>
  <div class="bnav-item" onclick="goToPage('tasks')"><div class="bnav-icon">📋</div><div class="bnav-label">任务</div></div>
</div>

<!-- ── EXCHANGE MODAL ── -->
<div class="modal" id="exchangeModal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-art" id="modalArt"></div>
    <div class="modal-title" id="modalTitle">确认购买</div>
    <div class="modal-text" id="modalText"></div>
    <div class="modal-btns">
      <button class="mbtn mbtn-cancel" onclick="closeModal()">取消</button>
      <button class="mbtn mbtn-confirm" id="modalConfirmBtn" onclick="confirmBuy()">花积分购买</button>
    </div>
  </div>
</div>

<!-- ── TASK ACTIVATION MODAL ── -->
<div class="modal" id="activationModal">
  <div class="modal-box" onclick="event.stopPropagation()">
    <span class="modal-icon" id="taskModalIcon">🎯</span>
    <div class="modal-title" id="taskModalTitle">输入激活码</div>
    <div class="modal-text" id="taskModalText">请输入从老师处获得的激活码</div>
    <input class="code-input" type="text" id="activationCodeInput" placeholder="输入激活码">
    <div class="modal-btns">
      <button class="mbtn mbtn-cancel" onclick="closeActivationModal()">取消</button>
      <button class="mbtn mbtn-confirm" onclick="submitActivationCode()">确认提交</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/points-system.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
// SVG ART GENERATORS
// ═══════════════════════════════════════════════════════════
function hex(n){return '#'+n.toString(16).padStart(6,'0');}

function skinSVG(s,extra){
  const {shirt,pants,jacket,tie,hair}=s;
  return `<svg viewBox="0 0 80 136" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="sg" cx="50%" cy="60%"><stop offset="0%" stop-color="rgba(255,255,255,.12)"/><stop offset="100%" stop-color="rgba(0,0,0,0)"/></radialGradient>
  </defs>
  <ellipse cx="40" cy="134" rx="22" ry="5" fill="rgba(0,0,0,.35)"/>
  <ellipse cx="40" cy="19" rx="19" ry="17" fill="${hex(hair)}"/>
  <ellipse cx="40" cy="27" rx="15" ry="18" fill="#f5c5a3"/>
  <rect x="24" y="13" width="32" height="9" rx="4" fill="${hex(hair)}"/>
  <ellipse cx="34" cy="25" rx="2.5" ry="3" fill="#1a0a00"/>
  <ellipse cx="46" cy="25" rx="2.5" ry="3" fill="#1a0a00"/>
  <ellipse cx="34.8" cy="24" rx="1" ry="1" fill="rgba(255,255,255,.7)"/>
  <ellipse cx="46.8" cy="24" rx="1" ry="1" fill="rgba(255,255,255,.7)"/>
  <path d="M35 32 Q40 36 45 32" stroke="#1a0a00" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <rect x="23" y="46" width="34" height="46" rx="5" fill="${hex(jacket)}"/>
  <polygon points="40,46 32,58 40,55" fill="${hex(shirt)}"/>
  <polygon points="40,46 48,58 40,55" fill="${hex(shirt)}"/>
  <polygon points="40,52 38,57 40,75 42,57" fill="${hex(tie)}"/>
  <rect x="9" y="48" width="14" height="38" rx="5" fill="${hex(jacket)}" transform="rotate(-8 16 67)"/>
  <rect x="57" y="48" width="14" height="38" rx="5" fill="${hex(jacket)}" transform="rotate(8 64 67)"/>
  <rect x="25" y="90" width="15" height="46" rx="4" fill="${hex(pants)}"/>

function getOwned(){return JSON.parse(localStorage.getItem('campus_cosmetics')||'{}');}
function setOwned(o){localStorage.setItem('campus_cosmetics',JSON.stringify(o));}
function isOwned(id){
  if(COSMETICS.find(c=>c.id===id&&c.isDefault)) return true;
  if(id==='skin_0') return true;
  return !!getOwned()[id];
}

function getEquipped(){return JSON.parse(localStorage.getItem('campus_equipped')||'{"skin":"skin_0"}');}
function setEquipped(slot,id){
  const eq=getEquipped();eq[slot]=id;
  localStorage.setItem('campus_equipped',JSON.stringify(eq));
  // also write skinIndex so main-menu can read it
  const item=COSMETICS.find(c=>c.id===id);
  if(item&&item.si!==undefined) localStorage.setItem('equipped_skin_index',item.si);
  if(item&&item.bg) localStorage.setItem('equipped_bg',item.bg);
  if(item&&item.mt) localStorage.setItem('equipped_model',item.mt);
}

let currentTab='all';
let selectedId=null;

function setTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(el) el.classList.add('active');
  renderAll();
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function renderAll(){
  const container=document.getElementById('itemsContainer');
  const featured=document.getElementById('featuredSection');
  const empty=document.getElementById('emptyState');
  container.innerHTML=''; featured.innerHTML='';

  if(currentTab==='task'){
    renderTasks(container,empty); return;
  }

  // featured banner (all tab only)
  if(currentTab==='all'){
    const feat=COSMETICS.find(c=>c.id==='skin_6');
    featured.innerHTML=makeFeaturedBanner(feat);
  }

  let items=COSMETICS;
  if(currentTab!=='all') items=items.filter(c=>c.cat===currentTab);

  if(!items.length){empty.style.display='block';return;}
  empty.style.display='none';

  // group by rarity
  const groups={legend:[],epic:[],rare:[],common:[]};
  items.forEach(c=>{if(groups[c.r]) groups[c.r].push(c);});

  const sec=(title,arr)=>{
    if(!arr.length) return;
    const d=document.createElement('div');
    const t=document.createElement('div');
    t.className='section-title';t.textContent=title;
    const g=document.createElement('div');g.className='items-grid';
    arr.forEach(item=>g.appendChild(makeCard(item)));
    d.appendChild(t);d.appendChild(g);
    container.appendChild(d);
  };
  sec('👑 传说级别',groups.legend);
  sec('💜 史诗级别',groups.epic);
  sec('💙 稀有级别',groups.rare);
  sec('⚪ 普通级别',groups.common);
}

function makeFeaturedBanner(item){
  if(!item) return '';
  const art=item.cat==='skin'?skinSVG(SKINS_DEF[item.si])
            :item.cat==='weapon'?weaponSVG(item.wt)
            :item.cat==='model'?modelSVG(item.mt):'';
  return `<div class="featured-banner" onclick="selectItem('${item.id}')">
    <div class="featured-glow"></div>
    <div class="featured-art">${art}</div>
    <div class="featured-info">
      <div class="featured-tag">⭐ 本期精选</div>
      <div class="featured-name">${item.name}</div>
      <div class="featured-desc">${item.desc}</div>
      <div class="featured-price">💎 ${item.price} 积分</div>
    </div>
  </div>`;
}

function getItemArtSVG(item){
  if(item.cat==='skin')   return skinSVG(SKINS_DEF[item.si]||SKINS_DEF[0]);
  if(item.cat==='weapon') return weaponSVG(item.wt);
  if(item.cat==='bg')     return bgSVG(item.bg);
  if(item.cat==='model')  return modelSVG(item.mt);
  return '';
}

function makeCard(item){
  const card=document.createElement('div');
  card.className=`item-card r-${item.r}`;
  card.onclick=()=>selectItem(item.id);

  const owned=isOwned(item.id);
  const eq=getEquipped();
  const eqSlot={skin:'skin',weapon:'weapon',bg:'bg',model:'model'}[item.cat];
  const equipped=eq[eqSlot]===item.id;

  const glowColor={common:'#6b7280',rare:'#3b82f6',epic:'#a855f7',legend:'#f59e0b'}[item.r];

  let badge='';
  if(equipped)      badge=`<div class="card-badge badge-equipped">已装备</div>`;
  else if(owned)    badge=`<div class="card-badge badge-owned">已拥有</div>`;
  else if(item.isNew)    badge=`<div class="card-badge badge-new">NEW</div>`;
  else if(item.isLimited) badge=`<div class="card-badge badge-limited">限定</div>`;

  const artHTML=item.cat==='bg'
    ?`<div style="width:100%;height:100%;position:relative;z-index:2;">${bgSVG(item.bg)}</div>`
    :`<svg style="width:80px;height:130px;position:relative;z-index:2;">${getItemArtSVG(item).replace(/<svg[^>]*>/,'').replace('</svg>','')}</svg>`;

  const priceHTML=item.price===0
    ?`<div class="card-price p-free">🆓 免费</div>`
    :`<div class="card-price p-${item.r}">💎 ${item.price}</div>`;

  card.innerHTML=`
    ${badge}
    <div class="card-art">
      <div class="card-art-bg"></div>
      ${artHTML}
      <div class="art-glow" style="background:${glowColor};opacity:.5;"></div>
    </div>
    <div class="card-info">
      <div class="card-rarity">${RARITY_NAMES[item.r]}</div>
      <div class="card-name">${item.name}</div>
      <div class="card-tags">${(item.tags||[]).map(t=>`<span class="card-tag">${t}</span>`).join('')}</div>
      ${priceHTML}
    </div>`;
  return card;
}

  {id:'task_lixiang',name:'英语老师李响',icon:'👨‍🏫',desc:'找英语老师李响对话，完成任务领取激活码',reward:100,code:'15267683145',teacher:'英语老师李响',cat:'task'},
];
let currentTask=null;

function renderTasks(container,empty){
  const pending=teacherTasks.filter(t=>!isTaskDone(t.id));
  if(!pending.length){empty.style.display='block';empty.querySelector('p').textContent='所有任务已完成 🎉';return;}
  empty.style.display='none';
  const t=document.createElement('div');t.className='section-title';t.textContent='📋 可用任务';
  const g=document.createElement('div');g.className='items-grid';
  pending.forEach(task=>{
    const c=document.createElement('div');
    c.className='item-card r-epic task-card';
    c.onclick=()=>openTaskModal(task);
    c.innerHTML=`
      <div class="task-badge-top"></div>
      <div class="task-art">${task.icon}</div>
      <div class="card-info">
        <div class="card-rarity">任务</div>
        <div class="card-name">${task.name}</div>
        <div class="task-teacher">💬 ${task.teacher}</div>
        <div class="task-reward">+${task.reward} 积分</div>
      </div>`;
    g.appendChild(c);
  });
  container.appendChild(t);container.appendChild(g);
}

// ═══════════════════════════════════════════════════════════
// SELECT ITEM → PREVIEW SIDEBAR
// ═══════════════════════════════════════════════════════════
let selectedItem=null;

function selectItem(id){
  selectedId=id;
  const item=COSMETICS.find(c=>c.id===id);
  if(!item) return;
  selectedItem=item;

  // highlight
  document.querySelectorAll('.item-card').forEach(c=>c.classList.remove('selected'));
  event&&event.currentTarget&&event.currentTarget.classList.add('selected');

  // update sidebar
  const art=getItemArtSVG(item);
  document.getElementById('previewArt').innerHTML=art;
  document.getElementById('previewName').textContent=item.name;
  document.getElementById('previewDesc').textContent=item.desc;
  const rEl=document.getElementById('previewRarity');
  rEl.textContent=RARITY_NAMES[item.r];
  rEl.style.background=RARITY_COLORS[item.r]+'22';
  rEl.style.color=RARITY_COLORS[item.r];
  rEl.style.border=`1px solid ${RARITY_COLORS[item.r]}44`;

  const priceEl=document.getElementById('previewPrice');
  priceEl.textContent=item.price===0?'🆓 免费':`💎 ${item.price} 积分`;
  priceEl.style.color=item.price===0?'#4ade80':RARITY_COLORS[item.r];

  const btn=document.getElementById('previewBtn');
  btn.style.display='block';
  const owned=isOwned(item.id);
  const eq=getEquipped();
  const eqSlot={skin:'skin',weapon:'weapon',bg:'bg',model:'model'}[item.cat];
  const equipped=eq[eqSlot]===item.id;

  if(equipped){
    btn.className='preview-btn owned';btn.textContent='✅ 已装备';
  } else if(owned){
    btn.className='preview-btn equip';btn.textContent='⚡ 装备';
  } else if(item.price===0){
    btn.className='preview-btn free';btn.textContent='🆓 免费获取';
  } else {
    btn.className='preview-btn buy';btn.textContent=`💎 ${item.price} 购买`;
  }

  // mobile: open modal directly
  if(window.innerWidth<900) openBuyModal(item);
}

function previewAction(){
  if(!selectedItem) return;
  const owned=isOwned(selectedItem.id);
  if(owned) equipItem(selectedItem);
  else openBuyModal(selectedItem);
}

function equipItem(item){
  const slot={skin:'skin',weapon:'weapon',bg:'bg',model:'model'}[item.cat]||'skin';
  setEquipped(slot,item.id);
  showToast(`⚡ ${item.name} 已装备！`);
  renderAll();
  if(selectedId) selectItem(selectedId);
}

// ═══════════════════════════════════════════════════════════
// BUY MODAL
// ═══════════════════════════════════════════════════════════
function openBuyModal(item){
  const art=getItemArtSVG(item);
  document.getElementById('modalArt').innerHTML=art;
  document.getElementById('modalTitle').textContent=item.price===0?'免费领取':'确认购买';
  const pts=getPoints();
  const confirmBtn=document.getElementById('modalConfirmBtn');
  if(item.price===0){
    document.getElementById('modalText').innerHTML=`<strong>${item.name}</strong><br><br>免费领取，立即拥有！`;
    confirmBtn.textContent='🆓 免费领取';confirmBtn.style.display='block';
  } else if(pts<item.price){
    document.getElementById('modalText').innerHTML=`积分不足！<br>当前 <strong>${pts}</strong> 积分，还差 <strong style="color:#ef4444;">${item.price-pts}</strong> 积分`;
    confirmBtn.style.display='none';
  } else {
    document.getElementById('modalText').innerHTML=`花费 <strong style="color:#f59e0b;">${item.price}</strong> 积分购买<br><strong>${item.name}</strong>`;
    confirmBtn.textContent=`💎 ${item.price} 购买`;confirmBtn.style.display='block';
  }
  const m=document.getElementById('exchangeModal');
  m.style.display='flex';m.classList.add('show');
}

function confirmBuy(){
  if(!selectedItem) return;
  const item=selectedItem;
  const owned=isOwned(item.id);
  if(!owned){
    if(item.price>0) spendPoints(item.price,'购买:'+item.name);
    const o=getOwned();o[item.id]=true;setOwned(o);
  }
  closeModal();
  refreshPts();
  // auto-equip on purchase
  equipItem(item);
}

function closeModal(){
  const m=document.getElementById('exchangeModal');
  m.classList.remove('show');m.style.display='none';
}

// ═══════════════════════════════════════════════════════════
// TASK MODAL
// ═══════════════════════════════════════════════════════════
function openTaskModal(task){
  currentTask=task;
  document.getElementById('taskModalIcon').textContent=task.icon;
  document.getElementById('taskModalTitle').textContent=task.name;
  document.getElementById('taskModalText').innerHTML=`
    <strong style="color:#f59e0b;">📍 任务：</strong>${task.desc}<br><br>
    <span style="color:#4ade80;font-weight:700;">完成奖励：+${task.reward} 积分</span>`;
  document.getElementById('activationCodeInput').value='';
  const m=document.getElementById('activationModal');
  m.style.display='flex';m.classList.add('show');
  setTimeout(()=>document.getElementById('activationCodeInput').focus(),100);
}

function closeActivationModal(){
  const m=document.getElementById('activationModal');
  m.classList.remove('show');m.style.display='none';
  currentTask=null;
}

function submitActivationCode(){
  if(!currentTask) return;
  const code=document.getElementById('activationCodeInput').value.trim();
  if(!code){showToast('❌ 请输入激活码');return;}
  if(code===currentTask.code){
    if(isTaskDone(currentTask.id)){showToast('⚠️ 任务已完成');closeActivationModal();return;}
    pointsSystem.addPoints(userId,currentTask.reward,'完成'+currentTask.name);
    markTaskDone(currentTask.id);
    closeActivationModal();
    setTimeout(()=>{refreshPts();renderAll();showToast(`🎉 获得 ${currentTask.reward} 积分！`);},100);
  } else {
    showToast('❌ 激活码错误');
    document.getElementById('activationCodeInput').value='';
    document.getElementById('activationCodeInput').focus();
  }
}

function isTaskDone(id){const ct=JSON.parse(localStorage.getItem('completed_tasks')||'{}');return !!(ct[userId]&&ct[userId][id]);}
function markTaskDone(id){
  const ct=JSON.parse(localStorage.getItem('completed_tasks')||'{}');
  if(!ct[userId]) ct[userId]={};
  ct[userId][id]={completed:true,at:new Date().toISOString()};
  localStorage.setItem('completed_tasks',JSON.stringify(ct));
}

// ═══════════════════════════════════════════════════════════
// TOAST + NAV + MISC
// ═══════════════════════════════════════════════════════════
function showToast(msg){
  const t=document.getElementById('toast');
  if(window.toastTimer) clearTimeout(window.toastTimer);
  t.textContent=msg;t.classList.add('show');t.style.display='block';
  window.toastTimer=setTimeout(()=>{t.classList.remove('show');t.style.display='none';},3000);
}

function goToPage(page){
  const pages={mall:'points-mall.html',inventory:'points-inventory.html',avatar:'points-avatar.html',rank:'points-rank.html',tasks:'points-tasks.html'};
  if(page==='mall'&&window.location.href.includes('points-mall')) return;
  if(window.parent&&window.parent!==window){
    try{if(typeof window.parent.openInGame==='function'){window.parent.openInGame(pages[page],page);return;}}catch(e){}
  }
  window.location.replace(pages[page]);
}

function goBack(){
  if(window.parent&&window.parent!==window){
    try{if(typeof window.parent.closeModal==='function'){window.parent.closeModal('feature-modal');return;}}catch(e){}
  }
  window.history.length>1?window.history.back():window.location.replace('main-menu.html');
}

// ═══════════════════════════════════════════════════════════
// ANIMATED BACKGROUND
// ═══════════════════════════════════════════════════════════
(function initBg(){
  const c=document.getElementById('bg-canvas');
  const ctx=c.getContext('2d');
  let W,H,stars=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;
    stars=Array.from({length:60},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+.3,v:Math.random()*.3+.1,a:Math.random()}));}
  resize();window.addEventListener('resize',resize);
  function draw(){
    ctx.clearRect(0,0,W,H);
    stars.forEach(s=>{
      s.a+=.008;if(s.a>1)s.a-=1;
      const alpha=Math.sin(s.a*Math.PI)*.6;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${alpha})`;ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  refreshPts();
  renderAll();
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){closeModal();closeActivationModal();}
  });
  document.getElementById('activationCodeInput').addEventListener('keypress',e=>{
    if(e.key==='Enter') submitActivationCode();
  });
  // sync user name
  const st=pointsSystem.getCurrentStudent();
  if(st){
    const uEl=document.querySelector('.h-title');
    if(uEl) uEl.textContent=`⚔️ ${st.name||'装备商城'}`;
  }
});
window.addEventListener('beforeunload',()=>{try{pointsSystem.savePointsData();}catch(e){}});
setInterval(()=>{try{pointsSystem.savePointsData();}catch(e){}},30000);
</script>
