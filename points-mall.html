<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>积分商城</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'PingFang SC','Microsoft YaHei',sans-serif;}

        :root{
            --bg:#070d1a;
            --panel:rgba(8,14,28,.9);
            --orange:#f97316;
            --orange-dim:rgba(249,115,22,.3);
            --gold:#ffd700;
            --cyan:#22d3ee;
            --purple:#a855f7;
            --green:#4ade80;
            --border:rgba(249,115,22,.22);
            --text-hi:rgba(255,255,255,.95);
            --text-mid:rgba(255,255,255,.65);
            --text-lo:rgba(255,255,255,.35);
            /* rarity */
            --common-c:#6b7280;   --common-g:rgba(107,114,128,.2);
            --rare-c:#3b82f6;     --rare-g:rgba(59,130,246,.25);
            --epic-c:#a855f7;     --epic-g:rgba(168,85,247,.25);
            --legend-c:#f59e0b;   --legend-g:rgba(245,158,11,.25);
        }

        html,body{min-height:100vh;background:var(--bg);overflow-x:hidden;}

        /* ── BACKGROUND ── */
        body::before{
            content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
            background:
                radial-gradient(ellipse at 20% 0%,rgba(249,115,22,.07) 0%,transparent 55%),
                radial-gradient(ellipse at 80% 100%,rgba(34,211,238,.05) 0%,transparent 55%);
        }
        body::after{
            content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
            background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);
        }

        /* ── HEADER ── */
        .header{
            position:sticky;top:0;z-index:100;
            background:rgba(4,8,20,.95);
            border-bottom:1px solid var(--border);
            backdrop-filter:blur(20px);
            padding:14px 20px 0;
        }

        .header-top{
            display:flex;align-items:center;justify-content:space-between;
            margin-bottom:14px;
        }

        .user-row{display:flex;align-items:center;gap:12px;}
        .avatar-icon{
            width:44px;height:44px;border-radius:10px;flex-shrink:0;
            background:linear-gradient(135deg,var(--orange),#ef4444);
            display:flex;align-items:center;justify-content:center;font-size:24px;
            border:2px solid rgba(249,115,22,.4);
        }
        .user-name{font-size:16px;font-weight:700;color:var(--text-hi);}
        .user-class{font-size:11px;color:var(--text-lo);margin-top:2px;}

        .pts-box{text-align:right;}
        .pts-val{
            font-size:30px;font-weight:900;
            background:linear-gradient(135deg,var(--gold),#fb923c);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;
            background-clip:text;
            filter:drop-shadow(0 0 8px rgba(255,215,0,.4));
        }
        .pts-lbl{font-size:11px;color:var(--text-lo);letter-spacing:1px;}

        /* category tabs */
        .tabs{
            display:flex;gap:8px;overflow-x:auto;padding-bottom:14px;
            scrollbar-width:none;
        }
        .tabs::-webkit-scrollbar{display:none;}

        .tab{
            padding:8px 18px;border-radius:8px;white-space:nowrap;cursor:pointer;
            font-size:13px;font-weight:600;
            background:rgba(255,255,255,.06);
            border:1px solid rgba(255,255,255,.1);
            color:var(--text-mid);
            transition:all .2s;flex-shrink:0;
        }
        .tab:hover{background:rgba(255,255,255,.1);color:var(--text-hi);}
        .tab.active{
            background:rgba(249,115,22,.2);
            border-color:var(--orange);
            color:var(--orange);
            box-shadow:0 0 12px rgba(249,115,22,.2);
        }

        /* ── CONTENT ── */
        .content{position:relative;z-index:1;padding:20px 16px 100px;}

        /* section title */
        .section-title{
            display:flex;align-items:center;gap:10px;
            font-size:14px;font-weight:800;letter-spacing:2px;
            color:var(--orange);text-transform:uppercase;
            margin:24px 0 14px;
        }
        .section-title::before{
            content:'';width:3px;height:16px;border-radius:2px;
            background:var(--orange);flex-shrink:0;
        }
        .section-title::after{
            content:'';flex:1;height:1px;
            background:linear-gradient(to right,rgba(249,115,22,.3),transparent);
        }

        /* items grid */
        .items-grid{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(148px,1fr));
            gap:12px;
            margin-bottom:8px;
        }

        /* ── ITEM CARD ── */
        .item-card{
            position:relative;border-radius:16px;padding:18px 14px 16px;
            cursor:pointer;overflow:hidden;
            border:1px solid rgba(255,255,255,.1);
            background:rgba(10,16,32,.8);
            transition:all .3s cubic-bezier(.4,0,.2,1);
            display:flex;flex-direction:column;align-items:center;
            text-align:center;
            min-height:170px;
        }

        /* rarity top stripe */
        .item-card::before{
            content:'';position:absolute;top:0;left:0;right:0;height:3px;
            border-radius:16px 16px 0 0;
        }

        /* rarity: common */
        .rarity-common{border-color:rgba(107,114,128,.3);}
        .rarity-common::before{background:var(--common-c);}

        /* rarity: rare */
        .rarity-rare{border-color:rgba(59,130,246,.4);}
        .rarity-rare::before{background:linear-gradient(90deg,#1d4ed8,#60a5fa);}
        .rarity-rare:hover{box-shadow:0 0 24px rgba(59,130,246,.3),0 8px 24px rgba(0,0,0,.5);}

        /* rarity: epic */
        .rarity-epic{border-color:rgba(168,85,247,.45);}
        .rarity-epic::before{background:linear-gradient(90deg,#7c3aed,#d946ef);}
        .rarity-epic:hover{box-shadow:0 0 28px rgba(168,85,247,.35),0 8px 24px rgba(0,0,0,.5);}

        /* rarity: legendary */
        .rarity-legend{border-color:rgba(245,158,11,.5);}
        .rarity-legend::before{background:linear-gradient(90deg,#d97706,#fbbf24,#f59e0b);}
        .rarity-legend{animation:legendPulse 3s ease-in-out infinite;}
        @keyframes legendPulse{
            0%,100%{box-shadow:0 0 18px rgba(245,158,11,.2),0 4px 16px rgba(0,0,0,.4);}
            50%{box-shadow:0 0 36px rgba(245,158,11,.45),0 4px 16px rgba(0,0,0,.4);}
        }

        .item-card:hover{
            transform:translateY(-6px) scale(1.02);
            border-color:rgba(249,115,22,.5);
        }
        .rarity-rare:hover{border-color:rgba(59,130,246,.7);}
        .rarity-epic:hover{border-color:rgba(168,85,247,.7);}
        .rarity-legend:hover{border-color:rgba(245,158,11,.8);animation:none;}

        /* rarity badge */
        .rarity-badge{
            position:absolute;top:10px;right:10px;
            font-size:9px;font-weight:800;letter-spacing:1px;
            padding:2px 7px;border-radius:4px;
        }
        .badge-common{background:rgba(107,114,128,.3);color:#9ca3af;}
        .badge-rare{background:rgba(59,130,246,.25);color:#60a5fa;}
        .badge-epic{background:rgba(168,85,247,.25);color:#c084fc;}
        .badge-legend{
            background:linear-gradient(135deg,rgba(245,158,11,.3),rgba(251,191,36,.3));
            color:#fbbf24;
            animation:shimmerBadge 2s linear infinite;
        }
        @keyframes shimmerBadge{
            0%{box-shadow:0 0 4px rgba(245,158,11,.2)}
            50%{box-shadow:0 0 10px rgba(245,158,11,.6)}
            100%{box-shadow:0 0 4px rgba(245,158,11,.2)}
        }

        /* icon */
        .item-icon{
            font-size:46px;margin-bottom:10px;flex-shrink:0;
            filter:drop-shadow(0 4px 8px rgba(0,0,0,.5));
            transition:transform .3s;
        }
        .item-card:hover .item-icon{transform:scale(1.12) translateY(-2px);}
        .rarity-legend .item-icon{
            filter:drop-shadow(0 0 12px rgba(245,158,11,.6)) drop-shadow(0 4px 8px rgba(0,0,0,.5));
        }

        .item-name{
            font-size:13px;font-weight:700;color:var(--text-hi);
            margin-bottom:5px;line-height:1.3;
        }
        .item-description{
            font-size:10px;color:var(--text-lo);margin-bottom:10px;
            flex:1;line-height:1.5;overflow:hidden;
            display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
        }

        .item-price{
            font-size:16px;font-weight:800;margin-top:auto;
        }
        .price-common{color:#9ca3af;}
        .price-rare{color:#60a5fa;}
        .price-epic{color:#c084fc;}
        .price-legend{
            background:linear-gradient(135deg,var(--gold),#fb923c);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;
            background-clip:text;
            filter:drop-shadow(0 0 6px rgba(245,158,11,.4));
        }

        .item-stock{font-size:10px;color:#ef4444;margin-top:4px;}

        /* TASK CARD */
        .task-card{
            background:linear-gradient(145deg,rgba(14,20,40,.9),rgba(20,14,40,.9));
            border-color:rgba(251,191,36,.35);
            min-height:190px;
        }
        .task-card::before{background:linear-gradient(90deg,#f59e0b,#ec4899,#8b5cf6);}
        .task-card:hover{
            border-color:rgba(251,191,36,.7);
            box-shadow:0 0 32px rgba(251,191,36,.2),0 8px 24px rgba(0,0,0,.5);
            transform:translateY(-6px) scale(1.02);
        }
        .task-badge{
            position:absolute;top:-1px;left:16px;
            background:linear-gradient(135deg,#f59e0b,#ef4444);
            color:white;padding:3px 10px;border-radius:0 0 8px 8px;
            font-size:10px;font-weight:800;letter-spacing:1px;
        }
        .task-teacher{
            font-size:10px;padding:3px 10px;border-radius:6px;
            background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.25);
            color:#fbbf24;margin:6px 0;
        }
        .task-reward{
            font-size:17px;font-weight:900;margin-top:6px;
            background:linear-gradient(135deg,#4ade80,#22d3ee);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;
            background-clip:text;
            filter:drop-shadow(0 0 6px rgba(74,222,128,.3));
        }

        /* ── BOTTOM NAV ── */
        .bottom-nav{
            position:fixed;bottom:0;left:0;right:0;
            background:rgba(4,8,20,.97);
            border-top:1px solid var(--border);
            backdrop-filter:blur(20px);
            display:flex;justify-content:space-around;
            padding:8px 0 env(safe-area-inset-bottom,8px);
            z-index:200;
        }
        .nav-item{
            display:flex;flex-direction:column;align-items:center;gap:4px;
            padding:6px 16px;border-radius:10px;cursor:pointer;
            transition:all .2s;
        }
        .nav-item:hover{background:rgba(249,115,22,.1);}
        .nav-item.active .nav-icon,.nav-item.active .nav-label{color:var(--orange);}
        .nav-icon{font-size:22px;transition:transform .2s;}
        .nav-item:active .nav-icon{transform:scale(.88);}
        .nav-label{font-size:11px;color:var(--text-lo);font-weight:600;}
        .nav-item.active .nav-label{color:var(--orange);}

        /* ── MODALS ── */
        .modal{
            display:none;position:fixed;inset:0;z-index:1000;
            background:rgba(0,0,0,.75);backdrop-filter:blur(12px);
            align-items:center;justify-content:center;
        }
        .modal.show{display:flex;animation:fadeIn .2s ease;}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}

        .modal-content{
            background:linear-gradient(145deg,#080d1e,#0f1729);
            border:1px solid rgba(249,115,22,.4);
            border-radius:20px;padding:32px 28px;
            max-width:380px;width:90%;text-align:center;
            box-shadow:0 0 60px rgba(249,115,22,.15),0 30px 60px rgba(0,0,0,.6);
            animation:slideUp .35s cubic-bezier(.175,.885,.32,1.275);
        }
        @keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:none;opacity:1}}

        .modal-icon{font-size:56px;margin-bottom:12px;}
        .modal-title{font-size:18px;font-weight:800;color:var(--text-hi);margin-bottom:8px;}
        .modal-text{font-size:13px;color:var(--text-mid);line-height:1.7;margin-bottom:20px;}
        .modal-text strong{color:var(--text-hi);}

        .modal-buttons{display:flex;gap:10px;}
        .btn{
            flex:1;padding:12px;border:none;border-radius:10px;
            font-size:14px;font-weight:700;cursor:pointer;
            font-family:inherit;transition:all .2s;
        }
        .btn-primary{
            background:linear-gradient(135deg,var(--orange),#ef4444);
            color:white;
            box-shadow:0 0 20px rgba(249,115,22,.3);
        }
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 32px rgba(249,115,22,.5);}
        .btn-secondary{
            background:rgba(255,255,255,.08);
            border:1px solid rgba(255,255,255,.15);
            color:var(--text-mid);
        }
        .btn-secondary:hover{background:rgba(255,255,255,.14);color:var(--text-hi);}

        /* activation input */
        #activationCodeInput{
            width:100%;padding:12px;
            background:rgba(255,255,255,.06);
            border:1px solid rgba(255,255,255,.15);
            border-radius:10px;
            font-size:16px;text-align:center;letter-spacing:3px;
            color:var(--text-hi);margin-bottom:18px;
            font-family:inherit;
            transition:border-color .2s;
        }
        #activationCodeInput:focus{
            outline:none;border-color:var(--orange);
            box-shadow:0 0 0 3px rgba(249,115,22,.15);
        }
        #activationCodeInput::placeholder{letter-spacing:1px;color:var(--text-lo);}

        /* ── TOAST ── */
        .toast{
            position:fixed;top:50%;left:50%;
            transform:translate(-50%,-50%);
            background:linear-gradient(135deg,rgba(14,20,40,.97),rgba(20,14,40,.97));
            border:1px solid rgba(249,115,22,.4);
            color:var(--text-hi);padding:18px 36px;
            border-radius:14px;font-size:16px;font-weight:700;
            z-index:11000;display:none;
            box-shadow:0 0 40px rgba(249,115,22,.25),0 20px 40px rgba(0,0,0,.6);
            pointer-events:none;backdrop-filter:blur(20px);
            min-width:200px;text-align:center;
        }
        .toast.show{display:block;animation:popIn .3s ease;}
        @keyframes popIn{
            from{transform:translate(-50%,-50%) scale(.8);opacity:0}
            to{transform:translate(-50%,-50%) scale(1);opacity:1}
        }

        /* ── EMPTY STATE ── */
        .empty-state{
            text-align:center;padding:60px 20px;
            color:var(--text-lo);
        }
        .empty-state .ei{font-size:56px;margin-bottom:14px;filter:grayscale(1);}
        .empty-state p{font-size:14px;}

        @media(max-width:480px){
            .items-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));}
        }
    </style>
</head>
<body>

<!-- ── HEADER ── -->
<div class="header">
    <div class="header-top">
        <div class="user-row">
            <div class="avatar-icon">👤</div>
            <div>
                <div class="user-name" id="userName">玩家</div>
                <div class="user-class" id="userClass">校园成员</div>
            </div>
        </div>
        <div class="pts-box">
            <div class="pts-val" id="pointsValue">—</div>
            <div class="pts-lbl">💎 我的积分</div>
        </div>
    </div>
    <div class="tabs">
        <button class="tab active" onclick="filterCategory('all',this)">全部</button>
        <button class="tab" onclick="filterCategory('task',this)">📋 任务</button>
        <button class="tab" onclick="filterCategory('virtual',this)">🎮 虚拟</button>
        <button class="tab" onclick="filterCategory('real',this)">🎁 实物</button>
        <button class="tab" onclick="filterCategory('hair',this)">💇 发型</button>
        <button class="tab" onclick="filterCategory('glasses',this)">🕶️ 眼镜</button>
        <button class="tab" onclick="filterCategory('hat',this)">🎩 帽子</button>
        <button class="tab" onclick="filterCategory('title',this)">🏅 称号</button>
    </div>
</div>

<!-- ── CONTENT ── -->
<div class="content">
    <div id="itemsContainer"></div>
    <div class="empty-state" id="emptyState" style="display:none;">
        <div class="ei">📦</div>
        <p>暂无商品</p>
    </div>
</div>

<!-- ── BOTTOM NAV ── -->
<div class="bottom-nav">
    <div class="nav-item active" onclick="goToPage('mall')">
        <div class="nav-icon">🏪</div>
        <div class="nav-label">商城</div>
    </div>
    <div class="nav-item" onclick="goToPage('inventory')">
        <div class="nav-icon">🎒</div>
        <div class="nav-label">背包</div>
    </div>
    <div class="nav-item" onclick="goToPage('avatar')">
        <div class="nav-icon">👤</div>
        <div class="nav-label">形象</div>
    </div>
    <div class="nav-item" onclick="goToPage('rank')">
        <div class="nav-icon">🏆</div>
        <div class="nav-label">排行榜</div>
    </div>
    <div class="nav-item" onclick="goToPage('tasks')">
        <div class="nav-icon">📋</div>
        <div class="nav-label">任务</div>
    </div>
</div>

<!-- ── EXCHANGE MODAL ── -->
<div class="modal" id="exchangeModal" onclick="handleModalClick(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-icon" id="modalIcon">🎁</div>
        <div class="modal-title" id="modalTitle">确认兑换</div>
        <div class="modal-text" id="modalText">
            确定要花费 <strong id="modalPrice">50</strong> 积分兑换<br>
            <strong id="modalItemName">商品名称</strong> 吗？
        </div>
        <div class="modal-buttons">
            <button class="btn btn-secondary" onclick="closeModal()">取消</button>
            <button class="btn btn-primary" onclick="confirmExchange()">确认兑换</button>
        </div>
    </div>
</div>

<!-- ── ACTIVATION MODAL ── -->
<div class="modal" id="activationModal">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-icon" id="taskModalIcon">🎯</div>
        <div class="modal-title" id="taskModalTitle">输入激活码</div>
        <div class="modal-text" id="taskModalText">请输入从老师处获得的激活码</div>
        <input type="text" id="activationCodeInput" placeholder="请输入激活码">
        <div class="modal-buttons">
            <button class="btn btn-secondary" onclick="closeActivationModal()">取消</button>
            <button class="btn btn-primary" onclick="submitActivationCode()">确认提交</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/points-system.js"></script>
<script>
    const userData = JSON.parse(localStorage.getItem('campus_user') || '{}');
    const userId   = userData.userId || 'student_001';

    const pointsSystem = new PointsSystem();
    pointsSystem.setCurrentUser(userId);

    let currentCategory = 'all';
    let selectedItem    = null;
    let currentTask     = null;

    /* ── RARITY helper ── */
    function getRarity(item){
        if(item.category==='task') return 'task';
        const p=item.price||0;
        if(p>=200) return 'legend';
        if(p>=100) return 'epic';
        if(p>=51)  return 'rare';
        return 'common';
    }
    const RARITY_LABELS={common:'普通',rare:'稀有',epic:'史诗',legend:'传说',task:'任务'};

    /* ── TASKS ── */
    const teacherTasks=[
        {id:'task_pe_teacher',name:'体育老师任务',icon:'🏃‍♂️',description:'找体育老师对话，完成任务领取激活码',reward:100,activationCode:'629457298',teacher:'体育老师',category:'task'},
        {id:'task_chinese_teacher',name:'语文老师任务',icon:'📖',description:'找语文老师对话，完成任务领取激活码',reward:100,activationCode:'35792468001',teacher:'语文老师',category:'task'},
        {id:'task_english_teacher_katie',name:'英语老师凯蒂任务',icon:'👩‍🏫',description:'找英语老师凯蒂对话，完成任务领取激活码',reward:100,activationCode:'576890138',teacher:'英语老师凯蒂',category:'task'},
        {id:'task_english_teacher_lixiang',name:'英语老师李响任务',icon:'👨‍🏫',description:'找英语老师李响对话，完成任务领取激活码',reward:100,activationCode:'15267683145',teacher:'英语老师李响',category:'task'}
    ];

    /* ── INIT ── */
    window.addEventListener('DOMContentLoaded',()=>{
        updateUI();
        renderItems();
        const modal=document.getElementById('exchangeModal');
        if(modal){modal.style.display='none';modal.classList.remove('show');}
        document.addEventListener('keydown',e=>{
            if(e.key==='Escape'){
                const m=document.getElementById('exchangeModal');
                if(m&&m.classList.contains('show')) closeModal();
            }
        });
        const input=document.getElementById('activationCodeInput');
        if(input) input.addEventListener('keypress',e=>{if(e.key==='Enter') submitActivationCode();});
    });

    /* ── UPDATE UI ── */
    function updateUI(){
        const st=pointsSystem.getCurrentStudent();
        if(st){
            document.getElementById('userName').textContent=st.name;
            document.getElementById('userClass').textContent=st.class||'校园成员';
            document.getElementById('pointsValue').textContent=st.points;
        }
    }

    /* ── RENDER ── */
    function renderItems(){
        const items=pointsSystem.getRewardItems();
        const container=document.getElementById('itemsContainer');
        const empty=document.getElementById('emptyState');
        container.innerHTML='';

        let allItems=[];
        if(currentCategory==='all'||currentCategory==='task'){
            allItems=[...teacherTasks.filter(t=>!isTaskCompleted(t.id))];
        }
        if(currentCategory!=='task'){
            let fi=items;
            if(currentCategory!=='all'){
                if(currentCategory==='virtual'||currentCategory==='real'){
                    fi=items.filter(i=>i.category===currentCategory);
                } else {
                    fi=items.filter(i=>i.type===currentCategory);
                }
            }
            const st=pointsSystem.getCurrentStudent();
            if(st&&st.inventory){
                fi=fi.filter(i=>{
                    if(i.category==='real') return true;
                    return !st.inventory.some(inv=>inv.itemId===i.id);
                });
            }
            allItems=[...allItems,...fi];
        }

        if(!allItems.length){empty.style.display='block';return;}
        empty.style.display='none';

        const taskItems=[], legendItems=[], epicItems=[], rareItems=[], commonItems=[];
        allItems.forEach(item=>{
            if(item.category==='task'){taskItems.push(item); return;}
            const r=getRarity(item);
            if(r==='legend') legendItems.push(item);
            else if(r==='epic') epicItems.push(item);
            else if(r==='rare') rareItems.push(item);
            else commonItems.push(item);
        });

        function section(title,arr){
            if(!arr.length) return;
            const sec=document.createElement('div');
            const t=document.createElement('div');
            t.className='section-title';t.textContent=title;
            const g=document.createElement('div');g.className='items-grid';
            arr.forEach(item=>g.appendChild(createItemCard(item)));
            sec.appendChild(t);sec.appendChild(g);
            container.appendChild(sec);
        }

        section('📋 任务中心',taskItems);
        section('👑 传说道具',legendItems);
        section('💜 史诗道具',epicItems);
        section('💙 稀有道具',rareItems);
        section('⚪ 普通道具',commonItems);
    }

    /* ── CREATE CARD ── */
    function createItemCard(item){
        const card=document.createElement('div');

        if(item.category==='task'){
            card.className='item-card task-card';
            card.onclick=()=>showTaskActivationModal(item);
            card.innerHTML=`
                <div class="task-badge">MISSION</div>
                <div class="item-icon">${item.icon}</div>
                <div class="item-name">${item.name}</div>
                <div class="item-description">${item.description}</div>
                <div class="task-teacher">💬 找 ${item.teacher}</div>
                <div class="task-reward">+${item.reward} 积分</div>
            `;
        } else {
            const r=getRarity(item);
            card.className=`item-card rarity-${r}`;
            card.onclick=()=>showExchangeModal(item);

            const priceClass=`price-${r}`;
            let stockInfo='';
            if(item.category==='real'&&item.stock>=0){
                stockInfo=`<div class="item-stock">库存: ${item.stock}</div>`;
            }

            card.innerHTML=`
                <div class="rarity-badge badge-${r}">${RARITY_LABELS[r]}</div>
                <div class="item-icon">${item.image}</div>
                <div class="item-name">${item.name}</div>
                <div class="item-description">${item.description}</div>
                <div class="item-price ${priceClass}">💎 ${item.price}</div>
                ${stockInfo}
            `;
        }
        return card;
    }

    /* ── FILTER ── */
    function filterCategory(cat,el){
        currentCategory=cat;
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        if(el) el.classList.add('active');
        renderItems();
    }

    /* ── EXCHANGE MODAL ── */
    function showExchangeModal(item){
        selectedItem=null;
        const modal=document.getElementById('exchangeModal');
        if(modal) modal.style.display='flex';
        selectedItem=item;
        document.getElementById('modalIcon').textContent=item.image;
        document.getElementById('modalItemName').textContent=item.name;
        document.getElementById('modalPrice').textContent=item.price;
        const st=pointsSystem.getCurrentStudent();
        const confirmBtn=document.querySelector('#exchangeModal .btn-primary');
        if(st.points<item.price){
            document.getElementById('modalText').innerHTML=`
                <span style="color:#ef4444;">积分不足！</span><br>
                当前 <strong>${st.points}</strong> 积分，还差 <strong>${item.price-st.points}</strong> 积分
            `;
            if(confirmBtn) confirmBtn.style.display='none';
        } else {
            document.getElementById('modalText').innerHTML=`
                花费 <strong>${item.price}</strong> 积分兑换<br>
                <strong>${item.name}</strong> ？
            `;
            if(confirmBtn) confirmBtn.style.display='block';
        }
        document.getElementById('exchangeModal').classList.add('show');
    }

    function handleModalClick(e){
        if(e.target.id==='exchangeModal') closeModal();
    }

    function closeModal(){
        const m=document.getElementById('exchangeModal');
        if(m){m.classList.remove('show');m.style.display='none';}
        selectedItem=null;
        const btn=document.querySelector('#exchangeModal .btn-primary');
        if(btn) btn.style.display='block';
    }

    function confirmExchange(){
        if(!selectedItem) return;
        const itemId=selectedItem.id;
        const result=pointsSystem.exchangeReward(userId,itemId);
        const m=document.getElementById('exchangeModal');
        if(m){m.classList.remove('show');m.style.display='none';}
        selectedItem=null;
        updateUI(); renderItems();
        showToast(result.success?'🎉 '+result.message:'❌ '+result.message);
    }

    /* ── TASK MODAL ── */
    function showTaskActivationModal(task){
        currentTask=task;
        document.getElementById('taskModalIcon').textContent=task.icon;
        document.getElementById('taskModalTitle').textContent=task.name;
        document.getElementById('taskModalText').innerHTML=`
            <div style="margin-bottom:10px;"><strong style="color:#f59e0b;">📍 任务提示：</strong><br>${task.description}</div>
            <div style="color:#4ade80;font-weight:700;">完成后获得 +${task.reward} 积分 🎁</div>
        `;
        document.getElementById('activationCodeInput').value='';
        document.getElementById('activationModal').classList.add('show');
        setTimeout(()=>document.getElementById('activationCodeInput').focus(),100);
    }

    function closeActivationModal(){
        const m=document.getElementById('activationModal');
        if(m){
            m.classList.remove('show');
            m.style.display='none';
            setTimeout(()=>{m.style.display='';},500);
        }
        document.getElementById('activationCodeInput').value='';
        currentTask=null;
    }

    function submitActivationCode(){
        if(!currentTask) return;
        const code=document.getElementById('activationCodeInput').value.trim();
        if(!code){showToast('❌ 请输入激活码');return;}
        if(code===currentTask.activationCode){
            if(isTaskCompleted(currentTask.id)){
                showToast('⚠️ 该任务已完成');closeActivationModal();return;
            }
            const reward=currentTask.reward, name=currentTask.name, id=currentTask.id;
            const st=pointsSystem.getCurrentStudent();
            if(st){
                try{
                    pointsSystem.addPoints(userId,reward,`完成${name}`);
                    markTaskCompleted(id);
                    const m=document.getElementById('activationModal');
                    if(m){m.classList.remove('show');m.style.display='none';}
                    currentTask=null;
                    setTimeout(()=>{updateUI();renderItems();showToast(`🎉 获得 ${reward} 积分！`);},100);
                }catch(e){alert('错误: '+e.message);}
            } else {alert('未找到学生信息，请重新登录');}
        } else {
            showToast('❌ 激活码错误，请重试');
            document.getElementById('activationCodeInput').value='';
            document.getElementById('activationCodeInput').focus();
        }
    }

    /* ── TASK STATUS ── */
    function isTaskCompleted(taskId){
        const ct=JSON.parse(localStorage.getItem('completed_tasks')||'{}');
        return ct[userId]&&ct[userId][taskId];
    }
    function markTaskCompleted(taskId){
        const ct=JSON.parse(localStorage.getItem('completed_tasks')||'{}');
        if(!ct[userId]) ct[userId]={};
        ct[userId][taskId]={completed:true,completedAt:new Date().toISOString()};
        localStorage.setItem('completed_tasks',JSON.stringify(ct));
    }

    /* ── TOAST ── */
    function showToast(msg){
        const t=document.getElementById('toast');
        if(!t){alert(msg);return;}
        if(window.toastTimer) clearTimeout(window.toastTimer);
        t.textContent=msg;t.classList.add('show');t.style.display='block';
        window.toastTimer=setTimeout(()=>{t.classList.remove('show');t.style.display='none';},3000);
    }

    /* ── NAV ── */
    function goToPage(page){
        const pages={
            mall:'points-mall.html',inventory:'points-inventory.html',
            avatar:'points-avatar.html',rank:'points-rank.html',tasks:'points-tasks.html'
        };
        const titles={
            mall:'💎 积分商城',inventory:'🎒 我的背包',
            avatar:'👤 虚拟形象',rank:'🏆 排行榜',tasks:'📋 任务中心'
        };
        if(!pages[page]) return;
        if(page==='mall'&&window.location.pathname.includes('points-mall.html')) return;
        if(window.parent&&window.parent!==window){
            try{
                if(typeof window.parent.openInGame==='function'){
                    window.parent.openInGame(pages[page],titles[page]);return;
                }
            }catch(e){}
        }
        window.location.replace(pages[page]);
    }

    /* ── AUTO SAVE ── */
    function autoSavePoints(){
        try{if(pointsSystem&&userId) pointsSystem.savePointsData();}catch(e){}
    }
    window.addEventListener('beforeunload',autoSavePoints);
    setInterval(autoSavePoints,30000);
</script>
</body>
</html>
