<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师管理后台 - 校园积乐园</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: #f5f5f5;
            min-height: 100vh;
        }
        
        /* 顶部导航栏 */
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .navbar-title {
            font-size: 20px;
            font-weight: bold;
        }
        
        .navbar-user {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* 主容器 */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        
        /* 功能卡片 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .func-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .func-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
        }
        
        .func-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .func-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        
        .func-desc {
            font-size: 14px;
            color: #666;
        }
        
        /* 表单区域 */
        .form-section {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .section-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f3f4f6;
            color: #666;
        }
        
        .btn-secondary:hover {
            background: #e5e7eb;
        }
        
        /* 学生列表 */
        .student-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .student-table th {
            background: #f9fafb;
            padding: 12px;
            text-align: left;
            font-size: 14px;
            color: #666;
            border-bottom: 2px solid #e5e7eb;
        }
        
        .student-table td {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }
        
        .student-table tr:hover {
            background: #f9fafb;
        }
        
        /* 提示消息 */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 2000;
            display: none;
        }
        
        .toast.show {
            display: block;
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from {
                transform: translateX(-50%) translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <div class="navbar">
        <div class="navbar-title">🎓 教师管理后台</div>
        <div class="navbar-user">
            <span>👨‍🏫 李老师</span>
            <button class="btn btn-secondary" onclick="logout()" style="padding: 8px 16px;">退出</button>
        </div>
    </div>
    
    <!-- 主容器 -->
    <div class="container">
        <!-- 功能卡片 -->
        <div class="card-grid">
            <div class="func-card" onclick="showSection('award')">
                <div class="func-icon">⭐</div>
                <div class="func-title">发放积分</div>
                <div class="func-desc">为学生发放积分奖励</div>
            </div>
            
            <div class="func-card" onclick="showSection('students')">
                <div class="func-icon">👥</div>
                <div class="func-title">学生管理</div>
                <div class="func-desc">查看学生积分情况</div>
            </div>
            
            <div class="func-card" onclick="showSection('exchange')">
                <div class="func-icon">🎁</div>
                <div class="func-title">兑换审核</div>
                <div class="func-desc">审核学生兑换申请</div>
            </div>
            
            <div class="func-card" onclick="showSection('stats')">
                <div class="func-icon">📊</div>
                <div class="func-title">数据统计</div>
                <div class="func-desc">查看积分统计数据</div>
            </div>
        </div>
        
        <!-- 发放积分表单 -->
        <div class="form-section" id="awardSection">
            <div class="section-title">⭐ 发放积分</div>
            
            <form onsubmit="awardPoints(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">选择学生</label>
                        <select class="form-select" id="studentSelect" required>
                            <option value="">请选择学生</option>
                            <option value="student_001">玩家 - 初一(1)班</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">行为类型</label>
                        <select class="form-select" id="behaviorSelect" onchange="updatePoints()">
                            <option value="">请选择行为</option>
                            <option value="听写全对">听写全对 (10分)</option>
                            <option value="作业优秀">作业优秀 (5分)</option>
                            <option value="课堂发言">课堂发言 (2分)</option>
                            <option value="帮助同学">帮助同学 (3分)</option>
                            <option value="考试进步">考试进步 (20分)</option>
                            <option value="完美出勤">完美出勤 (5分)</option>
                            <option value="自定义">自定义</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">积分数量</label>
                        <input type="number" class="form-input" id="pointsInput" min="1" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">备注说明</label>
                        <input type="text" class="form-input" id="remarkInput" placeholder="可选">
                    </div>
                </div>
                
                <div style="text-align: center; margin-top: 20px;">
                    <button type="submit" class="btn btn-primary">✅ 确认发放</button>
                </div>
            </form>
        </div>
        
        <!-- 学生列表 -->
        <div class="form-section" id="studentsSection" style="display: none;">
            <div class="section-title">👥 学生积分情况</div>
            
            <table class="student-table" id="studentTable">
                <thead>
                    <tr>
                        <th>学号</th>
                        <th>姓名</th>
                        <th>班级</th>
                        <th>当前积分</th>
                        <th>累计获得</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody">
                    <!-- 动态生成 -->
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- 提示消息 -->
    <div class="toast" id="toast"></div>
    
    <script src="js/points-system.js"></script>
    <script>
        const pointsSystem = new PointsSystem();
        
        window.addEventListener('DOMContentLoaded', () => {
            loadStudents();
        });
        
        function showSection(section) {
            // 隐藏所有区域
            document.getElementById('awardSection').style.display = 'none';
            document.getElementById('studentsSection').style.display = 'none';
            
            // 显示对应区域
            if (section === 'award') {
                document.getElementById('awardSection').style.display = 'block';
            } else if (section === 'students') {
                document.getElementById('studentsSection').style.display = 'block';
                loadStudents();
            } else if (section === 'exchange') {
                showToast('兑换审核功能开发中...');
            } else if (section === 'stats') {
                showToast('数据统计功能开发中...');
            }
        }
        
        function updatePoints() {
            const behavior = document.getElementById('behaviorSelect').value;
            const pointsInput = document.getElementById('pointsInput');
            const remarkInput = document.getElementById('remarkInput');
            
            const rules = pointsSystem.pointsData.pointsRules;
            if (rules[behavior]) {
                pointsInput.value = rules[behavior];
                remarkInput.value = behavior;
            } else {
                pointsInput.value = '';
                remarkInput.value = '';
            }
        }
        
        function awardPoints(event) {
            event.preventDefault();
            
            const studentId = document.getElementById('studentSelect').value;
            const points = parseInt(document.getElementById('pointsInput').value);
            const remark = document.getElementById('remarkInput').value || '教师奖励';
            
            if (pointsSystem.addPoints(studentId, points, remark, '李老师')) {
                showToast(`✅ 成功发放 ${points} 积分！`);
                event.target.reset();
            } else {
                showToast('❌ 发放失败，请重试');
            }
        }
        
        function loadStudents() {
            const tbody = document.getElementById('studentTableBody');
            const students = Object.values(pointsSystem.pointsData.students);
            
            tbody.innerHTML = students.map(student => `
                <tr>
                    <td>${student.id}</td>
                    <td>${student.name}</td>
                    <td>${student.class}</td>
                    <td><strong style="color: #667eea;">${student.points}</strong></td>
                    <td>${student.totalEarned}</td>
                    <td>
                        <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 12px;" 
                                onclick="viewHistory('${student.id}')">
                            查看记录
                        </button>
                    </td>
                </tr>
            `).join('');
        }
        
        function viewHistory(studentId) {
            const history = pointsSystem.getPointsHistory(studentId);
            let message = '积分历史记录：\n\n';
            
            history.forEach(record => {
                const date = new Date(record.date).toLocaleDateString();
                message += `${date} - ${record.reason}: ${record.amount > 0 ? '+' : ''}${record.amount}分\n`;
            });
            
            alert(message);
        }
        
        function logout() {
            window.location.href = 'index.html';
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
