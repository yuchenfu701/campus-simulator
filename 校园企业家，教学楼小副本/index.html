            // ─────────────────────────────────────────────────────────────────
            // 10. 操场灯架（四角高杆灯）
            // ─────────────────────────────────────────────────────────────────
            {
              const lightPoles=[[-65,60],[65,60],[-65,110],[65,110]];
              const pMat=new THREE.MeshLambertMaterial({color:0x606060});
              lightPoles.forEach(([px,pz])=>{
                const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.18,18,8),pMat);
                pole.position.set(px,9,pz); pole._noMerge=true; scene.add(pole);
                vbD(px,18.2,pz, 6,0.15,0.15, 0x606060);         // 横臂
                vbD(px+2.5,18.3,pz, 0.8,0.4,0.6, 0xfff5c0);    // 灯头
                vbD(px-2.5,18.3,pz, 0.8,0.4,0.6, 0xfff5c0);    // 灯头
                // PointLight已移除（每个PointLight都要遍历所有片元，性能开销大）
              });
            }

            // ─────────────────────────────────────────────────────────────────
            // 11. 室内光照（PointLight已全部移除，改用场景HemisphereLight统一补光）
            // PointLight性能说明：每盏PointLight = GPU对整个scene内所有片元计算距离
            // 9盏B1走廊灯 + 12盏B2/B3/B4 = 21盏PointLight，每帧21次全场景光照计算
            // ─────────────────────────────────────────────────────────────────
            // （已删除所有室内PointLight，全部改由场景全局灯光覆盖）

            // ─────────────────────────────────────────────────────────────────
            // 12. 天空星光粒子（InstancedMesh，22,000颗）
            // ─────────────────────────────────────────────────────────────────
            {
              const geo=new THREE.BoxGeometry(0.34,0.34,0.34);
              const mat=new THREE.MeshBasicMaterial({ color: 0xffffff, fog: false, depthWrite: false, transparent: true, opacity: 1 });
              const SCNT=22000;
              const inst=new THREE.InstancedMesh(geo,mat,SCNT);
              inst.frustumCulled = false;
              inst.renderOrder = 2;
              const M=new THREE.Matrix4();
              for(let i=0;i<SCNT;i++){
                const θ=Math.random()*Math.PI*2;
                const φ=Math.acos(1-Math.random()*0.92);
                const r=160+Math.random()*420;
                const x=r*Math.sin(φ)*Math.cos(θ);
                const y=r*Math.cos(φ)+25;
                const z=r*Math.sin(φ)*Math.sin(θ)+20;
                M.makeTranslation(x,y,z);
                inst.setMatrixAt(i,M);
              }
              inst.instanceMatrix.needsUpdate=true;
              _starsInst = inst; // 保存引用供昼夜系统使用
              scene.add(inst);
              console.log(`⭐ 天空星光: ${SCNT}`);
            }

              // ─────────────────────────────────────────────────────────────────
            // 18. 围墙表面微砖（已删除，改为光滑围墙面）
            // ─────────────────────────────────────────────────────────────────
            if (false) {
              const bW=0.20,bH=0.06,bDp=0.025;
              const bT2=T.brick.clone(); bT2.repeat.set(1,1);
              const mat=new THREE.MeshLambertMaterial({color:0xc8a888,map:bT2});

              // X向围墙（南北墙，砖长轴沿X）: BoxGeometry(bW=0.20, bH, bDp)
              const geoX=new THREE.BoxGeometry(bW,bH,bDp);
              const xSegs=[
                {sx:-120,sz:118.12,rW:240,fH:3},  // 南围墙
                {sx:-120,sz:-78.12,rW:240,fH:3},  // 北围墙
              ];
              let xTot=0;
              xSegs.forEach(({rW,fH})=>{ xTot+=Math.floor(rW/(bW+0.01))*Math.floor(fH/(bH+0.01)); });
              const instX=new THREE.InstancedMesh(geoX,mat,xTot);
              const MX=new THREE.Matrix4(); let xi=0;
              xSegs.forEach(({sx,sz,rW,fH})=>{
                const cols=Math.floor(rW/(bW+0.01)),rows=Math.floor(fH/(bH+0.01));
                for(let r=0;r<rows;r++){
                  const off=(r%2)*(bW+0.01)/2, y=0.06+r*(bH+0.01);
                  for(let c=0;c<cols;c++) MX.makeTranslation(sx+off+c*(bW+0.01)+bW/2,y,sz),instX.setMatrixAt(xi++,MX);
                }
              });
              instX.instanceMatrix.needsUpdate=true; scene.add(instX);

              // Z向围墙（东西墙，砖长轴沿Z）: BoxGeometry(bDp, bH, bW) ← 交换X/Z尺寸
              const geoZ=new THREE.BoxGeometry(bDp,bH,bW);
              const zSegs=[
                {sx:120.12,sz:-78,rW:196,fH:3},  // 东围墙
                {sx:-120.12,sz:-78,rW:196,fH:3}, // 西围墙
              ];
              let zTot=0;
              zSegs.forEach(({rW,fH})=>{ zTot+=Math.floor(rW/(bW+0.01))*Math.floor(fH/(bH+0.01)); });
              const instZ=new THREE.InstancedMesh(geoZ,mat,zTot);
              const MZ=new THREE.Matrix4(); let zi=0;
              zSegs.forEach(({sx,sz,rW,fH})=>{
                const cols=Math.floor(rW/(bW+0.01)),rows=Math.floor(fH/(bH+0.01));
                for(let r=0;r<rows;r++){
                  const off=(r%2)*(bW+0.01)/2, y=0.06+r*(bH+0.01);
                  for(let c=0;c<cols;c++) MZ.makeTranslation(sx,y,sz+off+c*(bW+0.01)+bW/2),instZ.setMatrixAt(zi++,MZ);
                }
              });
              instZ.instanceMatrix.needsUpdate=true; scene.add(instZ);
              console.log(`🧱 围墙微砖 ${xTot+zTot}块`);
            }

            // ─────────────────────────────────────────────────────────────────
            // 19. 屋顶女儿墙压顶砖（InstancedMesh，约30,000块）
            // ─────────────────────────────────────────────────────────────────
            {
              const bW=0.24,bH=0.06,bDp=0.35;
              const geo=new THREE.BoxGeometry(bW,bH,bDp);
              const mat=new THREE.MeshLambertMaterial({color:0x4a7eb5});
              // 四栋楼顶部压顶蓝砖（y=12.1m处）
              const parapets=[
                // [cx, cz_S, cz_N, buildW]  南北女儿墙
                [0,   9.0,  -8.0, 40],  // B1
                [0, -53.0, -70.0, 40],  // B2
                [75,  9.0,  -8.0, 40],  // B3
                [-75, 9.0,  -8.0, 40],  // B4
              ];
              const PARY=12.1;
              let ptot=0;
              parapets.forEach(([,,, bw])=>{ ptot+=Math.floor(bw/bW)*2; });
              const inst=new THREE.InstancedMesh(geo,mat,ptot);
              const M=new THREE.Matrix4();
              let idx=0;
              parapets.forEach(([cx,czS,czN,bw])=>{
                const cols=Math.floor(bw/bW);
                const startX=cx-bw/2;
                for(let col=0;col<cols;col++){
                  const x=startX+col*bW+bW/2;
                  M.makeTranslation(x,PARY,czS); inst.setMatrixAt(idx++,M);
                  M.makeTranslation(x,PARY,czN); inst.setMatrixAt(idx++,M);
                }
              });
              inst.instanceMatrix.needsUpdate=true;
              scene.add(inst);
              console.log(`🏗️ 屋顶压顶砖 ${ptot}块`);
            }

            // 统计报告
            let instTotal=0;
            scene.traverse(obj=>{ if(obj.isInstancedMesh) instTotal+=obj.count; });
            console.log(`✨ 细节系统完成！InstancedMesh实例总数: ${instTotal}（已优化：删除绿色粒子等低质量系统，保留高视觉价值系统）`);
        }

        // ═══════════════════════════════════════════════════════════════════
        // ■ 地图缓存系统（IndexedDB）+ 几何体合并（核心性能优化）
        // ═══════════════════════════════════════════════════════════════════
        const MAP_VER = 'campus_v37'; // v37：公厕 Z=-20 与教学楼错层，±88 围墙内，消除卡楼

        function _dbOpen(cb) {
            try {
                const req = indexedDB.open('campusMapDB', 1);
                req.onupgradeneeded = e => {
                    if (!e.target.result.objectStoreNames.contains('cache'))
                        e.target.result.createObjectStore('cache');
                };
                req.onsuccess = e => cb(null, e.target.result);
                req.onerror = () => cb('error');
            } catch(e) { cb('exception'); }
        }
        function _dbGet(key, cb) {
            _dbOpen((err, db) => {
                if (err) return cb(null);
                try {
                    const tx = db.transaction('cache', 'readonly');
                    const r = tx.objectStore('cache').get(key);
                    r.onsuccess = e => cb(e.target.result || null);
                    r.onerror = () => cb(null);
                } catch(e) { cb(null); }
            });
        }
        function _dbPut(key, val, cb) {
            _dbOpen((err, db) => {
                if (err) return cb && cb();
                try {
                    const tx = db.transaction('cache', 'readwrite');
                    tx.objectStore('cache').put(val, key);
                    tx.oncomplete = () => { cb && cb(); db.close(); };
                    tx.onerror = () => cb && cb();
                } catch(e) { cb && cb(); }
            });
        }

        // 几何体合并：把 ~12000 个静态 Mesh 合并成按材质分组的 ~15-25 个大 Mesh
        // 效果：WebGL draw call 从 12000+/帧 → ~25/帧，帧率从卡顿 → 流畅
        function mergeStaticMeshes() {
            const BGU = THREE.BufferGeometryUtils;
            if (!BGU) { console.warn('BufferGeometryUtils未加载'); return []; }

            // 标记互动门不参与合并（透明材质已自动跳过）
            const markNoMerge = pivot => { if(pivot) pivot.traverse(m => { if(m.isMesh) m._noMerge=true; }); };
            [window._mainDoorL, window._mainDoorR,
             window._b2DoorL,   window._b2DoorR,
             window._b3DoorL,   window._b3DoorR,
             window._b4DoorL,   window._b4DoorR].forEach(markNoMerge);

            const groups = new Map(); // matUUID → {mat, geos[]}
            const originals = [];

            scene.traverse(obj => {
                if (!obj.isMesh || obj.isInstancedMesh || obj._noMerge || obj._isMergedStatic) return;
                const mat = obj.material;
                if (!mat || mat.transparent) return;
                if (obj.geometry && obj.geometry.type === 'PlaneGeometry') return; // 大地面单独保留
                if (!groups.has(mat.uuid)) groups.set(mat.uuid, { mat, geos: [] });
                obj.updateWorldMatrix(true, false);
                const g = obj.geometry.clone();
                g.applyMatrix4(obj.matrixWorld);
                groups.get(mat.uuid).geos.push(g);
                originals.push(obj);
            });

            const result = [];
            let mergeErr = 0;
            groups.forEach(({ mat, geos }) => {
                if (!geos.length) return;
                try {
                    const merged = (BGU.mergeGeometries || BGU.mergeBufferGeometries)(geos, false);
                    if (!merged) return;
                    const m = new THREE.Mesh(merged, mat);
                    m.castShadow = true; m.receiveShadow = true;
                    m._isMergedStatic = true;
                    m.matrixAutoUpdate = false; m.updateMatrix();
                    scene.add(m);
                    result.push(m);
                } catch(e) { mergeErr++; }
                geos.forEach(g => g.dispose());
            });

            // 从场景移除原始Mesh（不只是隐藏！）——Three.js每帧仍会处理隐藏的对象
            // 保留在 walls[] 中用于碰撞检测，但彻底从场景图中移除
            originals.forEach(m => {
                scene.remove(m);
                // 释放GPU几何体内存（碰撞用bbox已在walls[].bbox中，不依赖geometry）
                if (m.geometry) m.geometry.dispose();
            });
            // 所有 InstancedMesh 也关闭 matrixAutoUpdate（它们是静态的）
            scene.traverse(obj => { if (obj.isInstancedMesh) { obj.matrixAutoUpdate=false; } });
            console.log(`✅ 几何体合并: ${originals.length}个Mesh彻底移出场景 → ${result.length}个合并Mesh, draw calls: ${originals.length}→${result.length}${mergeErr?', '+mergeErr+'个合并失败':''}`);
            return result;
        }

        // 序列化合并后的Mesh为可存入IndexedDB的纯ArrayBuffer结构
        function _serializeMerged(mergedMeshes) {
            return mergedMeshes.map(m => {
                const geo = m.geometry, mat = m.material;
                const pos  = new Float32Array(geo.attributes.position.array).buffer;
                const norm = geo.attributes.normal  ? new Float32Array(geo.attributes.normal.array).buffer  : null;
                const uv   = geo.attributes.uv      ? new Float32Array(geo.attributes.uv.array).buffer      : null;
                const idx  = geo.index              ? new Uint32Array(geo.index.array).buffer               : null;
                return {
                    pos, norm, uv, idx,
                    color: mat.color.getHex(),
                    texKey:  mat._cacheTexKey  || null,
                    texRepX: mat.map ? mat.map.repeat.x : 1,
                    texRepY: mat.map ? mat.map.repeat.y : 1,
                };
            });
        }

        // 序列化碰撞包围盒（用于缓存加载时重建 walls[]）
        function _serializeWalls() {
            return walls.filter(m => m.bbox).map(m => {
                const b = m.bbox;
                return [b.min.x,b.min.y,b.min.z, b.max.x,b.max.y,b.max.z];
            });
        }

        // 从缓存数据还原已合并的Mesh + 碰撞盒
        function _restoreFromCache(cacheData) {
            const T = buildDetailTextures();
            cacheData.meshData.forEach(d => {
                const geo = new THREE.BufferGeometry();
                geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(d.pos), 3));
                if (d.norm) geo.setAttribute('normal', new THREE.BufferAttribute(new Float32Array(d.norm), 3));
                if (d.uv)   geo.setAttribute('uv',     new THREE.BufferAttribute(new Float32Array(d.uv),   2));
                if (d.idx)  geo.setIndex(new THREE.BufferAttribute(new Uint32Array(d.idx), 1));
                let map = null;
                if (d.texKey && T[d.texKey]) {
                    map = T[d.texKey].clone();
                    map.repeat.set(d.texRepX, d.texRepY);
                    map.wrapS = map.wrapT = THREE.RepeatWrapping;
                }
                const mat = new THREE.MeshLambertMaterial({ color: d.color, map });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.castShadow = true; mesh.receiveShadow = true;
                mesh._isMergedStatic = true;
                mesh.matrixAutoUpdate = false; mesh.updateMatrix();
                scene.add(mesh);
            });
            // 重建碰撞盒
            cacheData.wallBBoxes.forEach(([x1,y1,z1,x2,y2,z2]) => {
                walls.push({ bbox: new THREE.Box3(
                    new THREE.Vector3(x1,y1,z1), new THREE.Vector3(x2,y2,z2)
                )});
            });
            console.log(`📦 从缓存还原: ${cacheData.meshData.length}个Mesh + ${cacheData.wallBBoxes.length}个碰撞盒`);
        }

        // 更新加载提示文字及进度条
        let _loadStep = 0;
        function _setLoadHint(text) {
            const hint = document.getElementById('load-hint');
            const bar  = document.getElementById('load-bar');
            const overlay = document.getElementById('map-loading');
            if (hint) hint.textContent = text;
            if (bar)  { _loadStep = Math.min(_loadStep + 14, 96); bar.style.width = _loadStep + '%'; }
            if (!text && overlay) {
                // 加载完成，动画隐藏
                if (bar) bar.style.width = '100%';
                setTimeout(() => { if (overlay) overlay.style.opacity='0'; overlay.style.transition='opacity 0.6s'; }, 200);
                setTimeout(() => { if (overlay) overlay.style.display='none'; }, 900);
            }
        }

        function createBuilding() {
            // ── 材质定义（精细配色方案，应用Canvas纹理）──
            const T = buildDetailTextures();
            // 外墙：米白 + 细微混凝土肌理（避免大块死白「素盒子」）
            const wallTex = T.concrete.clone();
            wallTex.wrapS = wallTex.wrapT = THREE.RepeatWrapping;
            wallTex.repeat.set(3, 2.5);
            const wallMat = new THREE.MeshLambertMaterial({ color: 0xede8e2, map: wallTex });
            wallMat._cacheTexKey = 'concrete';
            wallMat._cacheTexRX = 3;
            wallMat._cacheTexRY = 2.5;
            const cwT=T.corrWall.clone(); cwT.repeat.set(8,2);
            const corrWall  = new THREE.MeshLambertMaterial({ color: 0x9e9488, map: cwT }); // 走廊隔墙：与贴图相乘后仍偏灰
            corrWall._cacheTexKey='corrWall'; corrWall._cacheTexRX=8; corrWall._cacheTexRY=2;
            // 教室地板：大块浅色抛光砖（600×600mm 比例，清爽米白）
            const floorT=T.floor.clone(); floorT.wrapS=floorT.wrapT=THREE.RepeatWrapping; floorT.repeat.set(2,2);
            const floorMat  = new THREE.MeshLambertMaterial({ color: 0xf5f0e8, map: floorT });
            floorMat._cacheTexKey='floor'; floorMat._cacheTexRX=2; floorMat._cacheTexRY=2;
            // 走廊地板：中灰哑光砖
            const cflT=T.corrFloor.clone(); cflT.wrapS=cflT.wrapT=THREE.RepeatWrapping; cflT.repeat.set(2,2);
            const corrFloorMat = new THREE.MeshLambertMaterial({ color: 0x928a82, map: cflT }); // 走廊地略再深
            corrFloorMat._cacheTexKey='corrFloor'; corrFloorMat._cacheTexRX=2; corrFloorMat._cacheTexRY=2;
            const ceilMat   = new THREE.MeshLambertMaterial({ color: 0xd8d2c8 }); // 屋顶女儿墙等：灰米色
            const stairMat  = new THREE.MeshLambertMaterial({ color: 0xbcab88 }); // 楼梯米灰
            const glT=T.glass; glT.wrapS=glT.wrapT=THREE.RepeatWrapping; glT.repeat.set(1,1);
            const glassMat  = new THREE.MeshLambertMaterial({ color: 0xa8dcff, transparent: true, opacity: 0.32, side: THREE.DoubleSide, depthWrite: false });
            const bandMat   = new THREE.MeshLambertMaterial({ color: 0x4a7eb5 }); // 外墙腰线蓝
            const frameMat  = new THREE.MeshLambertMaterial({ color: 0x3a3a3a }); // 深色窗框
            const conT=T.concrete.clone(); conT.repeat.set(2,2);
            const columnMat = new THREE.MeshLambertMaterial({ color: 0xe0d8c8, map: conT });
            columnMat._cacheTexKey='concrete'; columnMat._cacheTexRX=2; columnMat._cacheTexRY=2;
            const baseMat   = new THREE.MeshLambertMaterial({ color: 0xc8bea8 }); // 踢脚线
            const tileAlt   = new THREE.MeshLambertMaterial({ color: 0xccc0a0 }); // 地板深色砖

            const BX1=BLDG_X1, BX2=BLDG_X2, BZ1=BLDG_Z1, BZ2=BLDG_Z2;
            const TH = NUM_FLOORS * FLOOR_H;  // 总高度 12m
            const WT = WALL_T;
            const ST = 0.40;  // 楼板厚度（增厚到0.4m，防止跳跃穿楼板）

            // ── 辅助：有碰撞的盒体 ──
            function wb(x, y, z, w, h, d, mat) {
                if (window._skipVisualMesh) return {position:{set:()=>{}},bbox:new THREE.Box3()};
                const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
                m.position.set(x, y, z);
                m.castShadow = false;
                m.receiveShadow = true;
                m.bbox = new THREE.Box3().setFromObject(m);
                scene.add(m); walls.push(m);
                return m;
            }
            // ── 辅助：装饰盒（无碰撞） ──
            function vb(x, y, z, w, h, d, color, alpha) {
                if (window._skipVisualMesh) return {position:{set:()=>{}},material:{}};
                const opt = (alpha !== undefined && alpha < 1)
                    ? { color, transparent: true, opacity: alpha, side: THREE.DoubleSide, depthWrite: false }
                    : { color };
                const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshLambertMaterial(opt));
                m.position.set(x, y, z);
                m.castShadow = false;
                m.receiveShadow = (alpha === undefined || alpha >= 1);
                scene.add(m); return m;
            }
            // ── 辅助：X向墙（可含门洞） ──
            function wallX(z, x1, x2, yB, h, mat, dX) {
                if (dX == null) { wb((x1+x2)/2, yB+h/2, z, x2-x1, h, WT, mat); return; }
                const l=dX-DOOR_W/2-x1, r=x2-(dX+DOOR_W/2), lH=h-DOOR_H;
                if(l>0.05)  wb(x1+l/2,           yB+h/2,          z, l,     h,  WT, mat);
                if(r>0.05)  wb(dX+DOOR_W/2+r/2,  yB+h/2,          z, r,     h,  WT, mat);
                if(lH>0.05) wb(dX,                yB+DOOR_H+lH/2,  z, DOOR_W,lH, WT, mat);
            }
            // ── 辅助：Z向墙（可含门洞） ──
            function wallZ(x, z1, z2, yB, h, mat, dZ) {
                if (dZ == null) { wb(x, yB+h/2, (z1+z2)/2, WT, h, z2-z1, mat); return; }
                const f=dZ-DOOR_W/2-z1, b=z2-(dZ+DOOR_W/2), lH=h-DOOR_H;
                if(f>0.05)  wb(x, yB+h/2,          z1+f/2,          WT, h,  f,     mat);
                if(b>0.05)  wb(x, yB+h/2,          dZ+DOOR_W/2+b/2, WT, h,  b,     mat);
                if(lH>0.05) wb(x, yB+DOOR_H+lH/2,  dZ,              WT, lH, DOOR_W, mat);
            }

            // ══════════════════════════════════════════════
            // 1. 外墙（含彩色腰线、立柱、窗框）
            // ══════════════════════════════════════════════
            wb(BX1, TH/2, (BZ1+BZ2)/2, WT, TH, BZ2-BZ1, wallMat);  // 西墙
            wb(BX2, TH/2, (BZ1+BZ2)/2, WT, TH, BZ2-BZ1, wallMat);  // 东墙

            const WIN_W=2.2, WIN_H=1.8, WIN_SILL=0.9;
            const RBOUNDS=[
                {x1:ROOM_XS[0], x2:ROOM_XS[1]},
                {x1:ROOM_XS[1], x2:ROOM_XS[2]},
                {x1:ROOM_XS[2], x2:ROOM_XS[3]}
            ];

            // 外立面每层腰线（蓝色水平装饰带）
            for (let f=0; f<NUM_FLOORS; f++) {
                const bandY = f * FLOOR_H;
                vb((BX1+BX2)/2, bandY+0.12, BZ1-0.01, BX2-BX1+WT*2, 0.24, 0.06, 0x4a7eb5, 1); // 北面腰线
                vb((BX1+BX2)/2, bandY+0.12, BZ2+0.01, BX2-BX1+WT*2, 0.24, 0.06, 0x4a7eb5, 1); // 南面腰线
                vb(BX1-0.01, bandY+0.12, (BZ1+BZ2)/2, 0.06, 0.24, BZ2-BZ1, 0x4a7eb5, 1);      // 西侧腰线
                vb(BX2+0.01, bandY+0.12, (BZ1+BZ2)/2, 0.06, 0.24, BZ2-BZ1, 0x4a7eb5, 1);      // 东侧腰线
            }
            // 顶部腰线
            vb((BX1+BX2)/2, TH-0.12, BZ1-0.01, BX2-BX1+WT*2, 0.24, 0.06, 0x4a7eb5, 1);
            vb((BX1+BX2)/2, TH-0.12, BZ2+0.01, BX2-BX1+WT*2, 0.24, 0.06, 0x4a7eb5, 1);

            // 外立面装饰立柱（竖向线条）
            const colW=0.35, colD=0.12;
            for (let cx=BX1+6; cx<=BX1+36; cx+=12) {
                vb(cx, TH/2, BZ1-colD/2-0.01, colW, TH, colD, 0xe8dfd2, 1);
                vb(cx, TH/2, BZ2+colD/2+0.01, colW, TH, colD, 0xe8dfd2, 1);
            }

            for (let f=0; f<NUM_FLOORS; f++) {
                const yB=f*FLOOR_H, fH=FLOOR_H;

                // 北墙教室背墙（含楼梯间实墙段）
                wb(STAIR_X+(BX2-STAIR_X)/2, yB+fH/2, BZ1, BX2-STAIR_X, fH, WT, wallMat);

                // 北墙教室段：每间3扇窗（含精细窗框）
                RBOUNDS.forEach(rm => {
                    const rW=rm.x2-rm.x1, sp=rW/4;
                    wb((rm.x1+rm.x2)/2, yB+WIN_SILL/2, BZ1, rW, WIN_SILL, WT, wallMat);
                    for (let w=0;w<3;w++) {
                        const wX=rm.x1+sp*(w+1);
                        // 玻璃（嵌入墙中，高透明）
                        vb(wX, yB+WIN_SILL+WIN_H/2, BZ1, WIN_W, WIN_H, WT, 0xa8dcff, 0.32);
                        // 深色窗框（四边）
                        vb(wX, yB+WIN_SILL+WIN_H/2, BZ1-0.01, WIN_W+0.12, 0.08, 0.1, 0x3a3a3a, 1); // 上框
                        vb(wX, yB+WIN_SILL-0.04,   BZ1-0.01, WIN_W+0.12, 0.08, 0.1, 0x3a3a3a, 1); // 下框
                        vb(wX-WIN_W/2-0.04, yB+WIN_SILL+WIN_H/2, BZ1-0.01, 0.08, WIN_H, 0.1, 0x3a3a3a, 1); // 左框
                        vb(wX+WIN_W/2+0.04, yB+WIN_SILL+WIN_H/2, BZ1-0.01, 0.08, WIN_H, 0.1, 0x3a3a3a, 1); // 右框
                        // 遮阳板
                        vb(wX, yB+WIN_SILL+WIN_H+0.1, BZ1-0.22, WIN_W+0.3, 0.08, 0.5, 0x4a7eb5, 1);
                        // 墙体缺口
                        const le=(w===0)?rm.x1:(rm.x1+sp*w+WIN_W/2);
                        const gW=wX-WIN_W/2-le;
                        if(gW>0.05) wb(le+gW/2, yB+WIN_SILL+WIN_H/2, BZ1, gW, WIN_H, WT, wallMat);
                        if(w===2){ const rg=rm.x2-(wX+WIN_W/2); if(rg>0.05) wb(wX+WIN_W/2+rg/2, yB+WIN_SILL+WIN_H/2, BZ1, rg, WIN_H, WT, wallMat); }
                    }
                    const tH=fH-WIN_SILL-WIN_H;
                    if(tH>0.05) wb((rm.x1+rm.x2)/2, yB+WIN_SILL+WIN_H+tH/2, BZ1, rW, tH, WT, wallMat);
                });

                // 南墙走廊外墙
                if (f === 0) {
                    // ── 一楼南墙：中央大门（3.5m宽×2.8m高）+ 两侧窗户 ──
                    const ENTR_W=3.5, ENTR_H=2.8, EX=0;
                    const lEnd=EX-ENTR_W/2, rStart=EX+ENTR_W/2;
                    const lW=lEnd-BX1, rW=BX2-rStart;
                    // 左段（2扇窗）
                    wb(BX1+lW/2, yB+WIN_SILL/2, BZ2, lW, WIN_SILL, WT, wallMat);
                    [1,2].forEach(w=>{
                        const wX=BX1+lW/3*w;
                        vb(wX,yB+WIN_SILL+WIN_H/2,BZ2,WIN_W,WIN_H,WT,0xa8dcff,0.32);
                        vb(wX,yB+WIN_SILL+WIN_H/2,BZ2+0.01,WIN_W+0.12,0.08,0.1,0x3a3a3a,1);
                        vb(wX,yB+WIN_SILL-0.04,BZ2+0.01,WIN_W+0.12,0.08,0.1,0x3a3a3a,1);
                        vb(wX-WIN_W/2-0.04,yB+WIN_SILL+WIN_H/2,BZ2+0.01,0.08,WIN_H,0.1,0x3a3a3a,1);
                        vb(wX+WIN_W/2+0.04,yB+WIN_SILL+WIN_H/2,BZ2+0.01,0.08,WIN_H,0.1,0x3a3a3a,1);
                        const le=(w===1)?BX1:(BX1+lW/3*(w-1)+WIN_W/2);
                        const gW=wX-WIN_W/2-le; if(gW>0.05) wb(le+gW/2,yB+WIN_SILL+WIN_H/2,BZ2,gW,WIN_H,WT,wallMat);
                        if(w===2){const rg=lEnd-(wX+WIN_W/2); if(rg>0.05) wb(wX+WIN_W/2+rg/2,yB+WIN_SILL+WIN_H/2,BZ2,rg,WIN_H,WT,wallMat);}
                    });
                    const tHL=fH-WIN_SILL-WIN_H; if(tHL>0.05) wb(BX1+lW/2,yB+WIN_SILL+WIN_H+tHL/2,BZ2,lW,tHL,WT,wallMat);
                    // 右段（2扇窗）
                    wb(BX2-rW/2, yB+WIN_SILL/2, BZ2, rW, WIN_SILL, WT, wallMat);
                    [1,2].forEach(w=>{
                        const wX=rStart+rW/3*w;
                        vb(wX,yB+WIN_SILL+WIN_H/2,BZ2,WIN_W,WIN_H,WT,0xa8dcff,0.32);
                        vb(wX,yB+WIN_SILL+WIN_H/2,BZ2+0.01,WIN_W+0.12,0.08,0.1,0x3a3a3a,1);
                        vb(wX,yB+WIN_SILL-0.04,BZ2+0.01,WIN_W+0.12,0.08,0.1,0x3a3a3a,1);
                        vb(wX-WIN_W/2-0.04,yB+WIN_SILL+WIN_H/2,BZ2+0.01,0.08,WIN_H,0.1,0x3a3a3a,1);
                        vb(wX+WIN_W/2+0.04,yB+WIN_SILL+WIN_H/2,BZ2+0.01,0.08,WIN_H,0.1,0x3a3a3a,1);
                        const le=(w===1)?rStart:(rStart+rW/3*(w-1)+WIN_W/2);
                        const gW=wX-WIN_W/2-le; if(gW>0.05) wb(le+gW/2,yB+WIN_SILL+WIN_H/2,BZ2,gW,WIN_H,WT,wallMat);
                        if(w===2){const rg=BX2-(wX+WIN_W/2); if(rg>0.05) wb(wX+WIN_W/2+rg/2,yB+WIN_SILL+WIN_H/2,BZ2,rg,WIN_H,WT,wallMat);}
                    });
                    const tHR=fH-WIN_SILL-WIN_H; if(tHR>0.05) wb(BX2-rW/2,yB+WIN_SILL+WIN_H+tHR/2,BZ2,rW,tHR,WT,wallMat);
                    // 门洞上方横梁
                    const abvH=fH-ENTR_H; if(abvH>0.05) wb(EX,yB+ENTR_H+abvH/2,BZ2,ENTR_W+WT,abvH,WT,wallMat);
                    // 大门框架（略向南墙外凸出，避免与实体墙同 Z 导致闪烁）
                    const _fz = BZ2 + WT * 0.52 + 0.04;
                    const _fd = 0.11;
                    vb(EX,yB+ENTR_H+0.07,_fz,ENTR_W+0.14,0.14,_fd,0x2a2a2a,1);  // 上横梁
                    vb(lEnd-0.07,yB+ENTR_H/2,_fz,0.14,ENTR_H,_fd,0x2a2a2a,1);   // 左门框
                    vb(rStart+0.07,yB+ENTR_H/2,_fz,0.14,ENTR_H,_fd,0x2a2a2a,1); // 右门框
                    // 中门框已删除（用户要求）
                } else {
                    // 上层南墙（5扇窗）
                    const numCW=5, cSp=(BX2-BX1)/(numCW+1);
                    wb((BX1+BX2)/2, yB+WIN_SILL/2, BZ2, BX2-BX1, WIN_SILL, WT, wallMat);
                    for (let w=0;w<numCW;w++) {
                        const wX=BX1+cSp*(w+1);
                        vb(wX,yB+WIN_SILL+WIN_H/2,BZ2,WIN_W,WIN_H,WT,0xa8dcff,0.32);
                        vb(wX,yB+WIN_SILL+WIN_H/2,BZ2+0.01,WIN_W+0.12,0.08,0.1,0x3a3a3a,1);
                        vb(wX,yB+WIN_SILL-0.04,BZ2+0.01,WIN_W+0.12,0.08,0.1,0x3a3a3a,1);
                        vb(wX-WIN_W/2-0.04,yB+WIN_SILL+WIN_H/2,BZ2+0.01,0.08,WIN_H,0.1,0x3a3a3a,1);
                        vb(wX+WIN_W/2+0.04,yB+WIN_SILL+WIN_H/2,BZ2+0.01,0.08,WIN_H,0.1,0x3a3a3a,1);
                        vb(wX,yB+WIN_SILL+WIN_H+0.1,BZ2+0.22,WIN_W+0.3,0.08,0.5,0x4a7eb5,1);
                        const le=(w===0)?BX1:(BX1+cSp*w+WIN_W/2);
                        const gW=wX-WIN_W/2-le; if(gW>0.05) wb(le+gW/2,yB+WIN_SILL+WIN_H/2,BZ2,gW,WIN_H,WT,wallMat);
                        if(w===numCW-1){const rg=BX2-(wX+WIN_W/2); if(rg>0.05) wb(wX+WIN_W/2+rg/2,yB+WIN_SILL+WIN_H/2,BZ2,rg,WIN_H,WT,wallMat);}
                    }
                    const tH2=fH-WIN_SILL-WIN_H; if(tH2>0.05) wb((BX1+BX2)/2,yB+WIN_SILL+WIN_H+tH2/2,BZ2,BX2-BX1,tH2,WT,wallMat);
                }
            }

            // 正门外廊（雨棚+平坦门廊+楼名标牌）
            const ENTR_H_GLOB=2.8;
            // 雨棚
            vb(0, ENTR_H_GLOB+0.7, BZ2+2.2, 9.2, 0.22, 4.8, 0x4a7eb5, 1);
            vb(0, ENTR_H_GLOB+0.57, BZ2+4.6, 9.4, 0.10, 0.10, 0x3a6aa0, 1);
            // 门廊立柱（仅保留最外侧两根，内侧两根已删除）
            [-3.5, 3.5].forEach(ox => {
                const col=new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.22,ENTR_H_GLOB+0.7,8),columnMat);
                col.position.set(ox, (ENTR_H_GLOB+0.7)/2, BZ2+4.0);
                col.bbox=new THREE.Box3().setFromObject(col);
                scene.add(col); walls.push(col);
            });
            // 平坦门廊地面（无台阶，与室内地面齐平）
            const porchMat=new THREE.MeshLambertMaterial({color:0xc8bea8});
            const porch=new THREE.Mesh(new THREE.PlaneGeometry(9.0,5.0),porchMat);
            porch.rotation.x=-Math.PI/2; porch.position.set(0,0.002,BZ2+2.5); scene.add(porch);
            // 门廊地面防滑线
            vb(0, 0.005, BZ2+0.3, 4.5, 0.01, 0.08, 0x888888, 1);
            // 楼名标牌（门上横梁处）
            vb(0, ENTR_H_GLOB+0.3, BZ2+0.09, 9.0, 0.55, 0.14, 0x1a4c8a, 1);
            vb(0, ENTR_H_GLOB+0.3, BZ2+0.15, 8.2, 0.38, 0.12, 0xffffff, 1);

            // ── 互动式大门（左右两扇，E键开关，绕铰链轴旋转）──
            const doorMatGlass=new THREE.MeshLambertMaterial({color:0xa8dcff,transparent:true,opacity:0.22,side:THREE.DoubleSide,depthWrite:false});
            // 单扇宽略大于门洞一半，闭合时在中缝重叠，消除玻璃缝（原 1.65×2 中间空 0.2m）
            const DW=1.78, DH=ENTR_H_GLOB;
            // 左扇：铰链在 x=-1.75，门叶向右略过中线
            const pivotL=new THREE.Group(); pivotL.position.set(-1.75, DH/2, BZ2); scene.add(pivotL);
            const meshL=new THREE.Mesh(new THREE.BoxGeometry(DW,DH,0.07),doorMatGlass);
            meshL.position.set(DW/2, 0, 0); pivotL.add(meshL);
            // 右扇：铰链在 x=1.75
            const pivotR=new THREE.Group(); pivotR.position.set( 1.75, DH/2, BZ2); scene.add(pivotR);
            const meshR=new THREE.Mesh(new THREE.BoxGeometry(DW,DH,0.07),doorMatGlass);
            meshR.position.set(-DW/2, 0, 0); pivotR.add(meshR);
            // 将门的枢轴（Group）存到全局，供E键使用
            window._mainDoorL=pivotL; window._mainDoorR=pivotR;
            window._mainDoorOpen=false;

            // ══════════════════════════════════════════════
            // 2. 楼板（1楼、2楼）与屋顶
            // ══════════════════════════════════════════════
            const slabW = STAIR_X - BX1;       // 34m
            const slabCX = BX1 + slabW/2;      // -3
            const BD = BZ2 - BZ1;              // 17m
            const slabCZ = (BZ1+BZ2)/2;        // 0.5

            for (let f=1; f<NUM_FLOORS; f++) {
                const slabY = f * FLOOR_H;
                const slab = new THREE.Mesh(new THREE.BoxGeometry(slabW, ST, BD), floorMat);
                slab.position.set(slabCX, slabY, slabCZ);
                slab.receiveShadow = true;
                slab.bbox = new THREE.Box3().setFromObject(slab);
                scene.add(slab); walls.push(slab);
                // 走廊区深灰防滑砖面层（覆盖floorMat，使用corrFloorMat纹理）
                {
                    const corrW = slabW, corrD = BZ2-CORR_Z;
                    const corrSlab = new THREE.Mesh(
                        new THREE.BoxGeometry(corrW, 0.014, corrD), corrFloorMat);
                    corrSlab.position.set(slabCX, slabY+ST/2+0.008, CORR_Z+corrD/2);
                    corrSlab.receiveShadow = true;
                    scene.add(corrSlab); walls.push(corrSlab);
                    corrSlab.bbox = new THREE.Box3().setFromObject(corrSlab);
                }
            }

            const stairW  = BX2 - STAIR_X;     // 6m
            const stairCX = STAIR_X + stairW/2; // 17

            // 各层楼梯中转平台（延伸至北墙，填满转角空洞，防止坠落）
            wb(stairCX, 2.0, -3.75, stairW, ST, 8.5, stairMat); // 1F→2F 中转平台（z=-8~0.5）
            wb(stairCX, 6.0, -3.75, stairW, ST, 8.5, stairMat); // 2F→3F 中转平台（z=-8~0.5）
            // 各层走廊接入平台（z=5~9，高度与楼板一致: fB+FLOOR_H）
            wb(stairCX, FLOOR_H,   CORR_Z+(BZ2-CORR_Z)/2, stairW, ST, BZ2-CORR_Z, stairMat); // 2F接入
            wb(stairCX, 2*FLOOR_H, CORR_Z+(BZ2-CORR_Z)/2, stairW, ST, BZ2-CORR_Z, stairMat); // 3F接入

            // 屋顶（含女儿墙）
            const roofMesh = new THREE.Mesh(new THREE.BoxGeometry(BX2-BX1+WT*2, 0.35, BD+WT*2), ceilMat);
            roofMesh.position.set((BX1+BX2)/2, TH+0.175, slabCZ);
            scene.add(roofMesh);
            // 女儿墙（屋顶四周矮墙）
            vb((BX1+BX2)/2, TH+0.7, BZ1-WT/2, BX2-BX1+WT*2, 1.05, WT, wallMat);
            vb((BX1+BX2)/2, TH+0.7, BZ2+WT/2, BX2-BX1+WT*2, 1.05, WT, wallMat);
            vb(BX1-WT/2, TH+0.7, slabCZ, WT, 1.05, BD+WT*2, wallMat);
            vb(BX2+WT/2, TH+0.7, slabCZ, WT, 1.05, BD+WT*2, wallMat);

            // 1F 走廊地面（与楼上同材质纹理，避免整块高亮纯色）
            if (!window._skipVisualMesh) {
                const g0 = new THREE.BoxGeometry(slabW, 0.018, BZ2 - CORR_Z);
                const m0 = new THREE.Mesh(g0, corrFloorMat);
                m0.position.set(slabCX, 0.009, CORR_Z + (BZ2 - CORR_Z) / 2);
                m0.receiveShadow = true;
                m0.bbox = new THREE.Box3().setFromObject(m0);
                scene.add(m0);
                walls.push(m0);
            }
            // 0层教室地砖棋盘格
            for (let tx=BX1; tx<STAIR_X; tx+=2) {
                for (let tz=BZ1; tz<CORR_Z; tz+=2) {
                    const alt=((Math.round((tx-BX1)/2)+(Math.round((tz-BZ1)/2)))%2===0);
                    if(alt) vb(tx+1, 0.008, tz+1, 1.9, 0.012, 1.9, 0xcec0a0, 1);
                }
            }

            // ══════════════════════════════════════════════
            // 3. 每层内隔墙（含踢脚线）
            // ══════════════════════════════════════════════
            // 教室门位置：每间靠左侧（靠走廊西端），黑板在右半侧，互不干扰
            const rcX = [
                ROOM_XS[0] + DOOR_W/2 + 0.6,   // Room 0: X≈-18.8（靠左壁）
                ROOM_XS[1] + DOOR_W/2 + 0.6,   // Room 1: X≈-6.8
                ROOM_XS[2] + DOOR_W/2 + 0.6    // Room 2: X≈5.2（靠左壁，黑板居右不遮挡）
            ];
            // 教室门洞：双侧门框 + 门楣 + 门槛石 + 门洞下踢脚（填平「豁口」感）
            function fillClassroomDoorway(yB, dX) {
                const zCor = CORR_Z + WT / 2 + 0.055;   // 走廊侧略突出
                const zCls = CORR_Z - WT / 2 - 0.055;   // 教室侧
                const fj = 0.09, fd = 0.11;
                const wood = 0x6b5346, woodL = 0x8b735a;
                // 左右门柱（双侧）
                vb(dX - DOOR_W / 2 - fj / 2, yB + DOOR_H / 2, zCor, fj, DOOR_H, fd, wood, 1);
                vb(dX + DOOR_W / 2 + fj / 2, yB + DOOR_H / 2, zCor, fj, DOOR_H, fd, wood, 1);
                vb(dX - DOOR_W / 2 - fj / 2, yB + DOOR_H / 2, zCls, fj, DOOR_H, fd, wood, 1);
                vb(dX + DOOR_W / 2 + fj / 2, yB + DOOR_H / 2, zCls, fj, DOOR_H, fd, wood, 1);
                // 门楣
                const lintelH = 0.16;
                vb(dX, yB + DOOR_H + lintelH / 2 + 0.02, zCor, DOOR_W + fj * 2 + 0.12, lintelH, fd, woodL, 1);
                vb(dX, yB + DOOR_H + lintelH / 2 + 0.02, zCls, DOOR_W + fj * 2 + 0.12, lintelH, fd, woodL, 1);
                // 门槛石（贯通墙厚）
                vb(dX, yB + 0.028, CORR_Z, DOOR_W + 0.28, 0.038, WT + 0.36, 0x5a4a40, 1);
                // 门洞位置踢脚线（与两侧踢脚连成一体）
                vb(dX, yB + 0.08, CORR_Z + 0.14, DOOR_W, 0.16, 0.06, 0x6d5c50, 1);
            }

            for (let f=0; f<NUM_FLOORS; f++) {
                const yB = f * FLOOR_H;
                // 走廊隔墙（Z=5），含教室门洞（靠右侧）
                for (let r=0; r<3; r++) {
                    wallX(CORR_Z, ROOM_XS[r], ROOM_XS[r+1], yB, FLOOR_H, corrWall, rcX[r]);
                    fillClassroomDoorway(yB, rcX[r]);
                    // 走廊墙踢脚线（门洞左侧段）
                    const dX=rcX[r]; const leftLen=dX-DOOR_W/2-ROOM_XS[r];
                    if(leftLen>0.1) vb(ROOM_XS[r]+leftLen/2, yB+0.08, CORR_Z+0.14, leftLen, 0.16, 0.06, 0x8a7f72, 1);
                    const rightLen=ROOM_XS[r+1]-(dX+DOOR_W/2);
                    if(rightLen>0.1) vb(dX+DOOR_W/2+rightLen/2, yB+0.08, CORR_Z+0.14, rightLen, 0.16, 0.06, 0x8a7f72, 1);
                }
                // 教室间隔墙
                // 教室间隔墙：实墙无门洞（避免教室之间穿堂洞）
                wallZ(ROOM_XS[1], BZ1, CORR_Z, yB, FLOOR_H, wallMat, null);
                wallZ(ROOM_XS[2], BZ1, CORR_Z, yB, FLOOR_H, wallMat, null);
                // 楼梯间隔墙
                wallZ(STAIR_X, BZ1, CORR_Z, yB, FLOOR_H, wallMat, null);

                // 走廊天花板（暖灰，与教室顶略有区分）
                vb(slabCX, yB+FLOOR_H-0.01, CORR_Z+(BZ2-CORR_Z)/2, slabW, 0.02, BZ2-CORR_Z, 0xc4bdb4, 1);
                // 教室天花板
                for (let r=0; r<3; r++) {
                    vb((ROOM_XS[r]+ROOM_XS[r+1])/2, yB+FLOOR_H-0.01, (BZ1+CORR_Z)/2, ROOM_XS[r+1]-ROOM_XS[r]-WT, 0.02, CORR_Z-BZ1-WT, 0xd5cfc6, 1);
                }
            }

            // ══════════════════════════════════════════════
            // 4. 楼梯 - 正确U形设计
            //    每层楼梯 = 北行段(10步, z:8→3.5, y↑2m)
            //             + 中转平台(z:2.5-3.5, y持平)
            //             + 南行段(10步, z:3→7.5, y↑2m)
            //    南行段顶端 (y=floorBase+4) 接入走廊（已在上方创建平台）
            // ══════════════════════════════════════════════
            const railColor = 0x8b6914;
            const nosing    = 0xe05050;
            const S_STEPS   = 10;    // 每段步数（10步，正常台阶高度，视觉清晰）
            const S_RISE    = 0.2;   // 每步高（20cm，与真实楼梯相符）
            const S_RUN     = 0.45;  // 每步进深（28cm有效踏面 + 走廊余量）

            // 走廊侧开口上方横梁（楼梯间与走廊相通处）
            for (let f=0; f<NUM_FLOORS; f++) {
                vb(stairCX, f*FLOOR_H+FLOOR_H-0.2, CORR_Z, stairW, 0.4, WT, corrWall);
            }

            // 构建每对楼梯（floorBase → floorBase+FLOOR_H）
            // 正确U形：右半边(东侧)上行，左半边(西侧)返回上行
            function buildStairPair(fB) {
                const halfW = stairW / 2;           // 3m 半幅
                const cxR   = stairCX + halfW / 2;  // 18.5 右半中心（上行入口段）
                const cxL   = stairCX - halfW / 2;  // 15.5 左半中心（上行返回段）

                // ── 上行入口段（走廊→中转平台）：右半边，玩家向北走上去
                for (let s=0; s<S_STEPS; s++) {
                    const zC = 5-(s+0.5)*S_RUN;
                    const yC = fB+(s+0.5)*S_RISE;
                    const step=new THREE.Mesh(new THREE.BoxGeometry(halfW,S_RISE,S_RUN),stairMat);
                    step.position.set(cxR,yC,zC);
                    step.receiveShadow=true;
                    step.bbox=new THREE.Box3().setFromObject(step);
                    scene.add(step); walls.push(step);
                    vb(cxR,yC+S_RISE/2+0.005,zC-S_RUN/2+0.04,halfW,0.02,0.07,nosing,1);
                    if(s%3===0){
                        vb(BX2-0.15,      yC+0.5,zC,0.08,1.0,0.08,railColor,1); // 东外墙柱
                        vb(stairCX+0.12,  yC+0.5,zC,0.08,1.0,0.08,railColor,1); // 中间柱
                    }
                }
                vb(BX2-0.15,     fB+1.0,(5+0.5)/2,0.06,0.06,S_STEPS*S_RUN,railColor,1);
                vb(stairCX+0.12, fB+1.0,(5+0.5)/2,0.06,0.06,S_STEPS*S_RUN,railColor,1);

                // ── 上行返回段（中转平台→走廊上层）：左半边，玩家向南走上去
                for (let s=0; s<S_STEPS; s++) {
                    const zC = 0.5+(s+0.5)*S_RUN;
                    const yC = fB+2+(s+0.5)*S_RISE;
                    const step=new THREE.Mesh(new THREE.BoxGeometry(halfW,S_RISE,S_RUN),stairMat);
                    step.position.set(cxL,yC,zC);
                    step.receiveShadow=true;
                    step.bbox=new THREE.Box3().setFromObject(step);
                    scene.add(step); walls.push(step);
                    vb(cxL,yC+S_RISE/2+0.005,zC+S_RUN/2-0.04,halfW,0.02,0.07,nosing,1);
                    if(s%3===0){
                        vb(STAIR_X+0.15, yC+0.5,zC,0.08,1.0,0.08,railColor,1); // 西外墙柱
                        vb(stairCX-0.12, yC+0.5,zC,0.08,1.0,0.08,railColor,1); // 中间柱
                    }
                }
                vb(STAIR_X+0.15, fB+3.0,(0.5+5)/2,0.06,0.06,S_STEPS*S_RUN,railColor,1);
                vb(stairCX-0.12, fB+3.0,(0.5+5)/2,0.06,0.06,S_STEPS*S_RUN,railColor,1);
            }

            // 生成 1F→2F 和 2F→3F 楼梯对
            for (let f=0; f<NUM_FLOORS-1; f++) {
                buildStairPair(f * FLOOR_H);
            }

            // 楼梯间入口小指示牌（不再创建巨型警示平面）
            for (let f=0; f<NUM_FLOORS; f++) {
                vb(STAIR_X+0.04, f*FLOOR_H+1.4, CORR_Z+1.0, 0.06, 0.5, 0.35, 0xffcc00, 0.9);
            }

            // ══════════════════════════════════════════════
            // 5. 各楼层教室内容与走廊灯光
            // ══════════════════════════════════════════════
            nearbyChairs = [];
            for (let f=0; f<NUM_FLOORS; f++) {
                for (let r=0; r<3; r++) {
                    createRoomContents(f, r, ROOM_XS[r], ROOM_XS[r+1], BZ1, CORR_Z, f*FLOOR_H);
                }
                createCorridorDecor(f);
            }

            // 外部环境：停车位线条（建筑南侧）
            for (let i=-3; i<=3; i++) {
                vb(i*4, 0.005, BZ2+5, 0.06, 0.01, 5.0, 0xffffff, 0.8);
            }
            vb((BX1+BX2)/2, 0.005, BZ2+7.6, 28.0, 0.01, 0.06, 0xffffff, 0.8); // 停车位横线

            // 建筑前广场地砖（南侧入口区域）
            vb((BX1+BX2)/2, 0.004, BZ2+4, 22, 0.01, 8, 0xd5cbb8, 1);

            console.log('✅ 教学楼建造完成！共 '+NUM_FLOORS+' 层，每层 3 间教室，合计 '+(NUM_FLOORS*3)+' 间教室');
            console.log('📐 建筑尺寸：'+(BX2-BX1)+'m × '+(BZ2-BZ1)+'m × '+TH+'m（宽×深×高）');
            console.log('🪜 楼梯说明：走廊东端（X>14楼梯间），向北走到 z=5 边界即遇台阶，沿北行段爬升→中转平台（z=0）→沿南行段继续爬升→到达2楼走廊；如此循环可上3楼。楼梯不在走廊范围内(z=5-9)，须走到 z<5 才能上楼。');
        }
        
        // ─────────────────────────────────────────────────
        // 单间教室内容（桌椅、黑板、讲台、灯光等）
        // floorIdx: 楼层(0~2), roomIdx: 房间(0~2)
        // roomX1/roomX2: 房间X范围, roomZ1/roomZ2: Z范围
        // yBase: 该楼层地板Y坐标
        // ─────────────────────────────────────────────────
        function createRoomContents(floorIdx, roomIdx, roomX1, roomX2, roomZ1, roomZ2, yBase) {
            if (window._skipVisualMesh) return; // 缓存命中时跳过（家具已在合并几何体缓存中）
            const roomW  = roomX2 - roomX1;
            const roomD  = roomZ2 - roomZ1;
            const roomCX = (roomX1+roomX2)/2;
            const roomCZ = (roomZ1+roomZ2)/2;

            const legMat   = new THREE.MeshLambertMaterial({ color: 0x6e6e6e });
            const woodT=(window._dtex&&window._dtex.wood)?window._dtex.wood.clone():null;
            if(woodT){woodT.wrapS=woodT.wrapT=THREE.RepeatWrapping;woodT.repeat.set(2,1);}
            const woodMat  = new THREE.MeshLambertMaterial({ color: 0xb8874a, map: woodT });
            const bbGreen = new THREE.MeshPhongMaterial({ color: 0x1a4d2e, shininess: 6, specular: 0x0a180c });
            const bbWood  = new THREE.MeshPhongMaterial({ color: 0x5a3d22, shininess: 22, specular: 0x221008 });
            const bbMetal = new THREE.MeshPhongMaterial({ color: 0x4a5558, shininess: 48, specular: 0x606468 });
            const _wT2=woodT?woodT.clone():null; if(_wT2)_wT2.repeat.set(3,1);
            const deskMat  = new THREE.MeshLambertMaterial({ color: 0xc8883a, map: _wT2 });
            const chairMat = new THREE.MeshLambertMaterial({ color: 0x4a8fc8 });
            const chairBkM = new THREE.MeshLambertMaterial({ color: 0x3a80b8 });
            const bookMat  = [
                new THREE.MeshLambertMaterial({color:0xe74c3c}),
                new THREE.MeshLambertMaterial({color:0x2ecc71}),
                new THREE.MeshLambertMaterial({color:0xf39c12}),
                new THREE.MeshLambertMaterial({color:0x9b59b6}),
                new THREE.MeshLambertMaterial({color:0x1abc9c}),
            ];

            function shRoom(m) {
                if (!m || !m.isMesh) return;
                m.castShadow = true;
                m.receiveShadow = true;
            }

            const doorX = roomX1 + DOOR_W/2 + 0.6;
            // 东墙内表面（+X 侧）：黑板贴此墙，学生面朝 +X；北墙仅保留窗户区，不再挂公告栏
            const eastFaceX = roomX2 - WALL_T - 0.06;
            const westFaceX = roomX1 + WALL_T + 0.07;
            const bbW = Math.min(roomW * 0.36, 4.35);
            const bbH = 1.48;
            const bbY = yBase + 2.46;
            const boardTh = 0.085;
            const bx = eastFaceX - boardTh / 2 - 0.025;

            // 外木框 + 内灰压条 + 墨绿板面（略分层）
            const fD = boardTh + 0.14, fH = bbH + 0.34, fW = bbW + 0.32;
            const outerF = new THREE.Mesh(new THREE.BoxGeometry(fD, fH, fW), bbWood);
            outerF.position.set(eastFaceX - fD / 2 - 0.02, bbY, roomCZ);
            shRoom(outerF); scene.add(outerF);
            const rim = new THREE.Mesh(new THREE.BoxGeometry(boardTh + 0.04, bbH + 0.12, bbW + 0.12), bbMetal);
            rim.position.set(bx - 0.018, bbY, roomCZ);
            shRoom(rim); scene.add(rim);
            const bbMain = new THREE.Mesh(new THREE.BoxGeometry(boardTh, bbH, bbW), bbGreen);
            bbMain.position.set(bx - 0.012, bbY, roomCZ);
            shRoom(bbMain); scene.add(bbMain);
            const chalkFaceX = bx - boardTh / 2 - 0.048;
            for (let k = 0; k < 5; k++) {
                const mk = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.028, bbW * (0.08 + Math.random() * 0.12)),
                    new THREE.MeshLambertMaterial({ color: 0xc8d8d0 }));
                mk.position.set(chalkFaceX, bbY + 0.42 - k * 0.28, roomCZ + (k - 2) * bbW * 0.13);
                mk.castShadow = false; mk.receiveShadow = false;
                scene.add(mk);
            }
            const tray = new THREE.Mesh(new THREE.BoxGeometry(boardTh + 0.06, 0.11, bbW + 0.2), bbMetal);
            tray.position.set(bx - 0.01, bbY - bbH / 2 - 0.1, roomCZ);
            shRoom(tray); scene.add(tray);
            const sbZW = Math.min(1.05, roomD * 0.22);
            [roomCZ - bbW / 2 - sbZW / 2 - 0.14, roomCZ + bbW / 2 + sbZW / 2 + 0.14].forEach(sz => {
                if (sz < roomZ1 + 0.75 || sz > roomZ2 - 0.75) return;
                const sb = new THREE.Mesh(new THREE.BoxGeometry(boardTh * 0.92, bbH * 0.68, sbZW), bbGreen);
                sb.position.set(bx - 0.01, bbY - 0.06, sz);
                shRoom(sb); scene.add(sb);
            });

            // 讲台：长边平行黑板（沿 Z）、窄进深朝学生（沿 +X→-X），避免与第一排课桌在 X 向上重叠
            const pdH = 0.92;
            const pdDepthX = 0.62;
            const pdWidthZ = 1.78;
            const pdX = bx - boardTh / 2 - 0.11 - pdDepthX / 2;
            const pd = new THREE.Mesh(new THREE.BoxGeometry(pdDepthX, pdH, pdWidthZ),
                new THREE.MeshLambertMaterial({ color: 0x9a7240 }));
            pd.position.set(pdX, yBase + pdH / 2, roomCZ);
            pd.bbox = new THREE.Box3().setFromObject(pd); walls.push(pd);
            shRoom(pd); scene.add(pd);
            const pdTop = new THREE.Mesh(new THREE.BoxGeometry(pdDepthX + 0.08, 0.06, pdWidthZ + 0.08),
                new THREE.MeshLambertMaterial({ color: 0xc4924e }));
            pdTop.position.set(pdX, yBase + pdH + 0.03, roomCZ);
            shRoom(pdTop); scene.add(pdTop);
            // 显示器贴在朝学生一侧（讲台 -X 面），窄边朝前
            const monX = pdX - pdDepthX / 2 + 0.05;
            const monitor = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.36, 0.5),
                new THREE.MeshLambertMaterial({ color: 0x222222 }));
            monitor.position.set(monX, yBase + pdH + 0.24, roomCZ);
            shRoom(monitor); scene.add(monitor);
            const screen = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.28, 0.42),
                new THREE.MeshLambertMaterial({ color: 0x1a6fbb }));
            screen.position.set(monX - 0.025, yBase + pdH + 0.24, roomCZ);
            shRoom(screen); scene.add(screen);

            // 课桌椅：5 列沿 Z，4 排沿 X，学生朝 +X（面向东墙黑板）
            const rows = 4, cols = 5;
            const dW = 1.1, dD = 0.52, dH = 0.72;
            const aW = 0.9, rSp = 1.72;
            const totZ = cols * dW + (cols - 1) * aW;
            const eastRow0 = eastFaceX - boardTh - 2.78;

            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    const dx = eastRow0 - row * rSp;
                    const dz = roomCZ - totZ / 2 + dW / 2 + col * (dW + aW);
                    if (dx < roomX1 + 0.55 || dz < roomZ1 + 0.45 || dz > roomZ2 - 0.55) continue;

                    const top = new THREE.Mesh(new THREE.BoxGeometry(dD, 0.04, dW), deskMat);
                    top.position.set(dx, yBase + dH, dz);
                    shRoom(top); scene.add(top);
                    const tEdge = new THREE.Mesh(new THREE.BoxGeometry(dD + 0.04, 0.04, dW + 0.04),
                        new THREE.MeshLambertMaterial({ color: 0x2a6090 }));
                    tEdge.position.set(dx, yBase + dH - 0.001, dz);
                    shRoom(tEdge); scene.add(tEdge);
                    const cbox = new THREE.Mesh(new THREE.BoxGeometry(dD * 0.85, 0.1, dW * 0.85));
                    cbox.position.set(dx, yBase + dH, dz); cbox.visible = false;
                    cbox.bbox = new THREE.Box3().setFromObject(cbox);
                    walls.push(cbox); scene.add(cbox);
                    [[-1, -1], [-1, 1], [1, -1], [1, 1]].forEach(([sx, sz]) => {
                        const leg = new THREE.Mesh(new THREE.BoxGeometry(0.05, dH, 0.05), legMat);
                        leg.position.set(dx + sx * dD * 0.42, yBase + dH / 2, dz + sz * dW * 0.42);
                        shRoom(leg); scene.add(leg);
                    });
                    const hook = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.05, 0.12), legMat);
                    hook.position.set(dx + dD / 2 + 0.02, yBase + dH * 0.55, dz);
                    shRoom(hook); scene.add(hook);

                    const cx = dx - dD / 2 - 0.38;
                    const cH = 0.44;
                    const seat = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.05, 0.40), chairMat);
                    seat.position.set(cx, yBase + cH, dz);
                    shRoom(seat); scene.add(seat);
                    const bck = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.36, 0.42), chairBkM);
                    bck.position.set(cx - 0.17, yBase + cH + 0.2, dz);
                    shRoom(bck); scene.add(bck);
                    const bckT = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.05, 0.42), legMat);
                    bckT.position.set(cx - 0.17, yBase + cH + 0.38, dz);
                    shRoom(bckT); scene.add(bckT);
                    nearbyChairs.push({ position: new THREE.Vector3(cx, yBase + cH, dz), mesh: seat });
                    [[-1, -1], [-1, 1], [1, -1], [1, 1]].forEach(([sx, sz]) => {
                        const cl = new THREE.Mesh(new THREE.BoxGeometry(0.03, cH, 0.03), legMat);
                        cl.position.set(cx + sx * 0.18, yBase + cH / 2, dz + sz * 0.17);
                        shRoom(cl); scene.add(cl);
                    });
                    if ((row + col) % 3 === 0) {
                        const bk = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.04, 0.30), bookMat[(row * 5 + col) % 5]);
                        // 桌面顶面 y = yBase+dH+0.02，书本半高 0.02，抬高避免穿模
                        bk.position.set(dx + 0.08, yBase + dH + 0.047, dz + 0.06);
                        shRoom(bk); scene.add(bk);
                    }
                }
            }

            const lgY = yBase + FLOOR_H - 0.12;
            [-1, 0, 1].forEach(i => {
                const tubeMat = new THREE.MeshLambertMaterial({ color: 0xe8e8e4 });
                const glowMat = new THREE.MeshBasicMaterial({ color: 0xfff6d8 });
                const shell = new THREE.Mesh(new THREE.BoxGeometry(roomW * 0.38, 0.08, 0.2), tubeMat);
                shell.position.set(roomCX + i * roomW * 0.24, lgY, roomCZ);
                shRoom(shell); scene.add(shell);
                const glow = new THREE.Mesh(new THREE.BoxGeometry(roomW * 0.34, 0.04, 0.14), glowMat);
                glow.position.set(roomCX + i * roomW * 0.24, lgY - 0.02, roomCZ);
                glow.castShadow = false;
                scene.add(glow);
            });

            // 软木公告栏改到西墙（北墙不再遮挡窗户）
            const blW = Math.min(roomW * 0.4, 4.0);
            const blD = 0.11;
            const blFrame = new THREE.Mesh(new THREE.BoxGeometry(blD + 0.12, 2.06, blW + 0.26),
                new THREE.MeshLambertMaterial({ color: 0x5c3820 }));
            blFrame.position.set(westFaceX + blD / 2 + 0.04, yBase + 2.32, roomCZ);
            shRoom(blFrame); scene.add(blFrame);
            const bl = new THREE.Mesh(new THREE.BoxGeometry(blD, 1.86, blW),
                new THREE.MeshLambertMaterial({ color: 0xc49668 }));
            bl.position.set(westFaceX + blD / 2 + 0.055, yBase + 2.32, roomCZ);
            shRoom(bl); scene.add(bl);
            const noticeColors = [0xef9a9a, 0x90caf9, 0xa5d6a7, 0xffe082, 0xce93d8];
            for (let k = 0; k < 4; k++) {
                const nc = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.26, blW * 0.17),
                    new THREE.MeshLambertMaterial({ color: noticeColors[k % 5] }));
                nc.position.set(westFaceX + blD + 0.09, yBase + 2.38 - (k % 2) * 0.2, roomCZ + (k - 1.5) * blW * 0.2);
                nc.castShadow = false;
                scene.add(nc);
            }

            const shelfH = 1.75, shelfW = 0.88, shelfD = 0.34;
            [-1, 1].forEach(side => {
                const sz = roomCZ + side * (roomD / 2 - shelfW / 2 - 0.55);
                if (sz < roomZ1 + 0.5 || sz > roomZ2 - 0.5) return;
                const shelf = new THREE.Mesh(new THREE.BoxGeometry(shelfD, shelfH, shelfW),
                    new THREE.MeshLambertMaterial({ color: 0xb87c3e }));
                shelf.position.set(westFaceX + shelfD / 2 + 0.05, yBase + shelfH / 2, sz);
                shelf.bbox = new THREE.Box3().setFromObject(shelf);
                walls.push(shelf);
                shRoom(shelf); scene.add(shelf);
                for (let sh = 1; sh <= 3; sh++) {
                    const sp = new THREE.Mesh(new THREE.BoxGeometry(shelfD * 0.96, 0.04, shelfW * 0.94),
                        new THREE.MeshLambertMaterial({ color: 0x9a6830 }));
                    sp.position.set(westFaceX + shelfD / 2 + 0.05, yBase + shelfH * sh / 4, sz);
                    shRoom(sp); scene.add(sp);
                }
                for (let bk = 0; bk < 3; bk++) {
                    const bw = 0.06 + Math.random() * 0.06;
                    const bObj = new THREE.Mesh(new THREE.BoxGeometry(bw, 0.28, shelfW * 0.75),
                        bookMat[(side * 10 + bk + roomIdx) % 5]);
                    bObj.position.set(westFaceX + 0.12 + bk * 0.12, yBase + shelfH * 2 / 4 + 0.16, sz);
                    shRoom(bObj); scene.add(bObj);
                }
            });

            // === 教室前方国旗（走廊墙内侧，黑板正上方）===
            const flag=new THREE.Mesh(new THREE.BoxGeometry(0.38, 0.25, 0.02),
                new THREE.MeshLambertMaterial({color:0xdd1111}));
            flag.position.set(roomCX, yBase+FLOOR_H-0.5, roomZ2-WALL_T-0.06); scene.add(flag);
            const flagStar=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.1,0.025),
                new THREE.MeshLambertMaterial({color:0xffdd00}));
            flagStar.position.set(roomCX-0.08, yBase+FLOOR_H-0.44, roomZ2-WALL_T-0.07); scene.add(flagStar);

            // === 彩色教室门牌 + 门框装饰（与门洞位置匹配）===
            // 门在教室走廊墙左侧（doorX 已在黑板段计算）
            const classNum = floorIdx*3+roomIdx+1;
            const plColors=[0xc62828,0x1565c0,0x2e7d32,0xe65100,0x6a1b9a,0x00838f,0xad1457,0x558b2f,0xf9a825];
            // 门牌（门洞右侧墙面上方）
            const placeX = doorX + DOOR_W/2 + 0.5;
            const nm = new THREE.Mesh(new THREE.BoxGeometry(0.82,0.54,0.07),
                new THREE.MeshLambertMaterial({color:plColors[classNum-1]}));
            nm.position.set(placeX, yBase+FLOOR_H-0.33, roomZ2-WALL_T-0.12); scene.add(nm);
            const nmW = new THREE.Mesh(new THREE.BoxGeometry(0.70,0.40,0.08),
                new THREE.MeshLambertMaterial({color:0xffffff}));
            nmW.position.set(placeX, yBase+FLOOR_H-0.33, roomZ2-WALL_T-0.14); scene.add(nmW);
            for (let k=0; k<2; k++) {
                const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.50,0.055,0.09),
                    new THREE.MeshLambertMaterial({color:plColors[classNum-1]}));
                stripe.position.set(placeX, yBase+FLOOR_H-0.25-k*0.13, roomZ2-WALL_T-0.15); scene.add(stripe);
            }
            // 门框装饰（木色，与门洞对齐）
            const doorFrameM = new THREE.MeshLambertMaterial({color:0x8b5e3c});
            [doorX-DOOR_W/2-0.06, doorX+DOOR_W/2+0.06].forEach(fx=>{
                const df=new THREE.Mesh(new THREE.BoxGeometry(0.1,DOOR_H+0.08,0.08),doorFrameM);
                df.position.set(fx,yBase+DOOR_H/2,roomZ2+0.02); scene.add(df);
            });
            const dm=new THREE.Mesh(new THREE.BoxGeometry(DOOR_W+0.32,0.1,0.08),doorFrameM);
            dm.position.set(doorX,yBase+DOOR_H+0.04,roomZ2+0.02); scene.add(dm);
        }

        // 走廊灯光与装饰（精细版）
        function createCorridorDecor(floorIdx) {
            const yB  = floorIdx * FLOOR_H;
            const lgY = yB + FLOOR_H - 0.12;
            const cZ  = CORR_Z + (BLDG_Z2-CORR_Z)/2;  // 走廊中央Z=7
            const corrLen = STAIR_X - BLDG_X1;          // 走廊长度34m
            const floorColors = [0x1565c0, 0x2e7d32, 0x6a1b9a]; // 蓝/绿/紫分楼层

            // ── 吊顶灯具（等间距，含灯具外壳）──
            for (let x=BLDG_X1+3.5; x<STAIR_X-1; x+=7) {
                // 灯具外壳
                const shell=new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.1, 0.55),
                    new THREE.MeshLambertMaterial({color:0xc8c4bc}));
                shell.position.set(x, lgY, cZ); scene.add(shell);
                // 发光面板
                const panel=new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.04, 0.45),
                    new THREE.MeshBasicMaterial({color:0xe8dcc8}));
                panel.position.set(x, lgY-0.04, cZ); scene.add(panel);
                // 点光源（暖白色）
                // PointLight已删除（性能优化）
            }

            // ── 走廊地面防滑条（深色条纹，每2m）──
            for (let x=BLDG_X1+1; x<STAIR_X; x+=2) {
                const strip=new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.014, BLDG_Z2-CORR_Z),
                    new THREE.MeshLambertMaterial({color:0x6a8090}));
                strip.position.set(x, yB+0.009, cZ); scene.add(strip);
            }

            // ── 楼层主标志牌（大型，西端墙面）──
            const fcol = floorColors[floorIdx];
            // 底板（彩色）
            const sign = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.72, 0.09),
                new THREE.MeshLambertMaterial({color:fcol}));
            sign.position.set(BLDG_X1+1.5, yB+2.9, cZ); scene.add(sign);
            // 白色内牌
            const signIn=new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.56, 0.1),
                new THREE.MeshLambertMaterial({color:0xe8e4dc}));
            signIn.position.set(BLDG_X1+1.5, yB+2.9, cZ-0.05); scene.add(signIn);
            // 彩色装饰线（模拟楼层文字）
            for(let k=0;k<2;k++) {
                const line=new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.07, 0.11),
                    new THREE.MeshLambertMaterial({color:fcol}));
                line.position.set(BLDG_X1+1.5, yB+3.02-k*0.22, cZ-0.07); scene.add(line);
            }

            // ── 教室区域导向箭头（走廊天花板）──
            for (let r=0; r<3; r++) {
                const arX=(ROOM_XS[r]+ROOM_XS[r+1])/2;
                const arr=new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.03, 0.2),
                    new THREE.MeshLambertMaterial({color:floorColors[floorIdx]}));
                arr.position.set(arX, yB+FLOOR_H-0.08, CORR_Z+0.3); scene.add(arr);
            }

            // ── 走廊两端消防栓柜（红色）──
            [BLDG_X1+0.3, STAIR_X-0.3].forEach(fx => {
                const fc=new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.75, 0.3),
                    new THREE.MeshLambertMaterial({color:0xdd2222}));
                fc.position.set(fx, yB+0.7, BLDG_Z2-0.2); scene.add(fc);
                const fcD=new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.65, 0.28),
                    new THREE.MeshLambertMaterial({color:0xee4444}));
                fcD.position.set(fx, yB+0.7, BLDG_Z2-0.24); scene.add(fcD);
            });

            // ── 走廊宣传栏（南墙内侧）──
            const bbW2=3.5;
            const bboard=new THREE.Mesh(new THREE.BoxGeometry(bbW2, 1.2, 0.08),
                new THREE.MeshLambertMaterial({color:0xfae0b0}));
            bboard.position.set(BLDG_X1+10, yB+2.4, BLDG_Z2-0.1); scene.add(bboard);
            const bbord=new THREE.Mesh(new THREE.BoxGeometry(bbW2+0.2, 1.4, 0.05),
                new THREE.MeshLambertMaterial({color:0x6b3010}));
            bbord.position.set(BLDG_X1+10, yB+2.4, BLDG_Z2-0.12); scene.add(bbord);
            // 通知张贴（小彩色方块）
            const pColors=[0xffb3b3,0xb3d9ff,0xb3ffb3,0xffffb3];
            for(let p=0;p<4;p++) {
                const pc=new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.72, 0.06),
                    new THREE.MeshLambertMaterial({color:pColors[p]}));
                pc.position.set(BLDG_X1+8.6+p*0.82, yB+2.4, BLDG_Z2-0.09); scene.add(pc);
            }

            // ── 走廊绿植盆栽（若干处）──
            const plantPositions=[BLDG_X1+1.0, BLDG_X1+18, STAIR_X-1.0];
            plantPositions.forEach(px => {
                // 花盆
                const pot=new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3),
                    new THREE.MeshLambertMaterial({color:0xc97a30}));
                pot.position.set(px, yB+0.15, BLDG_Z2-0.25); scene.add(pot);

        // 根据视角模式调整士兵模型的可见性

            soldier.traverse(function(object) {
                if (object.isMesh) {
                    if (isFirstPerson) {
                        // 在第一人称视角下隐藏整个士兵模型
                        object.visible = false;
                    } else {
                        // 在第三人称视角下显示整个士兵模型
                        object.visible = true;
                    }
                }
            });
            
            // 根据视角模式显示/隐藏第一人称手臂和腿部
            if (fpArms) fpArms.visible = isFirstPerson;
            if (fpLegs) fpLegs.visible = isFirstPerson;
        }

                const legGeometry = new THREE.CylinderGeometry(0.08, 0.1, 0.6, 8);
                
                const leftLeg = new THREE.Mesh(legGeometry, bodyMaterial);
                leftLeg.position.set(-0.15, -0.3, 0);

                rightLeg.position.set(0.15, -0.3, 0);

                const bootGeometry = new THREE.BoxGeometry(0.15, 0.08, 0.25);
                
                const leftBoot = new THREE.Mesh(bootGeometry, bootMaterial);
                leftBoot.position.set(-0.15, -0.62, 0.05);

            // 初始化士兵（无论模型是否加载成功）
            function initializeSoldier(soldierModel) {
                soldier = soldierModel;
                soldier.castShadow = true;
                soldier.receiveShadow = true;
                scene.add(soldier);
                
                // 查找并保存骨骼节点和SkinnedMesh
                let foundBones = [];
                soldier.traverse((child) => {
                    if (child.isSkinnedMesh) {

                        if (child.skeleton) {
                            console.log('✅ 有骨骼系统，骨骼数量:', child.skeleton.bones.length);
                            child.skeleton.bones.forEach((bone) => {
                                const boneName = bone.name;
                                soldierBones[boneName.toLowerCase()] = bone;
                                originalBoneRotations[boneName.toLowerCase()] = bone.rotation.clone();
                                foundBones.push(boneName);
                            });
                        }
                    }
                });
                console.log('🦴 所有骨骼名称:', foundBones.join(', '));

                camera.position.set(startX, FIRST_PERSON_HEIGHT, startZ);

                cameraVerticalAngle = 0;

                updateSoldierVisibility();

            // 尝试加载在线模型

                console.log('🔄 尝试加载在线士兵模型...');
                
                // 设置较短的超时时间
                const timeoutId = setTimeout(() => {
                    console.log('⏰ 加载超时，使用简单模型');
                    const simpleSoldier = createSimpleSoldier();
                    initializeSoldier(simpleSoldier);
                }, 3000); // 3秒超时
                
                loader.load(
                    'https://threejs.org/examples/models/gltf/Soldier.glb',
                    function(gltf) {
                        clearTimeout(timeoutId);
                        console.log('✅ 在线士兵模型加载成功');
                        
                        const soldierModel = gltf.scene;
                        soldierModel.scale.set(0.5, 0.5, 0.5);
                        soldierModel.position.set(startX, 0, startZ);
                        
                        // 设置动画
                        mixer = new THREE.AnimationMixer(soldierModel);
                        const animations = gltf.animations;
                        
                        idleAction = mixer.clipAction(animations.find(a => a.name === 'Idle'));
                        runAction = mixer.clipAction(animations.find(a => a.name === 'Run'));
                        
                        const jumpAnim = animations.find(a => a.name === 'Jump') || animations.find(a => a.name === 'Run');
                        if (jumpAnim) {
                            jumpAction = mixer.clipAction(jumpAnim);
                            if (jumpAnim.name === 'Run') {
                                jumpAction.timeScale = 1.5;
                            }
                        }
                        
                        slideAction = createSlideAnimation(gltf.animations);
                        crouchAction = createCrouchAnimation(gltf.animations);
                        
                        if (idleAction) {
                            idleAction.play();
                            currentAction = idleAction;
                        }
                        
                        initializeSoldier(soldierModel);
                    },
                    function(xhr) {
                        console.log('📦 模型加载进度:', (xhr.loaded / xhr.total * 100).toFixed(1) + '%');
                    },
                    function(error) {

                    }
                );
