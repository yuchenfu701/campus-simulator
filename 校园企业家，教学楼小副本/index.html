        // 为每面墙创建独特的纹理
        function createUniqueWallTexture(gridX, gridY) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const context = canvas.getContext('2d');
            
            // 使用网格位置作为种子，确保每面墙都不同
            const wallSeed = gridX * 1000 + gridY;
            
            // 基于种子的伪随机函数
            const seededRandom = (seed) => {
                const x = Math.sin(seed) * 10000;
                return x - Math.floor(x);
            };
            
            // 填充基础灰白色底色（每面墙颜色略有不同）
            const baseColorOffset = seededRandom(wallSeed * 1.1) * 20 - 10;
            const baseGray = 242 + baseColorOffset;
            context.fillStyle = `rgb(${baseGray}, ${baseGray}, ${baseGray})`;
            context.fillRect(0, 0, canvas.width, canvas.height);
            
            // 添加基础纹理（每面墙密度不同）
            const textureCount = 8000 + Math.floor(seededRandom(wallSeed * 1.2) * 8000);
            for (let i = 0; i < textureCount; i++) {
                const x = seededRandom(wallSeed * 2.1 + i * 0.1) * canvas.width;
                const y = seededRandom(wallSeed * 2.2 + i * 0.1) * canvas.height;
                const brightness = seededRandom(wallSeed * 2.3 + i * 0.1) * 60 - 30;
                const gray = Math.max(0, Math.min(255, 235 + brightness + baseColorOffset));
                
                context.fillStyle = `rgb(${gray}, ${gray}, ${gray})`;
                context.fillRect(x, y, 1, 1);
            }
            
            // 添加颗粒纹理（每面墙样式不同）
            const particleCount = 2000 + Math.floor(seededRandom(wallSeed * 3.1) * 2000);
            for (let i = 0; i < particleCount; i++) {
                const x = seededRandom(wallSeed * 4.1 + i * 0.1) * canvas.width;
                const y = seededRandom(wallSeed * 4.2 + i * 0.1) * canvas.height;
                const size = seededRandom(wallSeed * 4.3 + i * 0.1) * 1.2 + 0.3;
                const brightness = seededRandom(wallSeed * 4.4 + i * 0.1) * 80 - 40;
                const gray = Math.max(0, Math.min(255, 220 + brightness + baseColorOffset));
                
                context.fillStyle = `rgb(${gray}, ${gray}, ${gray})`;
                context.beginPath();
                context.arc(x, y, size, 0, Math.PI * 2);
                context.fill();
            }
            
            // 添加不规则颗粒（每面墙形状不同）
            const irregularCount = 1000 + Math.floor(seededRandom(wallSeed * 5.1) * 1000);
            for (let i = 0; i < irregularCount; i++) {
                const x = seededRandom(wallSeed * 6.1 + i * 0.1) * canvas.width;
                const y = seededRandom(wallSeed * 6.2 + i * 0.1) * canvas.height;
                const size = seededRandom(wallSeed * 6.3 + i * 0.1) * 2 + 0.5;
                const brightness = seededRandom(wallSeed * 6.4 + i * 0.1) * 100 - 50;
                const gray = Math.max(0, Math.min(255, 200 + brightness + baseColorOffset));
                
                const points = 3 + Math.floor(seededRandom(wallSeed * 6.5 + i * 0.1) * 4);
                context.beginPath();
                context.moveTo(x + size, y);
                for (let p = 1; p <= points; p++) {
                    const angle = (p / points) * Math.PI * 2;
                    const radius = size * (0.6 + seededRandom(wallSeed * 6.6 + i * 0.1 + p * 0.01) * 0.8);
                    const px = x + Math.cos(angle) * radius;
                    const py = y + Math.sin(angle) * radius;
                    context.lineTo(px, py);
                }
                context.closePath();
                
                context.fillStyle = `rgb(${gray}, ${gray}, ${gray})`;
                context.fill();
            }
            
            // 每面墙独立的裂缝系统
            const crackProbability = seededRandom(wallSeed * 7.1);
            let crackCount = 0;
            if (crackProbability > 0.8) {
                crackCount = seededRandom(wallSeed * 7.2) > 0.5 ? 1 : 2;
            }
            
            for (let crackIndex = 0; crackIndex < crackCount; crackIndex++) {
                createUniqueWallCrack(context, canvas, wallSeed + crackIndex * 100);
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            // 不使用重复，每面墙都是独立的
            texture.wrapS = THREE.ClampToEdgeWrapping;
            texture.wrapT = THREE.ClampToEdgeWrapping;
            
            return texture;
        }
        
        // 为单面墙创建独特的裂缝
        function createUniqueWallCrack(context, canvas, wallSeed) {
            const seededRandom = (seed) => {
                const x = Math.sin(seed) * 10000;
                return x - Math.floor(x);
            };
            
            // 完全随机的起始点
            const startX = seededRandom(wallSeed * 1.1) * canvas.width;
            const startY = seededRandom(wallSeed * 1.2) * canvas.height;
            
            // 每个裂缝都有完全不同的DNA
            const crackDNA = {
                chaos: seededRandom(wallSeed * 2.1),
                length: 20 + seededRandom(wallSeed * 2.2) * 120,
                segments: 3 + Math.floor(seededRandom(wallSeed * 2.3) * 20),
                branchiness: seededRandom(wallSeed * 2.4),
                thickness: 1 + seededRandom(wallSeed * 2.5) * 4,
                darkness: 40 + seededRandom(wallSeed * 2.6) * 80,
                personality: seededRandom(wallSeed * 2.7) * 10
            };
            
            drawUniqueWallCrack(context, startX, startY, crackDNA, wallSeed);
        }
        
        // 绘制独特的墙面裂缝
        function drawUniqueWallCrack(context, startX, startY, dna, seed) {
            const seededRandom = (s) => {
                const x = Math.sin(s) * 10000;
                return x - Math.floor(x);
            };
            
            let currentX = startX;
            let currentY = startY;
            let currentAngle = seededRandom(seed * 3.1) * Math.PI * 2;
            let totalDistance = 0;
            
            // 为每个裂缝创建独特的颜色
            const baseColor = 160 - dna.darkness;
            const r = Math.max(0, baseColor + (seededRandom(seed * 3.2) - 0.5) * 40);
            const g = Math.max(0, baseColor + (seededRandom(seed * 3.3) - 0.5) * 40);
            const b = Math.max(0, baseColor + (seededRandom(seed * 3.4) - 0.5) * 40);
            
            for (let seg = 0; seg < dna.segments && totalDistance < dna.length; seg++) {
                const segmentSeed = seed * 1000 + seg;
                
                // 完全随机的段长度
                const segLength = 3 + seededRandom(segmentSeed * 1.1) * 15;
                
                // 完全随机的角度变化
                const angleChange = (seededRandom(segmentSeed * 2.3) - 0.5) * Math.PI * dna.chaos;
                currentAngle += angleChange;
                
                // 完全随机的宽度
                const segWidth = dna.thickness * (0.5 + seededRandom(segmentSeed * 3.7) * 1.5);
                
                const nextX = currentX + Math.cos(currentAngle) * segLength;
                const nextY = currentY + Math.sin(currentAngle) * segLength;
                
                // 绘制主线
                context.strokeStyle = `rgba(${r}, ${g}, ${b}, ${0.7 + seededRandom(segmentSeed * 4.1) * 0.3})`;
                context.lineWidth = segWidth;
                context.lineCap = 'round';
                
                context.beginPath();
                context.moveTo(currentX, currentY);
                context.lineTo(nextX, nextY);
                context.stroke();
                
                // 随机锯齿
                if (seededRandom(segmentSeed * 5.2) > 0.3) {
                    const jaggedCount = Math.floor(seededRandom(segmentSeed * 6.3) * 5) + 1;
                    for (let j = 0; j < jaggedCount; j++) {
                        const jagPos = seededRandom(segmentSeed * 7.4 + j);
                        const jagX = currentX + (nextX - currentX) * jagPos;
                        const jagY = currentY + (nextY - currentY) * jagPos;
                        
                        const jagAngle = currentAngle + Math.PI/2 + (seededRandom(segmentSeed * 8.5 + j) - 0.5) * Math.PI;
                        const jagLength = segWidth * (1 + seededRandom(segmentSeed * 9.6 + j) * 3);
                        const jagEndX = jagX + Math.cos(jagAngle) * jagLength;
                        const jagEndY = jagY + Math.sin(jagAngle) * jagLength;
                        
                        context.strokeStyle = `rgba(${r+20}, ${g+20}, ${b+20}, ${0.3 + seededRandom(segmentSeed * 10.7+j) * 0.5})`;
                        context.lineWidth = Math.max(0.3, segWidth * 0.4);
                        
                        context.beginPath();
                        context.moveTo(jagX, jagY);
                        context.lineTo(jagEndX, jagEndY);
                        context.stroke();
                    }
                }
                
                // 随机分支
                if (seededRandom(segmentSeed * 11.8) < dna.branchiness && seg > 2) {
                    const branchCount = Math.floor(seededRandom(segmentSeed * 12.9) * 3) + 1;
                    for (let br = 0; br < branchCount; br++) {
                        const branchAngle = currentAngle + (seededRandom(segmentSeed * 13.1+br) - 0.5) * Math.PI;
                        const branchLength = segLength * (0.3 + seededRandom(segmentSeed * 14.2+br) * 0.7);
                        const branchWidth = segWidth * (0.4 + seededRandom(segmentSeed * 15.3+br) * 0.4);
                        
                        drawWallBranchSegment(context, currentX, currentY, branchLength, branchAngle, branchWidth, r, g, b, segmentSeed + br);
                    }
                }
                
                // 随机损伤点
                if (seededRandom(segmentSeed * 16.4) > 0.6) {
                    const damageCount = Math.floor(seededRandom(segmentSeed * 17.5) * 4) + 1;
                    for (let d = 0; d < damageCount; d++) {
                        const damPos = seededRandom(segmentSeed * 18.6 + d);
                        const damX = currentX + (nextX - currentX) * damPos + (seededRandom(segmentSeed * 19.7+d) - 0.5) * 15;
                        const damY = currentY + (nextY - currentY) * damPos + (seededRandom(segmentSeed * 20.8+d) - 0.5) * 15;
                        const damSize = seededRandom(segmentSeed * 21.9+d) * 3 + 0.5;
                        
                        context.fillStyle = `rgba(${r}, ${g}, ${b}, ${0.3 + seededRandom(segmentSeed * 22.1+d) * 0.5})`;
                        context.beginPath();
                        context.arc(damX, damY, damSize, 0, Math.PI * 2);
                        context.fill();
                    }
                }
                
                currentX = nextX;
                currentY = nextY;
                totalDistance += segLength;
                
                // 随机停顿和大转向
                if (seededRandom(segmentSeed * 23.2) > 0.85) {
                    currentAngle += (seededRandom(segmentSeed * 24.3) - 0.5) * Math.PI;
                }
            }
        }
        
        // 绘制墙面分支段
        function drawWallBranchSegment(context, startX, startY, length, angle, width, r, g, b, seed) {
            const seededRandom = (s) => {
                const x = Math.sin(s) * 10000;
                return x - Math.floor(x);
            };
            
            const endX = startX + Math.cos(angle) * length;
            const endY = startY + Math.sin(angle) * length;
            
            // 分支可能有自己的分段
            const subSegments = Math.floor(seededRandom(seed * 1.1) * 3) + 1;
            let currentX = startX;
            let currentY = startY;
            let currentAngle = angle;
            
            for (let sub = 0; sub < subSegments; sub++) {
                const subLength = length / subSegments;
                currentAngle += (seededRandom(seed * 2.2 + sub) - 0.5) * 0.5;
                
                const nextX = currentX + Math.cos(currentAngle) * subLength;
                const nextY = currentY + Math.sin(currentAngle) * subLength;
                
                context.strokeStyle = `rgba(${r+10}, ${g+10}, ${b+10}, ${0.5 + seededRandom(seed * 3.3+sub) * 0.4})`;
                context.lineWidth = width * (1 - sub * 0.2);
                context.lineCap = 'round';
                
                context.beginPath();
                context.moveTo(currentX, currentY);
                context.lineTo(nextX, nextY);
                context.stroke();
                
                currentX = nextX;
                currentY = nextY;
            }
        }
        
        // 为每面墙创建独特的法线贴图
        function createUniqueWallNormalMap(gridX, gridY) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const context = canvas.getContext('2d');
            
            const wallSeed = gridX * 1000 + gridY;
            const seededRandom = (seed) => {
                const x = Math.sin(seed) * 10000;
                return x - Math.floor(x);
            };
            
            // 填充中性法线颜色
            context.fillStyle = 'rgb(128, 128, 255)';
            context.fillRect(0, 0, canvas.width, canvas.height);
            
            // 添加基于种子的颗粒法线扰动
            const particleCount = 2000 + Math.floor(seededRandom(wallSeed * 1.1) * 2000);
            for (let i = 0; i < particleCount; i++) {
                const x = seededRandom(wallSeed * 2.1 + i * 0.1) * canvas.width;
                const y = seededRandom(wallSeed * 2.2 + i * 0.1) * canvas.height;
                const size = seededRandom(wallSeed * 2.3 + i * 0.1) * 1.2 + 0.3;
                const intensity = seededRandom(wallSeed * 2.4 + i * 0.1) * 0.3 + 0.1;
                
                const gradient = context.createRadialGradient(x, y, 0, x, y, size * 2);
                gradient.addColorStop(0, `rgb(128, 128, ${Math.floor(255 * (0.9 + intensity * 0.1))})`);
                gradient.addColorStop(0.5, `rgb(${Math.floor(128 + intensity * 20)}, ${Math.floor(128 + intensity * 20)}, 240)`);
                gradient.addColorStop(1, 'rgb(128, 128, 255)');
                
                context.fillStyle = gradient;
                context.beginPath();
                context.arc(x, y, size * 2, 0, Math.PI * 2);
                context.fill();
            }
            
            const normalTexture = new THREE.CanvasTexture(canvas);
            normalTexture.wrapS = THREE.ClampToEdgeWrapping;
            normalTexture.wrapT = THREE.ClampToEdgeWrapping;
            
            return normalTexture;
        }

        // 天花板碰撞检测（防止跳跃穿楼板）
        function checkCeilingCollision(testY) {
            const headY = testY + normalHeight + 0.1; // 头顶位置
            const playerX = soldier.position.x;
            const playerZ = soldier.position.z;
            const playerRadius = SOLDIER_RADIUS;
            for (const wall of walls) {
                const b = wall.bbox;
                const closestX = Math.max(b.min.x, Math.min(playerX, b.max.x));
                const closestZ = Math.max(b.min.z, Math.min(playerZ, b.max.z));
                const dx = playerX - closestX, dz = playerZ - closestZ;
                if (Math.sqrt(dx*dx+dz*dz) <= playerRadius * 1.1) {
                    const wallBot = b.min.y;
                    // 如果头顶碰到了墙的底面
                    if (headY >= wallBot - 0.1 && headY <= wallBot + 0.6 && testY < b.max.y) {
                        return wallBot - normalHeight - 0.15; // 返回被压低的玩家Y
                    }
                }
            }
            return null;
        }

        // 检测地面和墙顶碰撞
        function checkGroundCollision(testY = null) {
            const playerY = testY !== null ? testY : soldier.position.y;
            const playerX = soldier.position.x;
            const playerZ = soldier.position.z;
            const playerRadius = SOLDIER_RADIUS;
            
            let highestGround = GROUND_LEVEL;
            let onGround = false;
            
            // 检查基础地面
            if (playerY <= GROUND_LEVEL + 0.1) {
                onGround = true;
                highestGround = GROUND_LEVEL;
            }
            
            // 如果在穿墙模式下，直接返回
            if (isNoclipMode) {
                return { onGround: false, groundY: playerY };
            }
            
            // 检查所有墙体的顶部
            for (const wall of walls) {
                const wallBbox = wall.bbox;
                
                // 计算玩家到墙体的最近点（水平面）
                const closestX = Math.max(wallBbox.min.x, Math.min(playerX, wallBbox.max.x));
                const closestZ = Math.max(wallBbox.min.z, Math.min(playerZ, wallBbox.max.z));
                
                // 计算水平距离
                const distanceX = playerX - closestX;
                const distanceZ = playerZ - closestZ;
                const horizontalDistance = Math.sqrt(distanceX * distanceX + distanceZ * distanceZ);
                
                // 如果玩家在墙体的水平范围内（考虑玩家半径）
                if (horizontalDistance <= playerRadius * 1.1) { // 增大范围，改善楼梯检测
                    const wallTop = wallBbox.max.y;
                    
                    // 检查玩家是否在墙顶上方附近（容差增至0.45，确保楼梯台阶能被检测到）
                    if (playerY >= wallTop - 0.45 && playerY <= wallTop + 1.2) {
                        // 如果这个墙顶比当前发现的地面更高
                        if (wallTop > highestGround) {
                            highestGround = wallTop;
                            onGround = true;
                        }
                    }
                    // 额外检查：玩家是否穿入实体（防止下沉穿模）
                    if (playerY > wallBbox.min.y && playerY < wallTop - 0.1 && wallTop - playerY < 0.8) {
                        // 轻推到墙顶
                        highestGround = Math.max(highestGround, wallTop);
                        onGround = true;
                    }
                }
            }
            
            return { 
                onGround: onGround, 
                groundY: highestGround 
            };
        }

        // 坐下
        function sitDown() {
            if (!soldier) return;
            
            // 查找最近的椅子
            let nearestChair = null;
            let minDistance = 1.5; // 最大距离1.5米
            
            for (const chair of nearbyChairs) {
                const distance = soldier.position.distanceTo(chair.position);
                if (distance < minDistance) {
                    minDistance = distance;
                    nearestChair = chair;
                }
            }
            
            if (nearestChair) {
                // 保存当前位置
                savedPosition.copy(soldier.position);
                savedRotation = cameraHorizontalAngle;
                
                // 设置坐下状态
                isSitting = true;
                currentChair = nearestChair;
                
                // 计算目标位置：坐在椅子上（脚还在地面，但相机降低）
                const startPos = soldier.position.clone();
                const startCameraHeight = normalHeight;
                
                // 目标位置：椅子的XZ坐标，Y坐标保持在当前楼层地面
                const targetPos = new THREE.Vector3(
                    nearestChair.position.x,
                    savedPosition.y,  // 保持在当前楼层地面
                    nearestChair.position.z
                );
                
                // 坐下时的相机高度（相对偏移量：椅面高于地板的距离 + 0.3米眼睛偏移）
                const sitCameraHeight = nearestChair.position.y - savedPosition.y + 0.3;
                
                // 坐下动画：平滑移动到椅子位置，同时降低相机
                let progress = 0;
                const sitAnimation = () => {
                    progress += 0.06; // 动画速度
                    if (progress <= 1) {
                        // 平滑移动玩家位置
                        soldier.position.lerpVectors(startPos, targetPos, progress);
                        soldier.position.y = savedPosition.y; // 保持在当前楼层地面
                        
                        // 平滑降低相机高度
                        normalHeight = THREE.MathUtils.lerp(startCameraHeight, sitCameraHeight, progress);
                        
                        // 应用坐姿效果（压缩模型）
                        applySittingPose(progress);
                        
                        requestAnimationFrame(sitAnimation);
                    } else {
                        soldier.position.copy(targetPos);
                        soldier.position.y = savedPosition.y;
                        normalHeight = sitCameraHeight;
                        applySittingPose(1);
                    }
                };
                sitAnimation();
                
                // 停止所有移动
                moveDirection.set(0, 0, 0);
                verticalVelocity = 0;
                isWalking = false;
                walkSpeed = 0;
                
                console.log('✅ 已坐下，按E键站起来');
            } else {
                console.log('❌ 附近没有椅子');
            }
        }

                try {
                    if (typeof window.parent.openInGame === 'function') {
                        window.parent.openInGame('main-menu.html', '🏠 主菜单');
                        return;
                    }
                    const closeBtn = window.parent.document.getElementById('close-web-btn');
                    if (closeBtn) { closeBtn.click(); return; }
                } catch (err) {
                    console.error('退出失败:', err);
                }
            }
            window.location.href = '../main-menu.html';
        }

        // 新增：切换二段跳模式
        function toggleDoubleJump() {
            doubleJumpEnabled = !doubleJumpEnabled;
            maxJumps = doubleJumpEnabled ? 2 : 1;
            jumpCount = 0; // 重置跳跃计数
            
            const output = document.createElement('div');
            output.textContent = `二段跳模式: ${doubleJumpEnabled ? '开启' : '关闭'}`;
            output.style.color = doubleJumpEnabled ? '#00ff00' : '#ffaa00';
            consoleOutput.appendChild(output);
            
            console.log("二段跳模式: " + (doubleJumpEnabled ? "开启" : "关闭"));
        }
    </script>
