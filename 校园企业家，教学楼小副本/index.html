<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D教学楼 - 多层第一人称漫游</title>
    <script src="../js/campus-settings.js"></script>
    <link rel="stylesheet" href="../css/campus-mobile.css">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            overflow: hidden;
            font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
            background: linear-gradient(to bottom,
                #050e24 0%, #0a1840 15%, #1a3a8a 38%,
                #b04020 58%, #d06010 72%,
                #e89020 84%, #f8d060 93%, #fff4d0 100%);
        }
        canvas { display: block; background: transparent; }

        /* ── 调试面板 ── */
        #debug-overlay {
            position: absolute;
            top: 12px;
            left: 12px;
            background: linear-gradient(135deg, rgba(10,20,40,0.78), rgba(20,40,70,0.72));
            color: #b8e0ff;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 12px;
            line-height: 1.7;
            z-index: 100;
            border: 1px solid rgba(80,160,255,0.25);
            backdrop-filter: blur(4px);
            min-width: 200px;
        }
        #debug-overlay span { color: #7dd4ff; font-weight: bold; }

        /* ── 操作说明面板 ── */
        #instructions {
            position: absolute;
            bottom: 16px;
            left: 16px;
            background: linear-gradient(135deg, rgba(10,20,40,0.82), rgba(20,50,90,0.78));
            color: #d0e8ff;
            padding: 14px 18px;
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.8;
            z-index: 100;
            border: 1px solid rgba(80,160,255,0.3);
            backdrop-filter: blur(6px);
            max-width: 250px;
        }
        #instructions h3 {
            margin: 0 0 8px 0;
            font-size: 14px;
            color: #7dd4ff;
            border-bottom: 1px solid rgba(100,180,255,0.3);
            padding-bottom: 6px;
            letter-spacing: 1px;
        }
        #instructions p {
            margin: 3px 0;
        }
        #instructions p span.key {
            display: inline-block;
            background: rgba(80,150,255,0.25);
            border: 1px solid rgba(100,180,255,0.35);
            border-radius: 4px;
            padding: 0 5px;
            font-size: 11px;
            color: #a8d8ff;
            margin-right: 4px;
            font-family: monospace;
        }

        /* ── 开发控制台 ── */
        #console-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(5, 12, 24, 0.92);
            color: #7ee8a2;
            padding: 10px 16px;
            font-size: 13px;
            z-index: 300;
            display: none;
            border-top: 1px solid rgba(80,200,120,0.3);
            font-family: "Consolas", monospace;
        }
        #console-input {
            width: 100%;
            background: rgba(10, 25, 10, 0.6);
            color: #a0ffb0;
            border: 1px solid rgba(80,200,120,0.4);
            border-radius: 4px;
            padding: 6px 10px;
            font-size: 13px;
            font-family: "Consolas", monospace;
            outline: none;
        }
        #console-output {
            height: 180px;
            overflow-y: scroll;
            margin-bottom: 8px;
            scrollbar-width: thin;
            scrollbar-color: rgba(80,200,120,0.3) transparent;
        }

        /* ── 准心 ── */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            pointer-events: none;
            z-index: 200;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.85);
        }
        #crosshair::before {
            width: 2px; height: 14px;
            left: 9px; top: 3px;
        }
        #crosshair::after {
            width: 14px; height: 2px;
            left: 3px; top: 9px;
        }

        /* ── 退出按钮 ── */
        #exit-btn {
            position: absolute;
            top: 14px;
            right: 16px;
            background: linear-gradient(135deg, rgba(180,30,30,0.85), rgba(220,60,60,0.80));
            color: #fff;
            border: 1px solid rgba(255,120,120,0.45);
            border-radius: 22px;
            padding: 9px 22px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            z-index: 500;
            backdrop-filter: blur(6px);
            box-shadow: 0 4px 16px rgba(180,0,0,0.35);
            transition: all 0.25s ease;
            font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
            user-select: none;
        }
        #exit-btn:hover {
            background: linear-gradient(135deg, rgba(220,40,40,0.95), rgba(255,80,80,0.90));
            transform: translateY(-2px) scale(1.04);
            box-shadow: 0 8px 24px rgba(200,0,0,0.45);
        }
        #exit-btn:active {
            transform: scale(0.97);
        }

        #floor-indicator {
            position: absolute;
            top: 12px;
            right: 16px;

            color: #7dd4ff;
            padding: 8px 18px;
            border-radius: 20px;

            font-weight: bold;
            z-index: 100;
            border: 1px solid rgba(80,160,255,0.35);
            letter-spacing: 2px;
            display: none;
        }

        function paintMoonPhaseTexture(phase) {
            if (!_moonPhaseCanvas || !_moonPhaseTex) return;
            const ctx = _moonPhaseCanvas.getContext('2d');
            const w = _moonPhaseCanvas.width, h = _moonPhaseCanvas.height;
            const cx = w * 0.5, cy = h * 0.5, R = w * 0.42;
            const ang = ((phase % 1) + 1) % 1 * Math.PI * 2;
            ctx.clearRect(0, 0, w, h);
            ctx.fillStyle = '#0a0e18';
            ctx.fillRect(0, 0, w, h);
            ctx.globalCompositeOperation = 'source-over';
            const grd = ctx.createRadialGradient(cx - R * 0.22, cy - R * 0.18, R * 0.06, cx, cy, R);
            grd.addColorStop(0, '#f2f0ea');
            grd.addColorStop(0.35, '#c9ccd6');
            grd.addColorStop(0.72, '#9aa0ae');
            grd.addColorStop(1, '#6a7080');
            ctx.fillStyle = grd;
            ctx.beginPath();
            ctx.arc(cx, cy, R, 0, Math.PI * 2);
            ctx.fill();
            for (let i = 0; i < 48; i++) {
                const rr = 1.1 + Math.random() * 4.8;
                const a = Math.random() * Math.PI * 2;
                const dist = R * (0.1 + Math.random() * 0.82);
                const sx = cx + Math.cos(a) * dist;
                const sy = cy + Math.sin(a) * dist;
                ctx.fillStyle = `rgba(38,42,54,${0.14 + Math.random() * 0.32})`;
                ctx.beginPath();
                ctx.arc(sx, sy, rr, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.fillStyle = 'rgba(55,62,78,0.2)';
            ctx.beginPath();
            ctx.ellipse(cx - R * 0.24, cy + R * 0.12, R * 0.36, R * 0.26, 0.35, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'rgba(72,80,96,0.16)';
            ctx.beginPath();
            ctx.ellipse(cx + R * 0.28, cy - R * 0.18, R * 0.22, R * 0.2, -0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(cx - R * (1 - Math.cos(ang)), cy, R + 1.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalCompositeOperation = 'source-over';
            _moonPhaseTex.needsUpdate = true;
        }

        // 控制台命令处理函数
        function processConsoleCommand(command) {
            const output = document.createElement('div');
            output.textContent = `> ${command}`;
            consoleOutput.appendChild(output);
            
            // 处理命令
            const args = command.split(' ');
            const cmd = args.shift().toLowerCase();
            
            switch (cmd) {
                case 'help':
                    showHelp();
                    break;
                case 'teleport':
                case 'tp':
                    teleport(args);
                    break;
                case 'mode':
                    changeMode(args);
                    break;
                case 'noclip':
                    toggleNoclip();
                    break;
                case 'god':
                    toggleGodMode();
                    break;
                case 'volume':
                    setVolume(args);
                    break;
                case 'debug':
                    debug();
                    break;
                case 'clear':
                    clearConsole();
                    break;
                case 'camera':
                case 'view':
                    toggleView();
                    break;
                case 'resetlegs':
                    resetLegs();
                    break;
                case 'reset':
                    resetPlayerFully();
                    break;
                case 'status':
                    showStatus();
                    break;
                case 'pos':
                    showPosition();
                    break;
                case 'fly':
                    toggleFlyMode();
                    break;
                case 'doublejump':
                case 'dj':
                    toggleDoubleJump();
                    break;
                case 'time':
                    cmdTime(args);
                    break;
                case 'weather':
                case 'we':
                    cmdWeather(args);
                    break;
                case 'speed':
                case 'sp':
                    cmdSpeed(args);
                    break;
                case 'goto':
                case 'warp':
                    cmdGoto(args);
                    break;
                case 'copypos':
                case 'copy':
                    cmdCopypos();
                    break;
                case 'daylen':
                case 'dayduration':
                case '昼夜':
                    cmdDaylen(args);
                    break;
                case 'info':
                case 'i':
                case 'whereami':
                    cmdGameInfo();
                    break;
                case 'ver':
                case 'version':
                    cmdVersion();
                    break;
                case 'fps':
                case 'hud':
                    cmdHudToggle();
                    break;
                default:
                    const errorOutput = document.createElement('div');
                    errorOutput.textContent = '未知命令，输入 help 查看可用命令';
                    consoleOutput.appendChild(errorOutput);
                    break;
            }
            
            // 滚动到底部
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }

<h4 style="margin:12px 0 6px;color:#8cf;">二、世界与时间</h4>

<p style="margin:6px 0 0;font-size:12px;opacity:.85;">说明：晴天地表与天空主要由时间驱动；雨雪雾会叠加雾效与粒子。时间流逝不影响天气随机，仅影响抽下一段天气时的时段权重。</p>

            if (!soldier) {
                const output = document.createElement('div');
                output.textContent = '角色未加载';
                consoleOutput.appendChild(output);
                return;
            }
            if (args.length === 2) {
                const x = parseFloat(args[0]);
                const z = parseFloat(args[1]);
                if (isNaN(x) || isNaN(z)) {
                    const output = document.createElement('div');
                    output.textContent = 'tp x z 需要两个数字';
                    consoleOutput.appendChild(output);
                    return;
                }
                soldier.position.x = x;
                soldier.position.z = z;
                verticalVelocity = 0;
                const output = document.createElement('div');
                output.textContent = '已传送 (保持高度 Y=' + soldier.position.y.toFixed(2) + '): X=' + x + ' Z=' + z;
                consoleOutput.appendChild(output);
                return;
            }
            if (args.length !== 3) {
                const output = document.createElement('div');
                output.textContent = '传送需要 tp x y z 三个数字，或 tp x z 只改水平位置';
                consoleOutput.appendChild(output);
                return;
            }

            const x = parseFloat(args[0]);
            const y = parseFloat(args[1]);
            const z = parseFloat(args[2]);

            if (isNaN(x) || isNaN(y) || isNaN(z)) {
                const output = document.createElement('div');
                output.textContent = '坐标参数必须是数字';

                return;

            const output = document.createElement('div');

        // WebGL 阴影在 GPU 上计算；按硬件自适应像素比与阴影分辨率（集显/软渲染降级）
        window._gfxTier = 'high';
        function applyAdaptiveGpuQuality(renderer, sunDirLight) {
            let tier = 'high';
            try {
                const gl = renderer.getContext();
                const dbg = gl.getExtension('WEBGL_debug_renderer_info');
                if (dbg) {
                    const ren = (gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) || '') + '';
                    if (/SwiftShader|LLVMpipe|Software|Microsoft Basic|llvmpipe/i.test(ren)) tier = 'low';
                }
                const cores = navigator.hardwareConcurrency || 4;
                const mem = navigator.deviceMemory || 8;
                if (tier !== 'low') {
                    if (mem <= 2 || cores <= 2) tier = 'low';
                    else if (mem <= 4 || cores <= 4 || window.innerWidth < 1100) tier = 'medium';
                }
            } catch (e) { tier = 'medium'; }
            window._gfxTier = tier;
            if (tier === 'low') {
                renderer.setPixelRatio(1);
                if (sunDirLight && sunDirLight.shadow) {
                    sunDirLight.shadow.mapSize.width = 1024;
                    sunDirLight.shadow.mapSize.height = 1024;
                }
            } else if (tier === 'medium') {
                renderer.setPixelRatio(Math.min(1.5, window.devicePixelRatio || 1));
                if (sunDirLight && sunDirLight.shadow) {
                    sunDirLight.shadow.mapSize.width = 1536;
                    sunDirLight.shadow.mapSize.height = 1536;
                }
            } else {
                renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
            }
            console.log('画质档:', tier, '（阴影贴图 GPU）');
            return tier;
        }

            // 手机模式：多指并行 — 用 touch.identifier 区分「转视角」与其它触点（摇杆/按钮）
            let touchLookLastX = 0;
            let touchLookLastY = 0;
            let touchLookActive = false;
            let touchLookId = null;
            function touchListFind(touchList, id) {
                for (let i = 0; i < touchList.length; i++) {
                    if (touchList[i].identifier === id) return touchList[i];
                }
                return null;
            }
            function touchLookBlocked(clientX, clientY) {
                const el = document.elementFromPoint(clientX, clientY);
                if (!el) return false;
                return !!(el.closest && (
                    el.closest('#campus-3d-mobile-root') ||
                    el.closest('#campus-mobile-hud') ||
                    el.closest('#exit-btn') ||
                    el.closest('#map-loading')
                ));
            }
            renderer.domElement.addEventListener('touchstart', function (ev) {
                if (typeof CampusSettings === 'undefined' || !CampusSettings.isMobileMode()) return;
                if (touchLookActive && touchListFind(ev.touches, touchLookId)) return;
                for (let i = 0; i < ev.changedTouches.length; i++) {
                    const t = ev.changedTouches[i];
                    if (touchLookBlocked(t.clientX, t.clientY)) continue;
                    touchLookId = t.identifier;
                    touchLookActive = true;
                    touchLookLastX = t.clientX;
                    touchLookLastY = t.clientY;
                    break;
                }
            }, { passive: true });

                if (!t) return;
                ev.preventDefault();

                const dy = t.clientY - touchLookLastY;

                if (!touchLookActive || touchLookId === null) return;

                if (e.key.toLowerCase() === 'e') {

                    const dl=window._mainDoorL, dr=window._mainDoorR;
                    let doorTriggered=false;
                    if(soldier && dl && dr){
                        const doorCenter=new THREE.Vector3(0, 1.4, dl.position.z);
                        const dist=soldier.position.distanceTo(doorCenter);
                        if(dist<4.0){
                            doorTriggered=true;
                            const isOpen=window._mainDoorOpen=!window._mainDoorOpen;
                            const targetAngleL = isOpen ? -Math.PI/2 : 0;

                            window._mainDoorAnimGen = (window._mainDoorAnimGen || 0) + 1;

                                const spd=0.18;
                                dl.rotation.y+=( targetAngleL - dl.rotation.y)*spd;

                                if (!leftDone || !rightDone) requestAnimationFrame(animDoor);

                                    dr.rotation.y = targetAngleR;
                                    if (dl.children[0]) dl.children[0].visible = !isOpen;
                                    if (dr.children[0]) dr.children[0].visible = !isOpen;

                            animDoor();

                    }
                    if (!doorTriggered && window._wcSwingDoors) {
                        for (const wd of window._wcSwingDoors) {
                            if (!wd.pivot || !wd.pivot.rotation) continue;
                            const dcw = new THREE.Vector3(wd.cx, 1.35, wd.cz);

                                    if (gg !== wd._doorG) return;
                                    const k = 0.2;
                                    wd.pivot.rotation.y += (tgt - wd.pivot.rotation.y) * k;
                                    if (Math.abs(tgt - wd.pivot.rotation.y) > 0.03) requestAnimationFrame(animWC);
                                    else wd.pivot.rotation.y = tgt;
                                })();
                                showHint(wd.open ? '厕所门已打开' : '厕所门已关闭');
                                break;
                            }
                        }
                    }
                    if(!doorTriggered && window._bldgDoors){
                        for(const bd of window._bldgDoors){
                            const dc=new THREE.Vector3(bd.cx, 1.4, bd.cz);
                            if(soldier && soldier.position.distanceTo(dc)<5.0){
                                doorTriggered=true;
                                bd.open=!bd.open;
                                const isOpen=bd.open;
                                const tL=isOpen?-Math.PI/2:0, tR=isOpen?Math.PI/2:0;
                                bd._doorAnimGen = (bd._doorAnimGen || 0) + 1;
                                const g = bd._doorAnimGen;
                                (function animBD(){
                                    if (g !== bd._doorAnimGen) return;
                                    const k = 0.16;
                                    bd.pivL.rotation.y+=(tL-bd.pivL.rotation.y)*k;
                                    bd.pivR.rotation.y+=(tR-bd.pivR.rotation.y)*k;
                                    const lOk = Math.abs(bd.pivL.rotation.y - tL) <= 0.004;
                                    const rOk = Math.abs(bd.pivR.rotation.y - tR) <= 0.004;
                                    if (!lOk || !rOk) requestAnimationFrame(animBD);
                                    else {
                                        bd.pivL.rotation.y = tL;
                                        bd.pivR.rotation.y = tR;
                                        if (bd.pivL.children[0]) bd.pivL.children[0].visible = !isOpen;
                                        if (bd.pivR.children[0]) bd.pivR.children[0].visible = !isOpen;
                                    }
                                })();
                                showHint(isOpen?'大门已开启':'大门已关闭');
                                break;
                            }
                        }
                    }
                    if(!doorTriggered) toggleSitting();
                }
                
                // 按L键切换二段跳模式
                if (e.key.toLowerCase() === 'l' && !keyboard.lPressed) {
                    keyboard.lPressed = true;
                    doubleJumpEnabled = !doubleJumpEnabled;
                    maxJumps = doubleJumpEnabled ? 2 : 1;
                    
                    // 显示二段跳模式状态
                    console.log("二段跳模式: " + (doubleJumpEnabled ? "开启" : "关闭"));
                    
                    // 在控制台中显示消息
                    if (isConsoleOpen) {
                        const output = document.createElement('div');
                        output.textContent = `二段跳模式: ${doubleJumpEnabled ? '开启' : '关闭'}`;
                        output.style.color = doubleJumpEnabled ? '#00ff00' : '#ffaa00';
                        consoleOutput.appendChild(output);
                        consoleOutput.scrollTop = consoleOutput.scrollHeight;
                    }
                }
                
                // 按P键切换飞行模式
                if (e.key.toLowerCase() === 'p' && !keyboard.pPressed) {
                    keyboard.pPressed = true;
                    isFlying = !isFlying;
                    
                    if (!isFlying) {
                        // 退出飞行模式时，使用当前位置的垂直高度并给予一个小的下落速度
                        verticalVelocity = -5; // 小的下落速度
                    } else {
                        // 进入飞行模式时，清除垂直速度
                        verticalVelocity = 0;
                        // 重置滑铲冷却，让玩家在开启飞行模式后立即可以使用滑铲
                        slideCooldown = 0;
                    }
                    
                    // 显示飞行模式状态
                    console.log("飞行模式: " + (isFlying ? "开启" : "关闭"));
                }
                
                // 按Q键触发滑铲
                if (e.key.toLowerCase() === 'q' && !isSliding) {
                    // 在飞行模式下允许随时滑铲，无视冷却时间和地面限制
                    if (isFlying || (slideCooldown <= 0 && soldier.position.y <= GROUND_LEVEL)) {
                        startSlide();
                    }
                }
                // G 键：循环天气（带过渡）
                if (e.key.toLowerCase() === 'g' && !keyboard.gWeatherLock) {
                    keyboard.gWeatherLock = true;
                    const order = ['clear', 'rain', 'snow', 'fog'];
                    const i = order.indexOf(weatherType);
                    const next = order[(i < 0 ? 0 : i + 1) % order.length];
                    startWeatherTransition(next);
                }
            });
            window.addEventListener('keyup', function(e) {
                // 如果赵老师已被救援，禁用所有按键处理
                if (isTeacherRescued) {
                    return;
                }
                
                keyboard[e.key.toLowerCase()] = false;
                
                // 释放P键
                if (e.key.toLowerCase() === 'p') {
                    keyboard.pPressed = false;
                }
                
                // 释放L键
                if (e.key.toLowerCase() === 'l') {
                    keyboard.lPressed = false;
                }
                if (e.key.toLowerCase() === 'g') {
                    keyboard.gWeatherLock = false;
                }
            });
            
            // 添加控制台输入事件
            document.getElementById('console-input').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    const command = this.value.trim();
                    if (command) {
                        processConsoleCommand(command);
                        this.value = '';
                        
                        // 将命令添加到历史记录
                        if (command !== consoleHistory[consoleHistory.length - 1]) {
                            consoleHistory.push(command);
                            historyIndex = consoleHistory.length;
                        }
                    }
                } else if (e.key === 'ArrowUp') {
                    // 浏览历史命令(向上)
                    if (consoleHistory.length > 0 && historyIndex > 0) {
                        historyIndex--;
                        this.value = consoleHistory[historyIndex];
                    }
                    e.preventDefault();
                } else if (e.key === 'ArrowDown') {
                    // 浏览历史命令(向下)
                    if (consoleHistory.length > 0 && historyIndex < consoleHistory.length - 1) {
                        historyIndex++;
                        this.value = consoleHistory[historyIndex];
                    } else if (historyIndex === consoleHistory.length - 1) {
                        historyIndex = consoleHistory.length;
                        this.value = '';
                    }
                    e.preventDefault();
                } else if (e.key === 'Escape') {
                    // 关闭控制台
                    toggleConsole();
                }
            });
            
            // 开始动画循环
            animate(0);
            
            // 添加调试信息
            console.log('🎮 游戏已初始化！');
            console.log('🆘 如果遇到问题，请按 T 键打开控制台');
            console.log('🔧 在控制台中输入 "reset" 可以重置所有状态');
            console.log('📋 输入 "help" 查看所有可用命令');
            
            // 延迟显示帮助信息
            setTimeout(() => {
                console.log('✅ 游戏启动成功！');
            }, 1000);
        }

        // 创建地板纹理
        function createFloorTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const context = canvas.getContext('2d');
            
            // 填充白色底色（砖缝）
            context.fillStyle = '#f0f0f0'; // 白色砖缝
            context.fillRect(0, 0, canvas.width, canvas.height);
            
            const brickWidth = 24; // 砖块宽度
            const brickHeight = 12; // 砖块高度（长方形）
            
            // 绘制砖块图案（交错排列）
            for (let y = 0; y < canvas.height; y += brickHeight) {
                // 每隔一行偏移半个砖块宽度，形成砖块效果
                const offset = (Math.floor(y / brickHeight) % 2) * (brickWidth / 2);
                
                for (let x = -brickWidth; x < canvas.width + brickWidth; x += brickWidth) {
                    const brickX = x + offset;
                    const brickY = y;
                    
                    // 基础砖块颜色（更大的随机变化）
                    const brightness = Math.random() * 35 - 17; // 更大的变化范围
                    const baseColor = 40 + brightness;
                    
                    // 砖块的基本色调变化（模拟不同批次的砖块）
                    const redTint = Math.random() * 12 - 6;
                    const greenTint = Math.random() * 10 - 5;
                    const blueTint = Math.random() * 8 - 4;
                    
                    // 创建不规则的砖块路径
                context.beginPath();
                    
                    // 定义砖块的不规则边缘点
                    const irregularPoints = [];
                    const numPoints = 8; // 每边2个点
                    
                    // 顶边（左到右）
                    irregularPoints.push({ 
                        x: brickX + 0.5 + Math.random() * 2, 
                        y: brickY + 0.5 + Math.random() * 1.5 
                    });
                    irregularPoints.push({ 
                        x: brickX + brickWidth/2 + (Math.random() - 0.5) * 3, 
                        y: brickY + 0.5 + Math.random() * 2 
                    });
                    irregularPoints.push({ 
                        x: brickX + brickWidth - 0.5 - Math.random() * 2, 
                        y: brickY + 0.5 + Math.random() * 1.5 
                    });
                    
                    // 右边（上到下）
                    irregularPoints.push({ 
                        x: brickX + brickWidth - 0.5 - Math.random() * 1.5, 
                        y: brickY + brickHeight/2 + (Math.random() - 0.5) * 2 
                    });
                    
                    // 底边（右到左）
                    irregularPoints.push({ 
                        x: brickX + brickWidth - 0.5 - Math.random() * 2, 
                        y: brickY + brickHeight - 0.5 - Math.random() * 1.5 
                    });
                    irregularPoints.push({ 
                        x: brickX + brickWidth/2 + (Math.random() - 0.5) * 3, 
                        y: brickY + brickHeight - 0.5 - Math.random() * 2 
                    });
                    irregularPoints.push({ 
                        x: brickX + 0.5 + Math.random() * 2, 
                        y: brickY + brickHeight - 0.5 - Math.random() * 1.5 
                    });
                    
                    // 左边（下到上）
                    irregularPoints.push({ 
                        x: brickX + 0.5 + Math.random() * 1.5, 
                        y: brickY + brickHeight/2 + (Math.random() - 0.5) * 2 
                    });
                    
                    // 绘制不规则砖块形状
                    context.moveTo(irregularPoints[0].x, irregularPoints[0].y);
                    for (let i = 1; i < irregularPoints.length; i++) {
                        // 使用quadraticCurveTo创建更自然的曲线边缘
                        const current = irregularPoints[i];
                        const next = irregularPoints[(i + 1) % irregularPoints.length];
                        const controlX = current.x + (Math.random() - 0.5) * 2;
                        const controlY = current.y + (Math.random() - 0.5) * 2;
                        
                        context.quadraticCurveTo(controlX, controlY, current.x, current.y);
                    }
                    context.closePath();
                    
                    // 填充基础颜色
                    context.fillStyle = `rgb(${Math.max(0, Math.min(255, baseColor + redTint))}, ${Math.max(0, Math.min(255, baseColor + greenTint))}, ${Math.max(0, Math.min(255, baseColor + blueTint))})`;
                    context.fill();
                    
                    // 添加砖块内部的破损和缺角效果
                    if (Math.random() > 0.7) {
                        const chipsCount = Math.floor(Math.random() * 3) + 1;
                        for (let chip = 0; chip < chipsCount; chip++) {
                context.beginPath();
                            const chipX = brickX + 1.5 + Math.random() * (brickWidth - 3);
                            const chipY = brickY + 1.5 + Math.random() * (brickHeight - 3);
                            const chipSize = Math.random() * 3 + 1;
                            
                            // 创建不规则的破损形状
                            const angles = Math.floor(Math.random() * 4) + 3; // 3-6个角
                            context.moveTo(chipX + chipSize, chipY);
                            for (let a = 1; a <= angles; a++) {
                                const angle = (a / angles) * Math.PI * 2;
                                const radius = chipSize * (0.5 + Math.random() * 0.5);
                                const px = chipX + Math.cos(angle) * radius;
                                const py = chipY + Math.sin(angle) * radius;
                                context.lineTo(px, py);
                            }
                            context.closePath();
                            
                            context.fillStyle = `rgba(${Math.max(0, baseColor - 25)}, ${Math.max(0, baseColor - 25)}, ${Math.max(0, baseColor - 25)}, 0.8)`;
                            context.fill();
                        }
                    }
                    
                    // 添加砖块的深度感（多层阴影）- 在不规则路径内
                    context.save();
                    context.clip(); // 限制在砖块形状内
                    
                    // 1. 整体渐变效果
                    const gradient1 = context.createLinearGradient(brickX + 0.5, brickY + 0.5, brickX + brickWidth - 0.5, brickY + brickHeight - 0.5);
                    gradient1.addColorStop(0, `rgba(${Math.max(0, baseColor + 20)}, ${Math.max(0, baseColor + 20)}, ${Math.max(0, baseColor + 20)}, 0.8)`);
                    gradient1.addColorStop(0.3, `rgba(${baseColor}, ${baseColor}, ${baseColor}, 0.3)`);
                    gradient1.addColorStop(0.7, `rgba(${Math.max(0, baseColor - 15)}, ${Math.max(0, baseColor - 15)}, ${Math.max(0, baseColor - 15)}, 0.5)`);
                    gradient1.addColorStop(1, `rgba(${Math.max(0, baseColor - 30)}, ${Math.max(0, baseColor - 30)}, ${Math.max(0, baseColor - 30)}, 0.9)`);
                    context.fillStyle = gradient1;
                    context.fillRect(brickX, brickY, brickWidth, brickHeight);
                    
                    // 2. 随机的凹陷区域
                    for (let dent = 0; dent < 3; dent++) {
                        if (Math.random() > 0.6) {
                            const dentX = brickX + 1.5 + Math.random() * (brickWidth - 3);
                            const dentY = brickY + 1.5 + Math.random() * (brickHeight - 3);
                            const dentSize = Math.random() * 4 + 2;
                            
                            const dentGradient = context.createRadialGradient(dentX, dentY, 0, dentX, dentY, dentSize);
                            dentGradient.addColorStop(0, `rgba(${Math.max(0, baseColor - 40)}, ${Math.max(0, baseColor - 40)}, ${Math.max(0, baseColor - 40)}, 0.9)`);
                            dentGradient.addColorStop(1, `rgba(${baseColor}, ${baseColor}, ${baseColor}, 0)`);
                            context.fillStyle = dentGradient;
                            context.beginPath();
                            context.arc(dentX, dentY, dentSize, 0, Math.PI * 2);
                            context.fill();
                        }
                    }
                    
                    // 3. 随机的凸起区域
                    for (let bump = 0; bump < 2; bump++) {
                        if (Math.random() > 0.7) {
                            const bumpX = brickX + 1.5 + Math.random() * (brickWidth - 3);
                            const bumpY = brickY + 1.5 + Math.random() * (brickHeight - 3);
                            const bumpSize = Math.random() * 3 + 1;
                            
                            const bumpGradient = context.createRadialGradient(bumpX, bumpY, 0, bumpX, bumpY, bumpSize);
                            bumpGradient.addColorStop(0, `rgba(${Math.min(255, baseColor + 30)}, ${Math.min(255, baseColor + 30)}, ${Math.min(255, baseColor + 30)}, 0.7)`);
                            bumpGradient.addColorStop(1, `rgba(${baseColor}, ${baseColor}, ${baseColor}, 0)`);
                            context.fillStyle = bumpGradient;
                            context.beginPath();
                            context.arc(bumpX, bumpY, bumpSize, 0, Math.PI * 2);
                            context.fill();
                        }
                    }
                    
                    context.restore();
                    
                    // 4. 表面的真实纹理和风化效果
                    for (let i = 0; i < 20; i++) {
                        const texX = brickX + 1.5 + Math.random() * (brickWidth - 3);
                        const texY = brickY + 1.5 + Math.random() * (brickHeight - 3);
                        const texSize = Math.random() * 1.2 + 0.3;
                        const texBrightness = Math.random() * 40 - 20;
                        
                        context.fillStyle = `rgba(${Math.max(0, Math.min(255, baseColor + texBrightness))}, ${Math.max(0, Math.min(255, baseColor + texBrightness))}, ${Math.max(0, Math.min(255, baseColor + texBrightness))}, 0.7)`;
                        context.beginPath();
                        context.arc(texX, texY, texSize, 0, Math.PI * 2);
                        context.fill();
                    }
                    
                    // 5. 深层划痕和裂纹
                    const scratchCount = Math.floor(Math.random() * 4);
                    for (let s = 0; s < scratchCount; s++) {
                        const scratchStartX = brickX + 1.5 + Math.random() * (brickWidth - 3);
                        const scratchStartY = brickY + 1.5 + Math.random() * (brickHeight - 3);
                        const scratchLength = Math.random() * 10 + 4;
                        const scratchAngle = Math.random() * Math.PI * 2;
                        const scratchWidth = Math.random() * 1.5 + 0.5;
                        
                        context.strokeStyle = `rgba(${Math.max(0, baseColor - 35)}, ${Math.max(0, baseColor - 35)}, ${Math.max(0, baseColor - 35)}, 0.8)`;
                        context.lineWidth = scratchWidth;
                        context.lineCap = 'round';
                        context.beginPath();
                        
                        // 创建不规则的划痕路径
                        const segments = 3;
                        for (let seg = 0; seg <= segments; seg++) {
                            const progress = seg / segments;
                            const currentX = scratchStartX + Math.cos(scratchAngle) * scratchLength * progress + (Math.random() - 0.5) * 2;
                            const currentY = scratchStartY + Math.sin(scratchAngle) * scratchLength * progress + (Math.random() - 0.5) * 2;
                            
                            if (seg === 0) {
                                context.moveTo(currentX, currentY);
                            } else {
                                context.lineTo(currentX, currentY);
                            }
                        }
                context.stroke();
            }
            
                    // 6. 边缘的严重磨损和缺角
                    if (Math.random() > 0.6) {
                        const edgeDamageCount = Math.floor(Math.random() * 3) + 1;
                        for (let edge = 0; edge < edgeDamageCount; edge++) {
                            context.fillStyle = `rgba(${Math.max(0, baseColor - 20)}, ${Math.max(0, baseColor - 20)}, ${Math.max(0, baseColor - 20)}, 0.6)`;
                            
                            // 随机选择边缘位置
                            const edgeType = Math.floor(Math.random() * 4);
                            let damageX, damageY, damageW, damageH;
                            
                            switch(edgeType) {
                                case 0: // 顶边
                                    damageX = brickX + Math.random() * brickWidth;
                                    damageY = brickY + 0.5;
                                    damageW = Math.random() * 3 + 1;
                                    damageH = Math.random() * 2 + 1;
                                    break;
                                case 1: // 右边
                                    damageX = brickX + brickWidth - 1.5;
                                    damageY = brickY + Math.random() * brickHeight;
                                    damageW = Math.random() * 2 + 1;
                                    damageH = Math.random() * 3 + 1;
                                    break;
                                case 2: // 底边
                                    damageX = brickX + Math.random() * brickWidth;
                                    damageY = brickY + brickHeight - 1.5;
                                    damageW = Math.random() * 3 + 1;
                                    damageH = Math.random() * 2 + 1;
                                    break;
                                case 3: // 左边
                                    damageX = brickX + 0.5;
                                    damageY = brickY + Math.random() * brickHeight;
                                    damageW = Math.random() * 2 + 1;
                                    damageH = Math.random() * 3 + 1;
                                    break;
                            }
                            
                            context.fillRect(damageX, damageY, damageW, damageH);
                        }
                    }
                    
                    // 7. 污渍和水渍效果
                    if (Math.random() > 0.5) {
                        const stainCount = Math.floor(Math.random() * 3) + 1;
                        for (let stain = 0; stain < stainCount; stain++) {
                            const stainX = brickX + 0.5 + Math.random() * (brickWidth - 1);
                            const stainY = brickY + 0.5 + Math.random() * (brickHeight - 1);
                            const stainSize = Math.random() * 5 + 2;
                            const stainDarkness = Math.random() * 25 + 10;
                            
                            const stainGradient = context.createRadialGradient(stainX, stainY, 0, stainX, stainY, stainSize);
                            stainGradient.addColorStop(0, `rgba(${Math.max(0, baseColor - stainDarkness)}, ${Math.max(0, baseColor - stainDarkness)}, ${Math.max(0, baseColor - stainDarkness)}, 0.6)`);
                            stainGradient.addColorStop(0.7, `rgba(${Math.max(0, baseColor - stainDarkness/2)}, ${Math.max(0, baseColor - stainDarkness/2)}, ${Math.max(0, baseColor - stainDarkness/2)}, 0.3)`);
                            stainGradient.addColorStop(1, `rgba(${baseColor}, ${baseColor}, ${baseColor}, 0)`);
                            context.fillStyle = stainGradient;
                context.beginPath();
                            context.arc(stainX, stainY, stainSize, 0, Math.PI * 2);
                            context.fill();
                        }
                    }
                }
            }
            
            // 最后在砖缝上添加一些细微的污渍和不规则性
            for (let i = 0; i < 150; i++) {
                const groutX = Math.random() * canvas.width;
                const groutY = Math.random() * canvas.height;
                const groutSize = Math.random() * 1.5 + 0.5;
                
                context.fillStyle = `rgba(${180 + Math.random() * 40}, ${180 + Math.random() * 40}, ${180 + Math.random() * 40}, ${Math.random() * 0.4})`;
                context.beginPath();
                context.arc(groutX, groutY, groutSize, 0, Math.PI * 2);
                context.fill();
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            // 根据迷宫大小动态调整纹理重复次数，让砖块大小适中
            // 小迷宫也需要足够的重复次数，否则砖块会太大
            const repeatCount = Math.max(5, Math.floor(MAZE_SIZE * 16 / 40));
            texture.repeat.set(repeatCount, repeatCount);
            
            return texture;
        }
        
        // 创建墙壁纹理
        function createWallTexture() {

            canvas.width = 256;
            canvas.height = 256;
            const context = canvas.getContext('2d');
            
            // 填充基础灰白色底色
            context.fillStyle = '#f2f2f2'; // 更亮的基础色
            context.fillRect(0, 0, canvas.width, canvas.height);
            
            // 添加清晰的基础纹理
            for (let i = 0; i < 12000; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const brightness = Math.random() * 60 - 30; // 增加对比度
                const baseGray = 235 + brightness;
                
                context.fillStyle = `rgb(${Math.max(0, Math.min(255, baseGray))}, ${Math.max(0, Math.min(255, baseGray))}, ${Math.max(0, Math.min(255, baseGray))})`;
                context.fillRect(x, y, 1, 1);
            }
            
            // 添加清晰的颗粒纹理
            for (let i = 0; i < 3000; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 1.2 + 0.3; // 稍大但清晰的颗粒
                const brightness = Math.random() * 80 - 40; // 高对比度
                const baseGray = 220 + brightness;
                
                context.fillStyle = `rgb(${Math.max(0, Math.min(255, baseGray))}, ${Math.max(0, Math.min(255, baseGray))}, ${Math.max(0, Math.min(255, baseGray))})`;
                context.beginPath();
                context.arc(x, y, size, 0, Math.PI * 2);
                context.fill();
            }
            
            // 添加不规则颗粒
            for (let i = 0; i < 1500; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 2 + 0.5; // 清晰的小颗粒
                const brightness = Math.random() * 100 - 50;
                const baseGray = 200 + brightness;
                
                // 创建不规则形状
                const points = 3 + Math.floor(Math.random() * 4);
                context.beginPath();
                context.moveTo(x + size, y);
                for (let p = 1; p <= points; p++) {
                    const angle = (p / points) * Math.PI * 2;
                    const radius = size * (0.6 + Math.random() * 0.8);
                    const px = x + Math.cos(angle) * radius;
                    const py = y + Math.sin(angle) * radius;
                    context.lineTo(px, py);
                }
                context.closePath();
                
                context.fillStyle = `rgb(${Math.max(0, Math.min(255, baseGray))}, ${Math.max(0, Math.min(255, baseGray))}, ${Math.max(0, Math.min(255, baseGray))})`;
                context.fill();
            }
            
            // 真实的裂缝系统 - 完全随机化
            const crackCount = Math.random() > 0.75 ? (Math.random() > 0.5 ? 1 : 2) : 0; // 75%无裂缝，其余随机1-2条
            
            for (let crackIndex = 0; crackIndex < crackCount; crackIndex++) {
                createCompletelyRandomCrack(context, canvas, crackIndex);
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            
            return texture;
        }
        
        // 创建完全随机的裂缝
        function createCompletelyRandomCrack(context, canvas, seed) {
            // 完全随机的起始点
            const startX = Math.random() * canvas.width;
            const startY = Math.random() * canvas.height;
            
            // 每个裂缝都有完全不同的DNA
            const crackDNA = {
                chaos: Math.random(),           // 混乱程度
                length: 20 + Math.random() * 120,  // 长度
                segments: 3 + Math.floor(Math.random() * 20), // 段数
                branchiness: Math.random(),     // 分支程度
                thickness: 1 + Math.random() * 4,  // 厚度
                darkness: 40 + Math.random() * 80,  // 深度
                personality: Math.random() * 10 // 个性因子
            };
            
            // 基于DNA和种子创建独特的裂缝
            drawUniqueCrack(context, startX, startY, crackDNA, seed);
        }
        
        // 绘制独特的裂缝
        function drawUniqueCrack(context, startX, startY, dna, seed) {
            let currentX = startX;
            let currentY = startY;
            let currentAngle = Math.random() * Math.PI * 2;
            let totalDistance = 0;
            
            // 为每个裂缝创建独特的颜色
            const baseColor = 160 - dna.darkness;
            const r = Math.max(0, baseColor + (Math.random() - 0.5) * 40);
            const g = Math.max(0, baseColor + (Math.random() - 0.5) * 40);
            const b = Math.max(0, baseColor + (Math.random() - 0.5) * 40);
            
            for (let seg = 0; seg < dna.segments && totalDistance < dna.length; seg++) {
                // 每段都完全不同
                const segmentSeed = seed * 1000 + seg;
                const segRandom = (x) => Math.abs(Math.sin(segmentSeed * x)) % 1;
                
                // 完全随机的段长度
                const segLength = 3 + segRandom(1.1) * 15;
                
                // 完全随机的角度变化
                const angleChange = (segRandom(2.3) - 0.5) * Math.PI * dna.chaos;
                currentAngle += angleChange;
                
                // 完全随机的宽度
                const segWidth = dna.thickness * (0.5 + segRandom(3.7) * 1.5);
                
                const nextX = currentX + Math.cos(currentAngle) * segLength;
                const nextY = currentY + Math.sin(currentAngle) * segLength;
                
                // 绘制主线
                context.strokeStyle = `rgba(${r}, ${g}, ${b}, ${0.7 + segRandom(4.1) * 0.3})`;
                context.lineWidth = segWidth;
                context.lineCap = 'round';
                
                context.beginPath();
                context.moveTo(currentX, currentY);
                context.lineTo(nextX, nextY);
                context.stroke();
                
                // 随机锯齿
                if (segRandom(5.2) > 0.3) {
                    const jaggedCount = Math.floor(segRandom(6.3) * 5) + 1;
                    for (let j = 0; j < jaggedCount; j++) {
                        const jagPos = segRandom(7.4 + j);
                        const jagX = currentX + (nextX - currentX) * jagPos;
                        const jagY = currentY + (nextY - currentY) * jagPos;
                        
                        const jagAngle = currentAngle + Math.PI/2 + (segRandom(8.5 + j) - 0.5) * Math.PI;
                        const jagLength = segWidth * (1 + segRandom(9.6 + j) * 3);
                        const jagEndX = jagX + Math.cos(jagAngle) * jagLength;
                        const jagEndY = jagY + Math.sin(jagAngle) * jagLength;
                        
                        context.strokeStyle = `rgba(${r+20}, ${g+20}, ${b+20}, ${0.3 + segRandom(10.7+j) * 0.5})`;
                        context.lineWidth = Math.max(0.3, segWidth * 0.4);
                        
                        context.beginPath();
                        context.moveTo(jagX, jagY);
                        context.lineTo(jagEndX, jagEndY);
                        context.stroke();
                    }
                }
                
                // 随机分支
                if (segRandom(11.8) < dna.branchiness && seg > 2) {
                    const branchCount = Math.floor(segRandom(12.9) * 3) + 1;
                    for (let br = 0; br < branchCount; br++) {
                        const branchAngle = currentAngle + (segRandom(13.1+br) - 0.5) * Math.PI;
                        const branchLength = segLength * (0.3 + segRandom(14.2+br) * 0.7);
                        const branchWidth = segWidth * (0.4 + segRandom(15.3+br) * 0.4);
                        
                        drawBranchSegment(context, currentX, currentY, branchLength, branchAngle, branchWidth, r, g, b, segmentSeed + br);
                    }
                }
                
                // 随机损伤点
                if (segRandom(16.4) > 0.6) {
                    const damageCount = Math.floor(segRandom(17.5) * 4) + 1;
                    for (let d = 0; d < damageCount; d++) {
                        const damPos = segRandom(18.6 + d);
                        const damX = currentX + (nextX - currentX) * damPos + (segRandom(19.7+d) - 0.5) * 15;
                        const damY = currentY + (nextY - currentY) * damPos + (segRandom(20.8+d) - 0.5) * 15;
                        const damSize = segRandom(21.9+d) * 3 + 0.5;
                        
                        context.fillStyle = `rgba(${r}, ${g}, ${b}, ${0.3 + segRandom(22.1+d) * 0.5})`;
                        context.beginPath();
                        context.arc(damX, damY, damSize, 0, Math.PI * 2);
                        context.fill();
                    }
                }
                
                currentX = nextX;
                currentY = nextY;
                totalDistance += segLength;
                
                // 随机停顿和大转向
                if (segRandom(23.2) > 0.85) {
                    currentAngle += (segRandom(24.3) - 0.5) * Math.PI;
                }
            }
        }
        
        // 绘制分支段
        function drawBranchSegment(context, startX, startY, length, angle, width, r, g, b, seed) {
            const branchRandom = (x) => Math.abs(Math.sin(seed * x)) % 1;
            
            const endX = startX + Math.cos(angle) * length;
            const endY = startY + Math.sin(angle) * length;
            
            // 分支可能有自己的分段
            const subSegments = Math.floor(branchRandom(1.1) * 3) + 1;
            let currentX = startX;
            let currentY = startY;
            let currentAngle = angle;
            
            for (let sub = 0; sub < subSegments; sub++) {
                const subLength = length / subSegments;
                currentAngle += (branchRandom(2.2 + sub) - 0.5) * 0.5;
                
                const nextX = currentX + Math.cos(currentAngle) * subLength;
                const nextY = currentY + Math.sin(currentAngle) * subLength;
                
                context.strokeStyle = `rgba(${r+10}, ${g+10}, ${b+10}, ${0.5 + branchRandom(3.3+sub) * 0.4})`;
                context.lineWidth = width * (1 - sub * 0.2);
                context.lineCap = 'round';
                
                context.beginPath();
                context.moveTo(currentX, currentY);
                context.lineTo(nextX, nextY);
                context.stroke();
                
                currentX = nextX;
                currentY = nextY;
            }
        }
        
        // 创建墙壁法线贴图（用于真正的凹凸效果）
        function createWallNormalMap() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const context = canvas.getContext('2d');
            
            // 填充中性法线颜色 (128, 128, 255) = 法线向外
            context.fillStyle = 'rgb(128, 128, 255)';
            context.fillRect(0, 0, canvas.width, canvas.height);
            
            // 添加颗粒的法线扰动
            for (let i = 0; i < 3000; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 1.2 + 0.3;
                const intensity = Math.random() * 0.3 + 0.1; // 大幅减少强度
                
                // 创建径向渐变来模拟凸起的法线
                const gradient = context.createRadialGradient(x, y, 0, x, y, size * 2);
                
                // 中心：轻微向外的法线 (稍微亮的蓝色)
                gradient.addColorStop(0, `rgb(128, 128, ${Math.floor(255 * (0.9 + intensity * 0.1))})`);
                // 边缘：很轻微向外倾斜的法线
                gradient.addColorStop(0.5, `rgb(${Math.floor(128 + intensity * 20)}, ${Math.floor(128 + intensity * 20)}, 240)`);
                // 外围：回到中性
                gradient.addColorStop(1, 'rgb(128, 128, 255)');
                
                context.fillStyle = gradient;
                context.beginPath();
                context.arc(x, y, size * 2, 0, Math.PI * 2);
                context.fill();
            }
            
            // 添加不规则颗粒的法线
            for (let i = 0; i < 1500; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 2 + 0.5;
                const intensity = Math.random() * 0.2 + 0.1; // 减少强度
                
                // 为不规则颗粒创建更复杂的法线
                const points = 3 + Math.floor(Math.random() * 4);
                context.beginPath();
                context.moveTo(x + size, y);
                for (let p = 1; p <= points; p++) {
                    const angle = (p / points) * Math.PI * 2;
                    const radius = size * (0.6 + Math.random() * 0.8);
                    const px = x + Math.cos(angle) * radius;
                    const py = y + Math.sin(angle) * radius;
                    context.lineTo(px, py);
                }
                context.closePath();
                
                // 为不规则形状创建轻微的法线颜色
                const normalR = Math.floor(128 + (Math.random() - 0.5) * intensity * 30);
                const normalG = Math.floor(128 + (Math.random() - 0.5) * intensity * 30);
                const normalB = Math.floor(250 + intensity * 5);
                
                context.fillStyle = `rgb(${Math.max(0, Math.min(255, normalR))}, ${Math.max(0, Math.min(255, normalG))}, ${Math.max(0, Math.min(255, normalB))})`;
                context.fill();
            }
            
            // 添加细小的凹陷（法线向内）
            for (let i = 0; i < 800; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 1.5 + 0.2;
                
                // 轻微凹陷的法线向内 (稍暗的蓝色)
                const gradient = context.createRadialGradient(x, y, 0, x, y, size);
                gradient.addColorStop(0, 'rgb(128, 128, 220)'); // 中心轻微凹陷
                gradient.addColorStop(1, 'rgb(128, 128, 255)'); // 边缘正常
                
                context.fillStyle = gradient;
                context.beginPath();
                context.arc(x, y, size, 0, Math.PI * 2);
                context.fill();
            }
            
            // 添加细微的表面变化
            for (let i = 0; i < 8000; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const variation = Math.random() * 10 - 5; // 减少变化
                
                context.fillStyle = `rgb(${128 + variation}, ${128 + variation}, ${255 + variation})`;
                context.fillRect(x, y, 1, 1);
            }
            
            // 添加大的撞击裂缝的法线效果（对应漫反射贴图）
            for (let i = 0; i < 3; i++) {
                const centerX = Math.random() * canvas.width;
                const centerY = Math.random() * canvas.height;
                const crackLength = Math.random() * 80 + 40;
                const mainAngle = Math.random() * Math.PI * 2;
                
                // 主裂缝的法线（深凹陷）
                context.strokeStyle = 'rgb(128, 128, 160)'; // 深凹陷的法线（向内）
                context.lineWidth = 3 + Math.random() * 2;
                context.lineCap = 'round';
                
                context.beginPath();
                let currentX = centerX;
                let currentY = centerY;
                context.moveTo(currentX, currentY);
                
                // 绘制主裂缝的法线路径
                const segments = 8;
                for (let seg = 1; seg <= segments; seg++) {
                    const segmentLength = crackLength / segments;
                    const currentAngle = mainAngle + (Math.random() - 0.5) * 0.8;
                    
                    currentX += Math.cos(currentAngle) * segmentLength + (Math.random() - 0.5) * 15;
                    currentY += Math.sin(currentAngle) * segmentLength + (Math.random() - 0.5) * 15;
                    
                    currentX = Math.max(5, Math.min(canvas.width - 5, currentX));
                    currentY = Math.max(5, Math.min(canvas.height - 5, currentY));
                    
                    context.lineTo(currentX, currentY);
                }
                context.stroke();
                
                // 分支裂缝的法线
                const branches = 2 + Math.floor(Math.random() * 3);
                for (let branch = 0; branch < branches; branch++) {
                    const branchStartProgress = 0.2 + Math.random() * 0.6;
                    const branchStartX = centerX + Math.cos(mainAngle) * crackLength * branchStartProgress * 0.5;
                    const branchStartY = centerY + Math.sin(mainAngle) * crackLength * branchStartProgress * 0.5;
                    
                    const branchAngle = mainAngle + (Math.random() - 0.5) * Math.PI;
                    const branchLength = crackLength * (0.3 + Math.random() * 0.4);
                    
                    context.strokeStyle = 'rgb(128, 128, 180)'; // 分支裂缝稍浅
                    context.lineWidth = 1.5 + Math.random() * 1;
                    
                    context.beginPath();
                    context.moveTo(branchStartX, branchStartY);
                    
                    let branchX = branchStartX;
                    let branchY = branchStartY;
                    const branchSegments = 4;
                    for (let bSeg = 1; bSeg <= branchSegments; bSeg++) {
                        const bSegmentLength = branchLength / branchSegments;
                        const bCurrentAngle = branchAngle + (Math.random() - 0.5) * 0.6;
                        
                        branchX += Math.cos(bCurrentAngle) * bSegmentLength + (Math.random() - 0.5) * 8;
                        branchY += Math.sin(bCurrentAngle) * bSegmentLength + (Math.random() - 0.5) * 8;
                        
                        branchX = Math.max(5, Math.min(canvas.width - 5, branchX));
                        branchY = Math.max(5, Math.min(canvas.height - 5, branchY));
                        
                        context.lineTo(branchX, branchY);
                    }
                    context.stroke();
                }
                
                // 撞击区域的法线凹陷效果
                const damageRadius = 15 + Math.random() * 10;
                const damageGradient = context.createRadialGradient(centerX, centerY, 0, centerX, centerY, damageRadius);
                damageGradient.addColorStop(0, 'rgb(128, 128, 200)'); // 中心凹陷
                damageGradient.addColorStop(0.4, 'rgb(128, 128, 230)'); // 逐渐向外
                damageGradient.addColorStop(1, 'rgb(128, 128, 255)'); // 边缘正常
                
                context.fillStyle = damageGradient;
                context.beginPath();
                context.arc(centerX, centerY, damageRadius, 0, Math.PI * 2);
                context.fill();
            }
            
            const normalTexture = new THREE.CanvasTexture(canvas);
            normalTexture.wrapS = THREE.RepeatWrapping;
            normalTexture.wrapT = THREE.RepeatWrapping;
            
            return normalTexture;
        }
        
        // 生成迷宫
        // =====================================================
        // 教学楼主体生成函数
        // 建筑：3层，每层3间教室+走廊，右侧楼梯间
        // =====================================================
        // ══════════════════════════════════════════════════════
        // 校园布局
        // 教学楼: X:-20~20, Z:-8~9 （40×17m）
        // 校园总范围: X:-50~50, Z:-35~65 （100×100m，约6倍）
        //   操场: X:-40~40, Z:18~58（南侧大操场）
        //   办公楼: X:-50~-22, Z:-8~12（西侧）
        //   公厕: 西 X≈-98~-78、东 X≈78~98，Z≈-27~-13（北移与教学楼错层，南向外开门）
        //   校门: 南围墙中央 Z=65, X:-5~5
        // ══════════════════════════════════════════════════════
        /** 参考图：下粗上细棱柱干 + 竖纹树皮；棕色枝条接到多颗二十面体冠（青柠绿、哑光分面）；无地面碎块 */
        function addLowPolyTree(x, z, h, cr, cc) {
            if (window._skipVisualMesh) return;
            const crownReach = (cr || 1.8) * 2.2 + 1.5;
            if (x + crownReach > 61 && x - crownReach < 83 && z + crownReach > -22.5 && z - crownReach < -9.5) return;
            if (x + crownReach > 18 && x - crownReach < 40 && z + crownReach > -23.5 && z - crownReach < -12) return;
            buildDetailTextures();
            const T = window._dtex || {};
            const LIME = 0xa2f55c;
            const colMain = (cc != null && cc !== undefined) ? cc : LIME;
            const r0 = (colMain >> 16) & 255, g0 = (colMain >> 8) & 255, b0 = colMain & 255;
            const darkHex = (Math.max(10, r0 - 48) << 16) | (Math.max(20, g0 - 58) << 8) | Math.max(12, b0 - 38);
            const trunkMat = new THREE.MeshLambertMaterial({
                color: 0x6b4428, flatShading: true, map: T.treeBark || null
            });
            if (T.treeBark) { trunkMat.map.repeat.set(1.25, 3.2); }
            const branchMat = new THREE.MeshLambertMaterial({ color: 0x5c3d26, flatShading: true });
            const crownL = new THREE.MeshLambertMaterial({ color: colMain, flatShading: true });
            const crownD = new THREE.MeshLambertMaterial({ color: darkHex, flatShading: true });
            const sh = (m) => { m.castShadow = true; m.receiveShadow = true; };
            const yUp = new THREE.Vector3(0, 1, 0);

            const seg = 7;
            const trunkH = h * 0.88;
            const rBot = cr * 0.195;
            const rTop = cr * 0.048;
            const trunk = new THREE.Mesh(
                new THREE.CylinderGeometry(rTop, rBot, trunkH, seg),
                trunkMat
            );
            trunk.position.set(x, trunkH * 0.5 + h * 0.06, z);
            sh(trunk); scene.add(trunk);

            const flare = new THREE.Mesh(
                new THREE.CylinderGeometry(cr * 0.09, rBot * 0.98, h * 0.1, seg),
                trunkMat
            );
            flare.position.set(x, h * 0.05, z);
            sh(flare); scene.add(flare);

            const addClump = (px, py, pz, sc, mat, rx, ry, rz) => {
                const m = new THREE.Mesh(new THREE.IcosahedronGeometry(sc, 0), mat);
                m.position.set(px, py, pz);
                m.rotation.set(rx, ry, rz);
                sh(m); scene.add(m);
            };

            const hy = h * 0.98;
            const clumps = [
                [0, 1.05, 0, 0.98, 'L', 0.2, 0, 0.15],
                [0.55, 0.62, 0.28, 0.62, 'D', -0.25, 1.1, 0.1],
                [-0.48, 0.65, -0.32, 0.58, 'L', 0.15, 2.4, -0.12],
                [0.42, 0.88, -0.38, 0.52, 'D', -0.18, 0.6, 0.22],
                [-0.35, 0.55, 0.52, 0.48, 'L', 0.28, 4.2, -0.08],
                [0.28, 1.18, 0.22, 0.58, 'L', -0.12, 5.1, 0.18],
                [-0.52, 0.78, 0.15, 0.45, 'D', 0.22, 3.3, 0.14],
                [0.62, 0.72, -0.12, 0.42, 'L', 0.1, 1.8, -0.2],
                [0, 1.32, -0.42, 0.5, 'D', 0.3, 0.9, -0.25],
                [-0.22, 1.12, 0.48, 0.44, 'L', -0.15, 4.7, 0.12],
                [0.18, 0.48, -0.58, 0.38, 'D', 0.35, 2.9, -0.1],
                [-0.58, 0.92, -0.22, 0.4, 'L', 0.08, 5.6, 0.05],
                [0.35, 0.95, 0.55, 0.36, 'D', -0.22, 1.4, 0.28]
            ];

            function branchWorld(ax, ay, az, bx, by, bz, radA, radB) {
                const dir = new THREE.Vector3(bx - ax, by - ay, bz - az);
                const len = dir.length();
                if (len < 0.04) return;
                dir.multiplyScalar(1 / len);
                const mid = new THREE.Vector3((ax + bx) * 0.5, (ay + by) * 0.5, (az + bz) * 0.5);
                const cyl = new THREE.Mesh(new THREE.CylinderGeometry(radB, radA, len, 5), branchMat);
                cyl.position.copy(mid);
                cyl.quaternion.setFromUnitVectors(yUp, dir);
                sh(cyl); scene.add(cyl);
            }

            clumps.forEach(([ox, oy, oz, sc, tag, rx, ry, rz]) => {
                const px = x + ox * cr;
                const py = hy + oy * cr;
                const pz = z + oz * cr;
                const mat = tag === 'D' ? crownD : crownL;
                const rCl = Math.max(0.12, sc * cr);
                addClump(px, py, pz, rCl, mat, rx, ry, rz);
                const horiz = Math.sqrt(ox * ox + oz * oz);

            } // 闭合 if (!_moonPhaseTex)；否则后续树木/远景整段被包进该 if，脚本大括号错位 → 末尾语法错误、初始化卡住

            { const cv=document.createElement('canvas'); cv.width=512; cv.height=512;
              const c=cv.getContext('2d');
              // 勾缝底色（深灰）
              c.fillStyle='#9a9690'; c.fillRect(0,0,512,512);
              // 2×2 大砖格（每砖256px=600mm比例）
              const TILE=2;
              for(let r=0;r<TILE;r++) for(let col=0;col<TILE;col++){
                const x=col*256+4, y=r*256+4, w=248, h=248;

                c.fillStyle=`rgb(${base},${base-3},${base-8})`; c.fillRect(x,y,w,h);
                // 大理石纹（随机浅色条纹）
                c.save(); c.beginPath(); c.rect(x,y,w,h); c.clip();
                for(let i=0;i<6;i++){
                  const lx=x+Math.abs((r*113+col*79+i*47)%w);

              const t=new THREE.CanvasTexture(cv); t.wrapS=t.wrapT=THREE.RepeatWrapping; T.ceiling=t; }

            // ── 7. 木纹纹理（桌椅，对比更强的年轮曲线）──
            { const cv=document.createElement('canvas'); cv.width=256; cv.height=128;

            { const cv=document.createElement('canvas'); cv.width=256; cv.height=256;

              const t=new THREE.CanvasTexture(cv); t.wrapS=t.wrapT=THREE.RepeatWrapping; T.concrete=t; }

            { const cv=document.createElement('canvas'); cv.width=256; cv.height=512;

                  g.addColorStop(0,'#d8eef8'); g.addColorStop(0.45,'#a4c4dc'); g.addColorStop(1,'#5f7a94');
                  c.fillStyle=g; c.fillRect(x,yy,w,h);
                  c.strokeStyle='rgba(30,38,48,0.5)'; c.lineWidth=1;

              const t=new THREE.CanvasTexture(cv); t.wrapS=t.wrapT=THREE.RepeatWrapping; T.cityFacade=t; }

            // ── 9. 树干竖纹树皮（低多边形树）──
            { const cv=document.createElement('canvas'); cv.width=64; cv.height=256;
              const c=cv.getContext('2d');
              for(let y=0;y<256;y++){
                const n=Math.sin(y*0.11)*7+Math.sin(y*0.035)*4;
                const br=78+n, g=46+n*0.55, b=24+n*0.4;

                c.fillRect(0,y,64,1);
              }
              for(let i=0;i<70;i++){
                c.strokeStyle='rgba(18,9,4,'+(0.07+Math.random()*0.14)+')';
                c.lineWidth=0.8+Math.random()*1.2;
                c.beginPath();
                const x0=Math.random()*64;
                c.moveTo(x0,0); c.lineTo(x0+Math.random()*8-4,256); c.stroke();
              }

              t.wrapS=t.wrapT=THREE.RepeatWrapping;

            T._buildId = 'tex18';

        // ══════════════════════════════════════════════════════════════════════
        // 细节增强系统：InstancedMesh 10万+微几何体 + 建筑构件 + 光照升级
        // ══════════════════════════════════════════════════════════════════════
        function addDetailMeshes() {
            const T = buildDetailTextures();
            // 局部辅助：装饰几何体（无碰撞）
            function vbD(x,y,z,w,h,d,color,alpha){
                const opt=alpha!=null&&alpha<1?{color,transparent:true,opacity:alpha}:{color};
                const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshLambertMaterial(opt));
                m.position.set(x,y,z); m.castShadow=false;
                m._noMerge=true; // 每次重建，不参与几何体合并缓存
                scene.add(m); return m;
            }

            // 四栋楼数据 [rooms:[x1,x2,z1,z2], corr:[x1,x2,z1,z2], floors, floorH]
            const BLDGS=[
              {rooms:[[-20,-8,-8,5],[-8,4,-8,5],[4,14,-8,5]], corr:[-20,14,5,9],   fl:3,fh:4},
              {rooms:[[-20,-8,-70,-57],[-8,4,-70,-57],[4,14,-70,-57]], corr:[-20,14,-57,-53], fl:3,fh:4},
              {rooms:[[55,67,-8,5],[67,79,-8,5],[79,89,-8,5]], corr:[55,89,5,9],    fl:3,fh:4},
              {rooms:[[-89,-77,-8,5],[-77,-65,-8,5],[-65,-55,-8,5]], corr:[-89,-55,5,9], fl:3,fh:4},
            ];

            // 1 & 2. 密集地砖 InstancedMesh 已删除（改用楼板材质直接呈现）

            // ─────────────────────────────────────────────────────────────────
            // 3. 室内吊顶板（0.6m×0.6m×1.5cm，约18,000个）
            // ─────────────────────────────────────────────────────────────────
            {
              const S=0.6, H=0.015;
              const geo=new THREE.BoxGeometry(S-0.04,H,S-0.04);
              const ceilT=T.ceiling.clone(); ceilT.repeat.set(1,1);
              const mat=new THREE.MeshLambertMaterial({color:0xfaf8f4,map:ceilT});
              let tot=0;
              BLDGS.forEach(b=>{
                for(let f=0;f<b.fl;f++){
                  b.rooms.forEach(([x1,x2,z1,z2])=>{ tot+=Math.floor((x2-x1)/S)*Math.floor((z2-z1)/S); });
                  const [cx1,cx2,cz1,cz2]=b.corr;
                  tot+=Math.floor((cx2-cx1)/S)*Math.floor((cz2-cz1)/S);
                }
              });
              const inst=new THREE.InstancedMesh(geo,mat,tot);
              const M=new THREE.Matrix4(); let idx=0;
              BLDGS.forEach(b=>{
                for(let f=0;f<b.fl;f++){
                  const yp=(f+1)*b.fh-H/2-0.003;
                  b.rooms.forEach(([x1,x2,z1,z2])=>{
                    const nx=Math.floor((x2-x1)/S),nz=Math.floor((z2-z1)/S);
                    for(let xi=0;xi<nx;xi++) for(let zi=0;zi<nz;zi++){
                      M.makeTranslation(x1+(xi+0.5)*S,yp,z1+(zi+0.5)*S);
                      inst.setMatrixAt(idx++,M);
                    }
                  });
                  const [cx1,cx2,cz1,cz2]=b.corr;
                  const nx=Math.floor((cx2-cx1)/S),nz=Math.floor((cz2-cz1)/S);
                  for(let xi=0;xi<nx;xi++) for(let zi=0;zi<nz;zi++){
                    M.makeTranslation(cx1+(xi+0.5)*S,yp,cz1+(zi+0.5)*S);
                    inst.setMatrixAt(idx++,M);
                  }
                }
              });
              inst.instanceMatrix.needsUpdate=true; scene.add(inst);
              console.log(`🔲 吊顶板 ${tot}块`);
            }

            // 4. 室外广场密集小砖 InstancedMesh 已删除（改由 createCampus 大块铺装纹理）

            // 5. 草坪草叶已删除（用户要求：删除密集绿色小柱子）

            // ─────────────────────────────────────────────────────────────────
            // 6. 外墙砖浮雕已删除（改为光滑外墙）
            // ─────────────────────────────────────────────────────────────────
            if (false) {
              const bW=0.24,bH=0.065,bDp=0.042;
              const geo=new THREE.BoxGeometry(bW,bH,bDp);
              const bT=T.brick.clone(); bT.repeat.set(1,1);
              const mat=new THREE.MeshLambertMaterial({color:0xd09070,map:bT});
              // [面中心X, 面Z(墙外表面中心), 建筑宽度, 全楼高12m, Z朝向]
              const faces=[
                [0,   9.15, 40,12, 1],[0,  -8.15,40,12,-1],   // B1南北面
                [0, -52.85,40,12, 1],[0, -70.15,40,12,-1],   // B2
                [75,  9.15,40,12, 1],[75, -8.15,40,12,-1],   // B3
                [-75, 9.15,40,12, 1],[-75,-8.15,40,12,-1],   // B4
              ];
              let tot=0;
              faces.forEach(([,,fw,fh])=>{ tot+=Math.floor(fw/(bW+0.01))*Math.floor(fh/(bH+0.012)); });
              const inst=new THREE.InstancedMesh(geo,mat,tot);
              inst.castShadow=false;
              // 每个立面的门洞/窗洞跳过区域（相对绝对坐标）
              // B1/B3/B4南面主大门: cx=0,75,-75, cz=9.15 → 大门EX=0,ENTR_W=3.5,ENTR_H=2.8
              const skipZones=new Map([
                ['0_9.15',   [{x1:-2.0,x2:2.0,y1:0,y2:2.95}]],  // B1主大门
                ['75_9.15',  [{x1:73,x2:77,y1:0,y2:2.95}]],       // B3门口
                ['-75_9.15', [{x1:-77,x2:-73,y1:0,y2:2.95}]],     // B4门口
                ['0_-52.85', [{x1:-2.0,x2:2.0,y1:0,y2:2.95}]],  // B2主门
              ]);
              const M=new THREE.Matrix4(); let idx=0;
              faces.forEach(([cx,cz,fw,fh])=>{
                const cols=Math.floor(fw/(bW+0.01));
                const rows=Math.floor(fh/(bH+0.012));
                const startX=cx-fw/2;
                const zKey=`${cx}_${cz}`;
                const zones=skipZones.get(zKey)||[];
                for(let r=0;r<rows;r++){
                  const off=(r%2)*(bW+0.01)/2;
                  const y=0.04+r*(bH+0.012);
                  for(let col=0;col<cols;col++){
                    const x=startX+off+col*(bW+0.01)+bW/2;
                    const skip=zones.some(z=>x>=z.x1&&x<=z.x2&&y<=z.y2);
                    if(!skip){ M.makeTranslation(x,y,cz); inst.setMatrixAt(idx++,M); }
                  }
                }
              });
              inst.count=idx; // 仅渲染实际放置的砖块（跳过门洞后数量减少）
              inst.instanceMatrix.needsUpdate=true; scene.add(inst);
              console.log(`🧱 外墙砖浮雕 ${idx}块（含门洞镂空）`);
            }

            // ─────────────────────────────────────────────────────────────────
            // 7. 走廊二三楼护栏（InstancedMesh立柱+扶手）
            // ─────────────────────────────────────────────────────────────────
            {
              const postGeo=new THREE.BoxGeometry(0.05,0.88,0.05);
              const postMat=new THREE.MeshLambertMaterial({color:0xb8b0a8});
              const SPACE=0.55;
              const railDefs=[
                [-20,14,9,  [1,2]],  // B1走廊南墙护栏(2F,3F)
                [-20,14,-53,[1,2]],  // B2
                [55,89,  9, [1,2]],  // B3
                [-89,-55,9, [1,2]],  // B4
              ];
              let tot=0;
              railDefs.forEach(([x1,x2,,floors])=>{ tot+=Math.floor((x2-x1)/SPACE)*floors.length; });
              const posts=new THREE.InstancedMesh(postGeo,postMat,tot);
              const M=new THREE.Matrix4(); let idx=0;
              railDefs.forEach(([x1,x2,z,floors])=>{
                const n=Math.floor((x2-x1)/SPACE);
                floors.forEach(f=>{
                  const y=f*4+0.44;
                  for(let i=0;i<n;i++){
                    M.makeTranslation(x1+(i+0.5)*SPACE,y,z-0.06);
                    posts.setMatrixAt(idx++,M);
                  }
                });
              });
              posts.instanceMatrix.needsUpdate=true; scene.add(posts);
              // 扶手横杆
              railDefs.forEach(([x1,x2,z,floors])=>{
                const cx=(x1+x2)/2, len=x2-x1;
                floors.forEach(f=>{
                  vbD(cx,f*4+0.88,z-0.06, len,0.05,0.05, 0xa8a098);

              console.log(`🚧 护栏立柱 ${tot}根`);
            }

            // ─────────────────────────────────────────────────────────────────
            // 8. 外墙空调挂机（每楼每层3台，共36台）
            // ─────────────────────────────────────────────────────────────────
            {
              const acFaces=[
                [0,   9.18],[0,  -53.18],
                [75,  9.18],[-75, 9.18],
              ];
              acFaces.forEach(([cx,cz])=>{
                for(let f=0;f<3;f++){
                  [-13,-1,11].forEach(ox=>{
                    const ax=cx+ox, ay=f*4+2.85, az=cz;
                    vbD(ax,ay,az, 0.88,0.52,0.34, 0xd4d0cc);       // 机身
                    vbD(ax,ay,az+0.17*(cz>0?1:-1), 0.80,0.44,0.05, 0x888880); // 格栅
                    for(let g=-2;g<=2;g++) vbD(ax,ay+g*0.065,az+0.19*(cz>0?1:-1), 0.80,0.012,0.04, 0x77776f);
                    vbD(ax+0.38,ay-0.45,az-0.08*(cz>0?1:-1), 0.03,0.9,0.03, 0x909090); // 排水管
                  });
                }
              });
            }

            // ─────────────────────────────────────────────────────────────────
            // 9. 建筑四角雨水管（圆柱，高12m）
            // ─────────────────────────────────────────────────────────────────
            {
              const corners=[
                [-20,9],[-20,-8],[20,9],[20,-8],
                [-20,-53],[-20,-70],[20,-53],[20,-70],
                [55,9],[55,-8],[95,9],[95,-8],
                [-95,9],[-95,-8],[-55,9],[-55,-8],
              ];
              const pipeMat=new THREE.MeshLambertMaterial({color:0x888888});
              corners.forEach(([px,pz])=>{
                const pipe=new THREE.Mesh(new THREE.CylinderGeometry(0.045,0.045,12,6),pipeMat);
                pipe.position.set(px,6,pz); pipe._noMerge=true; scene.add(pipe);
                for(let y=1;y<12;y+=3) vbD(px,y,pz,0.13,0.06,0.13,0x777777);
