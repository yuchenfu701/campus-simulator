                console.log('⚠️ GLTFLoader不可用，使用简单模型');
                const simpleSoldier = createSimpleSoldier();
                initializeSoldier(simpleSoldier);
            }
        }
        
        // 创建自定义滑铲动画，基于现有动画
        function createSlideAnimation(animations) {
            // 查找现有的动画剪辑作为基础
            const baseAnim = animations.find(a => a.name === 'Jump') || animations.find(a => a.name === 'Run');
            if (!baseAnim) return null;
            
            // 创建滑铲动画 - 复制基础动画，但修改某些特性
            const slideClip = THREE.AnimationClip.parse(THREE.AnimationClip.toJSON(baseAnim));
            slideClip.name = 'Slide';
            
            // 设置为不循环，滑铲是一次性动作
            const slideAction = mixer.clipAction(slideClip);
            slideAction.loop = THREE.LoopOnce;
            slideAction.clampWhenFinished = true; // 播放完成后保持最后一帧
            
            // 降低播放速度，以便更好地配合滑铲姿势
            slideAction.timeScale = 0.5;
            
            return slideAction;
        }
        
        // 创建自定义下蹲动画，基于现有动画
        function createCrouchAnimation(animations) {
            // 查找现有的动画剪辑作为基础
            const baseAnim = animations.find(a => a.name === 'Idle') || animations.find(a => a.name === 'Walk');
            if (!baseAnim) return null;
            
            // 创建下蹲动画 - 复制基础动画，但修改某些特性
            const crouchClip = THREE.AnimationClip.parse(THREE.AnimationClip.toJSON(baseAnim));
            crouchClip.name = 'Crouch';
            
            // 下蹲动画需要循环播放，因为可能会长时间处于下蹲状态
            const crouchAction = mixer.clipAction(crouchClip);
            crouchAction.timeScale = 0.5; // 减慢动画速度
            
            return crouchAction;
        }
        
        // 在两个动画之间平滑过渡
        function fadeToAction(newAction, duration = 0.5) {
            if (currentAction !== newAction) {
                currentAction.fadeOut(duration);
                newAction.reset().fadeIn(duration).play();
                currentAction = newAction;
                
                // 更新调试信息
                let animationName = '空闲';
                if (currentAction === runAction) animationName = '奔跑';
                if (currentAction === jumpAction) animationName = '跳跃';
                
                document.getElementById('animation').textContent = animationName;
            }
        }
        
        // 处理窗口大小调整
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            const pr = window._gfxTier === 'low' ? 1 : (window._gfxTier === 'medium'
                ? Math.min(1.5, window.devicePixelRatio || 1) : Math.min(2, window.devicePixelRatio || 1));
            renderer.setPixelRatio(pr);
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // 检测碰撞
        function checkCollision(position) {
            // 如果在穿墙模式下，直接返回false（没有碰撞）
            if (isNoclipMode) {
                return false;
            }
            
            // 创建士兵的简化碰撞模型（一个垂直的圆柱体）
            const soldierCollider = {
                radius: SOLDIER_RADIUS,
                position: position
            };
            
            // 检查当前是否站在墙顶上
            const groundCheck = checkGroundCollision(position.y);
            const isOnWallTop = groundCheck.onGround && groundCheck.groundY > GROUND_LEVEL + 0.1;
            
            // 检查所有墙壁
            for (const wall of walls) {
                // 简化碰撞检测：检查士兵的圆柱体是否与墙壁的边界盒相交
                const wallBbox = wall.bbox;
                
                // 如果玩家在这面墙的顶部，允许在墙顶上移动
                if (isOnWallTop) {
                    const wallTop = wallBbox.max.y;
                    // 检查是否在当前墙的顶部
                    const closestX = Math.max(wallBbox.min.x, Math.min(position.x, wallBbox.max.x));
                    const closestZ = Math.max(wallBbox.min.z, Math.min(position.z, wallBbox.max.z));
                    const distanceX = position.x - closestX;
                    const distanceZ = position.z - closestZ;
                    const horizontalDistance = Math.sqrt(distanceX * distanceX + distanceZ * distanceZ);
                    
                    // 如果在墙顶范围内，且高度合适，允许移动
                    if (horizontalDistance <= soldierCollider.radius && 
                        Math.abs(position.y - wallTop) < 0.5) {
                        continue; // 跳过这面墙的碰撞检测
                    }
                }
                
                // 只检查侧面碰撞（墙的侧面）
                // 计算圆柱体到边界盒的最近点（只考虑水平平面）
                const closestX = Math.max(wallBbox.min.x, Math.min(soldierCollider.position.x, wallBbox.max.x));
                const closestZ = Math.max(wallBbox.min.z, Math.min(soldierCollider.position.z, wallBbox.max.z));
                
                // 计算水平距离
                const distanceX = soldierCollider.position.x - closestX;
                const distanceZ = soldierCollider.position.z - closestZ;
                const distanceSquared = distanceX * distanceX + distanceZ * distanceZ;
                
                // 检查垂直位置范围 - 只在墙的高度范围内检测侧面碰撞
                const playerBottom = soldierCollider.position.y - 0.5; // 玩家脚部
                const playerTop = soldierCollider.position.y + 1.8; // 玩家头部
                const wallBottom = wallBbox.min.y;
                const wallTop = wallBbox.max.y;
                
                // 只有当玩家躯干（腰部到胸部）与墙体高度重叠时才检测侧面碰撞
                // 使用缩小的范围防止跳跃时穿越楼板/薄墙
                const torsoBottom = soldierCollider.position.y - 0.1;  // 脚踝以上
                const torsoTop    = soldierCollider.position.y + 1.4;   // 肩膀以下（不含头顶）
                const wallThick   = wallTop - wallBottom;
                // 薄层结构（楼板，厚度<0.5m）只在玩家正好处于其内部时才产生侧碰撞
                const isSlab      = wallThick < 0.5;
                const verticalOverlap = isSlab
                    ? (torsoBottom < wallTop && torsoBottom > wallBottom - 0.05)
                    : (torsoTop > wallBottom && torsoBottom < wallTop);
                
                // 如果距离小于半径且有垂直重叠，则发生侧面碰撞
                if (distanceSquared < (soldierCollider.radius * soldierCollider.radius) && verticalOverlap) {
                    return true;
                }
            }
            
            return false;
        }
        
        // 鼠标锁定相关函数
        function lockPointer() {
            if (typeof CampusSettings !== 'undefined' && CampusSettings.isMobileMode()) {
                return;
            }
            if (!isMouseLocked) {
                renderer.domElement.requestPointerLock = 
                    renderer.domElement.requestPointerLock || 
                    renderer.domElement.mozRequestPointerLock || 
                    renderer.domElement.webkitRequestPointerLock;
                
                renderer.domElement.requestPointerLock();
            }
        }
        
        function onPointerLockChange() {
            isMouseLocked = (document.pointerLockElement === renderer.domElement || 
                            document.mozPointerLockElement === renderer.domElement || 
                            document.webkitPointerLockElement === renderer.domElement);
        }
        
        // 添加新的事件处理函数
        function onMouseMove(event) {
            if (!soldier || !isMouseLocked) return;
            
            // 计算鼠标移动的相对位置
            const movementX = event.movementX || event.mozMovementX || event.webkitMovementX || 0;
            const movementY = event.movementY || event.mozMovementY || event.webkitMovementY || 0;
            
            // 更新水平角度（左右旋转）
            cameraHorizontalAngle -= movementX * MOUSE_SENSITIVITY;
            
            // 在第一人称视角下才更新垂直角度
            if (isFirstPerson) {
                // 更新垂直角度（上下旋转），将符号取反使其符合直觉
                cameraVerticalAngle -= movementY * MOUSE_SENSITIVITY;
                
                // 限制垂直视角范围，防止过度旋转
                cameraVerticalAngle = Math.max(-Math.PI * 0.45, Math.min(Math.PI * 0.45, cameraVerticalAngle));
            }
            
            // 更新相机旋转 - 直接更新相机旋转，而不是等待下一帧
            updateCameraRotation();
            
            // 更新士兵的朝向以匹配相机的水平旋转
            soldier.rotation.y = cameraHorizontalAngle;
        }
        
        // 新增函数：更新相机旋转
        function updateCameraRotation() {
            // 重置相机的旋转
            camera.rotation.set(0, 0, 0);
            
            // 创建一个临时的欧拉角对象，设置正确的旋转顺序
            const euler = new THREE.Euler(0, 0, 0, 'YXZ');
            
            // 先应用Y轴旋转（水平方向）
            euler.y = cameraHorizontalAngle;
            
            // 再应用X轴旋转（垂直方向）
            euler.x = cameraVerticalAngle;
            
            // 将欧拉角直接应用到相机
            camera.rotation.copy(euler);
        }
        
        // 更新相机位置
        function updateCamera() {
            if (!soldier) return;
            
            if (isFirstPerson) {
                // 第一人称视角 - 直接设置位置而不是插值，减少延迟感
                camera.position.set(
                    soldier.position.x,
                    soldier.position.y + normalHeight, // 使用考虑下蹲状态的高度
                    soldier.position.z
                );
                
                // 确保相机旋转是最新的
                updateCameraRotation();
            } else {
                // 第三人称视角 - 优化的跟随逻辑
                // 计算相机应该在的理想位置（角色后方）
                const cameraOffset = new THREE.Vector3(0, 0, THIRD_PERSON_DISTANCE);
                
                // 应用水平旋转，让相机跟随角色朝向
                cameraOffset.applyAxisAngle(new THREE.Vector3(0, 1, 0), cameraHorizontalAngle);
                
                // 计算目标位置
                const targetPosition = new THREE.Vector3(
                    soldier.position.x + cameraOffset.x,
                    soldier.position.y + THIRD_PERSON_HEIGHT,
                    soldier.position.z + cameraOffset.z
                );
                
                // 平滑跟随
                camera.position.lerp(targetPosition, THIRD_PERSON_LERP);
                
                // 让相机始终看向角色
                const lookAtTarget = new THREE.Vector3(
                    soldier.position.x,
                    soldier.position.y + 1, // 看向角色胸部位置
                    soldier.position.z
                );
                camera.lookAt(lookAtTarget);
            }
        }
        
        // 处理跳跃和飞行功能
        function handleJump(deltaTime) {
            // 更新跳跃冷却时间
            if (jumpCooldown > 0) {
                jumpCooldown -= deltaTime;
            }
            
            // 如果在飞行模式下，处理飞行控制
            if (isFlying) {
                // 按空格键向上飞行
                if (keyboard[' ']) {
                    verticalVelocity = FLY_SPEED * playerMoveSpeedMul;
                } 
                // 按Shift键向下飞行
                else if (keyboard['shift']) {
                    verticalVelocity = -FLY_SPEED * playerMoveSpeedMul;
                } 
                // 不按任何键时保持当前高度
                else {
                    verticalVelocity = 0;
                }
                
                // 更新垂直位置
                soldier.position.y += verticalVelocity * deltaTime;
                
                // 防止飞到地面以下，除非是穿墙模式
                if (!isNoclipMode && soldier.position.y < GROUND_LEVEL) {
                    soldier.position.y = GROUND_LEVEL;
                }
                
                return; // 飞行模式下不执行下面的跳跃逻辑
            }
            
            // 以下是非飞行模式下的跳跃逻辑
            // 检查是否在地面上或墙顶，如果在穿墙模式下，允许在任何高度跳跃
            const groundCheck = checkGroundCollision();
            const isOnGround = (groundCheck.onGround && verticalVelocity <= 0) || isNoclipMode;
            
            // 如果在地面上，重置跳跃次数
            if (isOnGround) {
                jumpCount = 0;
                if (isJumping) {
                    isJumping = false;
                    // 恢复到正常动画
                    if (moveDirection.length() > 0) {
                        fadeToAction(runAction, 0.05);
                    } else {
                        fadeToAction(idleAction, 0.05);
                    }
                }
            }
            
            // 检查是否可以跳跃
            const canJump = jumpCount < maxJumps && jumpCooldown <= 0;
            
            // 如果按下空格键并且可以跳跃
            if (keyboard[' '] && canJump) {
                verticalVelocity = JUMP_FORCE;
                isJumping = true;
                jumpCount++;
                jumpCooldown = 0.2;
                
                // 播放跳跃动画
                if (jumpAction) {
                    fadeToAction(jumpAction, 0.05);
                }
                
                // 二段跳特效
                if (jumpCount > 1) {
                    console.log(`🚀 二段跳！当前跳跃次数: ${jumpCount}`);
                    // 二段跳时给予稍微更强的跳跃力
                    verticalVelocity = JUMP_FORCE * 1.1;
                }
                
                // 清除空格键状态，防止连续跳跃
                keyboard[' '] = false;
            }
            
            // 应用重力，除非在穿墙模式下
            if (!isNoclipMode) {
                verticalVelocity -= GRAVITY * deltaTime;
            }
            
            // 更新垂直位置
            const newY = soldier.position.y + verticalVelocity * deltaTime;
            
            // 检查地面和墙顶碰撞
            if (!isNoclipMode) {
                const collision = checkGroundCollision(newY);
                if (collision.onGround && verticalVelocity <= 0) {
                    soldier.position.y = collision.groundY;
                    verticalVelocity = 0;
                } else {
                    // 天花板检测：防止跳跃穿楼板
                    const ceilY = checkCeilingCollision(newY);
                    if (ceilY !== null && verticalVelocity > 0) {
                        soldier.position.y = ceilY;
                        verticalVelocity = 0;
                    } else {
                        soldier.position.y = newY;
                    }
                }
            } else {
                soldier.position.y = newY;
            }
            
            // 更新第一人称手臂和腿部动画
            updateFPLimbsForJump();
        }
        
        // 修改跳跃时的第一人称肢体动画
        function updateFPLimbsForJump() {
            if (!fpArms || !fpLegs || !isJumping) return;
            
            // 使手臂呈现向下摆动的姿势，模拟跳跃动作
            const jumpProgress = Math.min(1, (soldier.position.y - GROUND_LEVEL) / 1.5);
            
            // 起跳时手臂上抬
            if (verticalVelocity > 0) {
                // 更加夸张的起跳动作
                fpArms.children[0].rotation.x = -0.5 * jumpProgress + 0.2; // 左手抬起
                fpArms.children[1].rotation.x = -0.5 * jumpProgress + 0.2; // 右手抬起
                
                // 手臂略微张开
                fpArms.children[0].rotation.z = 0.15 * jumpProgress;
                fpArms.children[1].rotation.z = -0.15 * jumpProgress;
            } else {
                // 下落时手臂向前伸展，准备着陆
                fpArms.children[0].rotation.x = 0.3 * jumpProgress + 0.2; // 左手
                fpArms.children[1].rotation.x = 0.3 * jumpProgress + 0.2; // 右手
                
                // 手臂收回
                fpArms.children[0].rotation.z = 0;
                fpArms.children[1].rotation.z = 0;
            }
            
            // 修正跳跃时的腿部动画 - 正确处理大腿和小腿
            const leftThigh = fpLegs.children[0]; // 左大腿
            const rightThigh = fpLegs.children[1]; // 右大腿
            
            if (leftThigh && rightThigh) {
                // 跳跃时大腿抬起
                leftThigh.rotation.x = -0.3 - 0.4 * jumpProgress;
                rightThigh.rotation.x = -0.3 - 0.4 * jumpProgress;
            
            // 腿部略微分开
                leftThigh.rotation.z = 0.1;
                rightThigh.rotation.z = -0.1;
                
                // 处理膝盖弯曲（小腿）
                if (leftThigh.children.length > 0) {
                    const leftCalf = leftThigh.children[0];
                    leftCalf.rotation.x = 0.6 * jumpProgress; // 膝盖弯曲
                }
                
                if (rightThigh.children.length > 0) {
                    const rightCalf = rightThigh.children[0];
                    rightCalf.rotation.x = 0.6 * jumpProgress; // 膝盖弯曲
                }
            }
        }
        
        // 修改updateFPLimbs函数，增加飞行模式下的动作
        function updateFPLimbs(deltaTime) {
            if (!fpArms || !fpLegs) return;
            
            // 如果正在跳跃，由updateFPLimbsForJump处理
            if (isJumping && !isFlying) {
                return;
            }
            
            // 飞行模式下的动作
            if (isFlying) {
                // 手臂形成一个"飞行"姿势
                if (fpArms.children.length >= 2) {
                fpArms.children[0].rotation.x = -0.3; // 左手向前伸展
                fpArms.children[1].rotation.x = -0.3; // 右手向前伸展
                
                // 手臂略微向外张开
                fpArms.children[0].rotation.z = 0.3; // 左手向左张开
                fpArms.children[1].rotation.z = -0.3; // 右手向右张开
                }
                
                // 腿部伸直略微分开
                if (fpLegs.children.length >= 2) {
                fpLegs.children[0].rotation.x = 0; // 左腿伸直
                fpLegs.children[1].rotation.x = 0; // 右腿伸直
                fpLegs.children[0].rotation.z = 0.1; // 左腿向左
                fpLegs.children[1].rotation.z = -0.1; // 右腿向右
                }
                
                return;
            }
            
            // 使用新的步行动画系统
            updateWalkAnimation(deltaTime);
        }
        
        // 添加滑铲功能
        function startSlide() {
            // 飞行模式下跳过冷却和状态检查
            if (!isFlying && (isSliding || slideCooldown > 0)) return;
            
            isSliding = true;
            slideDistance = 0;
            
            // 保存滑铲方向（使用当前朝向）
            const forward = new THREE.Vector3(0, 0, -1);
            forward.applyAxisAngle(new THREE.Vector3(0, 1, 0), cameraHorizontalAngle);
            slideDirection.copy(forward);
            
            // 播放滑铲动画
            if (slideAction) {
                fadeToAction(slideAction, 0.1);
            } else if (jumpAction) {
                // 如果没有专门的滑铲动画，使用跳跃动画代替
                fadeToAction(jumpAction, 0.1);
            }
            
            // 调整角色姿势 - 使其进入滑铲状态
            if (!isFirstPerson) {
                // 在第三人称模式下，修改角色姿势
                // 将角色降低到接近地面的高度，模拟滑铲姿势
                soldier.position.y = GROUND_LEVEL + 0.1; // 几乎贴地
                
                // 确保角色保持水平，不要倾斜
                soldier.rotation.x = -Math.PI / 2; // 完全平躺，面朝上
            }
            
            console.log("开始滑铲" + (isFlying ? " (飞行中)" : ""));
        }
        
        // 处理滑铲逻辑
        function handleSlide(deltaTime) {
            // 更新滑铲冷却时间
            if (slideCooldown > 0) {
                slideCooldown -= deltaTime;
                // 更新UI显示冷却时间
                const cooldownElement = document.getElementById('slide-cooldown');
                if (cooldownElement) {
                    if (slideCooldown > 0) {
                        cooldownElement.textContent = slideCooldown.toFixed(1) + "s";
                        cooldownElement.style.display = "inline";
                    } else {
                        cooldownElement.style.display = "none";
                    }
                }
            }
            
            // 如果没有在滑铲，直接返回
            if (!isSliding) return;
            
            // 计算滑铲移动距离
            const slideStep = SLIDE_SPEED * deltaTime;
            slideDistance += slideStep;
            
            // 计算新位置
            const newPosition = new THREE.Vector3();
            newPosition.copy(soldier.position);
            newPosition.x += slideDirection.x * slideStep;
            newPosition.z += slideDirection.z * slideStep;
            
            // 检查碰撞
            if (!checkCollision(newPosition)) {
                soldier.position.copy(newPosition);
            } else {
                // 如果碰到墙壁，立即结束滑铲
                endSlide();
                return;
            }
            
            // 如果滑行足够距离，结束滑铲
            if (slideDistance >= SLIDE_DISTANCE) {
                endSlide();
            }
            
            // 更新第一人称模型姿势
            updateFPLimbsForSlide();
        }
        
        // 结束滑铲
        function endSlide() {
            isSliding = false;
            
            // 只有在非飞行模式下才设置冷却时间
            if (!isFlying) {
                slideCooldown = SLIDE_COOLDOWN;
            } else {
                // 飞行模式下没有冷却
                slideCooldown = 0;
            }
            
            // 恢复角色的正常姿势和高度
            if (!isFirstPerson) {
                soldier.rotation.x = 0;
                // 恢复到当前地板高度（支持多层楼）
                const gc = checkGroundCollision();
                soldier.position.y = gc.groundY;
            }
            
            // 恢复正常动画
            if (moveDirection.length() > 0) {
                fadeToAction(runAction, 0.2);
            } else {
                fadeToAction(idleAction, 0.2);
            }
            
            // 创建或更新冷却UI显示
            let cooldownElement = document.getElementById('slide-cooldown');
            if (!cooldownElement) {
                cooldownElement = document.createElement('span');
                cooldownElement.id = 'slide-cooldown';
                cooldownElement.style.marginLeft = '5px';
                cooldownElement.style.color = '#ff9900';
                document.getElementById('slide-text').appendChild(cooldownElement);
            }
            
            if (!isFlying) {
                console.log("滑铲结束，冷却时间: " + SLIDE_COOLDOWN + "秒");
                cooldownElement.textContent = SLIDE_COOLDOWN.toFixed(1) + "s";
                cooldownElement.style.display = "inline";
            } else {
                console.log("飞行模式滑铲结束，无冷却");
                cooldownElement.style.display = "none";
            }
        }
        
        // 修改updateFPLimbs函数，添加滑铲姿势
        function updateFPLimbsForSlide() {
            if (!fpArms || !fpLegs) return;
            
            // 滑铲时的手臂姿势 - 两手前伸，像图片中那样
            fpArms.children[0].rotation.x = 1.2; // 左手大幅度前伸
            fpArms.children[1].rotation.x = 1.2; // 右手大幅度前伸
            fpArms.children[0].rotation.z = -0.1; // 左手略外展
            fpArms.children[1].rotation.z = 0.1; // 右手略外展
            
            // 滑铲时的腿部姿势 - 全部伸直
            fpLegs.children[0].rotation.x = 0; // 左腿伸直
            fpLegs.children[1].rotation.x = 0; // 右腿伸直
            fpLegs.children[0].rotation.z = 0.1; // 左腿略向外
            fpLegs.children[1].rotation.z = -0.1; // 右腿略向外
            
            // 调整手臂和腿部整体位置，以模拟趴在地上滑行的效果
            fpArms.position.y = -0.8; // 手臂位置大幅度下降
            fpLegs.position.y = -1.0; // 腿部位置大幅度下降
        }
        
        // 处理下蹲
        function handleCrouch(deltaTime) {
            // 非飞行模式且在地面上才能下蹲
            if (isFlying || isJumping || isSliding) {
                isCrouching = false;
                crouchTransition = Math.max(0, crouchTransition - deltaTime * 5); // 逐渐恢复正常高度
            } else {
                // 检查是否在按下Shift键
                if (keyboard['shift'] && !isFlying) {
                    isCrouching = true;
                    crouchTransition = Math.min(1, crouchTransition + deltaTime * 5); // 逐渐下蹲
                    
                    // 播放下蹲动画(第三人称)
                    if (!isFirstPerson && crouchAction && currentAction !== crouchAction) {
                        fadeToAction(crouchAction, 0.2);
                    }
                    
                    // 降低角色高度(第三人称)
                    if (!isFirstPerson) {
                        // 调整角色整体高度
                        const targetScale = new THREE.Vector3(0.5, 0.5 * (1 - (1 - CROUCH_HEIGHT) * crouchTransition), 0.5);
                        soldier.scale.lerp(targetScale, deltaTime * 5);
                    }
                } else {
                    isCrouching = false;
                    crouchTransition = Math.max(0, crouchTransition - deltaTime * 5); // 逐渐恢复正常高度
                    
                    // 恢复正常站立动画(第三人称)
                    if (!isFirstPerson && crouchAction && currentAction === crouchAction) {
                        if (moveDirection.length() > 0) {
                            fadeToAction(runAction, 0.2);
                        } else {
                            fadeToAction(idleAction, 0.2);
                        }
                    }
                    
                    // 恢复角色正常高度(第三人称)
                    if (!isFirstPerson) {
                        const targetScale = new THREE.Vector3(0.5, 0.5, 0.5);
                        soldier.scale.lerp(targetScale, deltaTime * 5);
                    }
                }
            }
            
            // 根据下蹲过渡值更新相机高度(仅第一人称)
            if (isFirstPerson) {
                normalHeight = FIRST_PERSON_HEIGHT * (1 - crouchTransition * (1 - CROUCH_HEIGHT));
            }
            
            // 更新第一人称肢体姿势
            updateFPLimbsForCrouch();
        }
        
        // 更新第一人称肢体姿势以反映下蹲状态
        function updateFPLimbsForCrouch() {
            if (!fpArms || !fpLegs || isJumping || isSliding) return;
            
            if (crouchTransition > 0) {
                // 腿部弯曲程度基于下蹲过渡值
                const bendAmount = crouchTransition * 0.7; // 增加弯曲程度
                
                // 腿部更加弯曲，摆放更自然
                fpLegs.children[0].rotation.x = -0.3 - bendAmount; // 左腿弯曲更多
                fpLegs.children[1].rotation.x = -0.3 - bendAmount; // 右腿弯曲更多
                
                // 腿部略微外展，看起来更自然
                fpLegs.children[0].rotation.z = 0.2 * crouchTransition; // 左腿外展
                fpLegs.children[1].rotation.z = -0.2 * crouchTransition; // 右腿外展
                
                // 手臂位置略微下降并前伸
                fpArms.position.y = -0.3 - crouchTransition * 0.3;
                fpArms.position.z = -0.3 - crouchTransition * 0.2; // 向前移动
                
                // 手臂姿势变化 - 下蹲时手臂会略微前伸，保持平衡
                fpArms.children[0].rotation.x = 0.3 + crouchTransition * 0.2; // 左手前伸
                fpArms.children[1].rotation.x = 0.3 + crouchTransition * 0.2; // 右手前伸
            } else {
                // 重置位置
                fpArms.position.y = -0.3;
                fpArms.position.z = -0.3;
            }
        }
        
        // 修改moveSoldier函数，添加下蹲状态下的速度修改
        function moveSoldier(deltaTime) {
            if (!soldier) return;
            
            // 如果控制台打开，则不处理移动
            if (isConsoleOpen) return;
            
            // 如果赵老师已被救援，禁用所有移动控制
            if (isTeacherRescued) {
                // 重置所有移动状态
                isWalking = false;
                targetWalkSpeed = 0;
                walkSpeed = 0;
                walkCycle = 0;
                moveDirection.set(0, 0, 0);
                
                // 停止所有动画并播放idle动画
                resetWalkAnimation();
                
                // 更新相机位置（保持相机正常工作）
                updateCamera();
                return;
            }
            
            // 处理下蹲状态
            handleCrouch(deltaTime);
            
            // 处理滑铲冷却时间和状态
            handleSlide(deltaTime);
            
            // 如果正在滑铲，不允许常规移动
            if (isSliding) {
                // 更新相机位置
                updateCamera();
                return;
            }
            
            // 处理跳跃和飞行
            handleJump(deltaTime);
            
            // 初始化移动方向
            moveDirection.set(0, 0, 0);
            
            // 坐下时禁止移动
            if (isSitting) {
                moveDirection.set(0, 0, 0);
                verticalVelocity = 0;
                isWalking = false;
                walkSpeed = 0;
            } else {
            // 根据按键更新移动方向
            if (keyboard['w']) moveDirection.z -= 1;
            if (keyboard['s']) moveDirection.z += 1;
            if (keyboard['a']) moveDirection.x -= 1;
            if (keyboard['d']) moveDirection.x += 1;
            // 手机模式虚拟摇杆（../js/campus-3d-mobile.js 写入 window._campusJoy）
            var cj = window._campusJoy;
            if (cj && (cj.x !== 0 || cj.y !== 0)) {
                if (cj.y < -0.18) moveDirection.z -= 1;
                if (cj.y > 0.18) moveDirection.z += 1;
                if (cj.x < -0.18) moveDirection.x -= 1;
                if (cj.x > 0.18) moveDirection.x += 1;
            }
            }
            if (keyboard['x']) {
                // 切换视角模式
                isFirstPerson = !isFirstPerson;
                keyboard['x'] = false; // 防止按住时连续切换
                
                // 更新模型可见性
                updateSoldierVisibility();
            }
            
            // 检查是否在移动
            const wasWalking = isWalking;
            isWalking = moveDirection.length() > 0;
            
            // 如果有移动输入
            if (isWalking) {
                // 将移动方向标准化
                moveDirection.normalize();
                
                const adjustedDirection = new THREE.Vector3(0, 0, 0);
                
                // 创建代表相机朝向的向量，但忽略垂直分量
                const forward = new THREE.Vector3(0, 0, -1);
                const right = new THREE.Vector3(1, 0, 0);
                
                // 创建一个只包含Y轴旋转的欧拉角
                const horizontalRotation = new THREE.Euler(0, cameraHorizontalAngle, 0);
                
                // 应用水平旋转到方向向量
                forward.applyEuler(horizontalRotation);
                right.applyEuler(horizontalRotation);
                
                // 计算移动方向
                adjustedDirection.addScaledVector(forward, -moveDirection.z);
                adjustedDirection.addScaledVector(right, moveDirection.x);
                
                // 如果调整后的方向不为0
                if (adjustedDirection.length() > 0) {
                    adjustedDirection.normalize();
                    walkDirection.copy(adjustedDirection);
                    
                    // 计算移动速度（下蹲时速度减慢）
                    let currentSpeed = SOLDIER_SPEED * playerMoveSpeedMul;
                    if (isCrouching) {
                        currentSpeed *= CROUCH_SPEED_MODIFIER;
                    }
                    
                    // 更新目标走动速度
                    targetWalkSpeed = currentSpeed / SOLDIER_SPEED; // 标准化速度
                    
                    // 计算新位置（只移动水平方向）
                    const moveStep = currentSpeed * deltaTime;
                    const newPosition = new THREE.Vector3();
                    newPosition.copy(soldier.position);
                    newPosition.x += adjustedDirection.x * moveStep;
                    newPosition.z += adjustedDirection.z * moveStep;
                    // 保持垂直位置不变（由handleJump处理）
                    newPosition.y = soldier.position.y;
                    
                    // 在飞行模式或穿墙模式下跳过碰撞检测
                    let shouldMove = isFlying || isNoclipMode || !checkCollision(newPosition);
                    
                    // 如果被阻挡，尝试在墙顶上滑动移动
                    if (!shouldMove && !isFlying && !isNoclipMode) {
                        const groundCheck = checkGroundCollision(soldier.position.y);
                        if (groundCheck.onGround && groundCheck.groundY > GROUND_LEVEL + 0.1) {
                            // 在墙顶上，尝试只在水平方向移动
                            const wallTopPosition = new THREE.Vector3();
                            wallTopPosition.copy(newPosition);
                            wallTopPosition.y = groundCheck.groundY; // 保持在墙顶高度
                            
                            // 检查这个调整后的位置是否可以移动
                            shouldMove = !checkCollision(wallTopPosition);
                            if (shouldMove) {
                                newPosition.copy(wallTopPosition);
                            }
                        }
                    }
                    
                    if (shouldMove) {
                        soldier.position.copy(newPosition);
                        
                        // 更新朝向
                        soldier.rotation.y = cameraHorizontalAngle;
                    }
                }
            } else {
                // 如果没有移动，设置目标走动速度为0
                targetWalkSpeed = 0;
            }
            
            // 更新走动动画
            updateWalkAnimation(deltaTime);
            
            // 更新相机位置
            updateCamera();
            
            // 更新调试信息
            document.getElementById('position').textContent = 
                `X: ${soldier.position.x.toFixed(2)}, Y: ${soldier.position.y.toFixed(2)}, Z: ${soldier.position.z.toFixed(2)}`;
            document.getElementById('rotation').textContent = 
                `${cameraHorizontalAngle.toFixed(2)} 弧度`;

            // 更新楼层指示器
            const floorNum = Math.floor(soldier.position.y / FLOOR_H) + 1;
            const floorIndicator = document.getElementById('floor-indicator');
            if (floorIndicator) {
                const floorNames = ['1F', '2F', '3F'];
                const floorLabel = (floorNum >= 1 && floorNum <= 3) ? floorNames[floorNum-1] : (floorNum > 3 ? '屋顶' : '1F');
                if (floorIndicator.textContent !== floorLabel) {
                    floorIndicator.textContent = floorLabel;
                }
                floorIndicator.style.display = 'block';
            }
            
            // 更新动画状态显示
            let animationName = '空闲';
            if (isWalking && walkSpeed > 0.01 && !isJumping && !isFlying) {
                animationName = `行走 (速度:${walkSpeed.toFixed(2)}, 周期:${walkCycle.toFixed(2)})`;
            }
            if (isJumping) animationName = `跳跃 (${jumpCount}/${maxJumps})`;
            if (isFlying) animationName = '飞行';
            if (isSliding) animationName = '滑铲';
            if (isCrouching && !isWalking) animationName = '蹲伏';
            if (isCrouching && isWalking) animationName += '(蹲伏)';
            if (isNoclipMode) animationName += '(穿墙)';
            if (isGodMode) animationName += '(无敌)';
            if (doubleJumpEnabled) animationName += '(二段跳)';
            
            document.getElementById('animation').textContent = animationName;
        }
        
        // 新增：更新走动动画函数
        function updateWalkAnimation(deltaTime) {
            if (!soldier) return;
            
            // 如果不在移动或者walkSpeed接近0，立即重置到军事化标准姿势
            if (!isWalking || walkSpeed <= 0.01) {
                // 强制停止所有走路动画
                walkSpeed = 0;
                walkCycle = 0;
                targetWalkSpeed = 0;
                
                // 立即重置到军事化标准姿势
                resetWalkAnimation();
                
                // 确保士兵保持军事化标准站立姿势
                if (soldier) {
                    soldier.rotation.x = 0; // 挺直站立
                    soldier.rotation.z = 0; // 不倾斜
                    // 确保在地面上
                    if (soldier.position.y < GROUND_LEVEL) {
                        soldier.position.y = GROUND_LEVEL;
                    }
                }
                
                // 强制应用军事化姿势到第一人称视角
                if (isFirstPerson) {
                    if (fpArms) applyWalkAnimationToFPArms();
                    if (fpLegs) applyWalkAnimationToFPLegs();
                }
                
                return;
            }
            
            // 停止原始动画系统，防止冲突
            if (!isFirstPerson) {
                // 在第三人称视角下，只停止run和jump动画，保留idle动画
                if (currentAction === runAction) {
                    currentAction.stop();
                    if (idleAction) {
                        idleAction.reset().play();
                        currentAction = idleAction;
                    }
                }
                if (currentAction === jumpAction) {
                    currentAction.stop();
                    if (idleAction) {
                        idleAction.reset().play();
                        currentAction = idleAction;
                    }
                }
            } else {
                // 在第一人称视角下，保持idle动画作为基础
                if (currentAction && currentAction !== idleAction) {
                    currentAction.stop();
                    if (idleAction) {
                        idleAction.reset().play();
                        currentAction = idleAction;
                    }
                }
            }
            
            // 平滑过渡走动速度（只在移动时）
            walkSpeed = THREE.MathUtils.lerp(walkSpeed, targetWalkSpeed, deltaTime * 10);
            
            // 如果速度很小，重置动画
            if (walkSpeed < 0.01) {
                walkSpeed = 0;
                walkCycle = 0;
                resetWalkAnimation();
                return;
            }
            
            // 更新走动周期
            walkCycle += deltaTime * WALK_CYCLE_SPEED * walkSpeed;
            
            // 脚步声效果 - 只在地面行走时播放
            if (walkSpeed > 0.1 && !isJumping && !isFlying && !isSliding) {
                const currentStepPhase = Math.floor(walkCycle / Math.PI);
                const lastStepPhase = Math.floor((walkCycle - deltaTime * WALK_CYCLE_SPEED * walkSpeed) / Math.PI);
                
                if (currentStepPhase !== lastStepPhase) {
                    playFootstepSound();
                }
            }
            
            // 应用走动动画到第一人称手臂和腿部
            if (isFirstPerson) {
                if (fpArms) applyWalkAnimationToFPArms();
                if (fpLegs) applyWalkAnimationToFPLegs();
            }
            
            // 应用走动动画到第三人称模型
            if (!isFirstPerson && soldier) {
                applyWalkAnimationToSoldier();
            }
            
            // 新增：应用头部摆动到相机
            applyHeadBobToCamera();
        }
        
        // 新增：应用走动动画到第一人称手臂
        function applyWalkAnimationToFPArms() {
            if (!fpArms || fpArms.children.length < 2) return;
            
            // 如果walkSpeed为0或接近0，应用军事化标准姿势
            if (walkSpeed <= 0.01) {
                const leftArm = fpArms.children[0];
                const rightArm = fpArms.children[1];
                if (leftArm) {
                    // 左手臂军事化标准姿势
                    leftArm.rotation.x = 0.05; // 轻微前倾
                    leftArm.rotation.y = 0;
                    leftArm.rotation.z = 0.02; // 轻微向外
                    leftArm.position.y = -0.28;
                    leftArm.position.z = -0.08;
                    leftArm.position.x = -0.12; // 稍微分开
                }
                if (rightArm) {
                    // 右手臂军事化标准姿势
                    rightArm.rotation.x = 0.05; // 轻微前倾
                    rightArm.rotation.y = 0;
                    rightArm.rotation.z = -0.02; // 轻微向外
                    rightArm.position.y = -0.28;
                    rightArm.position.z = -0.08;
                    rightArm.position.x = 0.12; // 稍微分开
                }
                return;
            }
            
            const leftArm = fpArms.children[0]; // 左手臂
            const rightArm = fpArms.children[1]; // 右手臂
            
            if (leftArm && rightArm) {
                // 手臂摆动（左右手臂相位相反）
                const armSwing = Math.sin(walkCycle) * ARM_SWING_AMPLITUDE * walkSpeed;
                
                leftArm.rotation.x = 0.2 + armSwing;
                rightArm.rotation.x = 0.2 - armSwing;
                
                // 明显的上下摆动
                const verticalBob = Math.sin(walkCycle * 2) * 0.08 * walkSpeed;
                leftArm.position.y = -0.25 + verticalBob;
                rightArm.position.y = -0.25 + verticalBob;
                
                // 明显的前后摆动
                const forwardBob = Math.sin(walkCycle) * 0.12 * walkSpeed;
                leftArm.position.z = -0.1 + forwardBob;
                rightArm.position.z = -0.1 - forwardBob;
            }
        }
        
        // 新增：应用走动动画到第一人称腿部
        function applyWalkAnimationToFPLegs() {
            if (!fpLegs || fpLegs.children.length < 2) return;
            
            // 如果walkSpeed为0或接近0，应用军事化标准姿势
            if (walkSpeed <= 0.01) {
                const leftLeg = fpLegs.children[0];
                const rightLeg = fpLegs.children[1];
                if (leftLeg) {
                    // 左腿军事化标准姿势
                    leftLeg.rotation.x = 0; // 挺直
                    leftLeg.rotation.y = 0;
                    leftLeg.rotation.z = 0;
                    leftLeg.position.y = -0.42;
                    leftLeg.position.x = -0.18; // 双脚分开，肩宽距离
                    leftLeg.position.z = 0;
                    
                    // 确保小腿也回到正确位置
                    if (leftLeg.children.length > 0) {
                        const leftCalf = leftLeg.children[0];
                        leftCalf.rotation.x = 0;
                        leftCalf.position.y = -0.45;
                    }
                }
                if (rightLeg) {
                    // 右腿军事化标准姿势
                    rightLeg.rotation.x = 0; // 挺直
                    rightLeg.rotation.y = 0;
                    rightLeg.rotation.z = 0;
                    rightLeg.position.y = -0.42;
                    rightLeg.position.x = 0.18; // 双脚分开，肩宽距离
                    rightLeg.position.z = 0;
                    
                    // 确保小腿也回到正确位置
                    if (rightLeg.children.length > 0) {
                        const rightCalf = rightLeg.children[0];
                        rightCalf.rotation.x = 0;
                        rightCalf.position.y = -0.45;
                    }
                }
                return;
            }
            
            const leftLeg = fpLegs.children[0]; // 左腿（大腿）
            const rightLeg = fpLegs.children[1]; // 右腿（大腿）
            
            if (leftLeg && rightLeg) {
                // 改进的腿部摆动 - 使用更自然的步行周期
                const leftLegSwing = Math.sin(walkCycle) * LEG_SWING_AMPLITUDE * walkSpeed;
                const rightLegSwing = Math.sin(walkCycle + Math.PI) * LEG_SWING_AMPLITUDE * walkSpeed; // 相位差π
                
                // 大腿摆动 - 前后摆动更自然
                leftLeg.rotation.x = -0.1 + leftLegSwing;
                rightLeg.rotation.x = -0.1 + rightLegSwing;
                
                // 改进的垂直摆动 - 步行时的上下起伏
                const leftVerticalBob = Math.sin(walkCycle * 2) * 0.06 * walkSpeed;
                const rightVerticalBob = Math.sin((walkCycle + Math.PI) * 2) * 0.06 * walkSpeed;
                leftLeg.position.y = -0.4 + leftVerticalBob;
                rightLeg.position.y = -0.4 + rightVerticalBob;
                
                // 改进的左右摆动 - 模拟重心转移
                const leftSideBob = Math.sin(walkCycle) * 0.03 * walkSpeed;
                const rightSideBob = Math.sin(walkCycle + Math.PI) * 0.03 * walkSpeed;
                leftLeg.position.x = -0.15 + leftSideBob;
                rightLeg.position.x = 0.15 + rightSideBob;
                
                // 小腿动画 - 弯曲膝盖效果
                if (leftLeg.children.length > 0) {
                    const leftCalf = leftLeg.children[0];
                    // 抬腿时膝盖弯曲更多
                    const leftKneeBend = Math.max(0, Math.sin(walkCycle)) * 0.4 * walkSpeed;
                    leftCalf.rotation.x = leftKneeBend;
                    
                    // 小腿前后位置调整
                    leftCalf.position.y = -0.45 + leftKneeBend * 0.1;
                }
                
                if (rightLeg.children.length > 0) {
                    const rightCalf = rightLeg.children[0];
                    // 抬腿时膝盖弯曲更多
                    const rightKneeBend = Math.max(0, Math.sin(walkCycle + Math.PI)) * 0.4 * walkSpeed;
                    rightCalf.rotation.x = rightKneeBend;
                    
                    // 小腿前后位置调整
                    rightCalf.position.y = -0.45 + rightKneeBend * 0.1;
                }
            }
        }
        
        // 新增：应用走动动画到士兵模型
        function applyWalkAnimationToSoldier() {
            if (!soldier) return;
            
            // 如果walkSpeed为0或接近0，不应用任何走动动画
            if (walkSpeed <= 0.01) {
                // 确保重置所有自定义动画效果
                soldier.rotation.x = 0;
                soldier.rotation.z = 0;
                return;
            }
            
            // 身体轻微摇摆 - 减少幅度
            const bodySway = Math.sin(walkCycle * 0.5) * BODY_SWAY_AMPLITUDE * walkSpeed * 0.5;
            soldier.rotation.z = bodySway;
            
            // 身体前后摆动 - 减少幅度
            const bodyLean = Math.sin(walkCycle) * 0.015 * walkSpeed;
            soldier.rotation.x = bodyLean;
            
            // 轻微的上下摆动 - 减少幅度
            const bodyBob = Math.sin(walkCycle * 2) * 0.005 * walkSpeed;
            soldier.position.y += bodyBob;
        }
        
        // 新增：应用头部摆动到相机
        function applyHeadBobToCamera() {
            if (!camera) return;
            
            // 只在第一人称模式下应用头部摆动
            if (isFirstPerson) {
                // 头部上下摆动
                const headBob = Math.sin(walkCycle * 2) * HEAD_BOB_AMPLITUDE * walkSpeed;
                
                // 将摆动添加到相机的基础高度
                const baseHeight = soldier.position.y + normalHeight;
                camera.position.y = baseHeight + headBob;
                
                // 明显的左右摆动
                const sideBob = Math.sin(walkCycle) * 0.03 * walkSpeed;
                camera.position.x = soldier.position.x + sideBob;
                
                // 添加前后摆动
                const forwardBob = Math.sin(walkCycle * 0.5) * 0.02 * walkSpeed;
                camera.position.z = soldier.position.z + forwardBob;
            }
            // 第三人称视角下不应用任何摇晃效果
        }
        
        // 新增：创建脚步声效果（可选）
        function playFootstepSound() {
            // 在控制台显示脚步声，方便调试
            console.log('👣 脚步声 - 位置:', soldier.position.x.toFixed(2), soldier.position.z.toFixed(2));
            
            // 播放真实的脚步声音效
            generateFootstepSound();
            
            // 可以在这里添加地面粒子效果或其他视觉反馈
            createFootstepParticle();
        }
        
        // 新增：创建脚步粒子效果
        function createFootstepParticle() {
            if (!soldier || !scene) return;
            
            // 创建简单的粒子效果
            const particleGeometry = new THREE.SphereGeometry(0.02, 4, 4);
            const particleMaterial = new THREE.MeshBasicMaterial({ 
                color: 0x8B4513, 
                transparent: true, 
                opacity: 0.6 
            });
            
            const particle = new THREE.Mesh(particleGeometry, particleMaterial);
            particle.position.set(
                soldier.position.x + (Math.random() - 0.5) * 0.5,
                soldier.position.y + 0.05,
                soldier.position.z + (Math.random() - 0.5) * 0.5
            );
            
            scene.add(particle);
            
            // 粒子动画和自动移除
            let particleLife = 1.0;
            const animateParticle = () => {
                particleLife -= 0.02;
                particle.material.opacity = particleLife * 0.6;
                particle.position.y += 0.01;
                particle.scale.multiplyScalar(0.98);
                
                if (particleLife > 0) {
                    requestAnimationFrame(animateParticle);
                } else {
                    scene.remove(particle);
                    particle.geometry.dispose();
                    particle.material.dispose();
                }
            };
            animateParticle();
        }
        
        // 更新FPS统计
        function updateFPS(time) {
            frameCount++;
            
            if (time - lastFpsUpdate >= 1000) { // 每秒更新一次
                const fps = Math.round(frameCount * 1000 / (time - lastFpsUpdate));
                document.getElementById('fps').textContent = fps;
                
                frameCount = 0;
                lastFpsUpdate = time;
            }
        }
        
        // 创建第一人称视角的手臂和腿部

        // 动画循环
        function animate(time) {
            requestAnimationFrame(animate);
            
            // 计算时间增量（以秒为单位）
            const deltaTime = Math.min((time - lastTime) / 1000, 0.1); // 限制最大帧时间，防止大延迟
            lastTime = time;
            
            // 更新FPS
            updateFPS(time);

            gameTime = (gameTime + deltaTime / gameDayDurationSec) % 1;
            totalSimulatedDays += deltaTime / gameDayDurationSec;
            updateWeather(deltaTime);
            updateTimeSystem(deltaTime);
            
            // 更新动画混合器
            if (mixer) mixer.update(deltaTime);
            
            // 移动士兵
            moveSoldier(deltaTime);
            
            // 更新第一人称肢体动画
            updateFPLimbs(deltaTime);
            
            // 渲染场景
            renderer.render(scene, camera);
        }

        // ══════════════════════════════════════════════════════════
        // 昼夜 / 天气（gameTime∈[0,1)，与说明文档一致）
        // ══════════════════════════════════════════════════════════
        function smoothstep(t) {
            t = Math.max(0, Math.min(1, t));
            return t * t * (3 - 2 * t);
        }
        function getSunAngle(gt) {
            const g = ((gt % 1) + 1) % 1;
            return (g - 0.25) * Math.PI * 2;
        }
        function getDayFactor(gt) {
            return Math.max(0, Math.sin(getSunAngle(gt)));
        }
        function getSkyColor(gt) {
            const g = ((gt % 1) + 1) % 1;
            let i = 0;
            for (; i < SKY_STOPS.length - 1; i++) {
                if (g < SKY_STOPS[i + 1][0]) break;
            }
            const a = SKY_STOPS[i], b = SKY_STOPS[i + 1];
            const span = b[0] - a[0];
            const u = span < 1e-8 ? 0 : (g - a[0]) / span;
            return new THREE.Color(
                a[1] + (b[1] - a[1]) * u,
                a[2] + (b[2] - a[2]) * u,
                a[3] + (b[3] - a[3]) * u
            );
        }
        function getTimeSlot() {
            const h = ((gameTime % 1) + 1) % 1 * 24;
            if (h >= 5 && h < 11) return 'morning';
            if (h >= 11 && h < 17) return 'noon';
            if (h >= 17 && h < 21) return 'evening';
            return 'night';
        }
        function genWeatherDuration(w) {
            const r = WEATHER_DURATION[w];
            return r[0] + Math.random() * (r[1] - r[0]);
        }
        function pickNextWeather(prev) {
            const slot = getTimeSlot();
            const base = WEATHER_PROBS[slot];
            const bias = WEATHER_BIAS[prev] || WEATHER_BIAS.clear;
            const types = ['clear', 'rain', 'snow', 'fog'];
            let sum = 0;
            const wts = types.map((ty) => {
                const wt = Math.max(0.01, (base[ty] || 10) * (bias[ty] || 1));
                sum += wt;
                return wt;
            });
            let r = Math.random() * sum;
            for (let k = 0; k < types.length; k++) {
                r -= wts[k];
                if (r <= 0) return types[k];
            }
            return 'clear';
        }
        function resolveWx(type) {
            const P = WEATHER_PARAMS[type];
            const sky = new THREE.Color();
            if (P.skyR < 0) sky.copy(getSkyColor(gameTime));
            else sky.setRGB(P.skyR, P.skyG, P.skyB);
            const df = getDayFactor(gameTime);
            const out = {
                skyR: sky.r, skyG: sky.g, skyB: sky.b,
                fogNear: P.fogNear, fogFar: P.fogFar,
                fogR: P.fogR < 0 ? sky.r : P.fogR,
                fogG: P.fogG < 0 ? sky.g : P.fogG,
                fogB: P.fogB < 0 ? sky.b : P.fogB,
                rainOp: P.rainOp, snowOp: P.snowOp,
                useExpFog: type === 'fog'
            };
            if (type === 'clear') {
                if (df < 0.05) {
                    out.fogNear = 400;
                    out.fogFar = 1200;
                    out.fogR = sky.r;
                    out.fogG = sky.g;
                    out.fogB = sky.b;
                } else {
                    out.fogNear = 0;
                    out.fogFar = 0;
                }
                out.useExpFog = false;
            }
            return out;
        }
        function lerpWx(a, b, t) {
            const s = smoothstep(t);
            const c = (x, y) => x + (y - x) * s;
            return {
                skyR: c(a.skyR, b.skyR), skyG: c(a.skyG, b.skyG), skyB: c(a.skyB, b.skyB),
                fogNear: c(a.fogNear, b.fogNear), fogFar: c(a.fogFar, b.fogFar),
                fogR: c(a.fogR, b.fogR), fogG: c(a.fogG, b.fogG), fogB: c(a.fogB, b.fogB),
                rainOp: c(a.rainOp, b.rainOp), snowOp: c(a.snowOp, b.snowOp),
                useExpFog: false
            };
        }
        function applyWxVisual(wx) {
            const bg = new THREE.Color(wx.skyR, wx.skyG, wx.skyB);
            scene.background = bg;
            const hx = '#' + ('000000' + bg.getHex().toString(16)).slice(-6);
            document.body.style.background = 'linear-gradient(to bottom,' + hx + ' 0%,' + hx + ' 100%)';
            const fogHex = new THREE.Color(wx.fogR, wx.fogG, wx.fogB).getHex();
            if (wx.useExpFog) scene.fog = new THREE.FogExp2(fogHex, 0.098);
            else if (wx.fogFar > wx.fogNear + 1) scene.fog = new THREE.Fog(fogHex, wx.fogNear, wx.fogFar);
            else scene.fog = null;
            if (_weatherRain) {
                _weatherRain.material.opacity = wx.rainOp;
                _weatherRain.material.transparent = true;
                _weatherRain.visible = wx.rainOp > 0.02;
            }
            if (_weatherSnow) {
                _weatherSnow.material.opacity = wx.snowOp;
                _weatherSnow.material.transparent = true;
                _weatherSnow.visible = wx.snowOp > 0.02;
            }
        }
        function applyWeatherInstant(w) {
            const wx = resolveWx(w);
            applyWxVisual(wx);
        }
        function startWeatherTransition(next) {
            if (weatherState === 'active' && next === weatherType) {
                weatherDuration = genWeatherDuration(weatherType);
                weatherTimer = 0;
                return;
            }
            fromWeather = weatherType;
            toWeather = next;
            _wxA = resolveWx(fromWeather);
            _wxB = resolveWx(toWeather);
            weatherState = 'transitioning';
            transitionTimer = 0;
        }
        function applyWeatherLerp(t) {
            applyWxVisual(lerpWx(_wxA, _wxB, t));
        }
        function updateWeatherStateMachine(dt) {
            if (weatherState === 'active') {
                weatherTimer += dt;
                if (weatherType === 'rain') groundWetness = Math.min(1, groundWetness + dt / 30);
                else groundWetness = Math.max(0, groundWetness - dt / 120);
                if (weatherTimer >= weatherDuration) {
                    const next = pickNextWeather(weatherType);
                    if (next === weatherType) {
                        weatherDuration = genWeatherDuration(weatherType);
                        weatherTimer = 0;
                    } else startWeatherTransition(next);
                }
            } else if (weatherState === 'transitioning') {
                transitionTimer += dt;
                const csky = getSkyColor(gameTime);
                if (fromWeather === 'clear' || WEATHER_PARAMS[fromWeather].skyR < 0) {
                    _wxA.skyR = csky.r; _wxA.skyG = csky.g; _wxA.skyB = csky.b;
                    if (fromWeather === 'clear' && getDayFactor(gameTime) < 0.05) {
                        _wxA.fogR = csky.r; _wxA.fogG = csky.g; _wxA.fogB = csky.b;
                    }
                }
                if (toWeather === 'clear' || WEATHER_PARAMS[toWeather].skyR < 0) {
                    _wxB.skyR = csky.r; _wxB.skyG = csky.g; _wxB.skyB = csky.b;
                    if (toWeather === 'clear' && getDayFactor(gameTime) < 0.05) {
                        _wxB.fogR = csky.r; _wxB.fogG = csky.g; _wxB.fogB = csky.b;
                    }
                }
                let t = Math.min(1, transitionTimer / TRANSITION_DUR);
                applyWeatherLerp(t);
                if (t >= 1) {
                    weatherType = toWeather;
                    weatherState = 'active';
                    weatherTimer = 0;
                    weatherDuration = genWeatherDuration(weatherType);
                    applyWeatherInstant(weatherType);
                }
            }
        }
        function updateWeather(dt) {
            updateWeatherStateMachine(dt);
            const px = soldier ? soldier.position.x : 0;
            const py = soldier ? soldier.position.y : 10;
            const pz = soldier ? soldier.position.z : 0;
            const fall = 18 * dt;
            const drift = Math.sin(Date.now() * 0.001) * 0.35 * dt;
            if (_weatherRain && _weatherRain.visible) {
                const arr = _weatherRain.geometry.attributes.position.array;
                for (let i = 0; i < arr.length; i += 3) {
                    arr[i + 1] -= fall;
                    arr[i] += drift * 0.15;
                    if (arr[i + 1] < py - 2) {
                        arr[i] = px + (Math.random() - 0.5) * WEATHER_RANGE * 2;
                        arr[i + 1] = py + 28 + Math.random() * 22;
                        arr[i + 2] = pz + (Math.random() - 0.5) * WEATHER_RANGE * 2;
                    }
                }
                _weatherRain.geometry.attributes.position.needsUpdate = true;
            }
            if (_weatherSnow && _weatherSnow.visible) {
                const arr = _weatherSnow.geometry.attributes.position.array;
                const slow = 5.5 * dt;
                for (let i = 0; i < arr.length; i += 3) {
                    arr[i + 1] -= slow;
                    arr[i] += Math.sin((i + Date.now() * 0.002) * 0.08) * 2.2 * dt;
                    arr[i + 2] += Math.cos((i * 0.7 + Date.now() * 0.0017) * 0.07) * 2 * dt;
                    if (arr[i + 1] < py - 1) {
                        arr[i] = px + (Math.random() - 0.5) * WEATHER_RANGE * 2;
                        arr[i + 1] = py + 24 + Math.random() * 20;
                        arr[i + 2] = pz + (Math.random() - 0.5) * WEATHER_RANGE * 2;
                    }
                }
                _weatherSnow.geometry.attributes.position.needsUpdate = true;
            }
        }
        function updateSunLightFromTime(dtSec) {
            const dt = dtSec != null ? dtSec : 0.016;
            if (!_sunLight) return;
            const th = getSunAngle(gameTime);
            const sunH = Math.sin(th);
            const dayFactor = Math.max(0, sunH);
            const R = SUN_ORBIT_R * 0.82;
            const sunX = Math.cos(th) * R;
            const sunZ = Math.sin(th) * R + 20;
            const sunY = Math.max(6, sunH * R * 0.56 + 28);
            _sunLight.position.set(sunX, sunY, sunZ);
            if (_sunVisual) {
                _sunVisual.position.copy(_sunLight.position);
                _sunVisual.visible = sunH > -0.12;
                if (camera) {
                    const d = _sunVisual.position.distanceTo(camera.position);
                    const sc = THREE.MathUtils.clamp(d * 0.0112, 0.95, 2.45);
                    _sunVisual.scale.setScalar(sc);
                }
            }
            if (_sunLight.target) {
                _sunLight.target.position.set(0, 18, 20);
                _sunLight.target.updateMatrixWorld();
            }
            const warm = new THREE.Color(1, 0.52, 0.22);
            const cold = new THREE.Color(1, 0.96, 0.88);
            const g = ((gameTime % 1) + 1) % 1;
            let wb = 0;
            if (g > 0.64 && g < 0.82) wb = Math.max(0, 1 - Math.abs(g - 0.73) / 0.07);
            if (g > 0.17 && g < 0.33) wb = Math.max(wb, Math.max(0, 1 - Math.abs(g - 0.246) / 0.075));
            cold.lerp(warm, Math.min(1, wb * 0.82));
            _sunLight.color.copy(cold);
            _sunLight.intensity = dayFactor * 1.35 + 0.12;
            if (_hemiLight) {
                _hemiLight.intensity = 0.08 + 0.42 * dayFactor;
                _hemiLight.color.setHex(0x9eb8e0);
                _hemiLight.groundColor.setHex(dayFactor > 0.08 ? 0xb8a080 : 0x1a2838);
            }
            if (_ambientLight) _ambientLight.intensity = 0.03 + 0.11 * dayFactor;
            if (_fillLight) _fillLight.intensity = 0.02 + (1 - dayFactor) * 0.07;
            const nightEnough = sunH < -0.22;
            const sunDiskUp = _sunVisual && _sunVisual.visible;
            const starsOk = sunH < -0.08 && !sunDiskUp;
            if (_starsInst) {
                _starsInst.visible = starsOk;
                if (_starsInst.material) {
                    _starsInst.material.transparent = true;
                    _starsInst.material.opacity = Math.min(1, Math.max(0.35, (-sunH - 0.06) * 1.85));
                }
            }
            if (_moonMesh) {
                const moonGm = ((gameTime + 0.5) % 1 + 1) % 1;
                const mth = getSunAngle(moonGm);
                const moonH = Math.sin(mth);
                const moonX = Math.cos(mth) * R;
                const moonZ = Math.sin(mth) * R + 20;
                const moonY = Math.max(5, moonH * R * 0.56 + 28);
                const vis = nightEnough && !sunDiskUp && moonH > -0.28;
                _moonMesh.visible = vis;
                if (_moonMesh.userData.disc) _moonMesh.userData.disc.visible = vis;
                _moonMesh.position.set(moonX, moonY, moonZ);
                if (camera && vis) {
                    const md = new THREE.Vector3(moonX, moonY, moonZ).distanceTo(camera.position);
                    const ms = THREE.MathUtils.clamp(md * 0.0108, 0.95, 2.35);
                    _moonMesh.scale.setScalar(ms);
                } else {
                    _moonMesh.scale.setScalar(1);
                }
                let lp = totalSimulatedDays % LUNAR_SYNODIC_DAYS;
                if (lp < 0) lp += LUNAR_SYNODIC_DAYS;
                lp /= LUNAR_SYNODIC_DAYS;
                if (Math.abs(lp - _lastMoonPhaseDraw) > 0.0008) {
                    paintMoonPhaseTexture(lp);
                    _lastMoonPhaseDraw = lp;
                }
                if (_moonMesh.userData.disc && camera) {
                    _moonMesh.updateMatrixWorld(true);
                    _moonMesh.userData.disc.lookAt(camera.position);
                }
            }
            if (_cloudGroup) {
                _cloudGroup.visible = dayFactor > 0.12;
                _cloudGroup.position.x = Math.sin(gameTime * Math.PI * 2) * 10;
            }
            if (window._fantasyDome) {
                window._fantasyDome.visible = dayFactor > 0.14;
            }
        }
        function updateTimeHUD() {
            const hours = ((gameTime % 1) + 1) % 1 * 24;
            const h = Math.floor(hours) % 24;
            const m = Math.floor((hours - Math.floor(hours)) * 60);
            const timeStr = h.toString().padStart(2, '0') + ':' + m.toString().padStart(2, '0');
            const wtZh = { clear: '晴天', rain: '雨天', snow: '雪天', fog: '雾天' };
            const timeEl = document.getElementById('game-time-display');
            if (timeEl) timeEl.textContent = timeStr + '（' + (wtZh[weatherType] || weatherType) + '）';
        }
        function updateTimeSystem(dt) {
            updateSunLightFromTime(dt);
            if (weatherState === 'active' && weatherType === 'clear') {
                const target = getSkyColor(gameTime);
                if (!_skyLerpColor) _skyLerpColor = target.clone();
                const k = 1 - Math.exp(-Math.max(0, dt) / SKY_CLEAR_LERP_TAU_SEC);
                _skyLerpColor.r += (target.r - _skyLerpColor.r) * k;
                _skyLerpColor.g += (target.g - _skyLerpColor.g) * k;
                _skyLerpColor.b += (target.b - _skyLerpColor.b) * k;
                scene.background = _skyLerpColor.clone();
                const hx = '#' + ('000000' + _skyLerpColor.getHex().toString(16)).slice(-6);
                document.body.style.background = 'linear-gradient(to bottom,' + hx + ' 0%,' + hx + ' 100%)';
                const df = getDayFactor(gameTime);
                if (df < 0.05) scene.fog = new THREE.Fog(_skyLerpColor.getHex(), 400, 1200);
                else scene.fog = null;
            } else if (weatherState === 'active' && weatherType !== 'clear') {
                _skyLerpColor = null;
            }
            updateTimeHUD();
        }
        function initTimeWeatherSystems() {

        function setWeather(type) {

        function cmdTime(args) {
            const output = document.createElement('div');
            if (!args || args.length === 0) {
                const hours = ((gameTime % 1) + 1) % 1 * 24;
                const h = Math.floor(hours) % 24;
                const m = Math.floor((hours - Math.floor(hours)) * 60);
                output.textContent = '游戏时间 ' + h.toString().padStart(2, '0') + ':' + m.toString().padStart(2, '0') + '  gameTime=' + gameTime.toFixed(4);
                consoleOutput.appendChild(output);
                return;
            }
            const a0 = String(args[0]).toLowerCase();
            if (a0 === 'dawn' || a0 === '日出') gameTime = 0.26;
            else if (a0 === 'noon' || a0 === '正午') gameTime = 0.5;
            else if (a0 === 'dusk' || a0 === '日落') gameTime = 0.76;
            else if (a0 === 'midnight' || a0 === '午夜' || a0 === 'night') gameTime = 0;
            else if (/^\d{1,2}:\d{2}$/.test(args[0])) {
                const parts = args[0].split(':');
                const hh = Math.min(23, Math.max(0, parseInt(parts[0], 10)));
                const mm = Math.min(59, Math.max(0, parseInt(parts[1], 10)));
                gameTime = (hh + mm / 60) / 24;
            } else {
                const n = parseFloat(args[0]);
                if (!isNaN(n)) {
                    if (n >= 0 && n <= 1) gameTime = n;
                    else gameTime = (((n % 24) + 24) % 24) / 24;
                }
            }
            gameTime = ((gameTime % 1) + 1) % 1;
            output.textContent = '已设置时间 gameTime=' + gameTime.toFixed(4);
            consoleOutput.appendChild(output);
            updateSunLightFromTime();
        }
        function cmdWeather(args) {
            const output = document.createElement('div');
            if (!args || args.length === 0) {
                output.textContent = '用法：weather clear | rain | snow | fog';
                consoleOutput.appendChild(output);
                return;
            }
            const k = String(args[0]).toLowerCase();
            if (!WEATHER_PARAMS[k]) {
                output.textContent = '未知天气类型';
                consoleOutput.appendChild(output);
                return;
            }
            setWeather(k);
            output.textContent = '正在过渡到：' + k;
            consoleOutput.appendChild(output);
        }

        // 创建铁链
        function createChains(position) {
            const chainGroup = new THREE.Group();
            
            // 创建铁链的材质
            const chainMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x555555,
                metalness: 0.8,
                roughness: 0.2
            });
            
            // 创建脚链
            const footChainGeometry = new THREE.TorusGeometry(0.15, 0.02, 8, 16);
            
            const leftFootChain = new THREE.Mesh(footChainGeometry, chainMaterial);
            leftFootChain.position.set(position.x - 0.15, position.y + 0.1, position.z);
            leftFootChain.rotation.x = Math.PI / 2;
            chainGroup.add(leftFootChain);
            
            const rightFootChain = new THREE.Mesh(footChainGeometry, chainMaterial);
            rightFootChain.position.set(position.x + 0.15, position.y + 0.1, position.z);
            rightFootChain.rotation.x = Math.PI / 2;
            chainGroup.add(rightFootChain);
            
            // 创建连接链条
            const linkGeometry = new THREE.CylinderGeometry(0.015, 0.015, 0.1, 8);
            
            // 左脚链条连接到墙壁
            for (let i = 0; i < 5; i++) {
                const link = new THREE.Mesh(linkGeometry, chainMaterial);
                link.position.set(
                    position.x - 0.15 - (i * 0.3),
                    position.y + 0.1,
                    position.z
                );
                link.rotation.z = Math.PI / 2;
                chainGroup.add(link);
            }
            
            // 右脚链条连接到墙壁
            for (let i = 0; i < 5; i++) {
                const link = new THREE.Mesh(linkGeometry, chainMaterial);
                link.position.set(
                    position.x + 0.15 + (i * 0.3),
                    position.y + 0.1,
                    position.z
                );
                link.rotation.z = Math.PI / 2;
                chainGroup.add(link);
            }
            
            // 添加投影
            chainGroup.traverse(function(child) {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            
            chains.push(chainGroup);
            scene.add(chainGroup);
        }

        // 创建赵老师标签
        function createTeacherLabel(position) {
            // 创建画布来绘制文字
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 256;
            canvas.height = 64;
            
            // 设置字体样式
            context.font = 'Bold 36px Microsoft YaHei';
            context.fillStyle = 'rgba(255, 255, 255, 1.0)';
            context.strokeStyle = 'rgba(0, 0, 0, 1.0)';
            context.lineWidth = 4;
            
            // 绘制文字
            const text = '赵老师';
            const textWidth = context.measureText(text).width;
            const x = (canvas.width - textWidth) / 2;
            const y = 45;
            
            // 先绘制描边，再绘制填充

            isWalking = false;
            targetWalkSpeed = 0;
            walkSpeed = 0;
            walkCycle = 0;

            isJumping = false;

            resetWalkAnimation();

        // 新增：生成脚步声音效
        function generateFootstepSound() {
            if (!audioContext) return;
            
            // 解锁音频上下文（某些浏览器需要用户交互）
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
            
            // 创建音频节点
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            const filterNode = audioContext.createBiquadFilter();
            
            // 连接音频节点
            oscillator.connect(filterNode);
            filterNode.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            // 设置脚步声参数
            oscillator.type = 'brown'; // 使用棕色噪声，如果不支持则降级到其他类型
            if (!oscillator.type || oscillator.type !== 'brown') {
                oscillator.type = 'square';
            }
            
            // 设置频率（模拟脚步的低频声音）
            oscillator.frequency.setValueAtTime(60 + Math.random() * 40, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(30, audioContext.currentTime + 0.1);
            
            // 设置滤波器
            filterNode.type = 'lowpass';
            filterNode.frequency.setValueAtTime(200, audioContext.currentTime);
            filterNode.Q.setValueAtTime(1, audioContext.currentTime);
            
            // 设置音量包络
            gainNode.gain.setValueAtTime(0, audioContext.currentTime);
            gainNode.gain.linearRampToValueAtTime(masterVolume * 0.5, audioContext.currentTime + 0.01);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.15);
            
            // 播放音效
            const startTime = audioContext.currentTime;
            oscillator.start(startTime);
            oscillator.stop(startTime + 0.15);
        }
