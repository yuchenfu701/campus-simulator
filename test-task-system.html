<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务系统测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f0f0f0;
        }
        .test-section {
            background: white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
    </style>
</head>
<body>
    <h1>任务系统诊断工具</h1>
    
    <div class="test-section">
        <h2>步骤1：检查数据</h2>
        <button onclick="checkData()">检查存储数据</button>
        <div id="dataResult"></div>
    </div>
    
    <div class="test-section">
        <h2>步骤2：模拟完成任务</h2>
        <button onclick="simulateTask('task_pe_teacher', '629457298')">完成体育老师任务</button>
        <button onclick="simulateTask('task_chinese_teacher', '35792468001')">完成语文老师任务</button>
        <div id="taskResult"></div>
    </div>
    
    <div class="test-section">
        <h2>步骤3：清除任务完成记录</h2>
        <button onclick="clearTasks()">清除所有任务记录</button>
        <div id="clearResult"></div>
    </div>
    
    <script>
        function checkData() {
            const user = JSON.parse(localStorage.getItem('campus_user') || '{}');
            const points = JSON.parse(localStorage.getItem('campus_points_system') || '{}');
            const tasks = JSON.parse(localStorage.getItem('completed_tasks') || '{}');
            
            const result = document.getElementById('dataResult');
            result.innerHTML = `
                <h3 class="success">当前数据：</h3>
                <p><strong>用户ID:</strong> ${user.userId || '未登录'}</p>
                <p><strong>昵称:</strong> ${user.nickname || '无'}</p>
                <p><strong>积分:</strong> ${points.students && points.students[user.userId] ? points.students[user.userId].points : '无数据'}</p>
                <h3>已完成的任务：</h3>
                <pre>${JSON.stringify(tasks, null, 2)}</pre>
            `;
        }
        
        function simulateTask(taskId, code) {
            const user = JSON.parse(localStorage.getItem('campus_user') || '{}');
            const userId = user.userId;
            
            if (!userId) {
                alert('❌ 请先登录！打开 login.html 登录后再试。');
                return;
            }
            
            // 检查是否已完成
            const tasks = JSON.parse(localStorage.getItem('completed_tasks') || '{}');
            if (tasks[userId] && tasks[userId][taskId]) {
                alert('⚠️ 该任务已完成！');
                return;
            }
            
            // 标记任务完成
            if (!tasks[userId]) tasks[userId] = {};
            tasks[userId][taskId] = {
                completed: true,
                completedAt: new Date().toISOString()
            };
            localStorage.setItem('completed_tasks', JSON.stringify(tasks));
            
            // 发放积分
            const points = JSON.parse(localStorage.getItem('campus_points_system') || '{}');
            if (points.students && points.students[userId]) {
                points.students[userId].points += 100;
                points.students[userId].totalEarned += 100;
                localStorage.setItem('campus_points_system', JSON.stringify(points));
                
                alert('✅ 任务完成！获得100积分');
                checkData();
            } else {
                alert('❌ 未找到用户积分数据');
            }
        }
        
        function clearTasks() {
            if (confirm('确定要清除所有任务完成记录吗？')) {
                localStorage.removeItem('completed_tasks');
                document.getElementById('clearResult').innerHTML = '<p class="success">✅ 已清除所有任务记录</p>';
                checkData();
            }
        }
        
        // 自动检查数据
        checkData();
    </script>
</body>
</html>
