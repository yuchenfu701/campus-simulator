name: Build Electron App

on:
  push:
    tags:
      - 'v*'          # 打 v2.0.1 这样的 tag 时触发
  workflow_dispatch:  # 也可以在 GitHub 网页手动点击运行

permissions:
  contents: write   # 需要写权限才能上传到 Releases

jobs:
  # ─── Windows 构建 ─────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build Windows
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*.exe
          retention-days: 7

  # ─── macOS 构建 ───────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build macOS
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 没有 Apple 开发者证书时用这个跳过代码签名
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/*.dmg
          retention-days: 7

  # ─── 发布 Release（有 tag 时才运行）─────────────────────────
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: ./release

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: ./release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release/*
          name: "爱哲安民未来学校 ${{ github.ref_name }}"
          body: |
            ## 下载说明

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | 🪟 Windows | `*-Setup.exe` | 标准安装包 |
            | 🪟 Windows | `*-Portable.exe` | 免安装便携版 |
            |  macOS | `*.dmg` | 拖入应用程序文件夹即可 |

            > macOS 首次打开若提示「无法验证开发者」，右键点击 → 打开 → 仍然打开
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
