<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识问答 - 爱哲安民未来学校</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .game-container {
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .header .info {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            font-size: 16px;
            color: #666;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .info-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin-top: 5px;
        }
        
        .question-container {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .question-text {
            font-size: 20px;
            color: #333;
            text-align: center;
            line-height: 1.6;
        }
        
        .question-category {
            display: inline-block;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 15px;
        }

        /* 分类颜色 */
        .cat-语文  { background: linear-gradient(135deg, #e53e3e, #c53030) !important; }
        .cat-数学  { background: linear-gradient(135deg, #3182ce, #2b6cb0) !important; }
        .cat-英语  { background: linear-gradient(135deg, #38a169, #276749) !important; }
        .cat-科学  { background: linear-gradient(135deg, #00b5d8, #0987a0) !important; }
        .cat-历史  { background: linear-gradient(135deg, #dd6b20, #c05621) !important; }
        .cat-地理  { background: linear-gradient(135deg, #319795, #2c7a7b) !important; }
        .cat-趣味  { background: linear-gradient(135deg, #d69e2e, #b7791f) !important; }
        .cat-脑筋急转弯 { background: linear-gradient(135deg, #805ad5, #6b46c1) !important; }
        .cat-校园生活   { background: linear-gradient(135deg, #667eea, #764ba2) !important; }
        
        .options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .option {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 16px 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
            text-align: left;
        }
        
        .option:hover {
            border-color: #667eea;
            transform: translateX(5px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }
        
        .option.selected {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-color: #667eea;
        }
        
        .option.correct {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
            border-color: #48bb78;
        }
        
        .option.wrong {
            background: linear-gradient(135deg, #f56565, #e53e3e);
            color: white;
            border-color: #f56565;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .result-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .result-modal.show {
            display: flex;
        }
        
        .result-content {
            background: white;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            animation: slideIn 0.3s;
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .result-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .result-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .result-info {
            color: #666;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>📝 知识问答</h1>
            <div class="info">
                <div class="info-item">
                    <span>题目</span>
                    <span class="info-value" id="questionNum">1/10</span>
                </div>
                <div class="info-item">
                    <span>得分</span>
                    <span class="info-value" id="score">0</span>
                </div>
            </div>
        </div>
        
        <div class="question-container">
            <div>
                <span class="question-category" id="category">语文</span>
                <div class="question-text" id="questionText">加载中...</div>
            </div>
        </div>
        
        <div class="options" id="options"></div>
        
        <div class="controls">
            <button class="btn btn-primary" id="submitBtn" onclick="submitAnswer()" disabled>提交答案</button>
            <button class="btn btn-secondary" onclick="goBack()">返回</button>
        </div>
    </div>
    
    <div class="result-modal" id="resultModal">
        <div class="result-content">
            <div class="result-icon" id="resultIcon">🎉</div>
            <div class="result-title" id="resultTitle">答题完成！</div>
            <div class="result-info">
                <p>正确: <span id="finalCorrect">0</span>/10</p>
                <p>得分: <span id="finalScore">0</span></p>
                <p style="margin-top: 15px; color: #667eea; font-weight: bold;">+10 积分</p>
            </div>
            <button class="btn btn-primary" onclick="startNewGame()">再来一局</button>
        </div>
    </div>
    
    <script>
        // 题库数据
        const questions = [
            // 语文
            { category: '语文', question: '"床前明月光"的下一句是？', options: ['疑是地上霜', '举头望明月', '低头思故乡', '春眠不觉晓'], correct: 0 },
            { category: '语文', question: '《红楼梦》的作者是？', options: ['曹雪芹', '施耐庵', '罗贯中', '吴承恩'], correct: 0 },
            { category: '语文', question: '"但愿人长久"的下一句是？', options: ['千里共婵娟', '把酒问青天', '高处不胜寒', '人有悲欢离合'], correct: 0 },
            
            // 数学
            { category: '数学', question: '2的3次方等于？', options: ['6', '8', '9', '12'], correct: 1 },
            { category: '数学', question: '圆的周长公式是？', options: ['πr²', '2πr', 'πd', '2πd'], correct: 1 },
            { category: '数学', question: '三角形的内角和是？', options: ['90°', '180°', '270°', '360°'], correct: 1 },
            
            // 英语
            { category: '英语', question: '"Hello"的中文意思是？', options: ['再见', '你好', '谢谢', '对不起'], correct: 1 },
            { category: '英语', question: '"Apple"的中文意思是？', options: ['苹果', '香蕉', '橙子', '葡萄'], correct: 0 },
            { category: '英语', question: '"Thank you"的中文意思是？', options: ['不客气', '谢谢', '对不起', '请'], correct: 1 },
            
            // 科学
            { category: '科学', question: '水的化学式是？', options: ['H₂O', 'CO₂', 'O₂', 'H₂'], correct: 0 },
            { category: '科学', question: '光速约为？', options: ['3×10⁸ m/s', '3×10⁶ m/s', '3×10¹⁰ m/s', '3×10¹² m/s'], correct: 0 },
            { category: '科学', question: '地球绕太阳公转一周需要？', options: ['365天', '366天', '364天', '367天'], correct: 0 },
            
            // 历史
            { category: '历史', question: '中华人民共和国成立于？', options: ['1948年', '1949年', '1950年', '1951年'], correct: 1 },
            { category: '历史', question: '中国古代四大发明不包括？', options: ['造纸术', '指南针', '火药', '计算机'], correct: 3 },
            { category: '历史', question: '《史记》的作者是？', options: ['司马迁', '司马光', '司马相如', '司马懿'], correct: 0 },
            
            // 地理
            { category: '地理', question: '中国的首都是？', options: ['上海', '北京', '广州', '深圳'], correct: 1 },
            { category: '地理', question: '世界上最大的海洋是？', options: ['大西洋', '印度洋', '太平洋', '北冰洋'], correct: 2 },
            { category: '地理', question: '珠穆朗玛峰位于？', options: ['中国和尼泊尔', '中国和印度', '中国和巴基斯坦', '中国和缅甸'], correct: 0 },

            // ── 语文（扩充）────────────────────────────────────────────────
            { category: '语文', question: '"春眠不觉晓"的下一句是？', options: ['处处闻啼鸟', '夜来风雨声', '花落知多少', '明月别枝惊鹊'], correct: 0 },
            { category: '语文', question: '《西游记》中唐僧的真实身份是？', options: ['金蝉子转世', '如来弟子', '东土大唐高僧', '观音菩萨的弟子'], correct: 0 },
            { category: '语文', question: '"落霞与孤鹜齐飞"的下一句是？', options: ['秋水共长天一色', '霜天晓角', '碧云天，黄叶地', '残阳铺水中'], correct: 0 },
            { category: '语文', question: '李白被称为？', options: ['诗圣', '诗仙', '诗鬼', '诗魔'], correct: 1 },
            { category: '语文', question: '"温故而知新"出自哪部著作？', options: ['《孟子》', '《论语》', '《大学》', '《中庸》'], correct: 1 },
            { category: '语文', question: '《水浒传》中"及时雨"是谁的绰号？', options: ['林冲', '武松', '宋江', '李逵'], correct: 2 },
            { category: '语文', question: '杜甫被称为？', options: ['诗仙', '诗圣', '诗鬼', '诗神'], correct: 1 },
            { category: '语文', question: '"横眉冷对千夫指，俯首甘为孺子牛"是谁写的？', options: ['鲁迅', '郭沫若', '茅盾', '冰心'], correct: 0 },

            // ── 数学（扩充）────────────────────────────────────────────────
            { category: '数学', question: '1到100的整数之和是？', options: ['4950', '5000', '5050', '5100'], correct: 2 },
            { category: '数学', question: '勾股定理适用于哪种三角形？', options: ['等边三角形', '直角三角形', '等腰三角形', '所有三角形'], correct: 1 },
            { category: '数学', question: '圆周率 π 约等于？', options: ['3.14', '3.1415', '3.1416', '3.1415926'], correct: 2 },
            { category: '数学', question: '质数是指？', options: ['只能被1和自身整除的数', '偶数', '能被2整除的数', '大于10的数'], correct: 0 },
            { category: '数学', question: '一元二次方程 x²-5x+6=0 的解是？', options: ['x=2或x=3', 'x=1或x=6', 'x=-2或x=-3', 'x=2或x=-3'], correct: 0 },
            { category: '数学', question: '正方形的面积公式是？', options: ['4a', '2(a+b)', 'a²', 'πr²'], correct: 2 },

            // ── 英语（扩充）────────────────────────────────────────────────
            { category: '英语', question: '"School" 的中文意思是？', options: ['学校', '图书馆', '医院', '公园'], correct: 0 },
            { category: '英语', question: '"I love you" 翻译成中文是？', options: ['我喜欢你', '我爱你', '我需要你', '我想你'], correct: 1 },
            { category: '英语', question: '"Delicious" 的中文意思是？', options: ['漂亮的', '美味的', '有趣的', '困难的'], correct: 1 },
            { category: '英语', question: '"书"的英文单词是？', options: ['Desk', 'Pen', 'Book', 'Chair'], correct: 2 },
            { category: '英语', question: 'How do you say "再见" in English?', options: ['Hello', 'Sorry', 'Goodbye', 'Please'], correct: 2 },
            { category: '英语', question: '"Beautiful" 的反义词是？', options: ['Ugly', 'Small', 'Tall', 'Fast'], correct: 0 },

            // ── 科学（扩充）────────────────────────────────────────────────
            { category: '科学', question: '人体最大的器官是？', options: ['心脏', '大脑', '皮肤', '肺'], correct: 2 },
            { category: '科学', question: '声音在空气中的传播速度约为？', options: ['340 m/s', '300000 km/s', '1500 m/s', '1200 m/s'], correct: 0 },
            { category: '科学', question: '植物进行光合作用需要什么？', options: ['氧气和水', '二氧化碳、水和光能', '氮气和光能', '氧气和光能'], correct: 1 },
            { category: '科学', question: '人体血液中负责携带氧气的是？', options: ['白细胞', '血小板', '红细胞', '血浆'], correct: 2 },
            { category: '科学', question: '地球距离太阳最近时，是北半球的什么季节？', options: ['夏季', '秋季', '冬季', '春季'], correct: 2 },
            { category: '科学', question: 'DNA的中文全称是？', options: ['脱氧核糖核酸', '核糖核酸', '氨基酸', '蛋白质'], correct: 0 },
            { category: '科学', question: '牛顿第一定律又叫做？', options: ['万有引力定律', '惯性定律', '作用反作用定律', '加速度定律'], correct: 1 },

            // ── 历史（扩充）────────────────────────────────────────────────
            { category: '历史', question: '秦始皇统一中国是在哪一年？', options: ['前221年', '前206年', '前202年', '前256年'], correct: 0 },
            { category: '历史', question: '丝绸之路的起点是？', options: ['洛阳', '长安（西安）', '北京', '南京'], correct: 1 },
            { category: '历史', question: '第一次世界大战结束于哪一年？', options: ['1914年', '1918年', '1939年', '1945年'], correct: 1 },
            { category: '历史', question: '中国长城修建主要为了防御哪个方向的入侵？', options: ['东方', '南方', '西方', '北方'], correct: 3 },
            { category: '历史', question: '郑和下西洋最远到达了哪里？', options: ['印度', '东南亚', '非洲东海岸', '欧洲'], correct: 2 },
            { category: '历史', question: '"五四运动"发生于哪一年？', options: ['1911年', '1919年', '1921年', '1927年'], correct: 1 },

            // ── 地理（扩充）────────────────────────────────────────────────
            { category: '地理', question: '世界上最长的河流是？', options: ['亚马逊河', '尼罗河', '长江', '密西西比河'], correct: 1 },
            { category: '地理', question: '中国面积最大的省区是？', options: ['西藏', '内蒙古', '新疆', '青海'], correct: 2 },
            { category: '地理', question: '黄河发源于哪个省？', options: ['陕西', '甘肃', '青海', '四川'], correct: 2 },
            { category: '地理', question: '下列哪个城市不是直辖市？', options: ['北京', '上海', '广州', '重庆'], correct: 2 },
            { category: '地理', question: '赤道经过哪个大洲最多？', options: ['亚洲', '非洲', '南美洲', '大洋洲'], correct: 1 },

            // ── 趣味科普 ────────────────────────────────────────────────────
            { category: '趣味', question: '蜜蜂跳"8字舞"是为了什么？', options: ['庆祝找到蜂巢', '告诉同伴食物方向和距离', '吸引配偶', '驱赶天敌'], correct: 1 },
            { category: '趣味', question: '鸵鸟蛋是世界上最大的什么？', options: ['动物', '蛋', '鸟', '细胞'], correct: 1 },
            { category: '趣味', question: '人每天眨眼约多少次？', options: ['1000次', '5000次', '15000次', '30000次'], correct: 2 },
            { category: '趣味', question: '哪种动物的眼睛可以分别朝不同方向看？', options: ['狗', '老虎', '变色龙', '猫头鹰'], correct: 2 },
            { category: '趣味', question: '彩虹通常有几种颜色？', options: ['5种', '6种', '7种', '8种'], correct: 2 },
            { category: '趣味', question: '人体骨骼共有多少块？', options: ['106块', '206块', '306块', '256块'], correct: 1 },
            { category: '趣味', question: '光合作用释放的气体是？', options: ['二氧化碳', '氮气', '氧气', '氢气'], correct: 2 },
            { category: '趣味', question: '世界上最大的动物是？', options: ['大象', '蓝鲸', '鲨鱼', '霸王龙'], correct: 1 },

            // ── 脑筋急转弯 ─────────────────────────────────────────────────
            { category: '脑筋急转弯', question: '什么东西越洗越脏？', options: ['衣服', '水', '镜子', '手'], correct: 1 },
            { category: '脑筋急转弯', question: '"黄鼠狼给鸡拜年"下一句是？', options: ['没安好心', '当然欢迎', '不怀好意', '以上都对'], correct: 0 },
            { category: '脑筋急转弯', question: '兔子跑步最快能有多快？不是问速度，而是为什么它总跑赢乌龟？', options: ['腿长', '坚持不懈', '因为故事里乌龟赢了', '永不偷懒'], correct: 2 },
            { category: '脑筋急转弯', question: '什么样的路不能走？', options: ['泥路', '山路', '死路', '弯路'], correct: 2 },
            { category: '脑筋急转弯', question: '一个人站在镜子前，他在镜中的像是几个人？', options: ['0', '1', '2', '无数'], correct: 1 },

            // ── 校园生活 ────────────────────────────────────────────────────
            { category: '校园生活', question: '下列哪个行为是不文明行为？', options: ['弯腰捡垃圾', '上课认真听讲', '课间大声喧哗', '主动帮助同学'], correct: 2 },
            { category: '校园生活', question: '学校里"班长"的英文是？', options: ['Monitor', 'Teacher', 'Principal', 'Student'], correct: 0 },
            { category: '校园生活', question: '校园里看到同学欺凌他人，应该怎么做？', options: ['视而不见', '加入欺凌', '向老师报告', '拍视频发网上'], correct: 2 },
            { category: '校园生活', question: '考试时发现旁边同学在抄你的答案，正确做法是？', options: ['让他抄', '盖上答案并提醒他', '举报他', '假装没看见'], correct: 1 },
            { category: '校园生活', question: '图书馆里应该保持什么状态？', options: ['大声讨论', '安静阅读', '边看书边吃零食', '随意走动'], correct: 1 }
        ];
        
        // 游戏状态
        let gameState = {
            currentQuestions: [],
            currentIndex: 0,
            selectedOption: null,
            score: 0,
            correctCount: 0
        };
        
        // 初始化游戏
        function initGame() {
            // 随机选择10道题
            const shuffled = [...questions].sort(() => Math.random() - 0.5);
            gameState.currentQuestions = shuffled.slice(0, 10);
            gameState.currentIndex = 0;
            gameState.selectedOption = null;
            gameState.score = 0;
            gameState.correctCount = 0;
            
            loadQuestion();
        }
        
        // 加载题目
        function loadQuestion() {
            const question = gameState.currentQuestions[gameState.currentIndex];
            
            const catEl = document.getElementById('category');
            catEl.textContent = question.category;
            // 去掉旧分类 class，加上新的
            catEl.className = 'question-category cat-' + question.category;
            document.getElementById('questionText').textContent = question.question;
            document.getElementById('questionNum').textContent = `${gameState.currentIndex + 1}/10`;
            document.getElementById('submitBtn').disabled = true;
            gameState.selectedOption = null;
            
            // 渲染选项
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, index) => {
                const optionElement = document.createElement('div');
                optionElement.className = 'option';
                optionElement.textContent = option;
                optionElement.onclick = () => selectOption(index);
                optionsContainer.appendChild(optionElement);
            });
        }
        
        // 选择选项
        function selectOption(index) {
            if (gameState.selectedOption !== null) return;
            
            gameState.selectedOption = index;
            document.getElementById('submitBtn').disabled = false;
            
            // 更新UI
            const options = document.querySelectorAll('.option');
            options.forEach((opt, i) => {
                if (i === index) {
                    opt.classList.add('selected');
                } else {
                    opt.classList.remove('selected');
                }
            });
        }
        
        // 提交答案
        function submitAnswer() {
            if (gameState.selectedOption === null) return;
            
            const question = gameState.currentQuestions[gameState.currentIndex];
            const options = document.querySelectorAll('.option');
            const isCorrect = gameState.selectedOption === question.correct;
            
            // 显示正确答案
            options.forEach((opt, index) => {
                opt.onclick = null;
                if (index === question.correct) {
                    opt.classList.add('correct');
                } else if (index === gameState.selectedOption && !isCorrect) {
                    opt.classList.add('wrong');
                }
            });
            
            if (isCorrect) {
                gameState.correctCount++;
                gameState.score += 10;
                document.getElementById('score').textContent = gameState.score;
            }
            
            // 禁用提交按钮
            document.getElementById('submitBtn').disabled = true;
            
            // 下一题或结束
            setTimeout(() => {
                gameState.currentIndex++;
                if (gameState.currentIndex < gameState.currentQuestions.length) {
                    loadQuestion();
                } else {
                    showResult();
                }
            }, 1500);
        }
        
        // 显示结果
        function showResult() {
            document.getElementById('finalCorrect').textContent = gameState.correctCount;
            document.getElementById('finalScore').textContent = gameState.score;
            
            if (gameState.correctCount === 10) {
                document.getElementById('resultIcon').textContent = '🏆';
                document.getElementById('resultTitle').textContent = '完美！全对！';
            } else if (gameState.correctCount >= 7) {
                document.getElementById('resultIcon').textContent = '🎉';
                document.getElementById('resultTitle').textContent = '很棒！';
            } else {
                document.getElementById('resultIcon').textContent = '💪';
                document.getElementById('resultTitle').textContent = '继续加油！';
            }
            
            document.getElementById('resultModal').classList.add('show');
            
            // 奖励积分
            awardPoints(10);
        }
        
        // 奖励积分
        function awardPoints(points) {
            try {
                if (typeof PointsSystem !== 'undefined') {
                    const ps = new PointsSystem();
                    if (ps.awardGamePoints(points, '知识问答游戏', '小游戏')) {
                        console.log('✅ 获得 ' + points + ' 积分（已写入校园积分）');
                    } else {
                        console.warn('积分未写入：请先登录');
                    }
                }
            } catch (e) {
                console.warn('积分系统', e);
            }
        }
        
        // 开始新游戏
        function startNewGame() {
            document.getElementById('resultModal').classList.remove('show');
            initGame();
        }
        
        // 返回
        function goBack() {
            if (window.parent && window.parent.document.getElementById('close-web-btn')) {
                window.parent.document.getElementById('close-web-btn').click();
            } else {
                window.location.href = '../campus-games.html';
            }
        }
        
        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', () => {
            initGame();
        });
        
        // 加载积分系统
        if (typeof PointsSystem === 'undefined') {
            const script = document.createElement('script');
            script.src = '../js/points-system.js';
            document.head.appendChild(script);
        }
    </script>
</body>
</html>
