<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>速算挑战 - 爱哲安民未来学校</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .game-container {
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .header .info {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            font-size: 16px;
            color: #666;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .info-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin-top: 5px;
        }
        
        .question-container {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .question-text {
            font-size: 48px;
            color: white;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        .answer-input {
            width: 100%;
            padding: 20px;
            font-size: 32px;
            text-align: center;
            border: 3px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s;
        }
        
        .answer-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        .answer-input.correct {
            border-color: #48bb78;
            background: #f0fff4;
        }
        
        .answer-input.wrong {
            border-color: #f56565;
            background: #fff5f5;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .feedback {
            text-align: center;
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            min-height: 30px;
        }
        
        .feedback.correct {
            color: #48bb78;
        }
        
        .feedback.wrong {
            color: #f56565;
        }
        
        .result-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .result-modal.show {
            display: flex;
        }
        
        .result-content {
            background: white;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            animation: slideIn 0.3s;
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .result-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .result-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .result-info {
            color: #666;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🔢 速算挑战</h1>
            <div class="info">
                <div class="info-item">
                    <span>题目</span>
                    <span class="info-value" id="questionNum">1/20</span>
                </div>
                <div class="info-item">
                    <span>正确</span>
                    <span class="info-value" id="correct">0</span>
                </div>
                <div class="info-item">
                    <span>时间</span>
                    <span class="info-value" id="time">0</span>
                </div>
            </div>
        </div>
        
        <div class="question-container">
            <div class="question-text" id="questionText">加载中...</div>
            <input type="number" class="answer-input" id="answerInput" placeholder="输入答案" autofocus>
            <div class="feedback" id="feedback"></div>
        </div>
        
        <div class="controls">
            <button class="btn btn-primary" onclick="submitAnswer()">提交答案</button>
            <button class="btn btn-secondary" onclick="goBack()">返回</button>
        </div>
    </div>
    
    <div class="result-modal" id="resultModal">
        <div class="result-content">
            <div class="result-icon" id="resultIcon">🎉</div>
            <div class="result-title" id="resultTitle">挑战完成！</div>
            <div class="result-info">
                <p>正确: <span id="finalCorrect">0</span>/20</p>
                <p>用时: <span id="finalTime">0</span> 秒</p>
                <p>得分: <span id="finalScore">0</span></p>
                <p style="margin-top: 15px; color: #667eea; font-weight: bold;">+12 积分</p>
            </div>
            <button class="btn btn-primary" onclick="startNewGame()">再来一局</button>
        </div>
    </div>
    
    <script>
        // 游戏状态
        let gameState = {
            currentQuestion: null,
            questionIndex: 0,
            correctCount: 0,
            startTime: null,
            timer: null,
            isComplete: false
        };
        
        // 生成题目
        function generateQuestion() {
            const operations = ['+', '-', '×', '÷'];
            const operation = operations[Math.floor(Math.random() * operations.length)];
            
            let num1, num2, answer;
            
            switch(operation) {
                case '+':
                    num1 = Math.floor(Math.random() * 50) + 1;
                    num2 = Math.floor(Math.random() * 50) + 1;
                    answer = num1 + num2;
                    break;
                case '-':
                    num1 = Math.floor(Math.random() * 50) + 25;
                    num2 = Math.floor(Math.random() * num1);
                    answer = num1 - num2;
                    break;
                case '×':
                    num1 = Math.floor(Math.random() * 12) + 1;
                    num2 = Math.floor(Math.random() * 12) + 1;
                    answer = num1 * num2;
                    break;
                case '÷':
                    num2 = Math.floor(Math.random() * 12) + 1;
                    answer = Math.floor(Math.random() * 12) + 1;
                    num1 = num2 * answer;
                    break;
            }
            
            return {
                question: `${num1} ${operation} ${num2} = ?`,
                answer: answer
            };
        }
        
        // 初始化游戏
        function initGame() {
            gameState.questionIndex = 0;
            gameState.correctCount = 0;
            gameState.startTime = Date.now();
            gameState.isComplete = false;
            
            loadQuestion();
            startTimer();
        }
        
        // 加载题目
        function loadQuestion() {
            gameState.currentQuestion = generateQuestion();
            document.getElementById('questionText').textContent = gameState.currentQuestion.question;
            document.getElementById('questionNum').textContent = `${gameState.questionIndex + 1}/20`;
            document.getElementById('answerInput').value = '';
            document.getElementById('answerInput').classList.remove('correct', 'wrong');
            document.getElementById('feedback').textContent = '';
            document.getElementById('answerInput').focus();
        }
        
        // 提交答案
        function submitAnswer() {
            if (gameState.isComplete) return;
            
            const input = document.getElementById('answerInput');
            const userAnswer = parseInt(input.value);
            const correctAnswer = gameState.currentQuestion.answer;
            
            if (isNaN(userAnswer)) {
                document.getElementById('feedback').textContent = '请输入数字！';
                document.getElementById('feedback').className = 'feedback wrong';
                return;
            }
            
            const isCorrect = userAnswer === correctAnswer;
            
            if (isCorrect) {
                gameState.correctCount++;
                input.classList.add('correct');
                input.classList.remove('wrong');
                document.getElementById('feedback').textContent = '✓ 正确！';
                document.getElementById('feedback').className = 'feedback correct';
            } else {
                input.classList.add('wrong');
                input.classList.remove('correct');
                document.getElementById('feedback').textContent = `✗ 错误！正确答案是 ${correctAnswer}`;
                document.getElementById('feedback').className = 'feedback wrong';
            }
            
            // 更新正确数
            document.getElementById('correct').textContent = gameState.correctCount;
            
            // 下一题或结束
            setTimeout(() => {
                gameState.questionIndex++;
                if (gameState.questionIndex < 20) {
                    loadQuestion();
                } else {
                    endGame();
                }
            }, 1000);
        }
        
        // 开始计时器
        function startTimer() {
            if (gameState.timer) {
                clearInterval(gameState.timer);
            }
            
            gameState.timer = setInterval(() => {
                if (!gameState.isComplete) {
                    const elapsed = Math.floor((Date.now() - gameState.startTime) / 1000);
                    document.getElementById('time').textContent = elapsed;
                }
            }, 1000);
        }
        
        // 结束游戏
        function endGame() {
            gameState.isComplete = true;
            clearInterval(gameState.timer);
            
            const elapsed = Math.floor((Date.now() - gameState.startTime) / 1000);
            const score = gameState.correctCount * 10;
            
            document.getElementById('finalCorrect').textContent = gameState.correctCount;
            document.getElementById('finalTime').textContent = elapsed;
            document.getElementById('finalScore').textContent = score;
            
            if (gameState.correctCount === 20) {
                document.getElementById('resultIcon').textContent = '🏆';
                document.getElementById('resultTitle').textContent = '完美！全对！';
            } else if (gameState.correctCount >= 15) {
                document.getElementById('resultIcon').textContent = '🎉';
                document.getElementById('resultTitle').textContent = '很棒！';
            } else {
                document.getElementById('resultIcon').textContent = '💪';
                document.getElementById('resultTitle').textContent = '继续加油！';
            }
            
            document.getElementById('resultModal').classList.add('show');
            
            // 奖励积分
            awardPoints(12);
        }
        
        // 奖励积分
        function awardPoints(points) {
            try {
                if (typeof PointsSystem !== 'undefined') {
                    const pointsSystem = new PointsSystem();
                    const userData = JSON.parse(localStorage.getItem('campus_user') || '{}');
                    if (userData.userId) {
                        pointsSystem.setCurrentUser(userData.userId);
                        pointsSystem.addPoints(points, '速算挑战游戏');
                        console.log(`✅ 获得 ${points} 积分`);
                    }
                }
            } catch (e) {
                console.log('积分系统未加载');
            }
        }
        
        // 开始新游戏
        function startNewGame() {
            document.getElementById('resultModal').classList.remove('show');
            initGame();
        }
        
        // 返回
        function goBack() {
            if (window.parent && window.parent.document.getElementById('close-web-btn')) {
                window.parent.document.getElementById('close-web-btn').click();
            } else {
                window.location.href = '../campus-games.html';
            }
        }
        
        // 回车提交
        document.getElementById('answerInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                submitAnswer();
            }
        });
        
        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', () => {
            initGame();
        });
        
        // 加载积分系统
        if (typeof PointsSystem === 'undefined') {
            const script = document.createElement('script');
            script.src = '../js/points-system.js';
            document.head.appendChild(script);
        }
    </script>
</body>
</html>
