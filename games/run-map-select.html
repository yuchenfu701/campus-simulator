<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园跑酷 - 选择地图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* 背景粒子 */
        .bg-particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
        }

        .container {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(25px);
            border-radius: 36px;
            padding: 55px 50px;
            box-shadow: 0 30px 100px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.3);
            max-width: 820px;
            width: 100%;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 46px;
            background: linear-gradient(135deg, #667eea, #764ba2, #667eea);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 14px;
            font-weight: 800;
            animation: titleGradient 3s ease infinite, titleFloat 3s ease-in-out infinite;
            letter-spacing: 2px;
        }

        @keyframes titleGradient {
            0%, 100% { background-position: 0% 50%; }
            50%       { background-position: 100% 50%; }
        }

        @keyframes titleFloat {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-5px); }
        }

        .header p {
            font-size: 17px;
            color: #666;
            font-weight: 300;
        }

        .maps-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
            margin-bottom: 40px;
        }

        @media (max-width: 560px) {
            .maps-grid { grid-template-columns: 1fr; }
        }

        .map-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.7));
            border: 3px solid rgba(102, 126, 234, 0.2);
            border-radius: 28px;
            padding: 42px 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        .map-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(102,126,234,0.07), rgba(118,75,162,0.07));
            opacity: 0;
            transition: opacity 0.4s;
        }

        .map-card:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 0 24px 50px rgba(102, 126, 234, 0.35);
            border-color: #667eea;
        }

        .map-card:hover::before { opacity: 1; }
        .map-card:active { transform: translateY(-5px) scale(0.98); }

        /* 2D卡片特殊色调 */
        .map-card.map-2d:hover {
            box-shadow: 0 24px 50px rgba(59, 130, 246, 0.38);
            border-color: #3b82f6;
        }

        /* 3D卡片特殊色调 */
        .map-card.map-3d:hover {
            box-shadow: 0 24px 50px rgba(139, 92, 246, 0.38);
            border-color: #8b5cf6;
        }

        .map-icon {
            font-size: 90px;
            margin-bottom: 22px;
            display: block;
            animation: iconFloat 3s ease-in-out infinite;
            position: relative;
            z-index: 2;
        }

        .map-card.map-2d .map-icon { animation-delay: 0s; }
        .map-card.map-3d .map-icon { animation-delay: 0.5s; }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-10px); }
        }

        .map-card:hover .map-icon {
            animation: iconBounce 0.5s ease-in-out;
        }

        @keyframes iconBounce {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.25) rotate(-8deg); }
            70%  { transform: scale(1.1) rotate(5deg); }
            100% { transform: scale(1.15) rotate(0deg); }
        }

        .map-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 14px;
            position: relative;
            z-index: 2;
            transition: transform 0.3s;
        }

        .map-card.map-2d .map-title {
            background: linear-gradient(135deg, #3b82f6, #667eea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .map-card.map-3d .map-title {
            background: linear-gradient(135deg, #8b5cf6, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .map-card:hover .map-title { transform: scale(1.06); }

        .map-desc {
            font-size: 15px;
            color: #666;
            line-height: 1.8;
            margin-bottom: 22px;
            position: relative;
            z-index: 2;
            min-height: 55px;
        }

        .map-badge {
            display: inline-block;
            color: white;
            padding: 9px 22px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            position: relative;
            z-index: 2;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s;
        }

        .map-card.map-2d .map-badge {
            background: linear-gradient(135deg, #3b82f6, #667eea);
        }

        .map-card.map-3d .map-badge {
            background: linear-gradient(135deg, #8b5cf6, #764ba2);
        }

        .map-card:hover .map-badge {
            transform: scale(1.1);
            box-shadow: 0 6px 22px rgba(102, 126, 234, 0.6);
        }

        /* 点击波纹 */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(102, 126, 234, 0.55);
            transform: scale(0);
            animation: ripple-anim 0.6s ease-out;
            pointer-events: none;
        }

        @keyframes ripple-anim {
            to { transform: scale(4); opacity: 0; }
        }

        .controls {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        .btn-back {
            padding: 16px 38px;
            border: none;
            border-radius: 16px;
            font-size: 17px;
            cursor: pointer;
            font-weight: 700;
            background: linear-gradient(135deg, #f0f0f0, #e0e0e0);
            color: #333;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid rgba(0,0,0,0.05);
        }

        .btn-back:hover {
            background: linear-gradient(135deg, #e0e0e0, #d0d0d0);
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
        }

        .btn-back:active { transform: translateY(-2px) scale(0.98); }
    </style>
</head>
<body>
    <div class="bg-particles" id="particles"></div>

    <div class="container">
        <div class="header">
            <h1>🏃 校园跑酷</h1>
            <p>选择你喜欢的地图风格，开始精彩的跑酷之旅！</p>
        </div>

        <div class="maps-grid">
            <!-- 2D 爱哲地图 -->
            <div class="map-card map-2d" onclick="selectMap('2d', event, this)">
                <span class="map-icon">🗺️</span>
                <div class="map-title">2D 爱哲地图</div>
                <div class="map-desc">
                    经典2D像素风格校园地图，多种跑酷模式任你挑选，流畅操作体验。
                </div>
                <div class="map-badge">经典模式 · 多关卡</div>
            </div>

            <!-- 3D 虚拟地图 -->
            <div class="map-card map-3d" onclick="selectMap('3d', event, this)">
                <span class="map-icon">🏫</span>
                <div class="map-title">3D 虚拟地图</div>
                <div class="map-desc">
                    沉浸式3D虚拟校园漫游，第一人称视角自由探索教学楼，身临其境！
                </div>
                <div class="map-badge">3D沉浸 · 自由探索</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-back" onclick="goBack()">← 返回</button>
        </div>
    </div>

    <script>
        // 创建背景粒子
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 28; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.top  = Math.random() * 100 + '%';
                p.style.animationDelay    = Math.random() * 15 + 's';
                p.style.animationDuration = (10 + Math.random() * 10) + 's';
                container.appendChild(p);
            }
        }

        // 波纹效果
        function createRipple(e, el) {
            const ripple = document.createElement('span');
            const rect = el.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            ripple.style.cssText = `
                width:${size}px; height:${size}px;
                left:${e.clientX - rect.left - size/2}px;
                top:${e.clientY - rect.top - size/2}px;
            `;
            ripple.className = 'ripple';
            el.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        // 在 iframe 中使用根目录相对路径，直接访问时使用本文件的相对路径
        const mapConfig = {
            '2d': {
                iframePath: 'games/run-mode-select.html',   // 相对于根目录 index.html
                directPath: 'run-mode-select.html',          // 相对于本文件（games/ 文件夹）
                title: '🗺️ 2D 爱哲地图'
            },
            '3d': {
                iframePath: '校园企业家，教学楼小副本/index.html',  // 相对于根目录
                directPath: '../校园企业家，教学楼小副本/index.html', // 相对于本文件
                title: '🏫 3D 虚拟校园'
            }
        };

        function selectMap(type, e, el) {
            createRipple(e, el);
            el.style.transform = 'scale(0.95)';
            setTimeout(() => el.style.transform = '', 200);

            const cfg = mapConfig[type];

            // 优先调用父窗口的 openInGame（iframe 环境，路径基准为根目录）
            if (window.parent && window.parent !== window) {
                try {
                    if (typeof window.parent.openInGame === 'function') {
                        window.parent.openInGame(cfg.iframePath, cfg.title);
                        return;
                    }
                } catch (err) {
                    console.error('调用父窗口失败:', err);
                }
            }

            // 直接访问时跳转（路径相对于本文件）
            window.location.href = cfg.directPath;
        }

        // 返回
        function goBack() {
            if (window.parent && window.parent !== window) {
                try {
                    const closeBtn = window.parent.document.getElementById('close-web-btn');
                    if (closeBtn) { closeBtn.click(); return; }
                } catch (err) {}
            }
            window.location.href = '../campus-games.html';
        }

        window.addEventListener('DOMContentLoaded', createParticles);
    </script>
</body>
</html>
