<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园拼图 - 爱哲安民未来学校</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;   /* 修复：改为 flex-start，内容超高时可正常滚动 */
            padding: 20px;
        }
        
        .game-container {
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .header .info {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            font-size: 16px;
            color: #666;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .info-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin-top: 5px;
        }
        
        .puzzle-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            background: #f0f0f0;
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .puzzle-piece {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: white;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .puzzle-piece:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .puzzle-piece.empty {
            background: transparent;
            cursor: default;
        }
        
        .puzzle-piece.empty:hover {
            transform: none;
        }
        
        .puzzle-piece.correct {
            background: linear-gradient(135deg, #48bb78, #38a169);
        }
        
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .success-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .success-modal.show {
            display: flex;
        }
        
        .success-content {
            background: white;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            animation: slideIn 0.3s;
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .success-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .success-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .success-info {
            color: #666;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🧩 校园拼图</h1>
            <div class="info">
                <div class="info-item">
                    <span>步数</span>
                    <span class="info-value" id="moves">0</span>
                </div>
                <div class="info-item">
                    <span>时间</span>
                    <span class="info-value" id="time">0</span>
                </div>
            </div>
        </div>
        
        <div class="puzzle-grid" id="puzzleGrid"></div>
        
        <div class="controls">
            <button class="btn btn-primary" onclick="startNewGame()">新游戏</button>
            <button class="btn btn-secondary" onclick="goBack()">返回</button>
        </div>
    </div>
    
    <div class="success-modal" id="successModal">
        <div class="success-content">
            <div class="success-icon">🎉</div>
            <div class="success-title">恭喜完成！</div>
            <div class="success-info">
                <p>步数: <span id="finalMoves">0</span></p>
                <p>时间: <span id="finalTime">0</span> 秒</p>
                <p style="margin-top: 15px; color: #667eea; font-weight: bold;">+5 积分</p>
            </div>
            <button class="btn btn-primary" onclick="startNewGame()">再来一局</button>
        </div>
    </div>
    
    <script>
        // 游戏状态
        let gameState = {
            grid: [],
            emptyIndex: 8,
            moves: 0,
            startTime: null,
            timer: null,
            isComplete: false
        };
        
        // 初始化游戏
        function initGame() {
            // 创建1-8的数字数组，加上一个空位
            const numbers = [1, 2, 3, 4, 5, 6, 7, 8, null];
            
            // 打乱数组（确保有解）
            do {
                shuffleArray(numbers);
            } while (!isSolvable(numbers));
            
            gameState.grid = numbers;
            gameState.emptyIndex = numbers.indexOf(null);
            gameState.moves = 0;
            gameState.startTime = Date.now();
            gameState.isComplete = false;
            
            renderPuzzle();
            startTimer();
        }
        
        // 打乱数组
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }
        
        // 检查是否有解（逆序数算法）
        function isSolvable(array) {
            let inversions = 0;
            const arr = array.filter(n => n !== null);
            
            for (let i = 0; i < arr.length; i++) {
                for (let j = i + 1; j < arr.length; j++) {
                    if (arr[i] > arr[j]) {
                        inversions++;
                    }
                }
            }
            
            return inversions % 2 === 0;
        }
        
        // 渲染拼图
        function renderPuzzle() {
            const grid = document.getElementById('puzzleGrid');
            grid.innerHTML = '';
            
            gameState.grid.forEach((value, index) => {
                const piece = document.createElement('div');
                piece.className = 'puzzle-piece';
                
                if (value === null) {
                    piece.classList.add('empty');
                } else {
                    piece.textContent = value;
                    piece.onclick = () => movePiece(index);
                }
                
                // 检查是否正确位置
                if (value !== null && value === index + 1) {
                    piece.classList.add('correct');
                }
                
                grid.appendChild(piece);
            });
            
            updateMoves();
            checkWin();
        }
        
        // 移动拼图块
        function movePiece(index) {
            if (gameState.isComplete) return;
            
            const emptyIndex = gameState.emptyIndex;
            const row = Math.floor(index / 3);
            const col = index % 3;
            const emptyRow = Math.floor(emptyIndex / 3);
            const emptyCol = emptyIndex % 3;
            
            // 检查是否相邻
            const isAdjacent = (Math.abs(row - emptyRow) === 1 && col === emptyCol) ||
                              (Math.abs(col - emptyCol) === 1 && row === emptyRow);
            
            if (isAdjacent) {
                // 交换位置
                [gameState.grid[index], gameState.grid[emptyIndex]] = 
                [gameState.grid[emptyIndex], gameState.grid[index]];
                
                gameState.emptyIndex = index;
                gameState.moves++;
                
                renderPuzzle();
            }
        }
        
        // 更新步数显示
        function updateMoves() {
            document.getElementById('moves').textContent = gameState.moves;
        }
        
        // 开始计时器
        function startTimer() {
            if (gameState.timer) {
                clearInterval(gameState.timer);
            }
            
            gameState.timer = setInterval(() => {
                if (!gameState.isComplete) {
                    const elapsed = Math.floor((Date.now() - gameState.startTime) / 1000);
                    document.getElementById('time').textContent = elapsed;
                }
            }, 1000);
        }
        
        // 检查是否完成
        function checkWin() {
            const isWin = gameState.grid.every((value, index) => {
                if (index === 8) return value === null;
                return value === index + 1;
            });
            
            if (isWin && !gameState.isComplete) {
                gameState.isComplete = true;
                clearInterval(gameState.timer);
                
                const elapsed = Math.floor((Date.now() - gameState.startTime) / 1000);
                document.getElementById('finalMoves').textContent = gameState.moves;
                document.getElementById('finalTime').textContent = elapsed;
                document.getElementById('successModal').classList.add('show');
                
                // 奖励积分
                awardPoints(5);
            }
        }
        
        // 奖励积分
        function awardPoints(points) {
            try {
                if (typeof PointsSystem !== 'undefined') {
                    const ps = new PointsSystem();
                    if (ps.awardGamePoints(points, '校园拼图游戏', '小游戏')) {
                        console.log('✅ 获得 ' + points + ' 积分（已写入校园积分）');
                    } else {
                        console.warn('积分未写入：请先登录');
                    }
                }
            } catch (e) {
                console.warn('积分系统', e);
            }
        }
        
        // 开始新游戏
        function startNewGame() {
            document.getElementById('successModal').classList.remove('show');
            initGame();
        }
        
        // 返回
        function goBack() {
            if (window.parent && window.parent.document.getElementById('close-web-btn')) {
                window.parent.document.getElementById('close-web-btn').click();
            } else {
                window.location.href = '../campus-games.html';
            }
        }
        
        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', () => {
            initGame();
        });
        
        // 加载积分系统
        if (typeof PointsSystem === 'undefined') {
            const script = document.createElement('script');
            script.src = '../js/points-system.js';
            document.head.appendChild(script);
        }
    </script>
</body>
</html>
