<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园跑酷 - 爱哲安民未来学校</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
        }
        
        html {
            height: 100%;
            overflow: auto;
        }
        
        /* 背景动画粒子 */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .particle-bg {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: floatParticle 20s infinite ease-in-out;
        }
        
        @keyframes floatParticle {
            0%, 100% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }
        
        .game-container {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(25px);
            border-radius: 32px;
            padding: 35px;
            box-shadow: 0 30px 100px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.2);
            max-width: 920px;
            width: 100%;
            animation: fadeIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            z-index: 1;
            border: 2px solid rgba(255, 255, 255, 0.3);
            margin: 20px auto;
            min-height: auto;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .header h1 {
            font-size: 38px;
            background: linear-gradient(135deg, #667eea, #764ba2, #667eea);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            font-weight: 800;
            animation: titleGradient 3s ease infinite, titleFloat 3s ease-in-out infinite;
            text-shadow: 0 0 30px rgba(102, 126, 234, 0.3);
            letter-spacing: 1px;
        }
        
        @keyframes titleGradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        @keyframes titleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }
        
        .header .info {
            display: flex;
            justify-content: space-around;
            font-size: 14px;
            color: #666;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15), rgba(118, 75, 162, 0.15));
            padding: 20px;
            border-radius: 20px;
            border: 2px solid rgba(102, 126, 234, 0.2);
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.2);
            backdrop-filter: blur(10px);
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .info-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }
        
        .info-value {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: valuePulse 2s ease-in-out infinite;
        }
        
        @keyframes valuePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .combo-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            opacity: 0;
            transform: scale(0);
            transition: all 0.3s;
            z-index: 100;
        }
        
        .combo-indicator.show {
            opacity: 1;
            transform: scale(1);
            animation: comboPulse 0.5s ease-out;
        }
        
        @keyframes comboPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        .game-area {
            position: relative;
            width: 100%;
            height: 550px;
            background: linear-gradient(to bottom, #87CEEB 0%, #98D8C8 50%, #F7DC6F 100%);
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.15), 0 10px 40px rgba(0, 0, 0, 0.2);
            border: 3px solid rgba(255, 255, 255, 0.3);
            position: relative;
        }
        
        .game-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
        }
        
        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(to bottom, #90EE90 0%, #228B22 100%);
            border-top: 3px solid rgba(255, 255, 255, 0.3);
        }
        
        .ground::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 20px,
                rgba(255, 255, 255, 0.3) 20px,
                rgba(255, 255, 255, 0.3) 40px
            );
        }
        
        .player {
            position: absolute;
            bottom: 100px;
            left: 120px;
            width: 60px;
            height: 70px;
            z-index: 10;
            transition: transform 0.1s;
        }
        
        .player-body {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            position: relative;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .player-body::before {
            content: '🏃';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
        }
        
        .player.jumping {
            /* 移除CSS动画，改用JavaScript控制 */
        }
        
        .player.shield {
            animation: shieldPulse 0.5s ease-in-out infinite;
        }
        
        /* 移除旧的jump动画，改用JS控制 */
        
        @keyframes shieldPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.7); }
            50% { box-shadow: 0 0 0 15px rgba(102, 126, 234, 0); }
        }
        
        .obstacle {
            position: absolute;
            bottom: 100px;
            width: 50px;
            height: 70px;
            background: linear-gradient(135deg, #f56565, #e53e3e);
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(245, 101, 101, 0.4);
            z-index: 5;
        }
        
        .obstacle::before {
            content: '⚠️';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 30px;
        }
        
        .obstacle.tall {
            height: 100px;
        }
        
        .obstacle.wide {
            width: 80px;
            height: 50px;
        }
        
        .coin {
            position: absolute;
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
            animation: coinRotate 1s linear infinite, coinFloat 2s ease-in-out infinite;
            z-index: 6;
        }
        
        .coin::before {
            content: '💰';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
        }
        
        @keyframes coinRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes coinFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .powerup {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.6);
            animation: powerupFloat 2s ease-in-out infinite;
            z-index: 6;
        }
        
        .powerup.speed {
            background: linear-gradient(135deg, #48bb78, #38a169);
        }
        
        .powerup.speed::before {
            content: '⚡';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
        }
        
        .powerup.shield {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        
        .powerup.shield::before {
            content: '🛡️';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
        }
        
        .powerup.magnet {
            background: linear-gradient(135deg, #ed8936, #dd6b20);
        }
        
        .powerup.magnet::before {
            content: '🧲';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
        }
        
        @keyframes powerupFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.1); }
        }
        
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50px;
            opacity: 0.8;
            box-shadow: 0 2px 10px rgba(255, 255, 255, 0.5);
        }
        
        .particle-effect {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #FFD700;
            border-radius: 50%;
            pointer-events: none;
            animation: particleFade 0.8s ease-out forwards;
        }
        
        @keyframes particleFade {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }
        
        .status-effect {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        
        .status-badge {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            animation: badgePulse 1s ease-in-out infinite;
        }
        
        @keyframes badgePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 600;
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.7);
        }
        
        .btn-primary:hover:not(:disabled)::before {
            width: 300px;
            height: 300px;
        }
        
        .btn-primary span {
            position: relative;
            z-index: 1;
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #f0f0f0, #e8e8e8);
            color: #333;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        .btn-secondary:hover {
            background: linear-gradient(135deg, #e0e0e0, #d8d8d8);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }
        
        .instructions {
            text-align: center;
            margin-bottom: 20px;
            color: #666;
            font-size: 15px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15), rgba(118, 75, 162, 0.15));
            padding: 15px 20px;
            border-radius: 16px;
            border: 2px solid rgba(102, 126, 234, 0.2);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.15);
            font-weight: 500;
            animation: instructionSlide 0.6s ease-out 0.3s both;
        }
        
        @keyframes instructionSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .result-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s;
        }
        
        .result-modal.show {
            display: flex;
        }
        
        .result-content {
            background: white;
            border-radius: 32px;
            padding: 50px;
            text-align: center;
            max-width: 450px;
            animation: slideInUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.3);
        }
        
        @keyframes slideInUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .result-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 0.6s ease-out;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .result-title {
            font-size: 28px;
            color: #333;
            margin-bottom: 15px;
            font-weight: 700;
        }
        
        .result-info {
            color: #666;
            margin-bottom: 25px;
            font-size: 16px;
            line-height: 1.8;
        }
        
        .result-info p {
            margin: 8px 0;
        }
        
        .result-score {
            font-size: 36px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 15px 0;
        }
        /* ── 手机横屏适配 ─────────────────────────────────────────────────── */
        @media (max-height: 480px) and (orientation: landscape) {
            body {
                padding: 4px 8px;
                align-items: flex-start;
            }

            .game-container {
                padding: 8px 12px;
                border-radius: 16px;
                margin: 0 auto 4px;
            }

            .header {
                margin-bottom: 6px;
            }

            .header h1 {
                font-size: 18px;
                margin-bottom: 6px;
            }

            .header .info {
                padding: 8px 12px;
                border-radius: 10px;
                font-size: 12px;
            }

            .info-value {
                font-size: 18px;
            }

            /*
             * 游戏区域高度撑满横屏可用区域
             * 注意：ground(100px) + player bottom(100px) 由 JS 控制，保持不变
             * 只需保证 game-area 够高即可（至少 260px）
             */
            .game-area {
                height: calc(100dvh - 120px);
                min-height: 260px;
                margin-bottom: 6px;
                border-radius: 12px;
            }

            /* 操控按钮区更紧凑 */
            .controls {
                gap: 8px;
                margin-bottom: 4px;
            }

            .control-btn {
                padding: 8px 16px;
                font-size: 14px;
                border-radius: 12px;
            }

            /* 结果弹窗缩小 */
            .result-content {
                padding: 20px 24px;
                max-width: 340px;
            }

            .result-icon { font-size: 48px; margin-bottom: 10px; }
            .result-title { font-size: 20px; }
            .result-score { font-size: 26px; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🏃 校园跑酷</h1>
            <div class="info">
                <div class="info-item">
                    <div class="info-label">距离</div>
                    <div class="info-value" id="distance">0</div>
                </div>
                <div class="info-item">
                    <div class="info-label">金币</div>
                    <div class="info-value" id="coins">0</div>
                </div>
                <div class="info-item">
                    <div class="info-label">速度</div>
                    <div class="info-value" id="speed">1.0</div>
                </div>
                <div class="info-item">
                    <div class="info-label">连击</div>
                    <div class="info-value" id="combo">0</div>
                </div>
            </div>
        </div>
        
        <div class="combo-indicator" id="comboIndicator">连击 x<span id="comboCount">0</span>!</div>
        
        <div class="status-effect" id="statusEffect"></div>
        
        <div class="instructions">
            💡 按空格键或点击屏幕跳跃 | 收集金币和道具提升能力 | 连击获得更高分数！
        </div>
        
        <div class="game-area" id="gameArea">
            <div class="ground"></div>
            <div class="player" id="player">
                <div class="player-body"></div>
            </div>
        </div>
        
        <div class="controls">
            <button class="btn btn-primary" onclick="startGame()" id="startBtn">
                <span>开始游戏</span>
            </button>
            <button class="btn btn-secondary" onclick="goBack()">
                <span>返回</span>
            </button>
        </div>
    </div>
    
    <!-- 背景粒子 -->
    <div class="bg-particles" id="bgParticles"></div>
    
    <div class="result-modal" id="resultModal">
        <div class="result-content">
            <div class="result-icon" id="resultIcon">🎉</div>
            <div class="result-title">游戏结束！</div>
            <div class="result-info">
                <p>距离: <span id="finalDistance">0</span> 米</p>
                <p>金币: <span id="finalCoins">0</span></p>
                <p>连击: <span id="finalCombo">0</span></p>
                <div class="result-score">得分: <span id="finalScore">0</span></div>
                <p style="margin-top: 15px; color: #667eea; font-weight: bold; font-size: 18px;">+20 积分</p>
            </div>
            <button class="btn btn-primary" onclick="startGame()">再来一局</button>
        </div>
    </div>
    
    <script>
        // 游戏状态
        let gameState = {
            isRunning: false,
            isJumping: false,
            distance: 0,
            coins: 0,
            speed: 1,
            combo: 0,
            maxCombo: 0,
            obstacles: [],
            coinElements: [],
            powerups: [],
            clouds: [],
            gameLoop: null,
            obstacleTimer: null,
            coinTimer: null,
            powerupTimer: null,
            statusEffects: {
                speed: { active: false, duration: 0 },
                shield: { active: false, duration: 0 },
                magnet: { active: false, duration: 0 }
            }
        };
        
        const player = document.getElementById('player');
        const gameArea = document.getElementById('gameArea');
        
        // 开始游戏
        function startGame() {
            document.getElementById('resultModal').classList.remove('show');
            
            // 重置状态
            gameState.isRunning = true;
            gameState.isJumping = false;
            gameState.distance = 0;
            gameState.coins = 0;
            gameState.speed = 0.85; // 初始略慢，手机端更易玩
            gameState.combo = 0;
            gameState.maxCombo = 0;
            gameState.obstacles = [];
            gameState.coinElements = [];
            gameState.powerups = [];
            gameState.statusEffects = {
                speed: { active: false, duration: 0 },
                shield: { active: false, duration: 0 },
                magnet: { active: false, duration: 0 }
            };
            
            // 清除所有元素
            document.querySelectorAll('.obstacle, .coin, .cloud, .powerup, .particle-effect').forEach(el => el.remove());
            document.getElementById('statusEffect').innerHTML = '';
            player.classList.remove('shield');
            
            // 重置玩家位置和跳跃状态
            if (jumpAnimation) {
                cancelAnimationFrame(jumpAnimation);
                jumpAnimation = null;
            }
            player.style.bottom = '100px';
            player.style.transform = 'rotate(0deg)';
            player.classList.remove('jumping');
            gameState.isJumping = false;
            
            // 更新UI
            document.getElementById('startBtn').disabled = true;
            document.getElementById('startBtn').textContent = '游戏中...';
            
            // 创建云朵
            createClouds();
            
            // 开始游戏循环
            startGameLoop();
            
            // 开始生成障碍物（加快生成频率，但确保可跳过）
            gameState.obstacleTimer = setInterval(() => {
                createObstacle();
            }, 1800); // 从2000ms减少到1800ms，让游戏更有挑战性
            
            // 开始生成金币
            gameState.coinTimer = setInterval(() => {
                createCoin();
            }, 2500);
            
            // 开始生成道具
            gameState.powerupTimer = setInterval(() => {
                if (Math.random() < 0.3) {
                    createPowerup();
                }
            }, 5000);
        }
        
        // 创建云朵
        function createClouds() {
            for (let i = 0; i < 6; i++) {
                const cloud = document.createElement('div');
                cloud.className = 'cloud';
                const size = 60 + Math.random() * 50;
                cloud.style.width = size + 'px';
                cloud.style.height = size * 0.6 + 'px';
                cloud.style.left = Math.random() * (gameArea.offsetWidth - 100) + 'px';
                cloud.style.top = (30 + Math.random() * 200) + 'px';
                cloud.style.opacity = 0.6 + Math.random() * 0.3;
                gameArea.appendChild(cloud);
                gameState.clouds.push(cloud);
            }
        }
        
        // 游戏主循环
        function startGameLoop() {
            gameState.gameLoop = setInterval(() => {
                if (!gameState.isRunning) return;
                
                // 更新距离和速度
                const speedMultiplier = gameState.statusEffects.speed.active ? 1.5 : 1;
                gameState.distance += gameState.speed * speedMultiplier;
                
                // 速度递增（加快速度提升）
                if (gameState.distance % 50 === 0 && gameState.distance > 0) {
                    gameState.speed += 0.035;
                }
                
                // 更新状态效果
                updateStatusEffects();
                
                // 移动云朵
                moveClouds();
                
                // 移动障碍物（加快移动速度）
                gameState.obstacles.forEach((obstacle, index) => {
                    const left = parseFloat(obstacle.style.left) || gameArea.offsetWidth;
                    const baseSpeed = 6;
                    const moveSpeed = baseSpeed + gameState.speed * (gameState.statusEffects.speed.active ? 5 : 4);
                    obstacle.style.left = (left - moveSpeed) + 'px';
                    
                    // 检查碰撞
                    if (checkCollision(player, obstacle)) {
                        if (gameState.statusEffects.shield.active) {
                            // 护盾保护
                            obstacle.remove();
                            gameState.obstacles.splice(index, 1);
                            createParticles(obstacle.getBoundingClientRect());
                        } else {
                            endGame();
                        }
                    }
                    
                    // 移除超出屏幕的障碍物
                    if (left < -100) {
                        obstacle.remove();
                        gameState.obstacles.splice(index, 1);
                    }
                });
                
                // 移动金币（与障碍物同步速度）
                gameState.coinElements.forEach((coin, index) => {
                    const left = parseFloat(coin.style.left) || gameArea.offsetWidth;
                    const baseSpeed = 6;
                    const moveSpeed = baseSpeed + gameState.speed * (gameState.statusEffects.speed.active ? 5 : 4);
                    
                    // 磁铁效果
                    if (gameState.statusEffects.magnet.active) {
                        const playerRect = player.getBoundingClientRect();
                        const coinRect = coin.getBoundingClientRect();
                        const dx = playerRect.left + playerRect.width / 2 - (coinRect.left + coinRect.width / 2);
                        const dy = playerRect.top + playerRect.height / 2 - (coinRect.top + coinRect.height / 2);
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        
                        if (distance < 200) {
                            coin.style.left = (parseFloat(coin.style.left) + dx * 0.1) + 'px';
                            coin.style.bottom = (parseFloat(coin.style.bottom) - dy * 0.1) + 'px';
                        }
                    } else {
                        coin.style.left = (left - moveSpeed) + 'px';
                    }
                    
                    // 检查收集
                    if (checkCollision(player, coin)) {
                        gameState.coins++;
                        gameState.combo++;
                        gameState.maxCombo = Math.max(gameState.maxCombo, gameState.combo);
                        createParticles(coin.getBoundingClientRect());
                        coin.remove();
                        gameState.coinElements.splice(index, 1);
                        showCombo();
                        updateUI();
                    }
                    
                    // 移除超出屏幕的金币
                    if (left < -50) {
                        coin.remove();
                        gameState.coinElements.splice(index, 1);
                        gameState.combo = 0;
                    }
                });
                
                // 移动道具（与障碍物同步速度）
                gameState.powerups.forEach((powerup, index) => {
                    const left = parseFloat(powerup.style.left) || gameArea.offsetWidth;
                    const baseSpeed = 6;
                    const moveSpeed = baseSpeed + gameState.speed * (gameState.statusEffects.speed.active ? 5 : 4);
                    powerup.style.left = (left - moveSpeed) + 'px';
                    
                    // 检查收集
                    if (checkCollision(player, powerup)) {
                        const type = powerup.classList.contains('speed') ? 'speed' :
                                    powerup.classList.contains('shield') ? 'shield' : 'magnet';
                        activatePowerup(type);
                        createParticles(powerup.getBoundingClientRect());
                        powerup.remove();
                        gameState.powerups.splice(index, 1);
                    }
                    
                    // 移除超出屏幕的道具
                    if (left < -50) {
                        powerup.remove();
                        gameState.powerups.splice(index, 1);
                    }
                });
                
                updateUI();
            }, 16); // 约60fps
        }
        
        // 移动云朵
        function moveClouds() {
            gameState.clouds.forEach(cloud => {
                const left = parseFloat(cloud.style.left) || 0;
                cloud.style.left = (left - gameState.speed * 0.5) + 'px';
                if (left < -100) {
                    cloud.style.left = gameArea.offsetWidth + 'px';
                }
            });
        }
        
        // 创建障碍物
        function createObstacle() {
            if (!gameState.isRunning) return;
            
            // 检查是否有障碍物太近，避免无法跳过的情况
            const lastObstacle = gameState.obstacles[gameState.obstacles.length - 1];
            if (lastObstacle) {
                const lastLeft = parseFloat(lastObstacle.style.left) || gameArea.offsetWidth;
                // 如果最后一个障碍物还在屏幕右侧一半位置，延迟生成
                if (lastLeft > gameArea.offsetWidth * 0.5) {
                    return;
                }
            }
            
            const obstacle = document.createElement('div');
            obstacle.className = 'obstacle';
            
            // 随机类型（调整概率，减少高障碍物）
            const type = Math.random();
            if (type < 0.25) {
                // 25%概率生成高障碍物
                obstacle.classList.add('tall');
            } else if (type < 0.55) {
                // 30%概率生成宽障碍物
                obstacle.classList.add('wide');
            }
            // 45%概率生成普通障碍物
            
            obstacle.style.left = gameArea.offsetWidth + 'px';
            obstacle.style.bottom = '100px';
            gameArea.appendChild(obstacle);
            gameState.obstacles.push(obstacle);
        }
        
        // 创建金币
        function createCoin() {
            if (!gameState.isRunning) return;
            
            const coin = document.createElement('div');
            coin.className = 'coin';
            coin.style.left = gameArea.offsetWidth + 'px';
            coin.style.bottom = (120 + Math.random() * 250) + 'px';
            gameArea.appendChild(coin);
            gameState.coinElements.push(coin);
        }
        
        // 创建道具
        function createPowerup() {
            if (!gameState.isRunning) return;
            
            const types = ['speed', 'shield', 'magnet'];
            const type = types[Math.floor(Math.random() * types.length)];
            
            const powerup = document.createElement('div');
            powerup.className = `powerup ${type}`;
            powerup.style.left = gameArea.offsetWidth + 'px';
            powerup.style.bottom = (120 + Math.random() * 250) + 'px';
            gameArea.appendChild(powerup);
            gameState.powerups.push(powerup);
        }
        
        // 激活道具
        function activatePowerup(type) {
            gameState.statusEffects[type].active = true;
            gameState.statusEffects[type].duration = 10000; // 10秒
            
            if (type === 'shield') {
                player.classList.add('shield');
            }
            
            updateStatusUI();
        }
        
        // 更新状态效果
        function updateStatusEffects() {
            Object.keys(gameState.statusEffects).forEach(key => {
                if (gameState.statusEffects[key].active) {
                    gameState.statusEffects[key].duration -= 16;
                    if (gameState.statusEffects[key].duration <= 0) {
                        gameState.statusEffects[key].active = false;
                        if (key === 'shield') {
                            player.classList.remove('shield');
                        }
                        updateStatusUI();
                    }
                }
            });
        }
        
        // 更新状态UI
        function updateStatusUI() {
            const container = document.getElementById('statusEffect');
            container.innerHTML = '';
            
            Object.keys(gameState.statusEffects).forEach(key => {
                if (gameState.statusEffects[key].active) {
                    const badge = document.createElement('div');
                    badge.className = 'status-badge';
                    const icons = { speed: '⚡', shield: '🛡️', magnet: '🧲' };
                    badge.innerHTML = `${icons[key]} ${Math.ceil(gameState.statusEffects[key].duration / 1000)}s`;
                    container.appendChild(badge);
                }
            });
        }
        
        // 显示连击
        function showCombo() {
            if (gameState.combo > 1) {
                const indicator = document.getElementById('comboIndicator');
                document.getElementById('comboCount').textContent = gameState.combo;
                indicator.classList.add('show');
                setTimeout(() => {
                    indicator.classList.remove('show');
                }, 1000);
            }
        }
        
        // 创建粒子效果
        function createParticles(rect) {
            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle-effect';
                const angle = (Math.PI * 2 * i) / 8;
                const distance = 30 + Math.random() * 20;
                particle.style.left = (rect.left + rect.width / 2) + 'px';
                particle.style.top = (rect.top + rect.height / 2) + 'px';
                particle.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                particle.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
                document.body.appendChild(particle);
                
                setTimeout(() => particle.remove(), 800);
            }
        }
        
        // 跳跃系统
        let jumpAnimation = null;
        let jumpStartTime = null;
        const JUMP_DURATION = 700; // 跳跃持续时间（毫秒）
        const JUMP_HEIGHT = 240; // 跳跃高度（像素）- 240px足够跳过所有障碍物
        
        // 跳跃函数
        function jump() {
            // 防止重复触发 - 如果正在跳跃或游戏未运行，直接返回
            if (!gameState.isRunning || gameState.isJumping || jumpAnimation !== null) {
                return;
            }
            
            gameState.isJumping = true;
            jumpStartTime = Date.now();
            const startBottom = parseFloat(window.getComputedStyle(player).bottom) || 
                               parseFloat(player.style.bottom) || 100;
            
            // 使用requestAnimationFrame实现流畅的跳跃动画
            function animateJump() {
                // 如果游戏停止，取消动画
                if (!gameState.isRunning) {
                    jumpAnimation = null;
                    gameState.isJumping = false;
                    player.style.bottom = startBottom + 'px';
                    player.style.transform = 'rotate(0deg)';
                    return;
                }
                
                const elapsed = Date.now() - jumpStartTime;
                const progress = Math.min(elapsed / JUMP_DURATION, 1);
                
                // 使用更自然的抛物线轨迹（二次函数）
                // 上升阶段：快速上升，下降阶段：自然下落
                let currentHeight;
                if (progress <= 0.5) {
                    // 上升阶段：使用二次缓动，快速上升
                    const upProgress = progress * 2; // 0 到 1
                    currentHeight = JUMP_HEIGHT * upProgress * upProgress;
                } else {
                    // 下降阶段：使用二次缓动，自然下落
                    const downProgress = (progress - 0.5) * 2; // 0 到 1
                    currentHeight = JUMP_HEIGHT * (1 - downProgress * downProgress);
                }
                
                // 应用位置
                player.style.bottom = (startBottom + currentHeight) + 'px';
                
                // 添加轻微的旋转效果（更自然）
                const rotation = Math.sin(progress * Math.PI) * 8;
                player.style.transform = `rotate(${rotation}deg)`;
                
                if (progress < 1) {
                    jumpAnimation = requestAnimationFrame(animateJump);
                } else {
                    // 跳跃完成，重置状态
                    player.style.bottom = startBottom + 'px';
                    player.style.transform = 'rotate(0deg)';
                    gameState.isJumping = false;
                    jumpAnimation = null;
                }
            }
            
            // 开始动画
            jumpAnimation = requestAnimationFrame(animateJump);
        }
        
        // 检查碰撞
        function checkCollision(rect1, rect2) {
            const rect1Bounds = rect1.getBoundingClientRect();
            const rect2Bounds = rect2.getBoundingClientRect();
            
            return !(
                rect1Bounds.right < rect2Bounds.left ||
                rect1Bounds.left > rect2Bounds.right ||
                rect1Bounds.bottom < rect2Bounds.top ||
                rect1Bounds.top > rect2Bounds.bottom
            );
        }
        
        // 更新UI
        function updateUI() {
            document.getElementById('distance').textContent = Math.floor(gameState.distance);
            document.getElementById('coins').textContent = gameState.coins;
            document.getElementById('speed').textContent = gameState.speed.toFixed(1);
            document.getElementById('combo').textContent = gameState.combo;
        }
        
        // 结束游戏
        function endGame() {
            gameState.isRunning = false;
            
            clearInterval(gameState.gameLoop);
            clearInterval(gameState.obstacleTimer);
            clearInterval(gameState.coinTimer);
            clearInterval(gameState.powerupTimer);
            
            const baseScore = Math.floor(gameState.distance);
            const coinScore = gameState.coins * 10;
            const comboBonus = gameState.maxCombo * 5;
            const score = baseScore + coinScore + comboBonus;
            
            document.getElementById('finalDistance').textContent = Math.floor(gameState.distance);
            document.getElementById('finalCoins').textContent = gameState.coins;
            document.getElementById('finalCombo').textContent = gameState.maxCombo;
            document.getElementById('finalScore').textContent = score;
            
            // 根据得分显示不同图标
            const icon = document.getElementById('resultIcon');
            if (score >= 1000) {
                icon.textContent = '🏆';
            } else if (score >= 500) {
                icon.textContent = '🎉';
            } else {
                icon.textContent = '💪';
            }
            
            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').textContent = '重新开始';
            
            document.getElementById('resultModal').classList.add('show');
            
            // 奖励积分
            awardPoints(20);
        }
        
        // 奖励积分
        function awardPoints(points) {
            try {
                if (typeof PointsSystem !== 'undefined') {
                    const ps = new PointsSystem();
                    if (ps.awardGamePoints(points, '校园跑酷游戏', '小游戏')) {
                        console.log('✅ 获得 ' + points + ' 积分（已写入校园积分）');
                    } else {
                        console.warn('积分未写入：请先登录，或重新登录同步积分数据');
                    }
                }
            } catch (e) {
                console.warn('积分系统', e);
            }
        }
        
        // 返回
        function goBack() {
            if (gameState.isRunning) {
                endGame();
            }
            if (window.parent && window.parent.document.getElementById('close-web-btn')) {
                window.parent.document.getElementById('close-web-btn').click();
            } else {
                window.location.href = '../campus-games.html';
            }
        }
        
        // 键盘事件（添加防抖）
        let lastJumpTime = 0;
        const JUMP_COOLDOWN = 100; // 跳跃冷却时间（毫秒）
        
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'ArrowUp') {
                e.preventDefault();
                const now = Date.now();
                if (now - lastJumpTime > JUMP_COOLDOWN) {
                    lastJumpTime = now;
                    jump();
                }
            }
        });
        
        // 点击屏幕跳跃（添加防抖）
        let lastClickTime = 0;
        gameArea.addEventListener('click', (e) => {
            const now = Date.now();
            if (now - lastClickTime > JUMP_COOLDOWN) {
                lastClickTime = now;
                jump();
            }
        });
        
        // 创建背景粒子
        function createBackgroundParticles() {
            const container = document.getElementById('bgParticles');
            if (!container) return;
            
            for (let i = 0; i < 25; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle-bg';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }
        
        // 页面加载时创建粒子
        window.addEventListener('DOMContentLoaded', () => {
            createBackgroundParticles();
        });
        
        // 加载积分系统
        if (typeof PointsSystem === 'undefined') {
            const script = document.createElement('script');
            script.src = '../js/points-system.js';
            document.head.appendChild(script);
        }
    </script>
</body>
