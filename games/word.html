<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>成语接龙 - 爱哲安民未来学校</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .game-container {
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .header .info {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            font-size: 16px;
            color: #666;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .info-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin-top: 5px;
        }
        
        .chain-container {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 200px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .chain-item {
            display: inline-block;
            background: white;
            padding: 12px 20px;
            border-radius: 8px;
            margin: 5px;
            font-size: 18px;
            color: #333;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .chain-item.player {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .chain-item.computer {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
        }
        
        .current-word {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
            padding: 20px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            border-radius: 12px;
        }
        
        .input-container {
            margin-bottom: 20px;
        }
        
        .input-label {
            display: block;
            margin-bottom: 10px;
            font-size: 16px;
            color: #666;
        }
        
        .word-input {
            width: 100%;
            padding: 16px;
            font-size: 20px;
            text-align: center;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s;
        }
        
        .word-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        .word-input.error {
            border-color: #f56565;
            background: #fff5f5;
        }
        
        .hint {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            color: #999;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .result-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .result-modal.show {
            display: flex;
        }
        
        .result-content {
            background: white;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            animation: slideIn 0.3s;
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .result-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .result-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .result-info {
            color: #666;
            margin-bottom: 20px;
        }
    </style>
</head>

        <div class="current-word" id="currentWord">开始</div>
        
        <div class="input-container">

            <input type="text" class="word-input" id="wordInput" placeholder="输入成语" maxlength="4" autofocus>
            <div class="hint">提示：必须是四字成语，且以指定字开头</div>
        </div>
        
        <div class="controls">
            <button class="btn btn-primary" onclick="submitWord()">提交</button>
            <button class="btn btn-secondary" onclick="goBack()">返回</button>

    </div>
    
    <div class="result-modal" id="resultModal">

        // 游戏状态
        let gameState = {
            chain: [],
            currentLastChar: '开',
            round: 1,
            score: 0,
            usedIdioms: new Set(),
            isGameOver: false
        };
        
        // 初始化游戏
        function initGame() {
            gameState.chain = [];
            gameState.currentLastChar = '开';
            gameState.round = 1;
            gameState.score = 0;
            gameState.usedIdioms = new Set();
            gameState.isGameOver = false;
            
            updateDisplay();
            document.getElementById('wordInput').value = '';
            document.getElementById('wordInput').focus();
        }
        
        // 更新显示
        function updateDisplay() {
            document.getElementById('round').textContent = gameState.round;
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('nextChar').textContent = gameState.currentLastChar;
            
            const container = document.getElementById('chainContainer');
            container.innerHTML = '';
            
            gameState.chain.forEach((item, index) => {
                const element = document.createElement('span');
                element.className = `chain-item ${item.type}`;
                element.textContent = item.word;
                container.appendChild(element);
            });
            
            container.scrollTop = container.scrollHeight;
        }
        
        // 检查是否为有效成语
        function isValidIdiom(word) {
            return idioms.includes(word) && word.length === 4;
        }
        
        // 提交成语
        function submitWord() {
            if (gameState.isGameOver) return;
            
            const input = document.getElementById('wordInput');
            const word = input.value.trim();
            
            // 验证
            if (word.length !== 4) {
                showError('请输入四字成语！');
                return;
            }
            
            if (!word.startsWith(gameState.currentLastChar)) {
                showError(`成语必须以"${gameState.currentLastChar}"开头！`);
                return;
            }
            
            if (!isValidIdiom(word)) {
                showError('这不是一个有效的成语！');
                return;
            }
            
            if (gameState.usedIdioms.has(word)) {
                showError('这个成语已经用过了！');
                return;
            }
            
            // 添加玩家成语
            gameState.chain.push({ word: word, type: 'player' });
            gameState.usedIdioms.add(word);
            gameState.score += 10;
            gameState.round++;
            
            // 获取下一个字（成语的最后一个字）
            gameState.currentLastChar = word[word.length - 1];
            
            input.value = '';
            input.classList.remove('error');
            updateDisplay();
            
            // 电脑回应
            setTimeout(() => {
                computerTurn();
            }, 1000);
        }
        
        // 电脑回合
        function computerTurn() {
            // 查找以当前字开头的未使用成语
            const availableIdioms = idioms.filter(idiom => 
                idiom.startsWith(gameState.currentLastChar) && 
                !gameState.usedIdioms.has(idiom)
            );
            
            if (availableIdioms.length === 0) {
                // 电脑无法继续，玩家获胜
                endGame(true);
                return;
            }
            
            // 随机选择一个
            const computerWord = availableIdioms[Math.floor(Math.random() * availableIdioms.length)];
            
            gameState.chain.push({ word: computerWord, type: 'computer' });
            gameState.usedIdioms.add(computerWord);
            gameState.currentLastChar = computerWord[computerWord.length - 1];
            
            updateDisplay();
            
            // 检查玩家是否能继续
            const playerCanContinue = idioms.some(idiom => 
                idiom.startsWith(gameState.currentLastChar) && 
                !gameState.usedIdioms.has(idiom)
            );
            
            if (!playerCanContinue) {
                // 玩家无法继续，游戏结束
                endGame(false);
            }
        }
        
        // 显示错误
        function showError(message) {
            const input = document.getElementById('wordInput');
            input.classList.add('error');
            setTimeout(() => {
                input.classList.remove('error');
            }, 2000);
            alert(message);
        }
        
        // 结束游戏
        function endGame(playerWon) {
            gameState.isGameOver = true;
            
            document.getElementById('finalRound').textContent = gameState.round - 1;
            document.getElementById('finalScore').textContent = gameState.score;
            
            if (playerWon) {
                document.getElementById('resultIcon').textContent = '🏆';
                document.getElementById('resultTitle').textContent = '恭喜获胜！';
            } else {
                document.getElementById('resultIcon').textContent = '💪';
                document.getElementById('resultTitle').textContent = '再接再厉！';
            }
            
            document.getElementById('resultModal').classList.add('show');
            
            // 奖励积分
            awardPoints(15);
        }
        
        // 奖励积分
        function awardPoints(points) {
            try {
                if (typeof PointsSystem !== 'undefined') {
                    const pointsSystem = new PointsSystem();
                    const userData = JSON.parse(localStorage.getItem('campus_user') || '{}');
                    if (userData.userId) {
                        pointsSystem.setCurrentUser(userData.userId);
                        pointsSystem.addPoints(points, '成语接龙游戏');
                        console.log(`✅ 获得 ${points} 积分`);
                    }
                }
            } catch (e) {
                console.log('积分系统未加载');
            }
        }
        
        // 开始新游戏
        function startNewGame() {
            document.getElementById('resultModal').classList.remove('show');
            initGame();
        }
        
        // 返回
        function goBack() {
            if (window.parent && window.parent.document.getElementById('close-web-btn')) {
                window.parent.document.getElementById('close-web-btn').click();
            } else {
                window.location.href = '../campus-games.html';
            }
        }
        
        // 回车提交
        document.getElementById('wordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                submitWord();
            }
        });
        
        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', () => {
            initGame();
        });
        
        // 加载积分系统
        if (typeof PointsSystem === 'undefined') {
            const script = document.createElement('script');
            script.src = '../js/points-system.js';
            document.head.appendChild(script);
        }
    </script>
</body>
</html>
