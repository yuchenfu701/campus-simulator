<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成语接龙 - 爱哲安民未来学校</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;   /* 修复：改为 flex-start，内容超高时可正常滚动 */
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .header .info {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            font-size: 16px;
            color: #666;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .info-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin-top: 5px;
        }
        
        .chain-container {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 200px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .chain-item {
            display: inline-block;
            background: white;
            padding: 12px 20px;
            border-radius: 8px;
            margin: 5px;
            font-size: 18px;
            color: #333;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .chain-item.player {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .chain-item.computer {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
        }
        
        .current-word {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
            padding: 20px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            border-radius: 12px;
        }
        
        .input-container {
            margin-bottom: 20px;
        }
        
        .input-label {
            display: block;
            margin-bottom: 10px;
            font-size: 16px;
            color: #666;
        }
        
        .word-input {
            width: 100%;
            padding: 16px;
            font-size: 20px;
            text-align: center;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s;
        }
        
        .word-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        .word-input.error {
            border-color: #f56565;
            background: #fff5f5;
        }
        
        .hint {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            color: #999;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .result-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .result-modal.show {
            display: flex;
        }
        
        .result-content {
            background: white;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            animation: slideIn 0.3s;
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .result-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .result-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .result-info {
            color: #666;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>📖 成语接龙</h1>
            <div class="info">
                <div class="info-item">
                    <span>轮次</span>
                    <span class="info-value" id="round">1</span>
                </div>
                <div class="info-item">
                    <span>得分</span>
                    <span class="info-value" id="score">0</span>
                </div>
            </div>
        </div>
        
        <div class="chain-container" id="chainContainer"></div>
        
        <div class="current-word" id="currentWord">开始</div>
        
        <div class="input-container">
            <label class="input-label">请输入以 "<span id="nextChar">开</span>" 开头的四字成语：</label>
            <input type="text" class="word-input" id="wordInput" placeholder="输入成语" maxlength="4" autofocus>
            <div class="hint" id="errorMsg" style="color:#e53e3e;min-height:20px;font-weight:600;"></div>
        </div>

        <!-- 操作按钮 -->
        <div class="controls">
            <button class="btn btn-primary" onclick="submitWord()">提交</button>
            <button class="btn btn-secondary" id="hintBtn" onclick="showHint()">💡 提示</button>
            <button class="btn btn-secondary" onclick="goBack()">返回</button>
        </div>
        <!-- 提示展示区 -->
        <div id="hintBox" style="display:none;margin-top:12px;background:#f0f4ff;border-radius:12px;padding:12px;font-size:14px;color:#444;line-height:2;"></div>
        <!-- 难度选择 -->
        <div style="display:flex;gap:8px;justify-content:center;margin-top:14px;">
            <span style="font-size:13px;color:#999;align-self:center;">难度：</span>
            <button class="btn" id="dEasy"   onclick="setDiff('easy',   this)" style="padding:5px 12px;font-size:12px;border-radius:16px;border:2px solid #667eea;background:linear-gradient(135deg,#667eea,#764ba2);color:white;cursor:pointer;">简单</button>
            <button class="btn" id="dNormal" onclick="setDiff('normal', this)" style="padding:5px 12px;font-size:12px;border-radius:16px;border:2px solid #667eea;background:white;color:#667eea;cursor:pointer;">普通</button>
            <button class="btn" id="dHard"   onclick="setDiff('hard',   this)" style="padding:5px 12px;font-size:12px;border-radius:16px;border:2px solid #e53e3e;background:white;color:#e53e3e;cursor:pointer;">困难</button>
        </div>
    </div>
    
    <div class="result-modal" id="resultModal">
        <div class="result-content">
            <div class="result-icon" id="resultIcon">🎉</div>
            <div class="result-title" id="resultTitle">游戏结束！</div>
            <div class="result-info">
                <p>轮次: <span id="finalRound">0</span></p>
                <p>得分: <span id="finalScore">0</span></p>
                <p style="margin-top: 15px; color: #667eea; font-weight: bold;">+15 积分</p>
            </div>
            <button class="btn btn-primary" onclick="startNewGame()">再来一局</button>
        </div>
    </div>

        // 将旧成语也加入 idiomSet，并按首字索引
        for (const w of _legacyExtra) {
            if (w.length === 4) {
                idiomSet.add(w);
                const fc = w[0];
                if (!idiomsByFirst[fc]) idiomsByFirst[fc] = [];
                if (!idiomsByFirst[fc].includes(w)) idiomsByFirst[fc].push(w);
            }
        }

        // 难度配置
        const DIFF = {
            easy:   { hintUsed: 3, compDelay: 1500, label: '简单' },
            normal: { hintUsed: 2, compDelay: 1000, label: '普通' },
            hard:   { hintUsed: 1, compDelay: 600,  label: '困难' }
        };
        let currentDiff = 'easy';

        function setDiff(diff, btn) {
            currentDiff = diff;
            document.querySelectorAll('[id^="d"]').forEach(b => {
                b.style.background = 'white';
                b.style.color = b.style.borderColor || '#667eea';
            });
            btn.style.background = 'linear-gradient(135deg,#667eea,#764ba2)';
            btn.style.color = 'white';
            startNewGame();
        }

        // 游戏状态
        let gameState = {
            chain: [],
            currentLastChar: '开',
            round: 1,
            score: 0,
            hintsLeft: 3,
            usedIdioms: new Set(),
            isGameOver: false
        };
        
        // 初始化游戏
        function initGame() {
            // 随机挑选一个开局字（确保有足够成语可接）
            const startWords = ['开','人','天','山','水','大','心','风','马','龙','光','学','真','精','好'];
            const startChar = startWords[Math.floor(Math.random() * startWords.length)];
            gameState.chain = [];
            gameState.currentLastChar = startChar;
            gameState.round = 1;
            gameState.score = 0;
            gameState.usedIdioms = new Set();
            gameState.isGameOver = false;
            gameState.hintsLeft = DIFF[currentDiff].hintUsed;
            document.getElementById('hintBox').style.display = 'none';
            document.getElementById('hintBtn').textContent = `💡 提示(${gameState.hintsLeft})`;
            setError('');
            
            updateDisplay();
            document.getElementById('wordInput').value = '';
            document.getElementById('wordInput').focus();
        }
        
        // 更新显示
        function updateDisplay() {
            document.getElementById('round').textContent = gameState.round;
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('nextChar').textContent = gameState.currentLastChar;
            
            const container = document.getElementById('chainContainer');
            container.innerHTML = '';
            
            gameState.chain.forEach((item, index) => {
                const element = document.createElement('span');
                element.className = `chain-item ${item.type}`;
                element.textContent = item.word;
                container.appendChild(element);
            });
            
            container.scrollTop = container.scrollHeight;
        }
        
        // 错误提示（替换 alert）
        function setError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            if (msg) {
                const input = document.getElementById('wordInput');
                input.classList.add('error');
                setTimeout(() => { input.classList.remove('error'); el.textContent = ''; }, 2500);
            }
        }

        // 提示功能
        function showHint() {
            if (gameState.hintsLeft <= 0) { setError('提示次数已用完！'); return; }
            const available = getAvailable(gameState.currentLastChar);
            if (available.length === 0) { setError('没有可用的提示成语'); return; }
            gameState.hintsLeft--;
            document.getElementById('hintBtn').textContent = `💡 提示(${gameState.hintsLeft})`;
            const show = available.slice(0, 6);
            const box = document.getElementById('hintBox');
            box.style.display = 'block';
            box.innerHTML = `<b>以「${gameState.currentLastChar}」开头的成语（共${available.length}个）：</b><br>` +
                show.map(w => `<span onclick="document.getElementById('wordInput').value='${w}'" style="cursor:pointer;background:#e9edff;padding:3px 8px;border-radius:6px;margin:3px;display:inline-block;">${w}</span>`).join('') +
                (available.length > 6 ? `<span style="color:#999"> 等${available.length}个...</span>` : '');
        }

        // 获取以 char 开头的未用成语列表
        function getAvailable(char) {
            return (idiomsByFirst[char] || []).filter(w => !gameState.usedIdioms.has(w));
        }

        // 检查是否为有效成语（使用 Set 实现 O(1) 查找）
        function isValidIdiom(word) {
            return idiomSet.has(word) && word.length === 4;
        }
        
        // 提交成语
        function submitWord() {
            if (gameState.isGameOver) return;

            const input = document.getElementById('wordInput');
            const word = input.value.trim();
            document.getElementById('hintBox').style.display = 'none';

            // 验证
            if (word.length !== 4) {
                setError('请输入四字成语！');
                return;
            }
            if (!word.startsWith(gameState.currentLastChar)) {
                setError(`成语必须以「${gameState.currentLastChar}」开头！`);
                return;
            }
            if (!isValidIdiom(word)) {
                setError(`「${word}」不在成语库中，请换一个！`);
                return;
            }
            if (gameState.usedIdioms.has(word)) {
                setError('这个成语已经用过了！');
                return;
            }
            
            // 添加玩家成语
            gameState.chain.push({ word: word, type: 'player' });
            gameState.usedIdioms.add(word);
            gameState.score += 10;
            gameState.round++;
            
            // 获取下一个字（成语的最后一个字）
            gameState.currentLastChar = word[word.length - 1];
            
            input.value = '';
            input.classList.remove('error');
            updateDisplay();
            
            // 电脑回应（困难模式思考时间短，简单模式慢一些有准备时间）
            setTimeout(computerTurn, DIFF[currentDiff].compDelay);
        }
        
        // 电脑回合
        function computerTurn() {
            const availableIdioms = getAvailable(gameState.currentLastChar);

            if (availableIdioms.length === 0) {
                endGame(true);
                return;
            }

            // 困难模式：优先选那些让玩家难以接龙的成语（下一字可用数少）
            let computerWord;
            if (currentDiff === 'hard') {
                const scored = availableIdioms.map(w => ({
                    w, next: getAvailable(w[3]).length
                }));
                scored.sort((a, b) => a.next - b.next);
                // 优先选使玩家后续选择少的
                computerWord = scored[0].w;
            } else {
                computerWord = availableIdioms[Math.floor(Math.random() * availableIdioms.length)];
            }
            
            gameState.chain.push({ word: computerWord, type: 'computer' });
            gameState.usedIdioms.add(computerWord);
            gameState.currentLastChar = computerWord[computerWord.length - 1];
            
            updateDisplay();
            
            // 检查玩家是否能继续
            const playerCanContinue = getAvailable(gameState.currentLastChar).length > 0;
            
            if (!playerCanContinue) {
                // 玩家无法继续，游戏结束
                endGame(false);
            }
        }
        
        // 显示错误
        // showError → 已由 setError 替换，保留空函数避免遗漏调用报错
        function showError(msg) { setError(msg); }
        
        // 结束游戏
        function endGame(playerWon) {
            gameState.isGameOver = true;
            
            document.getElementById('finalRound').textContent = gameState.round - 1;
            document.getElementById('finalScore').textContent = gameState.score;
            
            if (playerWon) {
                document.getElementById('resultIcon').textContent = '🏆';
                document.getElementById('resultTitle').textContent = '恭喜获胜！';
            } else {
                document.getElementById('resultIcon').textContent = '💪';
                document.getElementById('resultTitle').textContent = '再接再厉！';
            }
            
            document.getElementById('resultModal').classList.add('show');
            
            // 奖励积分
            awardPoints(15);
        }
        
        // 奖励积分
        function awardPoints(points) {
            try {
                if (typeof PointsSystem !== 'undefined') {
                    const ps = new PointsSystem();
                    if (ps.awardGamePoints(points, '成语接龙游戏', '小游戏')) {
                        console.log('✅ 获得 ' + points + ' 积分（已写入校园积分）');
                    } else {
                        console.warn('积分未写入：请先登录');
                    }
                }
            } catch (e) {
                console.warn('积分系统', e);
            }
        }
        
        // 开始新游戏
        function startNewGame() {
            document.getElementById('resultModal').classList.remove('show');
            initGame();
        }
        
        // 返回
        function goBack() {
            if (window.parent && window.parent.document.getElementById('close-web-btn')) {
                window.parent.document.getElementById('close-web-btn').click();
            } else {
                window.location.href = '../campus-games.html';
            }
        }
        
        // 回车提交
        document.getElementById('wordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                submitWord();
            }
        });
        
        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', () => {
            initGame();
        });
        
        // 加载积分系统
        if (typeof PointsSystem === 'undefined') {
            const script = document.createElement('script');
            script.src = '../js/points-system.js';
            document.head.appendChild(script);
        }
    </script>
