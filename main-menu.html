<!DOCTYPE html>
<html lang="zh-CN" class="main-menu-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>主菜单 - 爱哲安民未来学校校园模拟器</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0e1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="爱哲学校">
    <link rel="apple-touch-icon" href="images/icon-192.png">
    <script src="js/campus-settings.js"></script>
    <link rel="stylesheet" href="css/campus-mobile.css">

    <!-- Three.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'PingFang SC','Microsoft YaHei',sans-serif;}

        :root{
            --orange:#f97316;
            --orange-dim:rgba(249,115,22,.35);
            --cyan:#22d3ee;
            --cyan-dim:rgba(34,211,238,.25);
            --purple:#8b5cf6;
            --bg:#070b17;
            --panel:rgba(10,15,30,.82);
            --border:rgba(249,115,22,.25);
            --text-hi:rgba(255,255,255,.95);
            --text-mid:rgba(255,255,255,.6);
            --text-lo:rgba(255,255,255,.35);
        }

        html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);}

        /* ─── BACKGROUND ─── */
        #bgCanvas{position:fixed;inset:0;z-index:0;}

        .scanlines{
            position:fixed;inset:0;z-index:1;pointer-events:none;
            background:repeating-linear-gradient(
                0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px
            );
        }

        .vignette{
            position:fixed;inset:0;z-index:2;pointer-events:none;
            background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.75) 100%);
        }

        /* ─── LAYOUT ─── */
        .layout{
            position:relative;z-index:10;
            width:100vw;height:100vh;
            display:grid;
            grid-template-columns:280px 1fr 300px;
            grid-template-rows:64px 1fr 88px;
        }

        /* ─── TOP BAR ─── */
        .topbar{
            grid-column:1/-1;
            display:flex;align-items:center;justify-content:space-between;
            padding:0 28px;
            background:rgba(4,8,20,.88);
            border-bottom:1px solid var(--border);
            backdrop-filter:blur(16px);
        }

        .logo-row{display:flex;align-items:center;gap:14px;}
        .logo-badge{
            width:40px;height:40px;border-radius:10px;
            background:linear-gradient(135deg,var(--orange),#ef4444);
            display:flex;align-items:center;justify-content:center;
            font-size:22px;
            box-shadow:0 0 16px rgba(249,115,22,.5);
        }
        .logo-name{
            font-size:16px;font-weight:800;letter-spacing:2px;
            color:var(--text-hi);
            text-shadow:0 0 20px rgba(249,115,22,.4);
        }
        .logo-sub{font-size:11px;color:var(--text-lo);letter-spacing:1px;margin-top:2px;}

        .season-tag{
            background:linear-gradient(135deg,rgba(249,115,22,.2),rgba(239,68,68,.2));
            border:1px solid var(--border);
            border-radius:8px;padding:4px 14px;
            font-size:12px;font-weight:700;color:var(--orange);letter-spacing:1px;
        }

        .topbar-right{display:flex;align-items:center;gap:12px;}

        .tb-chip{
            display:flex;align-items:center;gap:7px;
            background:rgba(255,255,255,.06);
            border:1px solid rgba(255,255,255,.1);
            border-radius:8px;padding:6px 14px;
            font-size:13px;color:var(--text-hi);
            transition:all .2s;cursor:default;
        }
        .tb-chip:hover{background:rgba(255,255,255,.1);border-color:var(--orange-dim);}
        .tb-chip .icon{font-size:15px;}
        .tb-chip.pts{border-color:rgba(255,215,0,.3);}
        .tb-chip.pts .val{color:#ffd700;font-weight:700;}

        .settings-top-btn{
            background:rgba(249,115,22,.15);
            border:1px solid var(--border);
            color:var(--orange);
            padding:6px 14px;border-radius:8px;
            font-size:13px;font-weight:600;cursor:pointer;
            font-family:inherit;transition:all .2s;
        }
        .settings-top-btn:hover{background:rgba(249,115,22,.3);}

        /* ─── LEFT NAV ─── */
        .left-nav{
            display:flex;flex-direction:column;
            background:var(--panel);
            border-right:1px solid var(--border);
            backdrop-filter:blur(20px);
            padding:20px 0;
            overflow:hidden;
        }

        /* user card inside left nav */
        .nav-user{
            padding:16px 20px 20px;
            border-bottom:1px solid var(--border);
            margin-bottom:16px;
        }
        .nav-user-row{display:flex;align-items:center;gap:12px;}
        .nav-avatar{
            width:52px;height:52px;border-radius:12px;flex-shrink:0;
            background:linear-gradient(135deg,var(--orange),#ef4444);
            display:flex;align-items:center;justify-content:center;
            font-size:28px;
            border:2px solid rgba(249,115,22,.5);
            box-shadow:0 0 16px rgba(249,115,22,.3);
            overflow:hidden;
            transition:box-shadow .3s;
        }
        .nav-avatar:hover{box-shadow:0 0 24px rgba(249,115,22,.6);}
        .nav-avatar img{width:100%;height:100%;object-fit:cover;}
        .nav-user-info{}
        .nav-uname{font-size:15px;font-weight:700;color:var(--text-hi);}
        .nav-uid{font-size:11px;color:var(--text-lo);margin-top:3px;}
        .nav-badges{display:flex;gap:6px;margin-top:10px;}
        .nav-badge{
            font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;
            background:rgba(249,115,22,.15);border:1px solid rgba(249,115,22,.3);
            color:var(--orange);
        }
        .nav-badge.cyan{
            background:rgba(34,211,238,.12);border-color:rgba(34,211,238,.3);
            color:var(--cyan);
        }

        /* nav items */
        .nav-list{flex:1;overflow-y:auto;padding:0 12px;scrollbar-width:none;}
        .nav-list::-webkit-scrollbar{display:none;}

        .nav-item{
            display:flex;align-items:center;gap:14px;
            padding:12px 16px;border-radius:12px;
            cursor:pointer;transition:all .25s;
            position:relative;overflow:hidden;
            margin-bottom:4px;
        }
        .nav-item::before{
            content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
            background:var(--orange);border-radius:0 3px 3px 0;
            transform:scaleY(0);transition:transform .25s;
        }
        .nav-item:hover{
            background:rgba(249,115,22,.1);
            border:1px solid rgba(249,115,22,.2);
            padding-left:20px;
        }
        .nav-item:hover::before{transform:scaleY(1);}
        .nav-item:active{transform:scale(.97);}

        .nav-icon{
            width:36px;height:36px;border-radius:10px;flex-shrink:0;
            display:flex;align-items:center;justify-content:center;
            font-size:18px;
            background:rgba(255,255,255,.07);
            border:1px solid rgba(255,255,255,.1);
            transition:all .25s;
        }
        .nav-item:hover .nav-icon{
            background:rgba(249,115,22,.2);
            border-color:rgba(249,115,22,.4);
            box-shadow:0 0 12px rgba(249,115,22,.3);
        }
        .nav-label{
            flex:1;font-size:14px;font-weight:600;
            color:var(--text-mid);transition:color .25s;
        }
        .nav-item:hover .nav-label{color:var(--text-hi);}
        .nav-tag{
            font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;
            background:rgba(249,115,22,.8);color:white;
        }
        .nav-tag.new{background:linear-gradient(135deg,#10b981,#059669);}

        .nav-sep{
            height:1px;background:var(--border);
            margin:8px 16px;
        }

        /* ─── CENTER (3D + overlay) ─── */
        .center-area{
            position:relative;overflow:hidden;
        }

        #charCanvas{
            position:absolute;inset:0;width:100%;height:100%;
            display:block;
        }

        /* center overlays */
        .center-overlay{
            position:absolute;inset:0;pointer-events:none;
        }

        /* bottom fog */
        .center-overlay::after{
            content:'';position:absolute;bottom:0;left:0;right:0;height:180px;
            background:linear-gradient(to top,var(--bg) 0%,transparent 100%);
        }

        /* top dim */
        .center-overlay::before{
            content:'';position:absolute;top:0;left:0;right:0;height:120px;
            background:linear-gradient(to bottom,rgba(4,8,20,.7) 0%,transparent 100%);
        }

        /* character name plate */
        .char-plate{
            position:absolute;bottom:100px;left:50%;transform:translateX(-50%);
            text-align:center;pointer-events:none;
        }
        .char-name{
            font-size:26px;font-weight:800;letter-spacing:3px;
            color:var(--text-hi);
            text-shadow:0 0 30px rgba(249,115,22,.6),0 2px 8px rgba(0,0,0,.8);
        }
        .char-class{
            font-size:12px;letter-spacing:4px;color:var(--orange);
            text-transform:uppercase;margin-top:4px;
            text-shadow:0 0 12px rgba(249,115,22,.5);
        }

        /* center top label */
        .center-title{
            position:absolute;top:20px;left:50%;transform:translateX(-50%);
            font-size:11px;letter-spacing:6px;color:var(--text-lo);
            text-transform:uppercase;pointer-events:none;
        }

        /* skin selector row at bottom */
        .skin-row{
            position:absolute;bottom:28px;left:50%;transform:translateX(-50%);
            display:flex;gap:12px;pointer-events:all;
        }
        .skin-btn{
            width:44px;height:44px;border-radius:10px;cursor:pointer;
            border:2px solid rgba(255,255,255,.15);
            background:rgba(255,255,255,.08);
            backdrop-filter:blur(8px);
            display:flex;align-items:center;justify-content:center;font-size:20px;
            transition:all .2s;
        }
        .skin-btn:hover{
            border-color:var(--orange);
            box-shadow:0 0 14px rgba(249,115,22,.5);
            transform:translateY(-3px);
        }
        .skin-btn.active{
            border-color:var(--orange);
            background:rgba(249,115,22,.2);
            box-shadow:0 0 18px rgba(249,115,22,.6);
        }

        /* ─── RIGHT PANEL ─── */
        .right-panel{
            display:flex;flex-direction:column;gap:12px;
            padding:16px 14px;
            background:var(--panel);
            border-left:1px solid var(--border);
            backdrop-filter:blur(20px);
            overflow-y:auto;scrollbar-width:none;
        }
        .right-panel::-webkit-scrollbar{display:none;}

        .rp-card{
            background:rgba(255,255,255,.04);
            border:1px solid rgba(255,255,255,.08);
            border-radius:14px;padding:14px;
            transition:border-color .2s;
        }
        .rp-card:hover{border-color:var(--border);}

        .rp-title{
            font-size:12px;font-weight:700;letter-spacing:2px;
            color:var(--orange);text-transform:uppercase;
            margin-bottom:12px;
            display:flex;align-items:center;gap:8px;
        }
        .rp-title::before{
            content:'';width:3px;height:14px;border-radius:2px;
            background:var(--orange);flex-shrink:0;
        }

        /* stats grid */
        .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
        .stat-cell{
            background:rgba(255,255,255,.05);border-radius:10px;
            padding:10px;text-align:center;
            border:1px solid rgba(255,255,255,.07);
            transition:all .2s;
        }
        .stat-cell:hover{background:rgba(249,115,22,.08);border-color:rgba(249,115,22,.2);}
        .stat-val{
            font-size:22px;font-weight:800;color:#ffd700;
            text-shadow:0 0 12px rgba(255,215,0,.4);
        }
        .stat-lbl{font-size:10px;color:var(--text-lo);margin-top:4px;letter-spacing:1px;}

        /* rank list */
        .rank-row{
            display:flex;align-items:center;gap:10px;
            padding:8px 10px;border-radius:10px;
            background:rgba(255,255,255,.04);
            margin-bottom:6px;
            transition:all .2s;
            border:1px solid transparent;
        }
        .rank-row:hover{background:rgba(249,115,22,.06);border-color:rgba(249,115,22,.15);}
        .rank-no{
            width:26px;height:26px;border-radius:50%;flex-shrink:0;
            display:flex;align-items:center;justify-content:center;
            font-weight:800;font-size:12px;color:#333;
            background:linear-gradient(135deg,#ffd700,#ffed4e);
        }
        .rank-no.s{background:linear-gradient(135deg,#c0c0c0,#e8e8e8);}
        .rank-no.b{background:linear-gradient(135deg,#cd7f32,#e8a95c);}
        .rank-info-col{flex:1;min-width:0;}
        .rank-nm{font-size:13px;font-weight:700;color:var(--text-hi);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .rank-sc{font-size:11px;color:var(--text-lo);}

        /* notices */
        .notice-line{
            font-size:12px;color:var(--text-mid);padding:8px 10px;
            border-radius:8px;background:rgba(255,255,255,.04);
            border-left:2px solid var(--orange);margin-bottom:6px;
            line-height:1.5;
        }

        /* avatar preview */
        .avatar-showcase{
            text-align:center;padding:8px 0;
        }
        .avatar-big{
            width:90px;height:90px;border-radius:18px;
            margin:0 auto 10px;
            background:linear-gradient(135deg,rgba(139,92,246,.4),rgba(99,102,241,.4));
            display:flex;align-items:center;justify-content:center;
            font-size:48px;
            border:2px solid rgba(139,92,246,.4);
            box-shadow:0 0 24px rgba(139,92,246,.3);
            cursor:pointer;transition:all .3s;overflow:hidden;
        }
        .avatar-big:hover{
            transform:scale(1.05);
            box-shadow:0 0 36px rgba(139,92,246,.5);
        }
        .avatar-edit{
            padding:7px 20px;border-radius:8px;border:none;cursor:pointer;
            background:linear-gradient(135deg,rgba(139,92,246,.25),rgba(99,102,241,.25));
            border:1px solid rgba(139,92,246,.35);
            color:var(--text-hi);font-size:12px;font-weight:600;
            font-family:inherit;transition:all .2s;
        }
        .avatar-edit:hover{background:linear-gradient(135deg,rgba(139,92,246,.45),rgba(99,102,241,.45));}

        /* ─── BOTTOM BAR ─── */
        .bottom-bar{
            grid-column:1/-1;
            display:flex;align-items:center;justify-content:center;gap:20px;
            padding:0 32px;
            background:rgba(4,8,20,.9);
            border-top:1px solid var(--border);
            backdrop-filter:blur(16px);
        }

        .btn-main{
            padding:0 56px;height:52px;border-radius:12px;border:none;
            font-size:17px;font-weight:800;letter-spacing:2px;cursor:pointer;
            font-family:inherit;transition:all .3s;position:relative;overflow:hidden;
        }
        .btn-enter{
            background:linear-gradient(135deg,var(--orange),#ef4444);
            color:white;
            box-shadow:0 0 32px rgba(249,115,22,.45);
            min-width:200px;
        }
        .btn-enter::before{
            content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
            background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
            transition:left .5s;
        }
        .btn-enter:hover{
            transform:translateY(-3px);
            box-shadow:0 0 48px rgba(249,115,22,.7),0 8px 24px rgba(0,0,0,.4);
        }
        .btn-enter:hover::before{left:100%;}
        .btn-enter:active{transform:translateY(-1px);}

        .btn-logout{
            background:rgba(255,255,255,.07);
            border:1px solid rgba(255,255,255,.15);
            color:var(--text-mid);
            padding:0 28px;height:52px;border-radius:12px;border:1px solid rgba(255,255,255,.15);
            font-size:14px;font-weight:600;letter-spacing:1px;cursor:pointer;
            font-family:inherit;transition:all .2s;
        }
        .btn-logout:hover{background:rgba(255,255,255,.12);color:var(--text-hi);}

        .bottom-center-info{
            position:absolute;left:50%;transform:translateX(-50%);
            display:flex;gap:32px;pointer-events:none;
        }
        .bci-item{text-align:center;}
        .bci-val{font-size:13px;font-weight:700;color:var(--text-hi);}
        .bci-lbl{font-size:10px;color:var(--text-lo);letter-spacing:1px;}

        /* ─── MAP MODAL ─── */
        #map-select-overlay{
            position:fixed;inset:0;z-index:99999;
            background:rgba(0,0,0,.8);backdrop-filter:blur(12px);
            display:flex;align-items:center;justify-content:center;
            animation:fadeIn .2s ease;
        }
        #map-select-overlay.hidden{display:none;}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}

        .map-select-box{
            background:linear-gradient(145deg,#080d1e,#0f1729);
            border:1px solid rgba(249,115,22,.4);
            border-radius:24px;padding:40px;
            max-width:580px;width:90%;
            box-shadow:0 0 80px rgba(249,115,22,.2),0 40px 80px rgba(0,0,0,.6);
            animation:popUp .35s cubic-bezier(.175,.885,.32,1.275);
        }
        @keyframes popUp{from{opacity:0;transform:scale(.85) translateY(20px)}to{opacity:1;transform:none}}

        .map-select-box h2{
            color:var(--text-hi);font-size:24px;font-weight:800;
            letter-spacing:2px;margin-bottom:6px;
            text-shadow:0 0 20px rgba(249,115,22,.4);
        }
        .map-select-box p{color:var(--text-lo);font-size:13px;margin-bottom:28px;}

        .map-btn-group{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
        .map-btn{
            background:rgba(255,255,255,.04);
            border:2px solid rgba(249,115,22,.25);
            border-radius:16px;padding:28px 16px;cursor:pointer;
            color:var(--text-hi);font-family:inherit;
            text-align:center;transition:all .3s;
        }
        .map-btn:hover{
            background:rgba(249,115,22,.1);border-color:var(--orange);
            transform:translateY(-4px);
            box-shadow:0 12px 32px rgba(249,115,22,.25);
        }
        .map-btn:active{transform:scale(.97);}
        .map-btn .btn-icon{font-size:48px;display:block;margin-bottom:10px;}
        .map-btn .btn-label{font-size:16px;font-weight:700;display:block;}
        .map-btn .btn-sub{font-size:11px;color:var(--text-lo);margin-top:4px;display:block;}
        .map-cancel-btn{
            background:none;border:none;color:var(--text-lo);
            font-size:13px;cursor:pointer;padding:6px 18px;border-radius:8px;
            transition:color .2s;font-family:inherit;
        }
        .map-cancel-btn:hover{color:var(--text-mid);}

        /* ─── FEATURE MODAL ─── */
        .feature-modal{
            position:fixed;inset:0;z-index:10000;
            display:flex;flex-direction:column;
            background:rgba(0,0,0,.85);backdrop-filter:blur(8px);
        }
        .feature-modal.hidden{display:none;}
        .modal-header{
            background:linear-gradient(135deg,rgba(249,115,22,.9),rgba(239,68,68,.9));
            padding:16px 28px;
            display:flex;justify-content:space-between;align-items:center;
            box-shadow:0 4px 20px rgba(0,0,0,.4);
        }
        .modal-title{color:white;font-size:20px;font-weight:800;letter-spacing:1px;}
        .modal-close-btn{
            background:rgba(255,255,255,.2);color:white;border:none;
            width:38px;height:38px;border-radius:50%;
            font-size:22px;cursor:pointer;transition:all .2s;
            display:flex;align-items:center;justify-content:center;
        }
        .modal-close-btn:hover{background:rgba(255,255,255,.35);transform:rotate(90deg);}
        .feature-iframe{flex:1;width:100%;border:none;background:white;}

        /* ─── RESPONSIVE ─── */
        @media(max-width:1100px){
            .layout{grid-template-columns:240px 1fr 260px;}
        }
        @media(max-width:900px){
            .layout{grid-template-columns:1fr;grid-template-rows:64px 1fr 88px;}
            .left-nav,.right-panel{display:none;}
            .center-area{grid-column:1;}
        }
    </style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="scanlines"></div>
<div class="vignette"></div>

<div class="layout">

    <!-- ═══ TOP BAR ═══ -->
    <div class="topbar">
        <div class="logo-row">
            <div class="logo-badge">🎓</div>
            <div>
                <div class="logo-name">爱哲安民未来学校</div>
                <div class="logo-sub">CAMPUS SIMULATOR · v2.0</div>
            </div>
        </div>
        <div class="season-tag">第一赛季</div>
        <div class="topbar-right">
            <button type="button" class="settings-top-btn" onclick="location.href='settings.html'">⚙️ 设置</button>
            <div class="tb-chip pts">
                <span class="icon">💎</span>
                <span class="val" id="userPoints">—</span>
            </div>
            <div class="tb-chip">
                <span class="icon">🏆</span>
                <span>第 <span id="userRank">—</span> 名</span>
            </div>
            <div class="tb-chip">
                <span class="icon">🕐</span>
                <span id="currentTime">—</span>
            </div>
        </div>
    </div>

    <!-- ═══ LEFT NAV ═══ -->
    <div class="left-nav">
        <div class="nav-user">
            <div class="nav-user-row">
                <div class="nav-avatar" id="userAvatar">👤</div>
                <div class="nav-user-info">
                    <div class="nav-uname" id="userName">玩家</div>
                    <div class="nav-uid" id="userId">ID: —</div>
                </div>
            </div>
            <div class="nav-badges">
                <span class="nav-badge">积分: <span id="navPts">—</span></span>
                <span class="nav-badge cyan">连续 <span id="dayStreak">—</span> 天</span>
            </div>

/* ═══════════════════════════════════════
   BACKGROUND CANVAS (animated grid + particles)
═══════════════════════════════════════ */
(function initBg(){
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let W,H;
    function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;}
    resize(); window.addEventListener('resize',resize);

    // grid lines
    function drawGrid(){
        ctx.save();
        ctx.strokeStyle='rgba(249,115,22,.06)';
        ctx.lineWidth=1;
        const sz=60;
        for(let x=0;x<W;x+=sz){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
        for(let y=0;y<H;y+=sz){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
        ctx.restore();
    }

    // particles
    const PTS=[];
    for(let i=0;i<80;i++) PTS.push({
        x:Math.random()*2000, y:Math.random()*1200,
        r:Math.random()*1.5+.3,
        vx:(Math.random()-.5)*.3, vy:(Math.random()-.5)*.3,
        a:Math.random()*.5+.1
    });

    function animBg(){
        ctx.clearRect(0,0,W,H);
        // deep bg
        const grd=ctx.createRadialGradient(W*.5,H*.5,0,W*.5,H*.5,Math.max(W,H)*.7);
        grd.addColorStop(0,'#0d1428'); grd.addColorStop(1,'#070b17');
        ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);

        drawGrid();

        // particles
        PTS.forEach(p=>{
            p.x+=p.vx; p.y+=p.vy;
            if(p.x<0)p.x=W; if(p.x>W)p.x=0;
            if(p.y<0)p.y=H; if(p.y>H)p.y=0;
            ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
            ctx.fillStyle=`rgba(249,115,22,${p.a})`;ctx.fill();
        });

        requestAnimationFrame(animBg);
    }
    animBg();
})();

/* ═══════════════════════════════════════
   THREE.JS CHARACTER
═══════════════════════════════════════ */
(function init3D(){
    if(typeof THREE==='undefined') return;

    const canvas = document.getElementById('charCanvas');
    const renderer = new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    renderer.shadowMap.enabled=true;
    renderer.shadowMap.type=THREE.PCFSoftShadowMap;
    renderer.toneMapping=THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure=1.1;

    function resize(){
        const w=canvas.parentElement.clientWidth, h=canvas.parentElement.clientHeight;
        renderer.setSize(w,h,false);
        camera.aspect=w/h; camera.updateProjectionMatrix();
    }

    const scene=new THREE.Scene();
    scene.fog=new THREE.FogExp2(0x070b17,.06);

    const camera=new THREE.PerspectiveCamera(45,1,.1,100);
    camera.position.set(0,2.2,5.5);
    camera.lookAt(0,1.8,0);

    // ── lighting ──
    const ambient=new THREE.AmbientLight(0x1a2040,3);
    scene.add(ambient);

    const mainLight=new THREE.DirectionalLight(0xffeedd,3);
    mainLight.position.set(2,5,3);
    mainLight.castShadow=true;
    scene.add(mainLight);

    const rimLight=new THREE.DirectionalLight(0xf97316,2);
    rimLight.position.set(-3,3,-2);
    scene.add(rimLight);

    const fillLight=new THREE.DirectionalLight(0x22d3ee,1.2);
    fillLight.position.set(3,0,2);
    scene.add(fillLight);

    // point light at feet
    const footLight=new THREE.PointLight(0xf97316,2,3);
    footLight.position.set(0,.2,0);
    scene.add(footLight);

    // ── materials ──
    const MAT = {
        body:  new THREE.MeshStandardMaterial({color:0x1e3a5f,roughness:.35,metalness:.6}),
        suit:  new THREE.MeshStandardMaterial({color:0x243045,roughness:.4,metalness:.5}),
        skin:  new THREE.MeshStandardMaterial({color:0xe8c5a0,roughness:.8,metalness:0}),
        armor: new THREE.MeshStandardMaterial({color:0x2d4a6e,roughness:.3,metalness:.8,
                   emissive:0x0a1f3a,emissiveIntensity:.2}),
        glow:  new THREE.MeshStandardMaterial({color:0xf97316,emissive:0xf97316,emissiveIntensity:1.2,
                   roughness:.2,metalness:.3}),
        weapon:new THREE.MeshStandardMaterial({color:0x1a1a2e,roughness:.2,metalness:.9}),
    };

    const skins=[
        {body:0x1e3a5f,armor:0x2d4a6e,glow:0xf97316},
        {body:0x2d4a1e,armor:0x3d5a2e,glow:0x4ade80},
        {body:0x3a1e5f,armor:0x4d2e6e,glow:0xa855f7},
        {body:0x5f3a1e,armor:0x6e4d2e,glow:0xffd700},
    ];

    function applySkin(i){
        const s=skins[i]||skins[0];
        MAT.body.color.setHex(s.body);
        MAT.armor.color.setHex(s.armor);
        MAT.glow.color.setHex(s.glow); MAT.glow.emissive.setHex(s.glow);
        footLight.color.setHex(s.glow);
        rimLight.color.setHex(s.glow);
    }
    window.setSkin=function(i){
        document.querySelectorAll('.skin-btn').forEach((b,j)=>b.classList.toggle('active',i===j));
        applySkin(i);
    };

    // ── build character ──
    const char=new THREE.Group();
    char.position.y=0;

    function box(w,h,d,mat,x=0,y=0,z=0){
        const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
        m.position.set(x,y,z); m.castShadow=true; return m;
    }
    function cyl(rt,rb,h,segs,mat,x=0,y=0,z=0){
        const m=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,segs),mat);
        m.position.set(x,y,z); m.castShadow=true; return m;
    }
    function sph(r,mat,x=0,y=0,z=0){
        const m=new THREE.Mesh(new THREE.SphereGeometry(r,16,16),mat);
        m.position.set(x,y,z); m.castShadow=true; return m;
    }

    // legs
    char.add(box(.28,.9,.28,MAT.suit,-.2,-.95,0));
    char.add(box(.28,.9,.28,MAT.suit, .2,-.95,0));
    // boots
    char.add(box(.3,.2,.38,MAT.armor,-.2,-1.5,.04));
    char.add(box(.3,.2,.38,MAT.armor, .2,-1.5,.04));
    // torso
    char.add(box(.68,1,.5,MAT.body,0,0,0));
    // chest armor
    char.add(box(.64,.55,.14,MAT.armor,0,.15,.28));
    // shoulder pads
    char.add(box(.2,.3,.3,MAT.armor,-.48,.3,0));
    char.add(box(.2,.3,.3,MAT.armor, .48,.3,0));
    // arms upper
    char.add(box(.2,.55,.2,MAT.suit,-.6,-.05,0));
    char.add(box(.2,.55,.2,MAT.suit, .6,-.05,0));
    // arms lower
    char.add(box(.18,.45,.18,MAT.body,-.6,-.58,0));
    char.add(box(.18,.45,.18,MAT.body, .6,-.58,0));
    // gloves
    char.add(box(.2,.2,.2,MAT.armor,-.6,-.87,0));
    char.add(box(.2,.2,.2,MAT.armor, .6,-.87,0));
    // neck
    char.add(cyl(.12,.12,.2,8,MAT.skin,0,.6,0));
    // head
    char.add(box(.54,.54,.54,MAT.skin,0,.97,0));
    // helmet
    char.add(box(.6,.3,.62,MAT.armor,0,1.19,0));
    char.add(box(.2,.16,.18,MAT.armor,0,1.25,.35)); // visor bump
    // visor glow
    char.add(box(.44,.09,.06,MAT.glow,0,1.15,.32));
    // belt
    char.add(box(.7,.12,.52,MAT.armor,0,-.52,0));
    // utility pouches
    char.add(box(.15,.2,.15,MAT.armor,-.3,-.5,.28));
    char.add(box(.15,.2,.15,MAT.armor, .08,-.5,.28));

    // weapon (rifle) — held in right hand area
    const gun=new THREE.Group();
    gun.add(box(.08,.08,.8,MAT.weapon,0,0,0));   // barrel
    gun.add(box(.14,.28,.35,MAT.weapon,0,-.06,.15)); // body
    gun.add(box(.06,.06,.22,MAT.weapon,0,0,-.32));   // stock
    gun.add(box(.06,.14,.08,MAT.weapon,0,-.22,.1));  // grip
    gun.add(box(.09,.06,.35,MAT.weapon,0,.07,-.05)); // rail
    gun.position.set(.72,-.6,.2);
    gun.rotation.set(0,.15,-.1);
    char.add(gun);

    scene.add(char);

    // ── platform ring ──
    const ring=new THREE.Mesh(
        new THREE.RingGeometry(1.1,1.5,64),
        new THREE.MeshBasicMaterial({color:0xf97316,transparent:true,opacity:.25,side:THREE.DoubleSide})
    );
    ring.rotation.x=-Math.PI/2;
    ring.position.y=-1.65;
    scene.add(ring);

    const ring2=new THREE.Mesh(
        new THREE.RingGeometry(.5,.75,64),
        new THREE.MeshBasicMaterial({color:0x22d3ee,transparent:true,opacity:.2,side:THREE.DoubleSide})
    );
    ring2.rotation.x=-Math.PI/2;
    ring2.position.y=-1.64;
    scene.add(ring2);

    // circle plane (shadow receiver)
    const platform=new THREE.Mesh(
        new THREE.CylinderGeometry(2,2,.02,64),
        new THREE.MeshStandardMaterial({color:0x0d1428,roughness:1,metalness:0})
    );
    platform.position.y=-1.66;
    platform.receiveShadow=true;
    scene.add(platform);

    // ── animate ──
    let t=0;
    let mouseX=0, mouseY=0;
    document.addEventListener('mousemove',e=>{
        mouseX=(e.clientX/innerWidth-.5)*2;
        mouseY=(e.clientY/innerHeight-.5)*2;
    });

    function tick(){
        requestAnimationFrame(tick);
        t+=.012;

        // breathing
        char.position.y=Math.sin(t)*.025;
        char.scale.y=1+Math.sin(t)*.01;

        // slight tilt toward mouse
        char.rotation.y=mouseX*.12 + Math.sin(t*.3)*.04;

        // ring spin
        ring.rotation.z+=.008;
        ring2.rotation.z-=.012;

        // glow pulse
        footLight.intensity=1.6+Math.sin(t*2)*.6;
        MAT.glow.emissiveIntensity=1+Math.sin(t*1.5)*.4;

        renderer.render(scene,camera);
    }

    resize();
    window.addEventListener('resize',resize);
    tick();
})();

function loadUserInfo(){
    const raw=localStorage.getItem('campus_user');
    if(!raw){window.location.href='login.html';return;}
    const user=JSON.parse(raw);

    document.getElementById('userName').textContent=user.nickname||'玩家';
    document.getElementById('charDisplayName').textContent=user.nickname||'玩家';
    document.getElementById('userId').textContent='手机: '+(user.phone||'—');

    const avEls=document.querySelectorAll('#userAvatar');
    avEls.forEach(el=>{
        if(user.avatar&&user.avatar.startsWith('data:')){
            el.innerHTML=`<img src="${user.avatar}" alt="avatar">`;
        } else {
            el.textContent=user.avatar||'👤';
        }
    });

    if(user.userId){
        const ps=new PointsSystem();
        ps.setCurrentUser(user.userId);
        const st=ps.getCurrentStudent();
        if(st&&st.name!==user.nickname){st.name=user.nickname;ps.savePointsData();}
    }
    loadPointsData();
}

function loadPointsData(){
    const ud=JSON.parse(localStorage.getItem('campus_user')||'{}');
    if(!ud||!ud.userId) return;
    const ps=new PointsSystem();
    ps.setCurrentUser(ud.userId);
    const st=ps.getCurrentStudent();
    if(!st) return;

    if(st.name!==ud.nickname){st.name=ud.nickname;ps.savePointsData();}

    const total=st.totalEarned||st.points||0;
    const cur=st.points||0;
    const streak=st.dayStreak||1;
    const inv=(st.inventory||[]).length;

    document.getElementById('userPoints').textContent=total;
    document.getElementById('navPts').textContent=total;
    document.getElementById('totalPoints').textContent=total;
    document.getElementById('dayStreak').textContent=streak;
    document.getElementById('statStreak').textContent=streak;
    document.getElementById('inventoryCount').textContent=inv;

    updateAvatarPreview(st,ps);

    ps.updateLeaderboard();
    const lb=ps.getLeaderboard(3);
    updateRankList(lb,ud.userId);
    updateUserRank(ps,ud.userId);
}

function updateUserRank(ps,userId){
    const lb=ps.getLeaderboard(100);
    const st=ps.getCurrentStudent();
    if(!st) return;
    const idx=lb.findIndex(i=>i.totalPoints===st.totalEarned&&i.name===st.name);
    const rankVal= idx!==-1 ? lb[idx].rank : (()=>{
        const all=Object.values(ps.pointsData.students).sort((a,b)=>(b.totalEarned||0)-(a.totalEarned||0));
        const r=all.findIndex(s=>s.id===userId)+1;
        return r>0?r:'--';
    })();
    document.getElementById('userRank').textContent=rankVal;
    document.getElementById('userRank2').textContent=rankVal;
}

function updateAvatarPreview(student,ps){
    const el=document.getElementById('avatarPreview');
    const items=ps.getRewardItems();
    let main='👤',hat='',glasses='';
    if(student.avatar?.hair&&student.avatar.hair!=='none'){
        const h=items.find(i=>i.id===student.avatar.hair);
        if(h) main=h.image;
    }
    if(student.avatar?.glasses&&student.avatar.glasses!=='none'){
        const g=items.find(i=>i.id===student.avatar.glasses);
        if(g) glasses=g.image;
    }
    if(student.avatar?.hat&&student.avatar.hat!=='none'){
        const h=items.find(i=>i.id===student.avatar.hat);
        if(h) hat=h.image;
    }
    el.innerHTML=`<div style="position:relative;display:inline-block;font-size:52px;">
        ${hat?`<div style="position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:.6em;">${hat}</div>`:''}
        <div>${main}</div>
        ${glasses?`<div style="position:absolute;top:28%;left:50%;transform:translate(-50%,-50%);font-size:.5em;">${glasses}</div>`:''}
    </div>`;
}

function updateRankList(lb,curUserId){
    const el=document.getElementById('rankList');
    const ud=JSON.parse(localStorage.getItem('campus_user')||'{}');
    if(!lb||!lb.length){el.innerHTML='<div style="color:var(--text-lo);font-size:12px;text-align:center;padding:10px;">暂无数据</div>';return;}
    const cls=['','s','b'];
    el.innerHTML=lb.map((item,i)=>`
        <div class="rank-row">
            <div class="rank-no ${cls[i]||''}">${item.rank}</div>
            <div class="rank-info-col">
                <div class="rank-nm">${item.name}</div>
                <div class="rank-sc">💎 ${item.totalPoints||0} 分</div>
            </div>
        </div>`).join('');
}

function enterMap(type){
    closeMapSelect();
    if(type==='3d'){window.location.href='校园企业家，教学楼小副本/index.html';return;}
    const started=localStorage.getItem('game_started');
    if(!started){localStorage.setItem('game_started','true');window.location.href='梦核校园最新力作(2).html';}
    else{window.location.href='index.html';}
}

function logout(){
    if(confirm('确定要退出登录吗？所有数据将自动保存。')){
        try{
            const ps=new PointsSystem();
            if(ps.currentUser) ps.savePointsData();
        }catch(e){}
        const ud=JSON.parse(localStorage.getItem('campus_user')||'{}');
        if(ud.userId){ud.lastLogoutTime=new Date().toISOString();localStorage.setItem('campus_user',JSON.stringify(ud));}
        const msg=document.createElement('div');
        msg.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,var(--orange),#ef4444);color:white;padding:24px 48px;border-radius:14px;font-size:17px;z-index:10001;font-weight:700;box-shadow:0 0 48px rgba(249,115,22,.6);';
        msg.textContent='✅ 数据已保存，正在退出...';
        document.body.appendChild(msg);
        setTimeout(()=>{localStorage.removeItem('campus_user');window.location.href='login.html';},800);
    }
}

/* ═══════════════════════════════════════
   AUTO SAVE
═══════════════════════════════════════ */
function autoSave(){
    try{
        const ud=JSON.parse(localStorage.getItem('campus_user')||'{}');
        if(ud.userId){const ps=new PointsSystem();ps.setCurrentUser(ud.userId);ps.savePointsData();}
    }catch(e){}
}
window.addEventListener('beforeunload',autoSave);
setInterval(autoSave,30000);

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
window.addEventListener('DOMContentLoaded',()=>{
    loadUserInfo();

    // Supabase sync
    (async function syncUser(){
        try{
            const ud=JSON.parse(localStorage.getItem('campus_user')||'{}');
            if(!ud.userId) return;
            await apiClient.createOrUpdateUser({
                userId:ud.userId,
                name:ud.nickname||ud.name||'玩家',
                avatar:ud.avatar||'👤',
                points:ud.points||0
            });
            console.log('✅ 用户已同步到 Supabase');
        }catch(e){console.warn('⚠️ 用户同步失败:',e.message);}
    })();
});
</script>
