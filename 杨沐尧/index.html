<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火柴人游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 背景粒子 -->
    <div class="bg-particles" id="bgParticles"></div>
    
    <!-- 游戏容器 -->
    <div class="game-container">
        <!-- 游戏信息栏 -->
        <div class="game-info">
            <div class="info-left">
                <div class="score">分数: <span id="score">0</span></div>
                <div class="level">关卡: <span id="level">1</span></div>
            </div>
            <div class="info-center">
                <div class="lives">生命: <span id="lives">3</span> ❤️</div>
            </div>
            <div class="info-right">
                <div class="high-score">最高分: <span id="highScore">0</span></div>
                <div class="controls-hint">M 静音</div>
                <button onclick="goBack()" style="margin-top: 10px; padding: 6px 12px; background: rgba(102, 126, 234, 0.2); border: 1px solid #667eea; border-radius: 6px; color: #667eea; cursor: pointer; font-size: 12px;">返回校园</button>
            </div>
        </div>
        
        <!-- 游戏画布 -->
        <canvas id="gameCanvas"></canvas>
        
        <!-- 游戏开始界面 -->
        <div id="startScreen" class="screen">
            <h1>🏃 火柴人大冒险</h1>
            <div class="game-description">
                <p>收集所有星星完成关卡</p>
                <p>小心红色敌人和地面陷阱！</p>
            </div>
            <div class="controls">
                <p>← → 或 A D : 移动</p>
                <p>空格 或 ↑ 或 W : 跳跃</p>
                <p>M : 静音切换</p>
            </div>
            <p class="start-hint">按空格键开始游戏</p>
        </div>
        
        <!-- 关卡完成界面 -->
        <div id="levelCompleteScreen" class="screen hidden">
            <h1>🎉 关卡完成！</h1>
            <p class="level-info">第 <span id="currentLevelDisplay">1</span> 关通过</p>
            <p>获得 50 分奖励</p>
            <p class="continue-hint">按空格键继续下一关</p>
        </div>
        
        <!-- 游戏结束界面 -->
        <div id="gameOverScreen" class="screen hidden">
            <h1 id="gameOverTitle">游戏结束</h1>
            <p class="final-score-label">最终分数</p>
            <p class="final-score-value"><span id="finalScore">0</span></p>
            <p class="restart-hint">按空格键重新开始</p>
        </div>
    </div>
    
    <script src="game.js"></script>
    <script>
        // 创建背景粒子
        function createBackgroundParticles() {
            const container = document.getElementById('bgParticles');
            if (!container) return;
            
            for (let i = 0; i < 25; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle-bg';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }
        
        // 返回校园游戏
        function goBack() {
            if (window.parent && window.parent.document.getElementById('close-web-btn')) {
                window.parent.document.getElementById('close-web-btn').click();
            } else {
                window.location.href = '../games/run-mode-select.html';
            }
        }
        
        // 页面加载时创建粒子
        window.addEventListener('DOMContentLoaded', () => {
            createBackgroundParticles();
        });
    </script>
</body>
</html>
