<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私聊 - 校园模拟器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, 
                #0f172a 0%, 
                #1e293b 25%, 
                #312e81 50%, 
                #1e293b 75%, 
                #0f172a 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px) saturate(180%);
            color: white;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            position: relative;
            z-index: 1;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .back-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: rotate(-90deg);
        }
        
        .friend-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .friend-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .friend-name {
            font-size: 18px;
            font-weight: 600;
        }
        
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            margin-bottom: 20px;
            min-height: 400px;
            max-height: calc(100vh - 200px);
        }
        
        .message {
            display: flex;
            margin-bottom: 16px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.own {
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            margin: 0 10px;
        }
        
        .message-content {
            max-width: 60%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        .message.own .message-content {
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            border-color: rgba(139, 92, 246, 0.5);
        }
        
        .message-text {
            color: white;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        
        .message-time {
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            margin-top: 4px;
        }
        
        .input-area {
            display: flex;
            gap: 12px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px) saturate(180%);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        .message-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 12px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.9);
            color: #1e293b;
            transition: all 0.3s ease;
        }
        
        .message-input:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
            background: white;
        }
        
        .send-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #8b5cf6, #6366f1, #3b82f6);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 8px 32px rgba(139, 92, 246, 0.4);
            transition: all 0.4s ease;
        }
        
        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(139, 92, 246, 0.6);
        }
        
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .empty-state {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            padding: 40px;
            font-size: 14px;
        }
        
        .loading {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <button class="back-btn" onclick="goBack()">←</button>
            <div class="friend-info">
                <div class="friend-avatar" id="friendAvatar">👤</div>
                <div class="friend-name" id="friendName">好友</div>
            </div>
        </div>
    </div>
    
    <div class="chat-container">
        <div class="messages-area" id="messagesArea">
            <div class="loading">加载中...</div>
        </div>
        
        <div class="input-area">
            <input 
                type="text" 
                id="messageInput" 
                class="message-input" 
                placeholder="输入消息..."
                maxlength="1000"
            >
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
    </div>
    
    <script src="js/api-client.js"></script>
    <script>
        // 获取URL参数
        const urlParams = new URLSearchParams(window.location.search);
        const friendId = urlParams.get('friendId');
        const friendName = urlParams.get('friendName') || '好友';
        
        // 获取当前用户信息
        const userData = JSON.parse(localStorage.getItem('campus_user') || '{}');
        const currentUserId = userData.userId || 'student_001';
        const currentUserName = userData.nickname || userData.name || '玩家';
        
        // 确保用户已同步到MongoDB
        async function ensureUserExists() {
            try {
                await apiClient.getUser(currentUserId);
            } catch (error) {
                try {
                    await apiClient.createOrUpdateUser({
                        userId: currentUserId,
                        name: currentUserName,
                        phone: userData.phone || undefined,
                        class: '初一(1)班',
                        avatar: userData.avatar || ''
                    });
                } catch (e) {
                    console.error('同步用户失败:', e);
                }
            }
        }
        
        // 初始化
        window.addEventListener('DOMContentLoaded', async () => {
            if (!friendId) {
                alert('❌ 缺少好友ID');
                goBack();
                return;
            }
            
            await ensureUserExists();
            document.getElementById('friendName').textContent = decodeURIComponent(friendName);
            loadMessages();
            
            // 支持回车发送
            document.getElementById('messageInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });
            
            // 定期刷新消息（每5秒）
            setInterval(loadMessages, 5000);
        });
        
        // 加载消息
        async function loadMessages() {
            const messagesArea = document.getElementById('messagesArea');
            
            try {
                const response = await apiClient.getMessages(currentUserId, friendId);
                
                if (response && response.success) {
                    if (response.data && response.data.length > 0) {
                        renderMessages(response.data);
                    } else {
                        messagesArea.innerHTML = '<div class="empty-state">还没有消息，开始聊天吧！</div>';
                    }
                } else {
                    throw new Error(response?.message || '加载消息失败');
                }
            } catch (error) {
                console.error('加载消息失败:', error);
                let errorMsg = '加载失败，请检查网络连接';
                
                if (error.message.includes('Failed to fetch') || error.message.includes('Unexpected token')) {
                    errorMsg = '无法连接到服务器，请确保后端服务器已启动（运行 启动服务器.bat）';
                } else if (error.message) {
                    errorMsg = error.message;
                }
                
                messagesArea.innerHTML = `<div class="empty-state">${errorMsg}</div>`;
            }
        }
        
        // 渲染消息
        function renderMessages(messages) {
            const messagesArea = document.getElementById('messagesArea');
            messagesArea.innerHTML = '';
            
            messages.forEach(msg => {
                const isOwn = msg.fromUserId === currentUserId;
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${isOwn ? 'own' : ''}`;
                
                const time = new Date(msg.createdAt).toLocaleTimeString('zh-CN', { 
                    hour: '2-digit', 
                    minute: '2-digit' 
                });
                
                messageDiv.innerHTML = `
                    <div class="message-avatar">${msg.fromUserAvatar || '👤'}</div>
                    <div class="message-content">
                        <div class="message-text">${escapeHtml(msg.content)}</div>
                        <div class="message-time">${time}</div>
                    </div>
                `;
                
                messagesArea.appendChild(messageDiv);
            });
            
            // 滚动到底部
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const content = input.value.trim();
            
            if (!content) {
                return;
            }
            
            // 禁用按钮
            sendBtn.disabled = true;
            sendBtn.textContent = '发送中...';
            
            try {
                const response = await apiClient.sendMessage(currentUserId, friendId, content);
                
                if (response && response.success) {
                    input.value = '';
                    // 重新加载消息
                    await loadMessages();
                } else {
                    throw new Error(response?.message || '发送失败');
                }
            } catch (error) {
                console.error('发送消息失败:', error);
                let errorMsg = '发送失败';
                
                if (error.message.includes('Failed to fetch') || error.message.includes('Unexpected token')) {
                    errorMsg = '无法连接到服务器，请确保后端服务器已启动（运行 启动服务器.bat）';
                } else if (error.message) {
                    errorMsg = error.message;
                }
                
                alert(errorMsg);
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = '发送';
            }
        }
        
        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 返回
        function goBack() {
            if (window.opener) {
                window.close();
            } else {
                window.location.href = 'campus-friends.html';
            }
        }
    </script>
</body>
</html>
