<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私聊 - 校园模拟器</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box;
            font-family:'PingFang SC','Microsoft YaHei',sans-serif; }

        body {
            background: linear-gradient(135deg,#0f172a 0%,#1e293b 25%,#312e81 50%,#1e293b 75%,#0f172a 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        @keyframes gradientShift {
            0%  { background-position:0% 50%; }
            50% { background-position:100% 50%; }
            100%{ background-position:0% 50%; }
        }
        body::before {
            content:''; position:fixed; inset:0;
            background:
                radial-gradient(circle at 20% 30%,rgba(139,92,246,.1) 0%,transparent 50%),
                radial-gradient(circle at 80% 70%,rgba(59,130,246,.1)  0%,transparent 50%);
            z-index:0; pointer-events:none;
        }

        /* ─── Header ─── */
        .header {
            background: rgba(255,255,255,.1);
            backdrop-filter: blur(20px) saturate(180%);
            color: white;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.1);
            border-bottom: 1px solid rgba(255,255,255,.15);
            position: relative; z-index:1;
        }
        .header-left { display:flex; align-items:center; gap:12px; }
        .back-btn {
            background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.25);
            color:white; width:36px; height:36px; border-radius:50%;
            cursor:pointer; display:flex; align-items:center; justify-content:center;
            font-size:18px; transition:all .3s;
        }
        .back-btn:hover { background:rgba(255,255,255,.25); transform:rotate(-90deg); }
        .friend-info  { display:flex; align-items:center; gap:10px; }
        .friend-avatar{
            width:40px; height:40px; border-radius:50%;
            background:linear-gradient(135deg,#8b5cf6,#6366f1);
            display:flex; align-items:center; justify-content:center; font-size:20px;
        }
        .friend-meta  { display:flex; flex-direction:column; gap:2px; }
        .friend-name  { font-size:17px; font-weight:600; }
        .friend-status{ display:flex; align-items:center; gap:5px; font-size:12px; color:rgba(255,255,255,.6); }
        .friend-status-dot {
            width:8px; height:8px; border-radius:50%; background:#6b7280;
            transition: background .4s;
        }
        .friend-status-dot.online  { background:#22c55e; box-shadow:0 0 6px #22c55e; }
        .friend-status-dot.offline { background:#6b7280; }

        /* 右侧连接状态 */
        .conn-status { display:flex; align-items:center; gap:6px; font-size:12px; color:rgba(255,255,255,.55); }
        .conn-dot { width:7px; height:7px; border-radius:50%; background:#6b7280; }
        .conn-dot.live   { background:#22c55e; animation:pulse 2s infinite; }
        .conn-dot.poll   { background:#f59e0b; }
        .conn-dot.offline{ background:#ef4444; }
        @keyframes pulse {
            0%,100%{ box-shadow:0 0 0 0 rgba(34,197,94,.4); }
            50%    { box-shadow:0 0 0 5px rgba(34,197,94,0); }
        }

        /* ─── Chat container ─── */
        .chat-container {
            flex:1; display:flex; flex-direction:column;
            max-width:1000px; margin:0 auto; width:100%;
            padding:16px 20px; position:relative; z-index:1;
        }
        .messages-area {
            flex:1; overflow-y:auto; padding:16px;
            background:rgba(255,255,255,.05);
            backdrop-filter:blur(10px);
            border-radius:16px; margin-bottom:14px;
            min-height:300px; max-height:calc(100vh - 200px);
            scroll-behavior: smooth;
        }
        .messages-area::-webkit-scrollbar { width:4px; }
        .messages-area::-webkit-scrollbar-thumb { background:rgba(255,255,255,.2); border-radius:2px; }

        /* ─── Messages ─── */
        .message {
            display:flex; margin-bottom:14px;
            animation: fadeIn .25s ease;
        }
        @keyframes fadeIn {
            from{ opacity:0; transform:translateY(8px); }
            to  { opacity:1; transform:translateY(0); }
        }
        .message.own { flex-direction:row-reverse; }
        .message-avatar {
            width:34px; height:34px; border-radius:50%;
            background:linear-gradient(135deg,#8b5cf6,#6366f1);
            display:flex; align-items:center; justify-content:center;
            font-size:17px; flex-shrink:0; margin:0 8px;
        }
        .message-content {
            max-width:62%; background:rgba(255,255,255,.1);
            backdrop-filter:blur(10px); border-radius:12px;
            padding:10px 14px; border:1px solid rgba(255,255,255,.15);
        }
        .message.own .message-content {
            background:linear-gradient(135deg,#8b5cf6,#6366f1);
            border-color:rgba(139,92,246,.5);
        }
        .message-text  { color:white; font-size:14px; line-height:1.55; word-break:break-all; }
        .message-time  { color:rgba(255,255,255,.45); font-size:11px; margin-top:3px; }

        /* ─── Typing indicator ─── */
        .typing-indicator {
            display:none; padding:6px 0;
        }
        .typing-bubble {
            display:inline-flex; align-items:center; gap:4px;
            background:rgba(255,255,255,.1); border-radius:12px;
            padding:8px 14px; border:1px solid rgba(255,255,255,.15);
        }
        .typing-bubble span {
            width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.6);
            animation: bounce 1.2s infinite;
        }
        .typing-bubble span:nth-child(2){ animation-delay:.2s; }
        .typing-bubble span:nth-child(3){ animation-delay:.4s; }
        @keyframes bounce {
            0%,60%,100%{ transform:translateY(0); }
            30%        { transform:translateY(-6px); }
        }
        .typing-text { margin-left:8px; font-size:12px; color:rgba(255,255,255,.5); }

        /* ─── Input area ─── */
        .input-area {
            display:flex; gap:10px;
            background:rgba(255,255,255,.1);
            backdrop-filter:blur(20px) saturate(180%);
            border-radius:16px; padding:14px;
            border:1px solid rgba(255,255,255,.15);
        }
        .message-input {
            flex:1; padding:11px 14px;
            border:2px solid rgba(139,92,246,.3);
            border-radius:12px; font-size:14px;
            background:rgba(255,255,255,.9); color:#1e293b;
            transition:all .3s; resize:none; max-height:100px;
        }
        .message-input:focus {
            outline:none; border-color:#8b5cf6;
            box-shadow:0 0 0 4px rgba(139,92,246,.1);
            background:white;
        }
        .send-btn {
            padding:11px 22px;
            background:linear-gradient(135deg,#8b5cf6,#6366f1,#3b82f6);
            color:white; border:none; border-radius:12px;
            cursor:pointer; font-size:14px; font-weight:600;
            box-shadow:0 8px 32px rgba(139,92,246,.4);
            transition:all .35s; white-space:nowrap;
        }
        .send-btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 12px 40px rgba(139,92,246,.6); }
        .send-btn:disabled { opacity:.45; cursor:not-allowed; transform:none; }

        /* ─── Empty / loading ─── */
        .empty-state  { text-align:center; color:rgba(255,255,255,.45); padding:40px; font-size:14px; }
        .loading-state{ text-align:center; color:rgba(255,255,255,.65); padding:24px; font-size:13px; }
        .error-toast {
            background:rgba(239,68,68,.22); color:#fca5a5;
            border-radius:8px; padding:8px 14px;
            margin:6px 0; font-size:13px; text-align:center;
            animation: fadeIn .2s;
        }

        /* ─── Date separator ─── */
        .date-sep {
            text-align:center; margin:10px 0;
            font-size:11px; color:rgba(255,255,255,.35);
            position:relative;
        }
        .date-sep::before,.date-sep::after {
            content:''; position:absolute; top:50%; width:30%; height:1px;
            background:rgba(255,255,255,.12);
        }
        .date-sep::before{ left:0; }
        .date-sep::after { right:0; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <button class="back-btn" onclick="goBack()">←</button>
        <div class="friend-info">
            <div class="friend-avatar" id="friendAvatar">👤</div>
            <div class="friend-meta">
                <div class="friend-name"  id="friendName">好友</div>
                <div class="friend-status">
                    <div class="friend-status-dot" id="friendStatusDot"></div>
                    <span id="friendStatusText">获取中...</span>
                </div>
            </div>
        </div>
    </div>
    <div class="conn-status">
        <div class="conn-dot" id="connDot"></div>
        <span id="connText">连接中</span>
    </div>
</div>

<div class="chat-container">
    <div class="messages-area" id="messagesArea">
        <div class="loading-state">加载中...</div>
    </div>

    <!-- 正在输入指示器 -->
    <div class="typing-indicator" id="typingIndicator">
        <div class="typing-bubble">
            <span></span><span></span><span></span>
            <span class="typing-text" id="typingText">对方正在输入...</span>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="messageInput" class="message-input"
               placeholder="输入消息... (Enter 发送)" maxlength="1000">
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
    </div>
</div>

<script src="js/api-client.js"></script>
<script>
// ─── 参数 & 用户 ───────────────────────────────────────────
const urlParams  = new URLSearchParams(window.location.search);
const friendId   = urlParams.get('friendId');
const friendName = decodeURIComponent(urlParams.get('friendName')   || '好友');
const friendAvt  = decodeURIComponent(urlParams.get('friendAvatar') || '👤');

const userData        = JSON.parse(localStorage.getItem('campus_user') || '{}');
const currentUserId   = userData.userId   || 'student_001';
const currentUserName = userData.nickname || userData.name || '玩家';
const currentUserAvt  = userData.avatar   || '👤';

// ─── DOM ──────────────────────────────────────────────────
const messagesArea    = document.getElementById('messagesArea');
const messageInput    = document.getElementById('messageInput');
const sendBtn         = document.getElementById('sendBtn');
const connDot         = document.getElementById('connDot');
const connText        = document.getElementById('connText');
const friendStatusDot = document.getElementById('friendStatusDot');
const friendStatusTxt = document.getElementById('friendStatusText');

// ─── 状态 ─────────────────────────────────────────────────
let renderedIds  = new Set();
let realtimeCh   = null;
let heartbeatTimer = null;
let onlineTimer  = null;

// ─── 连接状态 UI ───────────────────────────────────────────
function setConnStatus(state, label) {
    connDot.className = `conn-dot ${state}`;
    connText.textContent = label;
}

function setFriendOnline(online) {
    friendStatusDot.className = `friend-status-dot ${online ? 'online' : 'offline'}`;
    friendStatusTxt.textContent = online ? '在线' : '离线';
}

// ─── 消息渲染 ─────────────────────────────────────────────
function renderMessages(messages) {
    messagesArea.innerHTML = '';
    renderedIds.clear();
    if (!messages.length) {
        messagesArea.innerHTML = '<div class="empty-state">还没有消息，开始聊天吧！🎉</div>';
        return;
    }
    let lastDate = '';
    messages.forEach(msg => {
        const d = new Date(msg.createdAt).toLocaleDateString('zh-CN');
        if (d !== lastDate) {
            lastDate = d;
            const sep = document.createElement('div');
            sep.className = 'date-sep';
            sep.textContent = d;
            messagesArea.appendChild(sep);
        }
        appendMessage(msg);
    });
}

function appendMessage(msg, isOwnOverride) {
    const id = String(msg._id || msg.id || '');
    if (id && renderedIds.has(id)) return;
    if (id) renderedIds.add(id);

    const empty = messagesArea.querySelector('.empty-state, .loading-state');
    if (empty) empty.remove();

    const isOwn = isOwnOverride !== undefined ? isOwnOverride : (msg.fromUserId || msg.from_user_id) === currentUserId;
    const div   = document.createElement('div');
    div.className = `message ${isOwn ? 'own' : ''}`;
    if (id) div.dataset.msgId = id;

    const time = new Date(msg.createdAt || msg.created_at || Date.now())
        .toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
    const avt = isOwn ? currentUserAvt : (msg.fromUserAvatar || msg.from_user_avatar || friendAvt || '👤');
    const txt  = msg.content || '';

    div.innerHTML = `
        <div class="message-avatar">${avt}</div>
        <div class="message-content">
            <div class="message-text">${escapeHtml(txt)}</div>
            <div class="message-time">${time}</div>
        </div>`;
    messagesArea.appendChild(div);
    scrollBottom();
}

// ─── 加载历史消息 ─────────────────────────────────────────
async function loadMessages() {
    try {
        const res = await apiClient.getMessages(currentUserId, friendId);
        if (res && res.success) renderMessages(res.data || []);
    } catch (err) {
        if (!renderedIds.size) {
            messagesArea.innerHTML = `<div class="empty-state">加载失败：${err.message}</div>`;
        }
    }
}

// ─── Supabase 实时订阅（接收新消息）─────────────────────
async function initRealtime() {
    try {
        const db = await apiClient.getDB();
        realtimeCh = db
            .channel(`chat_${currentUserId}`)
            .on('postgres_changes', {
                event : 'INSERT',
                schema: 'public',
                table : 'messages',
                filter: `to_user_id=eq.${currentUserId}`
            }, (payload) => {
                const msg = payload.new;
                // 只显示来自当前好友的消息
                if (msg.from_user_id === friendId) {
                    appendMessage(msg, false);
                }
            })
            .subscribe((status) => {
                if (status === 'SUBSCRIBED') {
                    setConnStatus('live', '实时');
                } else if (status === 'CHANNEL_ERROR') {
                    setConnStatus('poll', '轮询');
                }
            });
    } catch (e) {
        console.warn('实时订阅失败，使用轮询:', e);
        setConnStatus('poll', '轮询');
        setInterval(loadMessages, 5000);
    }
}

// ─── 心跳：保持在线状态 ───────────────────────────────────
function startHeartbeat() {
    apiClient.updateLastSeen(currentUserId);
    heartbeatTimer = setInterval(() => apiClient.updateLastSeen(currentUserId), 15000);
}

// ─── 检查好友在线状态 ────────────────────────────────────
async function checkFriendOnline() {
    const result = await apiClient.checkOnlineStatus([friendId]);
    setFriendOnline(!!result[friendId]);
}

// ─── 发送消息 ────────────────────────────────────────────
async function sendMessage() {
    const content = messageInput.value.trim();
    if (!content || sendBtn.disabled) return;

    lockSend();
    messageInput.value = '';

    // 乐观显示（自己发送的消息立即显示）
    const tempId = 'temp_' + Date.now();
    appendMessage({
        _id: tempId,
        fromUserId: currentUserId,
        fromUserAvatar: currentUserAvt,
        content,
        createdAt: new Date().toISOString()
    }, true);

    try {
        const res = await apiClient.sendMessage(currentUserId, friendId, content);
        if (res && res.success) {
            // 移除临时消息，显示真实消息（带真实ID去重）
            const tempEl = messagesArea.querySelector(`[data-msg-id="${tempId}"]`);
            if (tempEl) {
                renderedIds.delete(tempId);
                tempEl.remove();
            }
            appendMessage(res.data, true);
        } else throw new Error(res?.message || '发送失败');
    } catch (e) {
        showToast(e.message || '发送失败');
        // 移除临时消息
        const tempEl = messagesArea.querySelector(`[data-msg-id="${tempId}"]`);
        if (tempEl) { renderedIds.delete(tempId); tempEl.remove(); }
    } finally {
        unlockSend();
        messageInput.focus();
    }
}

function lockSend()   { sendBtn.disabled = true;  sendBtn.textContent = '发送中...'; }
function unlockSend() { sendBtn.disabled = false; sendBtn.textContent = '发送'; }

// ─── 工具 ────────────────────────────────────────────────
function scrollBottom() { messagesArea.scrollTop = messagesArea.scrollHeight; }
function escapeHtml(t) {
    const d = document.createElement('div');
    d.textContent = t; return d.innerHTML;
}
function showToast(msg) {
    const div = document.createElement('div');
    div.className = 'error-toast';
    div.textContent = msg;
    messagesArea.appendChild(div);
    scrollBottom();
    setTimeout(() => div.remove(), 4000);
}
function goBack() {
    if (window.history.length > 1) window.history.back();
    else window.location.href = 'campus-friends.html';
}

// ─── 初始化 ───────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
    if (!friendId) { alert('缺少好友ID，请从好友列表进入'); goBack(); return; }

    document.getElementById('friendName').textContent   = friendName;
    document.getElementById('friendAvatar').textContent = friendAvt;

    setConnStatus('poll', '加载中');

    // 确保当前用户存在于数据库
    try {
        const r = await apiClient.getUser(currentUserId);
        if (!r.success) throw new Error('not found');
    } catch {
        await apiClient.createOrUpdateUser({
            userId: currentUserId,
            name  : currentUserName,
            avatar: currentUserAvt
        }).catch(() => {});
    }

    // 加载历史消息
    await loadMessages();

    // 初始化实时订阅
    await initRealtime();

    // 心跳 & 好友在线状态
    startHeartbeat();
    await checkFriendOnline();
    onlineTimer = setInterval(checkFriendOnline, 30000);

    // 输入监听
    messageInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
});
</script>
</body>
</html>
